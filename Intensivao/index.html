<head>
  <meta charset="utf-8">

  <title>Intensiv&atilde;o TEME26</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --paper: #ffffff;
      --ink: #202124;
      --muted: #666b70;
      --line: #deded7;
      --accent: #0f6b5f;
      --accent-soft: #e3f1ed;
      --warn: #8a4c00;
      --code: #f2f3f0;
      --shadow: 0 12px 36px rgba(31, 35, 40, .08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    .layout {
      display: grid;
      grid-template-columns: clamp(280px, 18vw, 340px) minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      border-right: 1px solid var(--line);
      background: #fbfbf8;
      padding: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand h1 {
      font-size: 1rem;
      line-height: 1.2;
      margin: 0;
    }

    .brand small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-weight: 500;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      font-size: .95rem;
      background: var(--paper);
      color: var(--ink);
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    nav {
      display: grid;
      gap: 6px;
      margin-top: 14px;
    }

    .nav-item {
      border: 0;
      border-radius: 8px;
      padding: 10px 11px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      font: inherit;
      cursor: pointer;
      line-height: 1.25;
    }

    .nav-item:hover,
    .nav-item.active {
      background: var(--accent-soft);
      color: #07463e;
    }

    .nav-item small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: .76rem;
    }

    main {
      padding: 20px clamp(16px, 2vw, 34px);
    }

    .article-shell {
      width: 100%;
      max-width: min(1500px, calc(100vw - clamp(280px, 18vw, 340px) - 52px));
      margin: 0 auto;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 0 18px;
      background: linear-gradient(var(--bg) 72%, rgba(247, 247, 244, 0));
    }

    .toolbar button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      padding: 9px 11px;
      font: inherit;
      cursor: pointer;
    }

    .toolbar button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .doc-meta {
      color: var(--muted);
      font-size: .88rem;
    }

    article {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(26px, 2.2vw, 42px);
      box-shadow: var(--shadow);
    }

    article h1 {
      margin-top: 0;
      font-size: clamp(1.8rem, 5vw, 2.75rem);
      line-height: 1.05;
    }

    article h2 {
      margin-top: 2.2rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--line);
      font-size: 1.35rem;
      line-height: 1.2;
    }

    article h3 {
      margin-top: 1.5rem;
      font-size: 1.08rem;
    }

    article p,
    article li,
    article td,
    article th,
    article blockquote {
      font-size: 1.04rem;
      line-height: 1.62;
    }

    article a {
      color: var(--accent);
      font-weight: 650;
      text-decoration: none;
    }

    article a:hover {
      text-decoration: underline;
    }

    blockquote {
      margin: 1.1rem 0;
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
    }

    code {
      background: var(--code);
      border-radius: 5px;
      padding: 2px 5px;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: .92em;
    }

    pre,
    .mermaid {
      overflow: auto;
      background: var(--code);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      white-space: pre;
    }

    .mermaid[data-processed="true"] {
      white-space: normal;
      min-height: 360px;
    }

    .mermaid svg {
      display: block;
      width: max(100%, 1180px);
      max-width: none;
      height: auto !important;
      margin: 0 auto;
    }

    .mermaid svg .nodeLabel,
    .mermaid svg .edgeLabel,
    .mermaid svg .label,
    .mermaid svg foreignObject {
      font-size: 17px !important;
      line-height: 1.25 !important;
    }

    pre code {
      background: transparent;
      padding: 0;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      margin: 1rem 0;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
      background: var(--paper);
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      vertical-align: top;
      text-align: left;
    }

    th {
      background: #f0f1ed;
      font-weight: 750;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .empty {
      padding: 14px 10px;
      color: var(--muted);
      font-size: .92rem;
    }

    .mobile-title {
      display: none;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: .88rem;
    }

    @media (max-width: 860px) {
      .layout {
        display: block;
      }

      aside {
        position: relative;
        height: auto;
        max-height: 45vh;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      main {
        padding: 14px;
      }

      .article-shell {
        max-width: none;
      }

      article {
        padding: 22px 18px;
      }

      .mermaid[data-processed="true"] {
        min-height: 280px;
      }

      .mermaid svg {
        width: max(100%, 920px);
      }

      .toolbar {
        padding-top: 8px;
      }

      .doc-meta {
        display: none;
      }

      .mobile-title {
        display: block;
      }

      th,
      td {
        padding: 9px 10px;
      }
    }

    @media print {
      aside,
      .toolbar {
        display: none;
      }

      .layout {
        display: block;
      }

      main {
        padding: 0;
      }

      article {
        border: 0;
        box-shadow: none;
      }
    }

  <script>
    const DOCUMENTS = [{"id":"LEITURA_OFICIAL.md","title":"Intensivão TEME26","markdown":"# Intensivão TEME26\n\nMaterial modular para revisão dirigida ao TEME26/RQE em Medicina de Emergência.\n\nObjetivo: estudar com foco em aprovação, usando o padrão das provas TEME22-25, as estações práticas, o conteúdo programático oficial de 2026, as referências do edital e atualizações clínicas relevantes.\n\n> Este material é educacional e deve ser confrontado com protocolos locais, disponibilidade de recursos e julgamento clínico. Quando houver divergência, a resposta de prova fica destacada e a atualização clínica entra em box separado.\n\n## Como estudar\n\n1. Leia a ficha do tema em uma passada rápida.\n2. Refaça mentalmente o fluxograma sem olhar.\n3. Decore a tabela de doses, alvos e números.\n4. Leia as pegadinhas TEME.\n5. Termine pelo checklist de revisão.\n\n## Ordem Prioritária\n\n| Ordem | Tema                                                         | Status | Arquivo                                                        |\n| ----: | ------------------------------------------------------------ | ------ | -------------------------------------------------------------- |\n|     1 | Via aérea e ventilação mecânica                              | Pronto | [Abrir](temas/001_via-aerea_vm.md)                             |\n|     2 | Trauma hemorrágico, controle de dano e transfusão maciça     | Pronto | [Abrir](temas/002_trauma-hemorragico.md)                       |\n|     3 | Reanimação/PCR adulto, pediátrica e pós-RCE                  | Pronto | [Abrir](temas/003_reanimacao-pcr.md)                           |\n|     4 | POCUS no choque, trauma, PCR e dispneia                      | Pronto | [Abrir](temas/004_pocus.md)                                    |\n|     5 | Síndrome coronariana, arritmias e emergências hipertensivas  | Pronto | [Abrir](temas/005_sca-arritmias-hipertensivas.md)              |\n|     6 | Choque, sepse e drogas vasoativas                            | Pronto | [Abrir](temas/006_choque-sepse-vasoativos.md)                  |\n|     7 | Emergências neurológicas: AVC, crise convulsiva, HIC e TCE   | Pronto | [Abrir](temas/007_emergencias-neurologicas.md)                 |\n|     8 | Toxicologia e animais peçonhentos                            | Pronto | [Abrir](temas/008_toxicologia-animais-peconhentos.md)          |\n|     9 | Emergências obstétricas e ginecológicas                      | Pronto | [Abrir](temas/009_emergencias-obstetricas-ginecologicas.md)    |\n|    10 | Emergências pediátricas                                      | Pronto | [Abrir](temas/010_emergencias-pediatricas.md)                  |\n|    11 | Distúrbios metabólicos, endócrinos, renais e gasometria      | Pronto | [Abrir](temas/011_disturbios-metabolicos-renais-gasometria.md) |\n|    12 | Emergências respiratórias: asma, DPOC, pneumonia, TEP e SDRA | Pronto | [Abrir](temas/012_emergencias-respiratorias.md)                |\n|    13 | APH, regulação, IMV, desastres e transporte                  | Pronto | [Abrir](temas/013_aph-regulacao-imv-desastres-transporte.md)   |\n|    14 | Gastro, hepatologia e abdome agudo                           | Pronto | [Abrir](temas/014_gastro-hepatologia-abdome-agudo.md)          |\n|    15 | Hemato-oncologia na emergência                               | Pronto | [Abrir](temas/015_hemato-oncologia-emergencia.md)              |\n|    16 | Dermato, reumato, alergia e anafilaxia                       | Pronto | [Abrir](temas/016_dermato-reumato-alergia-anafilaxia.md)       |\n|    17 | Paliativos, vulnerabilidades, ética, legislação e gestão     | Pronto | [Abrir](temas/017_paliativos-vulnerabilidades-etica-gestao.md) |\n|    18 | Infectologia na emergência                                   | Pronto | [Abrir](temas/018_infectologia-emergencia.md)                  |\n|    19 | Oftalmo, otorrino e odonto                                   | Pronto | [Abrir](temas/019_oftalmo-otorrino-odonto.md)                  |\n|    20 | Urologia na emergência                                       | Pronto | [Abrir](temas/020_urologia-emergencia.md)                      |\n|    21 | Ortopedia, trauma de extremidades e queimaduras              | Pronto | [Abrir](temas/021_ortopedia-extremidades-queimaduras.md)       |\n|    22 | Psiquiatria, agitação e contenção                            | Pronto | [Abrir](temas/022_psiquiatria-agitacao-contencao.md)           |\n|    23 | Procedimentos, analgesia e sedação                           | Pronto | [Abrir](temas/023_procedimentos-analgesia-sedacao.md)          |\n|    24 | Cardiovascular complementar                                  | Pronto | [Abrir](temas/024_cardiovascular-complementar.md)              |\n\n## Arquivos de apoio\n\n- [REGRAS_DO_MATERIAL.md](REGRAS_DO_MATERIAL.md): combinados editoriais, hierarquia de fontes e como lidar com conflitos.\n- [TEMPLATE_TEMA.md](TEMPLATE_TEMA.md): modelo a ser copiado para novos capítulos.\n- [MAPA_DE_QUESTOES_TEME22-25.md](MAPA_DE_QUESTOES_TEME22-25.md): rastreio inicial dos temas que apareceram nas provas e onde revisar.\n- [assets/README.md](assets/README.md): pasta para imagens, fluxos exportados e esquemas.\n\n## Próximos passos\n\n- Revisar os capítulos em ciclos curtos, corrigindo estilo e prioridade conforme simulados.\n- Refinar o mapa de questões até cobrir questão por questão das provas TEME22-25.\n- Acrescentar imagens/esquemas próprios em `assets/` quando um fluxograma Mermaid não bastar.\n- Atualizar referências que mudarem até o TEME26 e registrar revisões pós-simulado.\n"},{"id":"MAPA_DE_QUESTOES_TEME22-25.md","title":"Mapa de Questões TEME22-25","markdown":"# Mapa de Questões TEME22-25\n\nEste mapa é um rastreio inicial para evitar ponto cego. Ele cruza o conteúdo programático TEME26, os capítulos do Intensivão e termos recorrentes encontrados nos cadernos TEME22-25. A próxima passada deve transformar cada linha em questão exata, gabarito e comentário curto.\n\n## Como usar\n\n1. Leia a coluna \"Onde revisar\" antes de fazer questões.\n2. Marque a questão no PDF quando encontrar o enunciado.\n3. Se a questão cair fora do capítulo indicado, anote em \"Ajuste futuro\".\n4. Priorize temas que aparecem em mais de um ano ou que viraram estação prática.\n\n## Cobertura rápida\n\n| Tema | Sinais nas provas TEME22-25 | Onde revisar | Status |\n|---|---|---|---|\n| Via aérea e VM | Todos os anos; prática 2024/2025; auto-PEEP, RSI, via aérea difícil | [001](temas/001_via-aerea_vm.md) | Forte |\n| Trauma hemorrágico | Torniquete, pelve, transfusão, TXA, cálcio, hipotermia | [002](temas/002_trauma-hemorragico.md) | Forte |\n| PCR e pós-RCE | Ritmos, gestante, pediatria, tamponamento, TEP, temperatura | [003](temas/003_reanimacao-pcr.md) | Forte |\n| POCUS | BLUE, FAST/eFAST, CASA, aorta, punção guiada, ONSD/ocular | [004](temas/004_pocus.md) | Forte |\n| SCA/arritmias/PA | IAMCST, bradi/taqui, SCAPE, dissecção, choque cardiogênico | [005](temas/005_sca-arritmias-hipertensivas.md) | Forte |\n| Choque/sepse/DVA | Choque oculto, lactato, noradrenalina periférica, fluido-responsividade | [006](temas/006_choque-sepse-vasoativos.md) | Forte |\n| Neuro | AVC, HSA, TCE/HIC, crise, morte encefálica, SGB/miastenia | [007](temas/007_emergencias-neurologicas.md) | Forte |\n| Toxicologia/peçonhentos | Carvão, naloxona, salicilato, metanol, organofosforado, escorpião | [008](temas/008_toxicologia-animais-peconhentos.md) | Forte |\n| Obstetrícia/gineco | Eclâmpsia, ectópica, HPP, violência sexual, parto, HELLP | [009](temas/009_emergencias-obstetricas-ginecologicas.md) | Forte |\n| Pediatria | Sepse, asma/bronquiolite, convulsão febril, falciforme, abuso | [010](temas/010_emergencias-pediatricas.md) | Forte |\n| Metabólico/renal/gaso | CAD/EHH, Na/K/Ca, tireoide, diálise, rabdomiólise | [011](temas/011_disturbios-metabolicos-renais-gasometria.md) | Forte |\n| Respiratório | DPOC, asma, pneumonia, TEP, SDRA, derrame, traqueostomia | [012](temas/012_emergencias-respiratorias.md) | Forte |\n| APH/desastres | SAMU/regulação, START, transporte, CBRN, altitude, afogamento | [013](temas/013_aph-regulacao-imv-desastres-transporte.md) | Forte |\n| Gastro/hepato/abdome | HDA, PBE, pancreatite, colangite, apendicite, C. difficile | [014](temas/014_gastro-hepatologia-abdome-agudo.md) | Forte |\n| Hemato-onco | Neutropenia febril, falciforme, lise tumoral, transfusão | [015](temas/015_hemato-oncologia-emergencia.md) | Forte |\n| Dermato/reumato/alergia | Anafilaxia, angioedema, celulite, fasciite, SJS/TEN, monoartrite | [016](temas/016_dermato-reumato-alergia-anafilaxia.md) | Forte |\n| Ética/gestão/paliativos | Morte encefálica, CFM, alta segura, paliativo, vulneráveis | [017](temas/017_paliativos-vulnerabilidades-etica-gestao.md) | Forte |\n| Infectologia | HIV/TB, meningite, dengue, IST/PEP, febre e antibiótico empírico | [018](temas/018_infectologia-emergencia.md) | Novo |\n| Oftalmo/otorrino/odonto | Olho vermelho, glaucoma, retina, vertigem, epistaxe, infecção odontogênica | [019](temas/019_oftalmo-otorrino-odonto.md) | Novo |\n| Urologia | Torção testicular, obstrução infectada, priapismo, parafimose | [020](temas/020_urologia-emergencia.md) | Novo |\n| Ortopedia/queimaduras | Fratura exposta, luxações, compartimental, queimadura, lesão inalatória | [021](temas/021_ortopedia-extremidades-queimaduras.md) | Novo |\n| Psiquiatria/agitação | BARS, contenção, delirium, psicose, abstinência, suicídio | [022](temas/022_psiquiatria-agitacao-contencao.md) | Novo |\n| Procedimentos/sedação | Sedação procedural, bloqueios, toracocentese, paracentese, analgesia | [023](temas/023_procedimentos-analgesia-sedacao.md) | Novo |\n| Cardio complementar | Pericardite, miocardite, endocardite, tamponamento, aorta, TEV/TVP | [024](temas/024_cardiovascular-complementar.md) | Novo |\n\n## Rastreio por ano\n\n| Ano | Questões citadas nominalmente nos capítulos | Temas que ainda exigiam capítulo próprio |\n|---|---:|---|\n| TEME22 | 57 | Olho/glaucoma, HIV/TB/meningite/dengue, psiquiatria, fratura, afogamento/altitude/descompressão |\n| TEME23 | 41 | Fratura/luxação/compartimental, pielonefrite obstrutiva, afogamento/mergulho, otorrino/vertigem |\n| TEME24 | 40 | Olho vermelho/glaucoma, HIV/TB/meningite/encefalite/dengue, agitação/contenção/delirium, queimadura |\n| TEME25 | 48 | POCUS ocular/retina, HIV/TB/meningite/dengue, BARS/agitação, torção testicular, fraturas/luxações |\n\n## Lista de ataque\n\n1. Fazer uma passada nos capítulos 018-024.\n2. Voltar aos PDFs e marcar as questões exatas no cabeçalho de cada capítulo.\n3. Criar cartões rápidos para números de prova: PEP 72 h/28 dias, torção <6 h, priapismo >4 h, queimadura grave, BARS 6-7, dengue com sinais de alarme.\n4. Após cada simulado, atualizar a coluna de \"Status\": Forte, fraco, revisar ou erro recorrente.\n\n## Pegadinhas transversais\n\n- \"Paciente está calmo\" não significa melhora: pode ser exaustão, hipercapnia, hipoglicemia, choque ou sedação.\n- \"Exame normal\" não exclui emergência tempo-dependente: retina, torção testicular, síndrome compartimental, meningite inicial.\n- \"Encaminhar especialista\" não substitui conduta inicial do emergencista.\n- \"Dar antibiótico\" não substitui controle de foco: abscesso, obstrução urinária infectada, colangite, fasciite, empiema.\n- \"Fazer imagem\" não pode atrasar tratamento se o diagnóstico clínico é tempo-dependente.\n"},{"id":"temas/001_via-aerea_vm.md","title":"001 - Via Aérea e Ventilação Mecânica","markdown":"# 001 - Via Aérea e Ventilação Mecânica\n\n## Leitura de 30 segundos\n\n- Intubar não é \"passar tubo\": é **oxigenar, ventilar, proteger via aérea e sobreviver ao peri-intubação**.\n- A banca ama a diferença entre via aérea difícil anatômica, via aérea difícil fisiológica e via aérea falha.\n- Em paciente crítico, a melhor primeira tentativa é a que foi preparada: equipe, plano B, pré-oxigenação, ressuscitação, drogas, capnografia e sedação pós-IOT.\n- Em VM, prova cobra o básico bem feito: VCV/PCV, volume corrente por peso predito, pressão de plato, driving pressure, gasometria, curva fluxo-tempo e auto-PEEP.\n\n## Por que cai\n\nVia aérea e VM aparecem todos os anos nas provas TEME22-25 e nas práticas. O padrão da banca é caso clínico com decisão sob pressão: intoxicado agitado, gestante eclâmptica, trauma, choque, DPOC/asma, TCE, PCR, falha de ventilação ou curva de ventilador.\n\nNa prática, caiu de forma direta:\n\n- 2022: BVM/dispositivo extraglótico, troubleshooting e trauma + POCUS.\n- 2023: IOT com laringoscopia direta + bougie e suspeita de TRM.\n- 2024: cricotireoidostomia cirúrgica ou por punção.\n- 2025: modo VCV, gasometria, auto-PEEP na curva fluxo-tempo e correção por redução do volume minuto.\n\nO que a banca costuma testar:\n\n- Indicações de IOT: proteção de via aérea, falha de oxigenação/ventilação, curso clínico previsível.\n- Pré-oxigenação adequada e apneic oxygenation.\n- Escolha de droga em RSI conforme contexto fisiológico.\n- Reconhecimento de via aérea falha e NINO/CICO.\n- Capnografia e deterioração pós-IOT.\n- Ajuste inicial do ventilador e interpretação de curvas.\n\n## Conceitos que sustentam a conduta\n\nO erro cognitivo mais comum é tratar a intubação como procedimento isolado. Para a prova e para a sala vermelha, ela deve ser vista como uma sequência de risco: antes da laringoscopia vem oxigenação, hemodinâmica, acidose, preparo de resgate e plano de sedação; depois da passagem do tubo vem confirmação, ventilação e prevenção de colapso.\n\nVia aérea difícil pode ser anatômica, fisiológica ou ambas. A anatômica dificulta ver ou acessar a glote. A fisiológica faz o paciente morrer durante uma tentativa tecnicamente perfeita: hipoxemia, choque, acidose metabólica grave, falência de VD, gestação e obesidade reduzem a margem de erro.\n\nEm VM, a banca costuma cobrar a mecânica básica: volume corrente depende do peso predito, pressão de plato estima distensão alveolar no paciente passivo, driving pressure resume a relação entre volume entregue e complacência, e auto-PEEP aparece quando o fluxo expiratório não retorna a zero antes da próxima inspiração.\n\n## Abordagem prática\n\n### 1. Decida Se Precisa De Via aérea definitiva\n\nTrês indicações clássicas:\n\n1. **Não protege via aérea:** coma, sangramento, vômitos, secreção, trauma facial, convulsão recorrente.\n2. **Não oxigena ou não ventila:** hipoxemia refratária, hipercapnia com acidemia, fadiga, trabalho respiratório extremo.\n3. **Vai piorar:** queimadura/inalação, angioedema, hematoma cervical, sepse/choque em exaustão, transporte inseguro, necessidade de procedimento/imagem.\n\nMensagem de prova: Glasgow baixo ajuda, mas não é a única indicação. Não espere o paciente \"zerar\" para assumir a via aérea.\n\n### 2. Chame Ajuda E Prepare A Primeira Tentativa\n\nAntes de induzir:\n\n- Monitor: ECG, PA frequente, SpO2, capnografia pronta.\n- Acesso venoso ou intraósseo funcionante.\n- Aspiração ligada.\n- BVM com PEEP, máscara adequada e técnica a quatro mãos se possível.\n- Vídeo ou laringoscópio direto, bougie, tubos testados, seringa, fixação.\n- Dispositivo extraglótico de resgate.\n- Kit de crico aberto ou imediatamente acessível.\n- Vasopressor pronto se choque/risco de colapso.\n- Sedação e analgesia pós-IOT prescritas antes do bloqueador.\n\n### 3. Otimize Fisiologia Antes Da Laringoscopia\n\nVia aérea fisiologicamente difícil mata antes da anatomia.\n\nUse o mnemônico **CRASH**:\n\n| Letra | Problema | O que fazer antes da indução |\n|---|---|---|\n| C | Consumo de O2 aumentado | pré-oxigenar melhor; reduzir tempo de apneia |\n| R | Right ventricle/VD em risco | Evitar hipoxemia, hipercapnia e hipotensão |\n| A | Acidose grave | Manter ventilação-minuto; não deixar apneia longa |\n| S | Saturação baixa | VNI/HFNC/BVM com PEEP; rampa/cabeceira elevada |\n| H | Hipotensão | Fluido se responsivo, sangue se hemorragia, vasopressor pronto |\n\nRegra de sala vermelha: se dá para oxigenar por BVM/VNI, dá para ganhar tempo para preparar. Se não dá para oxigenar, é via aérea falha em evolução.\n\n### 4. Faça RSI Quando A Primeira Tentativa Tem Boa Chance\n\nSequência prática:\n\n1. preparação e plano verbalizado.\n2. Pré-oxigenação por 3-5 min ou 8 respirações profundas se cooperativo.\n3. Posicionamento: rampa/cabeceira elevada; estabilização manual em linha se trauma cervical.\n4. Indução + bloqueador em dose plena.\n5. Laringoscopia com a melhor ferramenta disponível; bougie cedo se visão parcial.\n6. Confirmar com capnografia em onda, ausculta e expansibilidade.\n7. Fixar, sedar, analgesiar, ventilar e reavaliar hemodinâmica.\n\n### 5. Se Falhou, Pare De Repetir O Mesmo Erro\n\nDepois de tentativa ruim:\n\n- Reoxigene.\n- Melhore posição, aspiração, lâmina, operador e dispositivo.\n- Use bougie se Cormack-Lehane II/III favorável.\n- Use dispositivo extraglótico se ventilação por máscara está ruim ou tentativa nova não é segura.\n- Declare via aérea falha cedo se não oxigena.\n\nDefinição operacional para prova: via aérea falha = duas tentativas sem sucesso por intubador experiente, ou uma tentativa sem sucesso no paciente \"forçado a agir\" e que não tolera nova demora.\n\n## Fluxograma\n\n```mermaid\nflowchart TD\n    A[Paciente com indicação de via aérea] --> B{Parado ou agônico?}\n    B -->|Sim| C[Algoritmo de PCR: BVM, compressão, DEG/IOT conforme equipe]\n    B -->|Não| D{predição de via aérea difícil?}\n    D -->|Não| E[RSI preparada]\n    D -->|Sim| F{Consigo oxigenar e esperar?}\n    F -->|Sim| G[Plano acordado/duplo preparo: especialista, vídeo/fibro, crico pronta]\n    F -->|Não| H[Forçado a agir: melhor tentativa + plano de resgate imediato]\n    E --> I{IOT confirmou por capnografia?}\n    G --> I\n    H --> I\n    I -->|Sim| J[Pós-IOT: sedação, VM, gasometria, Rx/POCUS, DOPE se piora]\n    I -->|Não| K[Reoxigenar e mudar estratégia]\n    K --> L{Oxigena com BVM/DEG?}\n    L -->|Sim| M[Nova tentativa otimizada ou via aérea definitiva alternativa]\n    L -->|Não| N[NINO/CICO: cricotireoidostomia]\n```\n\n## Via aérea difícil: Mnemônicos Que Caem\n\n| Mnemônico | Serve para prever | Itens-chave |\n|---|---|---|\n| LEMON | Laringoscopia difícil | Look, 3-3-2, Mallampati, obstrução, mobilidade cervical |\n| ROMAN | BVM difícil | radiação/restrição, obesidade/obstrução, máscara com barba, idade avançada, no teeth |\n| RODS | Dispositivo extraglótico difícil | Restrição abertura, obstrução, distorção, rigidez pulmonar/cervical |\n| SMART | Crico difícil | Surgery, massa, acesso/anatomia, radiação, tumor/trauma |\n| MACOCHA | IOT difícil em UTI/crítico | Mallampati, apneia, cervical, abertura oral, coma, hipoxemia, operador não anestesista |\n\nPegadinha: videolaringoscopia melhora visão, mas não garante passagem do tubo. Se a lâmina é hiperangulada, o tubo precisa de estilete bem moldado e trajetória adequada.\n\n## Doses, alvos e números\n\n### Drogas Da RSI\n\n### Indutores\n\n| Droga | Dose habitual adulto IV | Melhor uso | Cuidado de prova/prática |\n|---|---:|---|---|\n| Etomidato | 0,3 mg/kg | Instabilidade hemodinâmica, paciente crítico | Não analgesia; mioclonia; discussão sobre supressão adrenal |\n| Cetamina | 1-2 mg/kg | Broncoespasmo, dor, hipotensão sem catecolamina esgotada | Pode aumentar FC/PA; em choque catecolamina-depletado também pode hipotensar |\n| Propofol | 0,5-1,5 mg/kg no crítico | Convulsão, HIC selecionada, paciente estável | Hipotensão e vasodilatação; evitar dose cheia no choque |\n| Midazolam | 0,1-0,3 mg/kg | Alternativa quando sem outros indutores | início mais lento; hipotensão; não é preferido para RSI moderna |\n| Fentanil | 1-3 mcg/kg como pretratamento/analgesia | Atenuar resposta simpática, analgesia | Dose alta/rápida pode causar rigidez torácica e hipotensão |\n\n### Bloqueadores Neuromusculares\n\n| Droga | Dose RSI adulto IV | início/duração | Cuidado |\n|---|---:|---|---|\n| Succinilcolina | 1-1,5 mg/kg | Rápida, curta | Evitar em hiperK, queimadura/lesão muscular após 24-48 h, doença neuromuscular, hipertermia maligna, denervação |\n| rocurônio | 1-1,2 mg/kg | Rápido, longo | Exige sedação pós-IOT impecável; paralisia longa máscara convulsão e desconforto |\n\n> **Para prova TEME:** succinilcolina costuma aparecer como bloqueador clássico da RSI quando não há contraindicação. rocurônio é alternativa forte quando há risco de hiperpotassemia, queimadura tardia, doença neuromuscular ou necessidade de evitar succinilcolina.\n>\n> **Na prática clínica:** a escolha entre etomidato/cetamina e succinilcolina/rocurônio depende do contexto, protocolo local, experiência e disponibilidade. Revisões e ensaios recentes sugerem mortalidade semelhante entre cetamina e etomidato, mas a cetamina pode ter mais instabilidade hemodinâmica peri-intubação em pacientes críticos; isso não transforma etomidato em resposta universal.\n\n## Pré-oxigenação\n\nObjetivo: aumentar reserva alveolar de O2 e prolongar tempo de apneia segura.\n\n| situação | Estratégia |\n|---|---|\n| Cooperativo, baixo risco | máscara não reinalante bem vedada 3-5 min ou 8 respirações profundas |\n| Hipoxêmico grave | VNI com PEEP/CPAP ou BVM com PEEP e vedação adequada |\n| Obeso/gestante | Rampa, cabeceira elevada, PEEP, menor tolerância a apneia |\n| DPOC/asma | Evitar hiperinsuflação; permitir expiração; considerar VNI se indicado |\n| Durante apneia | Cateter nasal/HFNC se disponível para oxigenação apneica |\n\nPegadinhas:\n\n- Saturação 100% não garante boa denitrogenação se a técnica foi ruim.\n- máscara frouxa não pré-oxigena.\n- Hipoxêmico shuntado pode não melhorar com máscara simples; precisa PEEP.\n- Acidose grave não tolera apneia: o problema é ventilação-minuto, não só SpO2.\n\n> **Atualização clínica:** o ensaio PREOXI, publicado em 2024, comparou VNI com máscara de oxigênio para pré-oxigenação antes de IOT em adultos críticos no DE/UTI e encontrou menos hipoxemia no grupo VNI. Para prova, continue marcando a técnica descrita como adequada pela referência TEME; para prática, VNI é uma opção forte quando há hipoxemia e não há contraindicação.\n\n## Pós-IOT Imediato\n\nAssim que o tubo passa:\n\n1. Confirmar com capnografia em onda.\n2. Fixar tubo e registrar profundidade.\n3. Auscultar e observar expansão torácica.\n4. Iniciar sedação e analgesia contínua.\n5. Programar ventilador.\n6. Reavaliar PA: hipotensão pós-IOT é comum.\n7. Solicitar gasometria arterial e Rx/POCUS conforme contexto.\n\nSe piorou depois de intubar, pense **DOPE**:\n\n| Letra | Causa | Conduta |\n|---|---|---|\n| D | Deslocamento do tubo | Ver profundidade, capnografia, ausculta; reposicionar |\n| O | Obstrução | Aspirar, checar dobra/mordida/rolha |\n| P | Pneumotórax ou problema pulmonar | US pulmonar, descompressão se instável |\n| E | Equipamento | Desconectar e ventilar com BVM; checar ventilador/circuito |\n\n## Ventilação Mecânica Inicial\n\n### Ajuste Geral De Partida\n\n| Parâmetro | Valor inicial prático | observação |\n|---|---:|---|\n| Modo | A/C VCV ou PCV | VCV facilita prova e leitura de volume; PCV pode melhorar sincronia |\n| VC | 6-8 mL/kg de peso predito | Em SDRA, mirar 6 mL/kg |\n| FR | 16-20 irpm | Reduzir em asma/DPOC para evitar auto-PEEP |\n| PEEP | 5 cmH2O | Aumentar conforme hipoxemia/recrutabilidade |\n| FiO2 | 100% inicialmente se peri-IOT | Reduzir para alvo de SpO2 após estabilizar |\n| Pressão de plato | <= 30 cmH2O | Medir em pausa inspiratória no VCV |\n| Driving pressure | <= 15 cmH2O quando possível | Pplat - PEEP |\n\nPeso predito, não peso real, guia o volume corrente. Obeso não recebe VC por peso total.\n\n### Alvos De Oxigenação E Ventilação\n\n| Contexto | Alvo |\n|---|---|\n| Geral pós-IOT | SpO2 92-96% costuma ser razoável |\n| DPOC/risco de hipercapnia | SpO2 88-92% |\n| TCE grave sem herniação | Evitar hipoxemia; PaCO2 35-40 mmHg |\n| Herniação cerebral iminente | Hiperventilação temporária como ponte, não rotina |\n| SDRA | VC baixo, Pplat <= 30, permissão de hipercapnia se pH tolerável |\n\n## Para prova vs na prática\n\n> **Para prova TEME:** organize a resposta pela referência oficial mais recente: indicação clara de IOT, RSI quando apropriada, succinilcolina ou rocurônio conforme contraindicações, confirmação com capnografia, sedação pós-IOT e VM protetora.\n>\n> **Na prática clínica:** ajuste a técnica ao risco fisiológico e ao time disponível. Em paciente hipoxêmico, VNI/HFNC/BVM com PEEP podem ser melhores que máscara simples para pré-oxigenação. Em choque, ressuscitação e vasopressor pronto importam tanto quanto a lâmina. Em DPOC/asma, a prioridade ventilatória é evitar auto-PEEP, mesmo que o CO2 demore a normalizar.\n\n## Modos Ventilatórios Que Mais Caem\n\n| Modo | O ventilador controla | O que varia | Pegadinha |\n|---|---|---|---|\n| VCV A/C | Volume e fluxo | Pressão | Se complacência piora, pressão sobe |\n| PCV A/C | Pressão é tempo inspiratório | Volume | Se complacência piora, volume cai |\n| PSV | Pressão de suporte nos ciclos espontâneos | Volume e FR dependem do paciente | Não usar como modo pleno em paciente profundamente sedado/paralisado |\n| SIMV + PSV | Ciclos mandatórios + espontâneos assistidos | Misto | Mais complexo; pouco necessário no início |\n\nNa estação prática 2025, o esperado era reconhecer **VCV** pelas curvas e identificar **auto-PEEP** na curva fluxo-tempo.\n\n## Curvas E Auto-PEEP\n\nAuto-PEEP = o paciente inicia a próxima inspiração antes de terminar a expiração. O ar fica preso, aumenta pressão intratorácica, piora retorno venoso, causa hipotensão e dificulta disparo.\n\nSuspeite em:\n\n- DPOC/asma.\n- FR alta.\n- Tempo expiratório curto.\n- Fluxo expiratório que não volta a zero antes da próxima inspiração.\n- Hipotensão ou piora respiratória após ventilação.\n\nComo corrigir:\n\n1. Reduzir volume minuto: principalmente diminuir FR.\n2. Aumentar tempo expiratório: maior fluxo inspiratório, menor tempo inspiratório, relação I:E mais longa.\n3. Reduzir VC se seguro.\n4. Broncodilatador é tratamento da obstrução.\n5. Sedação/analgesia se assincronia.\n6. Em colapso: desconectar brevemente do ventilador e comprimir tórax pode aliviar hiperinsuflação dinâmica enquanto trata causa.\n\n```mermaid\nflowchart TD\n    A[Paciente em VM com obstrução/DPOC/asma] --> B{Fluxo expiratório volta a zero?}\n    B -->|Sim| C[Sem auto-PEEP relevante na curva]\n    B -->|Não| D[Auto-PEEP provável]\n    D --> E[Reduzir FR]\n    E --> F[Aumentar tempo expiratório]\n    F --> G[Tratar broncoespasmo e secreção]\n    G --> H[Reavaliar PA, curva fluxo-tempo e gasometria]\n```\n\n## Cenário Especial: Asma/DPOC Intubado\n\nPrioridade: evitar hiperinsuflação dinâmica.\n\n| Parâmetro | Estratégia |\n|---|---|\n| VC | 6-8 mL/kg peso predito |\n| FR | 8-12 irpm |\n| Fluxo inspiratório | Alto para encurtar inspiração |\n| I:E | Expiração prolongada |\n| pH | Aceitar hipercapnia permissiva se perfusão e pH toleráveis |\n| Pplat | Monitorar; se alta, avaliar hiperinsuflação |\n\nPegadinha TEME: a correção da auto-PEEP não é \"aumentar FR para lavar CO2\". Isso piora aprisionamento de ar.\n\n## Cenário Especial: TCE/HIC\n\n- Evitar hipoxemia sempre.\n- Evitar hipotensão peri-intubação.\n- Cabeceira elevada e cabeça neutra quando possível.\n- PaCO2 alvo usual 35-40 mmHg.\n- Hiperventilação só como medida temporária se sinais de herniação, enquanto terapia definitiva/hiperosmolar/neurocirurgia são acionadas.\n- Sedação e analgesia evitam tosse, hipertensão e aumento de PIC.\n\nPegadinha: hiperventilar todo TCE grave por rotina pode reduzir fluxo cerebral e piorar isquemia.\n\n## Cenário Especial: Gestante\n\n- Dessatura rápido: menor reserva funcional e maior consumo de O2.\n- Maior risco de aspiração.\n- Via aérea edemaciada e sangrante.\n- Deslocamento uterino para esquerda se gestação avançada.\n- Eclampsia: sulfato de magnésio e controle pressor não devem ser esquecidos por causa da via aérea.\n\nPara prova: gestante rebaixada, secreção, SpO2 baixa, eclampsia e risco de broncoaspiração tem indicação forte de IOT em sequência rápida com preparo cuidadoso.\n\n## Cenário Especial: Angioedema/Infecção Cervical\n\nSinais ruins:\n\n- Estridor.\n- Voz abafada.\n- Dificuldade de deglutir saliva.\n- Edema de língua/lábios/pescoço.\n- Trismo ou distorção anatômica.\n\nConduta: chamar ajuda cedo, preparar via aérea difícil e crico. Acordado pode ser melhor se ainda há tempo e cooperação. RSI em via aérea que vai fechar e anatomia distorcida pode transformar dificuldade em NINO.\n\n## Pegadinhas TEME\n\n- **\"Cetamina absolutamente contraindicada\"**: linguagem absoluta quase sempre é suspeita.\n- **Cocaína/agitado/hipertérmico**: benzodiazepínico e controle de temperatura são centrais; beta-bloqueio isolado pode ser armadilha.\n- **Succinilcolina no TCE agudo**: não é contraindicação automática; cuidado maior e hiperK em denervação/queimadura/lesão muscular tardia.\n- **Fentanil na RSI**: não é proibido; dose alta/rápida causa rigidez torácica e hipotensão.\n- **Pré-oxigenação por saturação apenas**: SpO2 boa não prova reserva segura.\n- **Dispositivo extraglótico**: não é solução ideal se obstrução/distorção importante, vômito/sangue ou necessidade de altas pressões.\n- **Capnografia alterada pós-transporte**: pense deslocamento/desconexão antes de diagnósticos raros.\n- **Auto-PEEP**: tratar reduzindo volume minuto e aumentando tempo expiratório.\n- **VC no obeso**: usar peso predito, não peso real.\n- **Hiperventilação no TCE**: ponte para herniação, não rotina.\n\n## Erros fatais na prática\n\n- Induzir antes de ter plano B e crico acessível.\n- Tentar várias laringoscopias sem reoxigenar.\n- Esquecer sedação pós-IOT após rocurônio.\n- Não usar capnografia em onda para confirmar tubo.\n- Intubar o choque sem vasopressor/sangue/ressuscitação preparados.\n- Colocar FR alta em DPOC/asma e causar auto-PEEP com hipotensão.\n- Tratar queda de saturação pós-IOT só aumentando FiO2, sem pensar DOPE.\n- Não pedir gasometria depois de iniciar VM em paciente crítico.\n\n## Checklist de revisão\n\n- [ ] Sei dizer as três indicações clássicas de IOT.\n- [ ] Sei diferenciar via aérea difícil anatômica, fisiológica e falha.\n- [ ] Sei montar a primeira tentativa com plano B.\n- [ ] Sei dose de etomidato, cetamina, propofol, succinilcolina e rocurônio.\n- [ ] Sei contraindicar succinilcolina quando há risco de hiperK.\n- [ ] Sei reconhecer NINO/CICO e indicar crico.\n- [ ] Sei confirmar tubo com capnografia.\n- [ ] Sei programar VM inicial protetora.\n- [ ] Sei reconhecer auto-PEEP na curva fluxo-tempo.\n- [ ] Sei corrigir auto-PEEP reduzindo FR/volume minuto e aumentando tempo expiratório.\n\n## Questões e estações relacionadas\n\n**Provas teóricas**\n\n- TEME22: questões 4, 8, 15, 18, 19, 31, 32, 46, 70, 79, 88, 89, 95.\n- TEME23: questões 2, 14, 16, 21, 37, 46, 48, 56, 64, 81, 82.\n- TEME24: questões 3, 34, 35, 52, 60, 64, 66, 80, 84, 85, 97.\n- TEME25: questões 1, 2, 4, 8, 9, 13, 14, 15, 16, 21, 31, 42, 55, 75, 83, 91.\n\n**Práticas**\n\n- 2022: BVM + dispositivo extraglótico; troubleshooting.\n- 2023: IOT com laringoscopia direta + bougie em suspeita de trauma raquimedular.\n- 2024: via aérea cirúrgica/cricotireoidostomia.\n- 2025: VCV, gasometria, auto-PEEP e correção por redução de volume minuto.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático oficial TEME26: bloco \"Vias aéreas, ventilação e oxigenação\" e \"Cuidados críticos\".\n- Referências bibliográficas TEME26: Tratado de Medicina de Emergência ABRAMEDE, Manual de Via aérea na Emergência, POCUS ABRAMEDE.\n- Provas teóricas TEME22, TEME23, TEME24, TEME25 e estações práticas disponíveis no projeto.\n\n**Material local**\n\n- Emergency Talks: Aula 05 - Via aérea I.\n- Emergency Talks: Aula 50 - Via aérea II.\n- Emergency Talks: Aula 25 e 26 - Ventilação Mecânica I e II.\n- `Emergency Talks/Resumo do Emergency.docx`.\n\n**Atualização clínica**\n\n- American Society of Anesthesiologists. 2022 Practice Guidelines for Management of the Difficult Airway. DOI: https://doi.org/10.1097/ALN.0000000000004002\n- Difficult Airway Society. Guidelines for the management of tracheal intubation in critically ill adults. British Journal of Anaesthesia, 2018. DOI: https://doi.org/10.1016/j.bja.2017.10.021\n- Casey JD et al. Noninvasive Ventilation for Preoxygenation during Emergency Intubation. New England Journal of Medicine, 2024. DOI: https://doi.org/10.1056/NEJMoa2313680\n- Zampieri FG et al. Induction agents for emergency tracheal intubation in critically ill adults: systematic review and network meta-analysis. Critical Care, 2026. DOI: https://doi.org/10.1186/s13054-026-06067-w\n- NIH ARDSNet Ventilator Protocol: low tidal volume ventilation, plateau pressure and oxygenation targets.\n"},{"id":"temas/002_trauma-hemorragico.md","title":"002 - Trauma Hemorrágico, Controle De Dano E Transfusão Maciça","markdown":"# 002 - Trauma Hemorrágico, Controle De Dano E Transfusão Maciça\n\n## Leitura de 30 segundos\n\n- Hemorragia é uma das principais causas evitáveis de morte no trauma: controle mecânico do sangramento vem antes de cristaloide bonito.\n- No XABCDE, o **X** e hemorragia exsanguinante: compressão, packing, torniquete, estabilização pélvica e cirurgia/intervenção precoce.\n- Choque hemorrágico não espera hipotensão: taquicardia, TEC lento, pele fria, confusão, lactato/base déficit e mecanismo grave já bastam para agir.\n- Se precisa de transfusão maciça: aquecer, TXA precoce, sangue/componentes balanceados, cálcio, coagulopatia/ROTEM e controle definitivo do foco.\n- A banca TEME gosta de torniquete, 1:1:1 ou sangue total, eFAST com instabilidade, pelve, hipotermia e armadilhas contra excesso de cristaloide.\n\n## Por que cai\n\nTrauma foi um dos blocos mais recorrentes nas provas TEME22-25 e aparece nas estações práticas. A estação de trauma de 2025 cobrou exatamente o que importa: XABCDE, identificar hemorragia exsanguinante, torniquete correto, horário do torniquete, choque hemorrágico, eFAST, pelve/ossos longos, protocolo de transfusão maciça, TXA, cálcio, aquecimento, exames de coagulopatia/ROTEM e avaliação cirúrgica.\n\nO que a banca costuma testar:\n\n- Controle imediato de sangramento externo antes de se perder em via aérea/TC.\n- Trauma instável + eFAST positivo = cirurgia/controle de fonte, não tomografia.\n- Amputação ou sangramento volumoso de extremidade = torniquete cedo, sem afrouxar a cada 15 min.\n- Choque hemorrágico = sangue/componentes balanceados; cristaloide e ponte curta.\n- TXA deve ser precoce, idealmente dentro de 3 horas.\n- Hipotermia, acidose e coagulopatia formam a tríade letal; hoje muitos incluem hipocalcemia como quarto pilar.\n- Fratura pélvica instável pode sangrar muito e precisa de estabilização mecânica imediata.\n\n## Conceitos que sustentam a conduta\n\nO trauma hemorrágico mata por perda de volume, perda de capacidade de transporte de oxigênio e coagulopatia induzida pelo trauma. Cristaloide em excesso dilui fatores, piora hipotermia, desfaz coágulo e aumenta sangramento. Por isso, a ressuscitação moderna é hemostática: controlar a fonte e repor sangue/componentes de forma balanceada.\n\nO paciente pode estar em choque antes da PAS cair. Jovens compensam com taquicardia e vasoconstrição; gestantes e idosos podem enganar; betabloqueador máscara frequência. A avaliação é sindrômica: mecanismo, perfusão, estado mental, pele, pulso, lactato/base déficit, eFAST e resposta ao tratamento.\n\nControle de dano tem duas metades inseparaveis:\n\n- **Controle anatômico:** torniquete, compressão, packing, binder pélvico, cirurgia, embolização, toracotomia/laparotomia quando indicado.\n- **Ressuscitação fisiológica:** sangue, plasma, plaquetas, TXA, cálcio, fibrinogênio/crio quando indicado, aquecimento e permissão de PA menor até controlar sangramento, exceto situações especiais.\n\n## Abordagem prática\n\n### 1. XABCDE Sem Perder O X\n\n1. **X:** hemorragia externa exsanguinante: compressão direta, packing, torniquete, curativo hemostático.\n2. **A:** via aérea com restrição de movimento cervical; IOT sé indicação, sem atrasar controle de sangramento.\n3. **B:** procurar pneumotórax hipertensivo, Hemotórax maciço, tórax instável, tamponamento.\n4. **C:** pulso, pele, TEC, PA, eFAST, pelve, ossos longos, acessos calibrosos/IO, sangue.\n5. **D:** Glasgow, pupilas, glicemia se necessário; TCE muda alvo pressor.\n6. **E:** expor tudo e aquecer agressivamente.\n\nMensagem de prova: se o sangramento e catastrofico, ele é tratado antes do A. Não existe intubação bonita em paciente que está exsanguinando sem controle.\n\n### 2. Controle Hemorragia Externa\n\n| situação | Conduta |\n|---|---|\n| Sangramento compressível | Compressão direta forte e contínua |\n| Ferida profunda/juncional | Packing com eaze, preferir hemostática se disponível, mais pressão |\n| Extremidade com sangramento grave | Torniquete proximal, apertar até parar sangramento e pulso distal |\n| Torniquete insuficiente | Revisar posição/aperto e colocar segundo torniquete acima |\n| Depois de controlar | Curativo compressivo, registrar horário, não afrouxar no atendimento inicial |\n\nTorniquete:\n\n- Usar preferencialmente torniquete comercial.\n- Colocar 5-7 cm acima da ferida quando o local e claro; em Cenário confuso, alto e apertado no membro.\n- Não colocar sobre articulação.\n- Apertar até cessar sangramento.\n- Registrar horário.\n- Não afrouxar periodicamente.\n\n### 3. Suspeite Das Quatro Fontes De Sangue Oculto\n\nNo politrauma instável, procure sangramento em:\n\n| Fonte | Como suspeitar | Controle inicial |\n|---|---|---|\n| Tórax | MV reduzido, macicez, choque, eFAST pleural | Drenagem; cirurgia se maciço/persistente |\n| Abdome | eFAST positivo, dor, distensão, mecanismo | Laparotomia se instável |\n| Pelve/retroperitônio | dor/instabilidade pélvica, mecanismo, choque | Binder/lençol; sangue; embolização/tamponamento/cirurgia |\n| Ossos longos/externo | deformidade, fratura femur, amputação, sangramento | Imobilização, tração se indicada, torniquete/compressão |\n\nRegra de prova: paciente instável não vai passear na tomografia para \"definir melhor\" uma hemorragia que já está matando.\n\n### 4. Ative Transfusão Maciça Cedo\n\nAtive se houver:\n\n- Choque com suspeita de hemorragia.\n- Sangramento ativo importante.\n- Necessidade prevista de múltiplos hemocomponentes.\n- Trauma penetrante ou contuso grave com instabilidade.\n- eFAST positivo + instabilidade.\n- Pelve instável + choque.\n- Shock index elevado, lactato/base déficit importantes ou piora progressiva.\n\nConduta da primeira hora:\n\n1. Acionar cirurgia/trauma/intervenção imediatamente.\n2. Dois acessos calibrosos ou intraosseo.\n3. Aquecer paciente, sala, fluidos e sangue.\n4. Enviar tipagem, provas, hemograma, gasometria, lactato, coagulograma, fibrinogênio, cálcio iônico, ROTEM/TEG se disponível.\n5. Transfusão balanceada 1:1:1 ou sangue total se protocolo local.\n6. TXA se dentro da janela e sangramento/risco de sangramento importante.\n7. Cálcio durante transfusão.\n8. Reavaliar fonte: tórax, abdome, pelve, ossos longos, externo.\n\n## Fluxograma\n\n```mermaid\nflowchart TD\n    A[Trauma com sangramento ou choque] --> B[X: sangramento externo exsanguinante?]\n    B -->|Sim| C[Compressão/packing/torniquete + registrar horário]\n    B -->|Não| D[ABCDE com foco em perfusão]\n    C --> D\n    D --> E{Instável ou hipoperfundido?}\n    E -->|Não| F[Exame secundário + TC conforme mecanismo]\n    E -->|Sim| G[eFAST + tórax + pelve + ossos longos]\n    G --> H{Fonte provável?}\n    H -->|Abdome/eFAST positivo| I[Cirurgia/laparotomia; ativar transfusão maciça]\n    H -->|Tórax| J[Drenagem; toracotomia se maciço/persistente]\n    H -->|Pelve| K[Binder/lençol + sangue + embolização/tamponamento]\n    H -->|Extremidade| L[Torniquete/imobilizar/controle vascular]\n    H -->|Indefinida| M[Ressuscitação hemostática + busca ativa com POCUS/cirurgia]\n    I --> N[TXA + cálcio + aquecer + coagulopatia/ROTEM]\n    J --> N\n    K --> N\n    L --> N\n    M --> N\n```\n\n## Doses, alvos e números\n\n### Ressuscitação Hemostática\n\n| Item | Número | observação TEME |\n|---|---:|---|\n| TXA trauma | 1 g EV em 10 min + 1 g EV em 8 h | Referência clássica CRASH-2; administrar até 3 h do trauma |\n| Transfusão maciça | CH:PFC:Plaquetas 1:1:1 | Sangue total também aceito se disponível/protocolo |\n| Cristaloide | 1.000-1.500 mL aquecido como ponte | Evitar litros repetidos se choque hemorrágico |\n| Cálcio | 1-2 ampolas a cada 4 hemoderivados | A estação 2025 cobrou exatamente esse padrão |\n| Temperatura | evitar < 35-36 C | Hipotermia piora coagulopatia |\n| Fibrinogênio | tratar se baixo; alvo prático > 150-200 mg/dL | Usar crio/fibrinogênio conforme protocolo/ROTEM |\n| Plaquetas | alvo > 50.000; no TCE/hemorragia SNC mirar > 100.000 | Prova pode cobrar alvo maior no neurotrauma |\n| PAS em hemorragia sem TCE | alvo aproximado 80-90 mmHg até controle | Hipotensão permissiva não vale para TCE grave |\n| PAS em TCE grave | manter pelo menos > 100-110 mmHg | Evitar hipotensão e hipoxemia |\n\n### Perdas Em Fraturas\n\n| Lesão | Perda estimada |\n|---|---:|\n| Radio/ulna | 150-250 mL |\n| Umero | ~250 mL |\n| Tibia/fibula | ~500 mL |\n| Femur | ~1.000 mL |\n| Pelve | 1.500-3.000 mL ou mais |\n\n### Hemotórax\n\n| Achado | Conduta |\n|---|---|\n| Hemotórax com instabilidade | Drenagem imediata + sangue + cirurgia conforme resposta |\n| Drenagem inicial > 1.500 mL | Toracotomia/avaliação cirúrgica urgente |\n| Sangramento > 200 mL/h por 3 h | Toracotomia/avaliação cirúrgica |\n\n### Trauma Pediátrico\n\n| Item | Número |\n|---|---:|\n| Cristaloide inicial | 20 mL/kg |\n| Concentrado de hemácias | 10-20 mL/kg |\n| Hipotensão sistolica minima | 70 + 2 x idade |\n\n## eFAST No Choque Hemorrágico\n\nO eFAST responde Perguntas objetivas:\n\n- Tem líquido livre abdominal?\n- Tem tamponamento?\n- Tem pneumotórax?\n- Tem Hemotórax?\n\nIntérprete pelo contexto:\n\n| Cenário | Conduta provável |\n|---|---|\n| Instável + FAST abdominal positivo | Laparotomia/controle cirúrgico |\n| Instável + janela pericardica positiva | Tamponamento: cirurgia/toracotomia/pericardiocentese como ponte |\n| Instável + pneumotórax | Descompressão imediata |\n| estável + mecanismo abdominal | TC com contraste, mesmo se FAST negativo |\n| FAST negativo + choque | Procurar pelve, tórax, retroperitônio, ossos longos e choque não hemorrágico |\n\nPegadinha: eFAST negativo não exclui lesão abdominal em paciente estável, nem sangramento retroperitoneal/pélvico.\n\n## Pelve E Retroperitônio\n\nQuando suspeitar:\n\n- Mecanismo de alta energia.\n- Dor pélvica, instabilidade, encurtamento/rotação de membro.\n- Equimose perineal/escrotal, sangue em meato uretral.\n- Choque sem outra fonte clara.\n\nConduta inicial:\n\n1. Não \"testar\" pelve repetidamente.\n2. Binder pélvico ou lençol no nível dos grandes trocanteres, não na cintura.\n3. Evitar sondagem vesical se sangue no meato, equimose perineal ou suspeita de lesão uretral; fazer uretrografia retrógrada.\n4. Transfusão hemostática.\n5. Acionar ortopedia/cirurgia/intervenção: fixação, tamponamento pré-peritoneal e/ou embolização conforme serviço.\n\n## Trauma Abdominal\n\n| Cenário | Conduta |\n|---|---|\n| Instável + peritonite/evisceracao/FAST positivo | Laparotomia imediata |\n| estável + trauma contuso | TC com contraste |\n| Lesão esplênica/hepática em estável | Manejo não operatório pode ser possível em centro com suporte |\n| Trauma penetrante anterior estável sem peritonite | exploração local/TC/observação conforme protocolo |\n| Peritonite, pneumoperitonio, evisceracao importante | Cirurgia |\n\nPegadinha: lesão esplênica grau alto na TC não é indicação automática de laparotomia se o paciente está estável e em centro capaz de monitorar/embolizar.\n\n## Extremidades\n\n### Fratura Exposta\n\n1. Controlar sangramento.\n2. Avaliar neurovascular antes e depois.\n3. Remover contaminação grosseira.\n4. Cobrir com curativo esteril.\n5. Imobilizar.\n6. Antibiótico precoce.\n7. Profilaxia tetanica.\n8. Cirurgia/ortopedia.\n\n| Gustilo-Anderson | Antibiótico inicial típico |\n|---|---|\n| I-II sem contaminação grosseira | Cefazolina |\n| III | Cefazolina + gentamicina |\n| Solo/fezes/água ou contaminação importante | Ampliar cobertura conforme exposição/protocolo |\n\n### Síndrome Compartimental\n\nSinais precoces:\n\n- Dor desproporcional.\n- Dor ao estiramento passivo.\n- Parestesia.\n- Compartimento tenso.\n\nPulso ausente, palidez e paralisia são tardios. Conduta: retirar constrições e chamar cirurgia para fasciotomia.\n\n## Populações Especiais\n\n### Gestante\n\n- Prioridade e salvar a mãe.\n- Sinais maternos podem subestimar perda: aumento de volume plasmático máscara choque.\n- Deslocar útero para esquerda se gestação avançada.\n- Oxigenar e evitar hipotensão.\n- Monitor fetal se viável e disponível, sem atrasar cuidado materno.\n- Rh negativo + trauma: imunoglobulina anti-D conforme protocolo.\n\n### Idoso\n\n- Menor reserva e maior mortalidade com lesões aparentemente pequenas.\n- Betabloqueador e marcapasso mascaram taquicardia.\n- Anticoagulantes mudam risco é conduta.\n- Limiar menor para imagem, observação e reversão de coagulopatia quando indicado.\n\n### Criança\n\n- Hipotensão e tardia.\n- Taquicardia, TEC lento, palidez e letargia são sinais precoces.\n- FAST tem menor sensibilidade que em adulto; não use para \"liberar\" criança instável.\n- Aquecimento e glicemia importam.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** se o caso descreve choque hemorrágico, responda com controle de fonte, cirurgia precoce, transfusão 1:1:1 ou sangue total, TXA 1 g + 1 g dentro de 3 horas, cálcio a cada 4 hemoderivados, aquecimento e coleta de coagulopatia/ROTEM.\n>\n> **Na prática clínica:** protocolos atuais valorizam sangue total de baixo titulo quando disponível, reposição guiada por viscoelásticos, cálcio iônico monitorado, fibrinogênio/crio precoces quando baixo e métricas de desempenho. O mais importante contínua sendo não atrasar transporte/centro cirúrgico/intervenção por medidas adjuntas.\n\n## Pegadinhas TEME\n\n- **Afrouxar torniquete a cada 15 min:** errado.\n- **Mais cristaloide para choque hemorrágico persistente:** geralmente errado; precisa sangue e controle de fonte.\n- **FAST negativo exclui trauma abdominal:** errado.\n- **Instável vai para TC:** errado, salvo exceções muito selecionadas e com equipe adequada.\n- **Hipotensão permissiva em TCE grave:** errado; TCE precisa evitar hipotensão.\n- **Binder pélvico na cintura:** errado; fica nos trocanteres.\n- **Sondar paciente com sangue no meato:** errado; fazer uretrografia retrógrada.\n- **Plaqueta cai cedo na coagulopatia do trauma:** nem sempre; fibrinogênio pode cair precocemente.\n- **TXA depois de 3 horas como rotina:** evitar; benefício é precoce.\n- **Fratura exposta sem contaminação pode esperar antibiótico no centro cirúrgico:** errado; antibiótico precoce.\n\n## Erros fatais na prática\n\n- Não olhar dorso, axila, virilha e períneo.\n- Controlar via aérea e esquecer hemorragia compressível.\n- Não registrar horário do torniquete.\n- Repetir palpação pélvica e desorganizar coágulo.\n- Mandar instável para TC sem controle de fonte.\n- Deixar o paciente hipotermico na sala vermelha.\n- Transfundir muito sem cálcio.\n- Não acionar cirurgia/intervenção cedo.\n- Não reavaliar resposta: pulso, pele, consciência, lactato, base déficit, eFAST e sangramento.\n\n## Checklist de revisão\n\n- [ ] Sei executar XABCDE com X antes do A quando há hemorragia exsanguinante.\n- [ ] Sei indicar compressão, packing e torniquete.\n- [ ] Sei que torniquete não deve ser afrouxado periodicamente.\n- [ ] Sei as quatro fontes ocultas de sangue no trauma.\n- [ ] Sei quando eFAST positivo manda para laparotomia.\n- [ ] Sei usar binder/lençol na pelve no nível dos trocanteres.\n- [ ] Sei ativar transfusão maciça e responder 1:1:1 ou sangue total.\n- [ ] Sei dose e janela do TXA.\n- [ ] Sei repor cálcio durante transfusão maciça.\n- [ ] Sei evitar hipotermia, acidose, coagulopatia e hipocalcemia.\n- [ ] Sei que hipotensão permissiva não vale para TCE grave.\n\n## Questões e estações relacionadas\n\n**Provas teóricas**\n\n- TEME22: questões 3, 39, 42, 45, 61, 74, 91.\n- TEME23: questões 13, 27, 34, 43, 44, 47, 94.\n- TEME24: questões 5, 17, 43, 54, 73, 74, 77, 85.\n- TEME25: questões 7, 17, 19, 33, 39, 42, 66, 75, 76.\n\n**Práticas**\n\n- 2025: estação trauma com XABCDE, torniquete, horário, choque hemorrágico, eFAST, pelve/ossos longos, transfusão maciça 1:1:1 ou sangue total, cristaloide aquecido, TXA, cálcio, aquecimento, coagulopatia/ROTEM e avaliação cirúrgica.\n- 2024: trauma pediátrico com politrauma, eFAST, choque, TC e concentrado de hemácias.\n- 2022: trauma + POCUS com choque hemorrágico e FAST.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático oficial TEME26: trauma e causas externas; medicina pré-hospitalar; cuidados críticos.\n- Referências bibliográficas TEME26: Tratado de Medicina de Emergência ABRAMEDE; Atendimento pré-hospitalar ABRAMEDE; diretriz europeia de sangramento no trauma; POCUS ABRAMEDE.\n- Provas teóricas TEME22, TEME23, TEME24, TEME25 e estações práticas disponíveis no projeto.\n\n**Material local**\n\n- Emergency Talks: Aula 04 - Avaliação inicial do politraumatizado.\n- Emergency Talks: Aula 10 - Trauma torácico.\n- Emergency Talks: Aula 13 - Choque.\n- Emergency Talks: Aula 17 - Trauma abdominopelvico.\n- Emergency Talks: Aula 18 - POCUS no trauma, vascular e neuro.\n- Emergency Talks: Aula 39 - Trauma de extremidades.\n- Emergency Talks: Aula 45 - Trauma cranioencefálico.\n- Emergency Talks: Aula 46 - Trauma em populações especiais I.\n- Emergency Talks: Aula 49 - Trauma em populações especiais II.\n\n**Atualização clínica**\n\n- Rossaint R et al. The European guideline on management of major bleeding and coagulopathy following trauma: sixth edition. Critical Care, 2023. DOI: https://doi.org/10.1186/s13054-023-04327-7\n- Joint Trauma System. Damage Control Resuscitation Clinical Practice Guideline, 2019/atualizado no portal JTS. https://jts.health.mil/assets/docs/cpgs/Damage_Control_Resuscitation_12_Jul_2019_ID18.pdf\n- American Association for the Surgery of Trauma/American College of Surgeons Committee on Trauma. Clinical protocol for damage-control resuscitation for the adult trauma patient. Journal of Trauma and Acute Care Surgery, 2024. DOI: https://doi.org/10.1097/TA.0000000000003555\n- American Heart Association/American Red Cross. 2024 First Aid Guidelines: external bleeding control. https://cpr.heart.org/en/resuscitation-science/2024-first-aid-guidelines\n"},{"id":"temas/003_reanimacao-pcr.md","title":"003 - reanimação/PCR Adulto, Pediátrica E Pós-RCE","markdown":"# 003 - reanimação/PCR Adulto, Pediátrica E Pós-RCE\n\n## Leitura de 30 segundos\n\n- PCR e prova de prioridade: reconhecer, chamar ajuda, compressão de alta qualidade e desfibrilação precoce salvam mais do que tubo e droga.\n- Separe rápido: **FV/TV sem pulso = choque**; **AESP/assistolia = RCP + adrenalina precoce + causa reversível**.\n- Em ritmo chocável, não pare para medicação antes de tentar desfibrilar. Em ritmo não chocável, adrenalina entra assim que possível.\n- Via aérea avançada ajuda se for feita sem pausa longa; capnografia confirma tubo, mede qualidade e ajuda a reconhecer RCE.\n- POCUS só presta se couber na pausa de pulso. Se vira \"aula de ultrassom\" durante PCR, virou dano.\n- Pós-RCE é outra emergência: ECG, oxigenação/ventilação, pressão, temperatura, causa da PCR, convulsão e UTI.\n\n## Por que cai\n\nReanimação aparece de forma repetida nas provas TEME22-25 e nas estações práticas. O padrão é muito consistente: a banca quer ver prioridade, algoritmo, doses básicas, ritmos, causas reversíveis e segurança operacional.\n\nO que já apareceu ou foi fortemente sugerido nas provas/estações:\n\n- TEME22: compressão 100-120/min, prioridade da RCP, FV/TV sem pulso, adrenalina/amiodarona, POCUS/CASA e bradicardia.\n- TEME23: PCR em gestante, afogamento, metas pós-RCE, capnografia, POCUS em PCR e tamponamento.\n- TEME24: PCR em gestante, torsades de pointes, tamponamento, pós-RCE com IAMCST e estação prática com BAVT evoluindo para FV.\n- TEME25: FV refratária, bradicardia instável/marca-passo, regulação frente a PCR, pós-RCE pediátrico e decisão de não iniciar/interromper em contexto de futilidade.\n- Práticas 2022-24: RCP de alta qualidade, tamponamento/pneumopericárdio, PCR pediátrica com TSV, bradicardia instável, IAMCST, marca-passo e desfibrilação.\n\nTradução para prova: se a alternativa atrasa compressão, atrasa choque, hiperventila, ignora causa reversível ou usa POCUS prolongando pausa, provavelmente está errada.\n\n## Abordagem prática\n\n### 1. Primeiros 30 Segundos\n\n1. Checar responsividade e respiração normal.\n2. Chamar ajuda, acionar time/código, pedir desfibrilador, carrinho, capnografia e acesso IV/IO.\n3. Checar pulso central em até 10 segundos. Se dúvida, tratar como PCR.\n4. Iniciar compressão torácica imediatamente.\n5. Monitor/desfibrilador assim que chegar: definir ritmo chocável ou não chocável.\n\nFrase de estação: \"Paciente irresponsivo, sem respiração normal e sem pulso central em até 10 segundos. início RCP de alta qualidade, solicito desfibrilador, monitor, acesso IV/IO, adrenalina e capnografia.\"\n\n### 2. RCP De Alta Qualidade\n\n- frequência: 100-120/min.\n- Profundidade adulto: 5-6 cm.\n- Retorno completo do torax.\n- Pausas menores que 10 segundos.\n- Trocar compressor a cada 2 minutos ou antes se fadiga.\n- Evitar ventilação excessiva.\n- Usar feedback, metronomo, capnografia e liderança fechada quando disponível.\n\nO alvo não é \"parecer organizado\"; é gerar pressão de perfusão coronariana e cerebral.\n\n### 3. Ritmo Chocavel: FV/TV Sem Pulso\n\nConduta mental:\n\n1. Choque assim que identificado.\n2. RCP por 2 minutos imediatamente depois do choque.\n3. Reavaliar ritmo em pausa curta.\n4. Se persiste FV/TVsp: novo choque, RCP e adrenalina.\n5. Se persiste: choque, RCP, amiodarona ou lidocaina, causas reversíveis.\n\nMensagem TEME: choque primeiro. Droga sem desfibrilação precoce em FV e atraso.\n\n### 4. Ritmo Não Chocavel: AESP/Assistolia\n\nConduta mental:\n\n1. RCP de alta qualidade.\n2. Adrenalina 1 mg IV/IO assim que possível e depois a cada 3-5 minutos.\n3. Confirmar cabos/ganho/derivação se assistolia.\n4. Procurar e tratar 5H/5T.\n5. Reavaliar ritmo a cada 2 minutos.\n\nMensagem TEME: AESP não é diagnóstico final; é ritmo de PCR que obriga procurar causa tratável.\n\n### 5. Via aérea Durante PCR\n\nSem via aérea avançada:\n\n- Adulto: 30 compressões para 2 ventilações.\n- Pediatria: 30:2 se um socorrista; 15:2 se dois profissionais.\n\nCom via aérea avançada:\n\n- Adulto: compressões continuas + 1 ventilação a cada 6 segundos, cerca de 10/min.\n- Pediatria: compressões continuas + ventilação 20-30/min, cerca de 1 a cada 2-3 segundos.\n- Confirmar tubo com capnografia em onda, ausculta e expansibilidade.\n\nSe a tentativa de IOT causa pausa longa, dessaturação ou perda de compressão, prefira BVM bem feita ou supraglótico e volte ao algoritmo.\n\n### 6. POCUS/CASA Na PCR\n\nUse POCUS para procurar causa reversível sem atrapalhar:\n\n- Tamponamento.\n- TEP maciço/sobrecarga de VD.\n- Pneumotórax hipertensivo.\n- Hipovolemia grave.\n- Pseudo-AESP: atividade mecânica com pulso muito fraco/não percebido.\n\nRegra operacional: probe posicionado durante compressões, imagem adquirida na pausa, decisão em até 10 segundos. Não usar ausência de movimento cardíaco isoladamente para encerrar RCP.\n\n### 7. Pós-RCE Imediato\n\nDepois que voltou pulso, não comemore e abandone: o paciente ainda está morrendo.\n\n1. Confirmar pulso, PA e capnografia.\n2. Titular O2: evitar hipoxemia; reduzir FiO2 quando SpO2 confiável estiver adequada.\n3. Ventilar para normocapnia.\n4. Tratar hipotensão: cristaloide se indicado, noradrenalina/adrenalina/dobutamina conforme fenótipo.\n5. ECG de 12 derivações rapidamente.\n6. IAMCST, choque cardiogênico ou instabilidade elétrica: discutir hemodinâmica/cateterismo.\n7. Procurar causa: história, exame, POCUS, gaso, eletrólitos, lactato, tóxico, TEP, tamponamento, pneumotórax, sangramento.\n8. Se comatoso: estratégia protocolizada de temperatura e prevenção de febre.\n9. Tratar convulsão e considerar EEG quando disponível.\n10. Não prognosticar cedo, especialmente sob sedação, hipotermia, choque ou distúrbios metabólicos.\n\n## Conceitos que sustentam a conduta\n\n### RCP Funciona Por Pressão, Não Por Coreografia\n\nO objetivo da compressão é gerar fluxo mínimo para coronárias e cérebro. Toda pausa derruba a pressão de perfusão coronariana; depois de reiniciar compressão, leva tempo para recuperar. Por isso, as pausas para pulso, ritmo, IOT, POCUS e passagem de caso devem ser curtas e planejadas.\n\nA desfibrilação encerra circuitos elétricos caóticos, mas só funciona bem quando vem cedo e acompanhada de RCP de qualidade. Em FV/TV sem pulso, o miocárdio fica menos responsivo com o passar do tempo; atrasar choque para obter acesso, intubar ou discutir causa e erro clássico.\n\n### Adrenalina: Ajuda RCE, Mas Não Substitui O Básico\n\nAdrenalina aumenta pressão de perfusão coronariana e chance de RCE. O ganho neurológico é mais incerto, então ela não deve virar desculpa para compressão ruim ou choque atrasado.\n\n- Ritmo não chocável: dar cedo.\n- Ritmo chocável: priorizar RCP/desfibrilação inicial; dar quando choques iniciais falham.\n- Dose alta de adrenalina não é rotina.\n- Vasopressina não substitui adrenalina com vantagem.\n\n### Capnografia\n\nCapnografia em onda durante PCR serve para:\n\n- Confirmar e vigiar tubo.\n- Detectar deslocamento/obstrução do tubo.\n- Monitorar qualidade da RCP.\n- Sugerir RCE quando há aumento abrupto e sustentado do EtCO2.\n\nEtCO2 muito baixo após RCP adequada sugere mau prognóstico, mas não deve ser usado sozinho para decidir interrupção.\n\n### 5H/5T\n\n| 5H | 5T |\n|---|---|\n| Hipovolemia | Trombose coronariana |\n| Hipoxia | Trombose pulmonar |\n| H+ / acidose | Tamponamento cardíaco |\n| Hipo/hipercalemia e distúrbios metabólicos | Tóxicos |\n| Hipotermia | Tension pneumothorax |\n\nPense nas causas que você consegue tratar durante a PCR: choque, agulha/drenagem, pericardiocentese, cálcio, glicose/insulina, antídoto, trombólise quando TEP altamente provável, controle de hemorragia.\n\n### situações Especiais Que A Banca Gosta\n\n**TEP com PCR:** suspeite em dispneia/síncope prévia, hipoxemia, fatores de risco, VD dilatado no POCUS. Trombólise pode ser considerada durante RCP quando TEP e altamente provável ou confirmado. Depois, a RCP costuma precisar ser prolongada.\n\n**SCA com PCR:** desfibrilar/RCP e, após RCE, ECG e hemodinâmica se IAMCST ou forte suspeita. Trombólise sistêmica durante PCR por SCA não é rotina quando angioplastia e possível.\n\n**Gestante:** deslocamento uterino manual para esquerda, compressões um pouco mais altas no esterno, via aérea difícil prevista, equipe obstétrica/neonatal. Se útero no nível/acima do umbigo e sem RCE rápido, considerar histerotomia/cesárea perimortem a partir de 4 minutos para nascimento em torno de 5 minutos.\n\n**Afogamento:** hipóxia é o motor. Ventilação precoce é importante, mas se sem pulso, não atrasar compressões. Aquecer e tratar hipoxemia.\n\n**Hipercalemia:** cálcio IV, insulina + glicose, beta-agonista, bicarbonato se acidose/instabilidade, diálise quando indicado. Em PCR por hipercalemia, cálcio é tratamento causal, não \"detalhe\".\n\n**Hipotermia:** reaquecer ativamente; em hipotermia grave, a avaliação de morte e resposta a drogas/choques muda. Evite declarar óbito cedo sem reaquecimento adequado, salvo lesões incompatíveis com vida.\n\n**Opioide:** se há pulso e depressão respiratória, ventilar e usar naloxona. Se sem pulso, RCP/desfibrilador primeiro; naloxona não substitui RCP.\n\n**Torsades de pointes:** TV polimórfica com QT longo: sulfato de magnésio e corrigir K/Mg, suspender drogas que prolongam QT; se sem pulso, desfibrilar.\n\n## Fluxograma\n\n### PCR Adulto\n\n```mermaid\nflowchart TD\n    A[\"Irresponsivo, sem respiração normal\"] --> B[\"Chamar ajuda + desfibrilador + iniciar RCP\"]\n    B --> C[\"Monitor: ritmo?\"]\n    C -->|FV/TV sem pulso| D[\"Choque\"]\n    D --> E[\"RCP 2 min imediatamente\"]\n    E --> F[\"Acesso IV/IO + capnografia + causas\"]\n    F --> C\n    C -->|AESP/assistolia| G[\"RCP 2 min + adrenalina cedo\"]\n    G --> H[\"5H/5T + confirmar assistolia se aplicável\"]\n    H --> C\n    C -->|RCE| I[\"Pós-RCE: O2, CO2, PA, ECG, causa, temperatura\"]\n    C -->|Sem RCE e critério de interrupção| J[\"Decisão estruturada; não usar EtCO2 isolado\"]\n```\n\n### Pós-RCE\n\n```mermaid\nflowchart TD\n    A[\"RCE\"] --> B[\"ABCDE + confirmar tubo/capnografia\"]\n    B --> C[\"SpO2 adequada e normocapnia\"]\n    C --> D[\"Tratar hipotensão: volume se indicado + vasoativo\"]\n    D --> E[\"ECG 12 derivações\"]\n    E -->|IAMCST ou instabilidade| F[\"Hemodinâmica/cateterismo\"]\n    E -->|Sem IAMCST claro| G[\"Investigar causa: POCUS, gaso, labs, TC se indicado\"]\n    F --> H[\"UTI + controle de temperatura se comatoso\"]\n    G --> H\n    H --> I[\"Convulsão/EEG, glicemia, prognóstico tardio multimodal\"]\n```\n\n## Doses, alvos e números\n\n### Adulto - PCR\n\n| Item | Número/conduta |\n|---|---|\n| Compressões | 100-120/min |\n| Profundidade | 5-6 cm |\n| Pausa | Menor que 10 s |\n| Troca de compressor | A cada 2 min ou se fadiga |\n| Sem via aérea avançada | 30:2 |\n| Com via aérea avançada | Compressões continuas + 10 ventilações/min |\n| Desfibrilacao bifásica | 120-200 J conforme aparelho; se desconhecido, energia maxima |\n| Desfibrilacao monofasica | 360 J |\n| Adrenalina | 1 mg IV/IO a cada 3-5 min |\n| Amiodarona FV/TVsp refratária | 300 mg IV/IO; segunda dose 150 mg |\n| Lidocaina alternativa | 1-1,5 mg/kg; repetir 0,5-0,75 mg/kg; max 3 mg/kg |\n| Sulfato de magnésio TdP | 1-2 g IV/IO |\n| Bicarbonato | Não rotineiro; considerar em hipercalemia, intoxicação por tricíclico/bloqueador de canal de sódio ou acidose específica |\n| Cálcio | Não rotineiro; usar em hipercalemia, hipocalcemia, bloqueador de canal de cálcio, Hipermagnesemia |\n\n### Adulto - Peri-PCR\n\n| situação | Conduta chave |\n|---|---|\n| Bradicardia instável | Atropina 1 mg IV a cada 3-5 min, max 3 mg |\n| Bradicardia refratária | Marcapasso transcutaneo; adrenalina 2-10 mcg/min ou dopamina 5-20 mcg/kg/min; preparar transvenoso |\n| Taquicardia instável com pulso | Cardioversao sincronizada |\n| QRS estreito regular estável | Vagal; adenosina 6 mg, depois 12 mg |\n| QRS largo regular estável | Antiarritmico conforme protocolo; considerar cardioversão se piora |\n| QRS largo irregular | Pensar FA pré-excitada ou TdP; evitar bloqueadores AV se pré-excitacao |\n\n### Pediatria - PCR\n\n| Item | Número/conduta |\n|---|---|\n| Compressões | 100-120/min |\n| Profundidade lactente | Cerca de 4 cm ou 1/3 do diâmetro AP |\n| Profundidade criança | Cerca de 5 cm ou 1/3 do diâmetro AP |\n| Sem via aérea avançada | 30:2 um socorrista; 15:2 dois profissionais |\n| Com via aérea avançada | 20-30 ventilações/min |\n| Desfibrilacao | 2 J/kg; depois 4 J/kg; subsequentes pelo menos 4 J/kg, max 10 J/kg ou dose adulta |\n| Adrenalina IV/IO | 0,01 mg/kg a cada 3-5 min |\n| Adrenalina traqueal | 0,1 mg/kg se sem IV/IO |\n| Amiodarona | 5 mg/kg IV/IO para FV/TVsp refratária |\n| Lidocaina | 1 mg/kg IV/IO alternativa |\n| Bradicardia com pulso | Se FC menor que 60 + má perfusão apesar de O2/ventilação: iniciar RCP |\n| Atropina pediátrica | 0,02 mg/kg se Vagal/BAV; min 0,1 mg |\n\n### Neonatal - Sala De Parto\n\n| Item | Número/conduta |\n|---|---|\n| Prioridade | Ventilação efetiva |\n| Indicar VPP | Apneia/gasping ou FC menor que 100/min |\n| Compressões | Se FC menor que 60/min após 30 s de VPP efetiva |\n| Relação compressão:ventilação | 3:1 |\n| Total de eventos | 90 compressões + 30 ventilações/min |\n| Oxigênio durante compressões | 100%, titular depois |\n| Adrenalina IV/IO/UVC | 0,01-0,03 mg/kg a cada 3-5 min |\n| expansão volume | 10 mL/kg se perda sanguínea/choque suspeito |\n\n### Pós-RCE\n\n| Alvo | Conduta prática |\n|---|---|\n| SpO2 | Evitar hipoxemia; titular O2 quando medida confiável. Alvo comum 92-98% em adulto; pediatria 94-98% ou basal |\n| CO2 | Normocapnia; geralmente PaCO2 35-45 mmHg |\n| Pressão | Evitar hipotensão; alvo mínimo comum PAM maior ou igual a 65 mmHg; muitos protocolos miram 70-100 se tolerado |\n| Temperatura adulto comatoso | Controle protocolizado 32-37,5 C; evitar febre; manter pelo menos 36 h em adultos que não obedecem comandos |\n| Temperatura pediátrica comatosa | TTM 32-34 C seguido de 36-37,5 C ou apenas 36-37,5 C por até 5 dias, conforme protocolo |\n| ECG | 12 derivações assim que possível |\n| Glicemia | Evitar hipo e hiperglicemia; usar alvo institucional |\n| Convulsão | Tratar crise clínica; considerar EEG |\n| Prognóstico neurológico | Multimodal é tardio, geralmente após 72 h e sem confundidores |\n\n## Pegadinhas TEME\n\n- **\"Intubar primeiro\" em PCR:** errado se atrasa compressão/choque. Primeiro RCP e desfibrilador.\n- **\"Checar pulso por 30 segundos\":** errado. Até 10 segundos.\n- **\"FV refratária = adrenalina antes do primeiro choque\":** errado. Choque precoce vem primeiro.\n- **\"AESP = não tem o que fazer além de adrenalina\":** errado. Procurar causa reversível é o centro da conduta.\n- **\"Atropina na PCR\":** não é droga de PCR. Atropina e para bradicardia sintomática com pulso.\n- **\"EtCO2 baixo encerra RCP\":** não sozinho. Pode ajudar prognóstico, mas não decide isoladamente.\n- **\"POCUS em PCR sempre ajuda\":** só se não prolongar pausa. POCUS mal usado piora sobrevida.\n- **\"RCE = acabou\":** errado. Pós-RCE tem mortalidade alta e exige pacote imediato.\n- **\"Hipotermia 32-34 obrigatória para todo mundo\":** cuidado. Atualização fala em controle de temperatura protocolizado, com faixa adulta 32-37,5 C em comatosos.\n- **\"Criança com FC 50 e perfusão ruim: só observar porque tem pulso\":** errado. Se FC menor que 60 com má perfusão apesar de oxigenação/ventilação, iniciar RCP.\n- **\"PCR gestante: esperar obstetra chegar\":** errado. RCP imediata, deslocamento uterino e decisão precoce de histerotomia se indicado.\n- **\"Trombolisar toda PCR por dor torácica\":** errado. TEP altamente provável/confirmado pode justificar; SCA deve ir para angioplastia após RCE quando possível.\n\n## Erros fatais na prática\n\n- Não assumir liderança e deixar compressões descoordenadas.\n- Pausa longa para laringoscopia, ultrassom, pulso ou discussão.\n- Desfibrilador carregado sem aviso claro ou choque sem segurança.\n- Esquecer de reiniciar RCP imediatamente após choque.\n- Hiperventilar com BVM e reduzir retorno venoso.\n- Não trocar compressor fatigado.\n- Não confirmar tubo com capnografia.\n- Não tratar causa obvia: pneumotórax hipertensivo, tamponamento, hipercalemia, hipovolemia, TEP.\n- Dar alta cognitiva após RCE: esquecer ECG, vasopressor, temperatura, ventilação e destino.\n- Prognosticar cedo por pupila, mioclonia ou Glasgow sob sedação/choque/hipotermia.\n\n## Para prova vs na prática\n\n| Tema | Resposta TEME | Atualização/Prática |\n|---|---|---|\n| Prioridade inicial | RCP de alta qualidade + desfibrilação precoce | Treinar equipe, feedback, cronometrista e pausas planejadas melhoram mais do que \"decorar droga\" |\n| Adrenalina | 1 mg IV/IO a cada 3-5 min | Não chocável: cedo. Chocavel: após falha de desfibrilação inicial. Evitar dose alta rotineira |\n| Via aérea | Não interromper compressões para intubar | Em equipe experiente, IOT/supraglótico com capnografia; em equipe limitada, BVM bem feita e segura |\n| POCUS | CASA/causas reversíveis em pausa curta | POCUS só com operador treinado e decisão pré-planejada; não transformar pausa em exame completo |\n| Temperatura pós-RCE | Controle de temperatura em comatoso; evitar febre | AHA 2025 aceita estratégia protocolizada entre 32-37,5 C em adultos que não obedecem comandos, por pelo menos 36 h |\n| Pós-RCE com IAMCST | ECG e hemodinâmica | Sem IAMCST, cateterismo seletivo conforme choque, instabilidade elétrica e suspeita coronariana |\n| Interrupção de RCP | Decisão estruturada, tempo/ritmo/contexto/causa | EtCO2, POCUS é tempo ajudam, mas nenhum deve ser usado isoladamente |\n\n## Checklist de revisão\n\n- [ ] Reconheco PCR em até 10 segundos e início compressões.\n- [ ] Sei diferenciar FV/TVsp de AESP/assistolia.\n- [ ] Sei a sequência do ritmo chocável sem atrasar choque.\n- [ ] Sei que AESP/assistolia pede adrenalina precoce e 5H/5T.\n- [ ] Sei dose de adrenalina, amiodarona, choque e magnésio.\n- [ ] Sei metas de compressão: 100-120/min, 5-6 cm, pausa menor que 10 s.\n- [ ] Sei ventilação adulto com via avançada: 10/min.\n- [ ] Sei ventilação pediátrica com via avançada: 20-30/min.\n- [ ] Sei quando iniciar RCP em bradicardia pediátrica com pulso.\n- [ ] Sei usar POCUS sem prolongar pausa.\n- [ ] Sei pacote pós-RCE: O2, CO2, PA, ECG, causa, temperatura, convulsão, UTI.\n- [ ] Sei que prognóstico neurológico é tardio e multimodal.\n\n## Questões e estações relacionadas\n\nUse está lista para refazer mentalmente as respostas depois de ler o capítulo:\n\n- **TEME22:** compressões 100-120/min; FV/TVsp e drogas; bradicardia; POCUS/CASA na PCR.\n- **TEME23:** PCR em gestante; afogamento sem respiração; metas pós-RCE; capnografia; tamponamento/trauma.\n- **TEME24:** PCR em gestante; torsades; tamponamento; pós-RCE com IAMCST; questão de ritmo/monitor.\n- **TEME25:** FV refratária; bradicardia instável e marca-passo; regulação frente a PCR; pós-RCE pediátrico; limite/futilidade.\n- **Prática 2022:** reanimação, RCP de alta qualidade e tamponamento por pneumopericárdio.\n- **Prática 2023:** reanimação pediátrica e TSV estável.\n- **Prática 2024:** BAVT instável, marca-passo, IAMCST e evolução para FV.\n\n## Referências\n\n- Conteúdo programático TEME26 e referências oficiais do edital.\n- Provas teóricas TEME22, TEME23, TEME24 e TEME25 disponíveis no projeto.\n- Estações práticas TEME22-25 disponíveis no projeto.\n- Emergency Talks: Aula 01 - Reanimação; Aula 30 - Emergências pediátricas; Aula 34 - Síncope e Arritmias.\n- Resumo do Emergency.docx, arquivo do usuário.\n- American Heart Association. 2025 Guidelines for CPR and ECC: [Adult Advanced Life Support](0).\n- American Heart Association. 2025 Guidelines for CPR and ECC: [Adult Basic Life Support](1).\n- American Heart Association. 2025 Guidelines for CPR and ECC: [Pediatric Basic Life Support](2).\n- American Heart Association. 2025 Guidelines for CPR and ECC: [Pediatric Advanced Life Support](3).\n- American Heart Association. 2025 Guidelines for CPR and ECC: [Neonatal Resuscitation](4).\n- American Heart Association. 2025 Guidelines for CPR and ECC: [Special Circumstances of Resuscitation](5).\n- American Heart Association. 2025 Guidelines for CPR and ECC: [Post-Cardiac Arrest Care](6).\n"},{"id":"temas/004_pocus.md","title":"004 - POCUS no Choque, Trauma, PCR e Dispneia","markdown":"# 004 - POCUS no Choque, Trauma, PCR e Dispneia\n\n## Leitura de 30 segundos\n\n- POCUS não é \"fazer ultrassom\"; é responder uma Pergunta clínica imediatamente: tem pneumotórax? tem tamponamento? tem líquido livre? o VE está ruim? o VD está grande? cabe volume?\n- Na prova TEME, os quatro trilhos são: **BLUE** na dispneia, **RUSH** no choque, **eFAST** no trauma e **CASA** na PCR.\n- Lung sliding presente reduz muito a chance de pneumotórax naquele ponto; ausente não fecha diagnóstico sozinho.\n- Linhas B difusas bilaterais com sliding = congestão/edema pulmonar até prova em contrário; no contexto hipertensivo, pense em SCAPE.\n- Choque + VE hipercinético/cavidades pequenas/VCI colabando = hipovolemia provável; choque + VE ruim/B-lines/VCI cheia = cardiogênico ou intolerância a volume.\n- FAST negativo não libera paciente instável nem exclui retroperitônio, pelve, lesão de órgão sólido ou trauma abdominal em paciente estável.\n- Na PCR, POCUS só entra se a pausa couber em até 10 segundos. Se atras
