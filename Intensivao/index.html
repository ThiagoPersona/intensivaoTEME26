025, Tratado ABRAMEDE 2024 e materiais oficiais indicados no edital.\n- Provas teóricas TEME22-25 e estações práticas TEME24-25 disponíveis no projeto.\n\n**Material local**\n\n- Emergency Talks - Aula 02: Déficit focal agudo e AVCi.\n- Emergency Talks - Aula 03: Cefaleia e sangramentos do SNC.\n- Emergency Talks - Aula 12: Convulsões e infecções do SNC.\n- Emergency Talks - Aula 18: POCUS trauma, vascular e neuro.\n- Emergency Talks - Aula 40: Alteração do nível de consciência e HIC.\n- Emergency Talks - Aula 45: Trauma cranioencefálico.\n- `Resumo do Emergency.docx`.\n\n**Atualização clínica**\n\n- Ministério da Saúde. PCDT Acidente Vascular Cerebral Isquêmico Agudo, Portaria Conjunta SAES/SECTICS n 29, 12/12/2023, páeina atualizada em 21/01/2025: https://www.gov.br/saude/pt-br/assuntos/pcdt/a/acidente-vascular-cerebral-isquemico-agudo/view\n- Ministério da Saúde. Linha de Cuidado AVC Isquêmico até 4 horas: https://linhasdecuidado.saude.gov.br/portal/acidente-vascular-cerebral-%28AVC%29-no-adulto/unidade-hospitalar/avc-isquemico-menor-igual-4horas/\n- Powers WJ et al. AHA/ASA 2019 update to 2018 Guidelines for the Early Management of Acute Ischemic Stroke: https://www.ahajournals.org/doi/10.1161/STR.0000000000000211\n- Alamowitch S et al. European Stroke Organisation expedited recommendation on tenecteplase for acute ischaemic stroke, 2023: https://pmc.ncbi.nlm.nih.gov/articles/PMC10069183/\n- Greenberg SM et al. AHA/ASA 2022 Guideline for Spontaneous Intracerebral Hemorrhage: https://pubmed.ncbi.nlm.nih.gov/35579034/\n- Hoh BL et al. AHA/ASA 2023 Guideline for Aneurysmal Subarachnoid Hemorrhage: https://pubmed.ncbi.nlm.nih.gov/37212182/\n- Brain Trauma Foundation. Guidelines for the Management of Severe TBI, 4th Edition: https://braintrauma.org/coma/guidelines/severe-tbi\n- Glauser T et al. American Epilepsy Society guideline for convulsive status epilepticus: https://www.acep.org/siteassets/uploads/uploaded-files/acep/clinical-and-practice-management/clinical-policies/aesconvulsivestatusepilepticus.pdf\n- Cook AM et al. Neurocritical Care Society Guidelines for the Acute Treatment of Cerebral Edema in Neurocritical Care Patients, 2020: https://pubmed.ncbi.nlm.nih.gov/32227294/\n- Conselho Federal de Medicina. Resolução CFM n 2.173/2017 e critérios de morte encefálica: https://portal.cfm.org.br/noticias/cfm-atualiza-resolucao-com-criterios-de-diagnostico-da-morte-encefalica/\n"},{"id":"temas/008_toxicologia-animais-peconhentos.md","title":"008 - Toxicologia E Animais Peçonhentos","markdown":"# 008 - Toxicologia E Animais Peçonhentos\n\n## Leitura de 30 segundos\n\n- Intoxicação grave se resolve em prioridades, não em \"descobrir a substância\": ABCDE, glicemia, ECG, temperatura, gasometria/lactato e suporte vem antes do antídoto.\n- A prova ama seis síndromes: opioide, colinérgica, simpatomimética, bloqueador de canal de cálcio/beta-bloqueador, bloqueio de canal de sódio por tricíclico e acidose com gap/osmolar por alcoois tóxicos/salicilato.\n- Descontaminação não é reflexo automático: carvão ativado só se exposição recente, substância adsorvível e via aérea segura; lavagem gástrica é exceção.\n- Em acidente peçonhento, o que aprova é reconhecer o padrão: Bothrops sangra/coagula, Crotalus paralisa e faz rabdomiólise, coral paralisa com pouco local, escorpião grave em criança faz vômitos/EAP/choque, Lonomia sangra.\n- Soro antiveneno não é calculado por peso; e por tipo de acidente e gravidade. Criança recebe a mesma quantidade de frascos-ampolas do adulto.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME22-25 cobrou carvão/lavagem, opioide/naloxona, álcool tóxico, tricíclico, LAST, cocaína/hipertermia, paraquat, metais, botulismo, chumbinho, Bothrops, Crotalus/coral, escorpionismo, abelhas e estação prática pediátrica com carbamato/organofosforado.\n- **O que a banca costuma testar:** antídoto certo, quando não usar antídoto, indicação de diálise, QRS alargado, acidose metabólica com anion gap, osmolar gap, indicação de soro antiveneno, diferença entre alergia e envenenamento e condutas que não podem atrasar suporte.\n- **Como costuma aparecer:** caso com sintomas mistos é uma alternativa tentadora que faz \"procedimento de descontaminação\" ou \"antídoto famoso\" antes de ventilar, fazer RCP, resfriar, dar bicarbonato ou aplicar soro específico.\n\n## Abordagem prática\n\n### 1. Intoxicado grave no primeiro minuto\n\n1. **ABCDE e proteção da equipe:** tire o paciente da fonte, use EPI se organofosforado/carbamato, retire roupas contaminadas, lave pele/olhos quando exposição cutanea.\n2. **Corrija os matadores:** hipoxemia, hipoventilação, hipoglicemia, hipertermia, choque, convulsão, arritmia e acidose grave.\n3. **Monitorize cedo:** ECG de 12 derivações, capnografia se sedado/intubado, temperatura central se hipertérmico, glicemia, gasometria/lactato, eletrólitos, função renal/hepática, CK, coagulograma conforme caso.\n4. **Procure toxíndrome, não nome comercial:** pupilas, pele, secreções, frequência respiratória, PA/FC, temperatura, estado mental, neuromuscular e ECG.\n5. **Acione CIATox/toxicologista quando grave, desconhecido, gestante/criança, necessidade de antídoto raro, diálise, soro, ou exposição ocupacional/coletiva.**\n\n> **Resposta de prova TEME:** suporte inicial, glicemia e ECG aparecem antes da \"toxicologia completa\". Se o paciente não ventila, ventile; se está em PCR, RCP/ACLS primeiro.\n>\n> **Atualização clínica:** em 2026, a tendência de toxicologia e individualizar protocolos fixos, principalmente NAC, diálise e observação pós-naloxona. Para prova, euarde o algoritmo clássico; na prática, discuta cedo com CIATox.\n\n### 2. Reconheça os toxíndromes de prova\n\n| Toxidrome | Pistas | Causas clássicas | Conduta que muda jogo |\n|---|---|---|---|\n| Opioide | Bradipneia, RNC, miose; pode não ter miose | Heroina, morfina, fentanil, metadona | Ventilação + naloxona titulada |\n| Sedativo-hipnotico | RNC, ataxia, fala arrastada, vitais relativamente preservados | Benzodiazepínicos, barbituricos, álcool | Suporte; flumazenil só em caso muito selecionado |\n| Colinérgico | Broncorreia, salivação, lacrimejamento, miose, diarreia, fasciculações | Organofosforado/carbamato, \"chumbinho\" | Descontaminação + atropina até secar secreção + pralidoxima se organofosforado/desconhecido |\n| Anticolinérgico | Pele seca/quente, midríase, delirium, retenção urinária, taquicardia | Anti-histamínico, TCA, atropínicos | Suporte, benzodiazepínico; ECG manda |\n| Simpatomimético | Agitação, hipertensão, midríase, sudorese, hipertermia | Cocaína, anfetamina, MDMA | Benzodiazepínico + resfriamento agressivo |\n| Bloqueio de canal de sódio | RNC, hipotensão, convulsão, QRS largo, R em aVR | TCA, difenidramina, carbamazepina, cocaína | Bicarbonato de sódio |\n| CCB/BB | Bradicardia + choque; CCB tende a hiperglicemia, BB a hipoglicemia/convulsão | Verapamil, diltiazem, amlodipina, propranolol | Cálcio + insulina em alta dose euglicêmica |\n| Acidose com gap/osmolar | Acidose metabólica, lactato, gap osmolar, RNC | Metanol, etilenoglicol, salicilato | Fomepizol/etanol + bicarbonato/diálise conforme caso |\n\n### 3. Descontaminação: menos é melhor\n\n1. **Carvão ativado:** considerar se até 1 h da ingestão, substância adsorvível, dose potencialmente grave e via aérea protegida/cooperação. Em liberação prolongada ou anticolinérgico, pode haver janela um pouco maior, mas é decisão caso a caso.\n2. **Não adsorve bem:** metais pesados, ferro, lítio, álcool, ácidos/álcali, solventes, pesticidas e muitas substâncias corrosivas.\n3. **Lavagem gástrica:** não é rotina. Só considerar em ingestão recente, potencialmente letal, sem alternativa melhor, com via aérea protegida e equipe treinada.\n4. **Ipeca/vômito induzido:** não tem papel na sala vermelha.\n5. **Irrigação intestinal total com PEG:** lembrar em body packer, drogas de liberação prolongada, ferro/lítio/potássio ou substâncias radiopacas; discutir com CIATox.\n\n### 4. antídotos que mais caem\n\n- **Naloxona:** opioide com hipoventilação. Titule para respirar, não para \"acordar bonito\".\n- **N-acetilcisteína:** paracetamol potencialmente tóxico, curva de Rumack-Matthew quando aplicável, ingestão tardia/desconhecida com suspeita ou lesão hepática.\n- **Bicarbonato de sódio:** TCA/bloqueador de canal de sódio com QRS >100 ms, hipotensão, arritmia ou convulsão.\n- **Atropina + pralidoxima:** organofosforado/carbamato grave; atropina seca pulmão, pralidoxima ajuda nicotinico quando organofosforado e precoce.\n- **Fomepizol ou etanol:** metanol e etilenoglicol.\n- **Hidroxocobalamina:** cianeto, especialmente inalação de fumaça + lactato alto/choque/RNC.\n- **Azul de metileno:** meta-hemoglobinemia sintomática.\n- **Fab anti-digoxina:** arritmia grave, instabilidade, hipercalemia importante ou PCR associada a digoxina.\n- **Emulsao lipídica 20%:** LAST e tóxicos lipofilicos refratários selecionados.\n\n## Conceitos que sustentam a conduta\n\n### Opioides\n\nO marcador clínico mais útil para naloxona e ventilação: FR baixa, hipercapnia, hipoxemia ou apneia. Miose ajuda, mas ausência de miose não exclui opioide, sobretudo com hipoxemia, coingestão ou opioides sintéticos. Em PCR suspeita por opioide, naloxona pode entrar sem atrapalhar, mas não substitui compressão, ventilação, desfibrilação e adrenalina quando indicadas.\n\n### Benzodiazepínicos e flumazenil\n\nIntoxicação isolada por benzodiazepínico raramente mata se suporte ventilatório estiver disponível. Flumazenil pode precipitar convulsão e abstinência, principalmente em usuário crônico ou coingestão com TCA/cocaína/carbamazepina. Use como resposta de prova apenas em exposição isolada, paciente não habituado, criança com ingestão acidental ou reversão de sedação procedural.\n\n### Triciclicos e bloqueadores de canal de sódio\n\nTCA mata por convulsão, hipotensão e cardiotoxicidade. O ECG é o exame mais importante: QRS >100 ms, R em aVR >3 mm, QT prolongado e arritmias sugerem toxicidade. O bicarbonato aumenta sódio extracelular e alcaliniza, reduzindo ligação do tóxico ao canal de sódio. Evite flumazenil, antiarrítmico classe Ia/Ic e cardioversão \"por reflexo\" sem corrigir toxicidade de base.\n\n### Cocaína, anfetaminas e hipertermia\n\nA morte vem de hipertermia, acidose, rabdomiólise, arritmia e colapso. Benzodiazepínico é primeira linha para agitação, hipertensão e demanda adrenérgica. Resfriamento físico é prioridade quando temperatura alta. Se precisar intubar paciente hipertérmico/rabdomiólise, prefira rocurônio a succinilcolina.\n\n> **Para prova TEME:** evite beta-bloqueador isolado em intoxicação por cocaína/simpatomimético.\n>\n> **Na prática clínica:** a contraindicação absoluta de todo beta-bloqueador é cada vez mais questionada. Em crise hipertensiva/IAM por cocaína, benzodiazepínico, nitroglicerina e bloqueador de canal de cálcio seguem escolhas seguras; uso de beta-bloqueio combinado alfa/beta deve ser individualizado e supervisionado.\n\n### Paracetamol\n\nNa ingestão aguda conhecida, dosar paracetamol a partir de 4 h e aplicar nomograma de Rumack-Matthew. Se >8 h, tempo desconhecido, ingestão repetida, tentativa de suicídio com história ruim ou transaminase alterada, não espere tudo ficar perfeito para iniciar NAC. O protocolo clássico IV entrega 300 mg/kg em 21 h; oral clássico e 140 mg/kg seguido de 70 mg/kg de 4/4 h por 17 doses.\n\n> **Atualização clínica 2026:** a ACMT reforca que NAC IV não deve ser interrompida automaticamente em 21 h se ainda houver paracetamol detectavel, AST/ALT subindo, INR >=2 ou marcadores ruins como acidose, lactato, creatinina ou fosfato. Para prova, decore a dose; na prática, pare por critério clínico-laboratorial.\n\n### Salicilatos\n\nSalicilato e traiçoeiro porque o paciente compensa a acidose hiperventilando. Intubar sem manter ventilação minuto alta pode derrubar pH rapidamente e aumentar entrada do salicilato no SNC. Tratamento: carvão se cedo, glicose mesmo sem hipoglicemia se RNC, bicarbonato para alcalinizar soro/urina e hemodialise se grave.\n\n### Alcoois tóxicos\n\nMetanol dá distúrbio visual, acidose e lesão neurológica. Etilenoglicol dá embriaguez inicial, cristais de oxalato, hipocalcemia, AKI e acidose. Isopropanol faz cetose sem acidose importante e não é tratado com fomepizol. Gap osmolar alto ajuda cedo, mas gap normal não exclui se o metabolismo já avançou para acidose.\n\n### Organofosforados, carbamatos e chumbinho\n\nO problema imediato é excesso colinérgico com broncorreia, broncoespasmo, bradicardia, secreção e falência ventilatória. Atropina deve ser repetida/dobrada até secar secreções respiratórias e melhorar ausculta, não até atineir uma dose \"bonita\". Pralidoxima é mais forte para organofosforado precoce; se a classe é desconhecida e o quadro é grave, não segure.\n\n### Bloqueador de canal de cálcio e beta-bloqueador\n\nAmbos podem dar bradicardia e choque refratário a atropina. CCB costuma cursar com hiperglicemia; BB, especialmente propranolol, pode dar hipoglicemia, convulsão e QRS largo. Não espere resposta mágica a uma ampola: use cálcio, insulina em alta dose euglicêmica, vasopressores, glucagon para BB, bicarbonato se QRS largo, emulsão lipídica/ECMO em refratário.\n\n### Digoxina\n\nNáusea, vômitos, alteração visual, confusão e arritmias em usuário de digoxina devem acender alerta. Nível \"terapêutico\" não exclui toxicidade se potássio/renalidade/tempo de coleta estão confusos. Fab é indicado em arritmia ventricular, bloqueio/instabilidade grave, hipercalemia importante, ingestão maciça ou PCR. Cardioversao pode precipitar arritmia; se inevitável, use baixa energia e trate a causa.\n\n### Fumaça: CO e cianeto\n\nCO da cefaleia, confusão, síncope, isquemia, acidose e COHb elevada; oximetria comum engana. Trate com O2 a 100%. Câmara hiperbárica entra na conversa se COHb >25-30%, RNC/síncope, isquemia, acidose grave, gestação ou quadro neurológico/cardíaco relevante. Cianeto deve ser pensado em incêndio fechado com hipotensão, RNC e lactato muito alto; hidroxocobalamina não deve esperar confirmação laboratorial se o quadro é compatível.\n\n### Metais, paraquat e botulismo\n\n- **Arsenico:** gastroenterite intensa, diarreia tipo \"água de arroz\", choque, QT/torsades, linhas radiopacas possíveis no Rx. Se sintomático e exposição forte, quela antes de confirmação, com toxicologista.\n- **Chumbo:** encefalopatia em criança ou adulto exposto é indicação de quelação urgente; carvão não resolve metal pesado.\n- **Paraquat:** lesão cáustica oral/GI, lesão renal/hepática e fibrose pulmonar tardia. Não há antídoto salvador; descontaminação precoce e CIATox importam. Evite oxigênio liberal, usando apenas para hipoxemia.\n- **Botulismo:** paralisia flacida descendente, simétrica, com pares cranianos, diplopia/ptose/disfagia, pupilas alteradas, sem déficit sensitivo e geralmente consciente. Suporte ventilatório e antitoxina precoce; não espere laboratório.\n\n### LAST\n\nToxicidade sistêmica por anestésico local pode começar com parestesia perioral, zumbido, gosto metálico, agitação e convulsão, evoluindo para hipotensão/arritmia/PCR. Trate diferente do ACLS padrão: via aérea, benzodiazepínico para convulsão, doses menores de adrenalina, evitar vasopressina/beta-bloqueador/bloqueador de canal de cálcio e fazer emulsão lipídica 20%.\n\n## Animais Peçonhentos: Padrão De Prova\n\n### Conduta geral\n\n1. **Não faça dano:** não earrotear, cortar, sugar, queimar, aplicar gelo/álcool/querosene, nem dar AAS.\n2. **Suporte e dor:** analgesia, limpeza, remover anéis/objetos apertados, marcar progressão de edema, atualizar tétano, hidratar se risco renal/rabdomiólise.\n3. **Classifique por síndrome:** local/coagulante, neuro-miotóxico, neuroparalítico, autonômico/cardiogênico, hemorrágico.\n4. **Laboratório dirigido:** hemograma, coagulograma/tempo de coagulação, fibrinogênio se disponível, CK, creatinina, EAS/mioglobinúria, eletrólitos, ECG conforme caso.\n5. **Soro específico precoce quando indicado:** dose por gravidade, mesma dose adulto/criança, IV, sob monitorização e preparo para anafilaxia.\n6. **Notifique e regule:** acidentes por animais peçonhentos são de notificação; transferência não deve atrasar suporte e soro quando disponível.\n\n### Serpentes\n\n| Acidente | Pistas | Complicacao-chave | Soro de prova |\n|---|---|---|---|\n| Bothrops | Dor/edema progressivo, equimose, sangramento, coagulopatia | Hemorragia, síndrome compartimental, AKI | Antibotrópico ou combinado disponível |\n| Crotalus | Ptose/diplopia, facies miastenica, mialeia, urina escura, pouco local | Rabdomiolise e AKI | Anticrotalico |\n| Lachesis | Quadro local tipo Bothrops + Vagal: vômito/diarreia, bradicardia, hipotensão | Choque, sangramento | Antilachetico/combinado |\n| Elapidico/coral | Pouco local + ptose, disfagia, fraqueza, paralisia respiratória | Insuficiência ventilatória | Antielapídico |\n\n**Bothrops filhote e pegadinha:** pode ter pouca reação local e coagulopatia importante. Não descarte Bothrops só porque o edema é pequeno nas primeiras horas.\n\n### Escorpionismo\n\nLeve é dor/parestesia local. Moderado tem sintomas autonômicos de menor intensidade: sudorese, náuseas/vômitos, agitação, alteração de FC/PA. Grave tem vômitos incoercíveis, sudorese profusa, sialorreia, RNC, convulsão, priapismo, insuficiência cardíaca, EAP, choque ou insuficiência respiratória. Crianças, especialmente pequenas, descompensam mais.\n\n> **Resposta de prova TEME:** criança com vômitos, sudorese, choque, disfunção ventricular/EAP, hiperglicemia ou pancreatite depois de picada = escorpionismo grave por Tityus; analgesia isolada não basta.\n\n### Aranhas e Lonomia\n\n- **Loxosceles:** pouca dor inicial, depois eritema/edema, placa marmórea, necrose; forma sistêmica com hemólise, icterícia, hemoglobinúria e AKI.\n- **Phoneutria:** dor imediata muito intensa, edema local, sudorese, agitação, hipertensão, náuseas/vômitos, priapismo em criança.\n- **Latrodectus:** dor, contraturas, rigidez abdominal, sudorese e sintomas autonômicos.\n- **Lonomia:** contato com lagarta; dor/queimação local discreta pode enganar, depois coagulopatia, equimoses, sangramentos, hematúria e IRA. Evite AAS, IM e procedimentos desnecessários.\n\n### Abelhas\n\nUma picada pode matar por anafilaxia: adrenalina IM, via aérea e suporte. Muitas picadas podem matar por envenenamento direto: hemólise, rabdomiólise, CIVD, lesão renal, choque e necessidade de diálise. Não confunda \"muitas abelhas\" com \"só alergia\".\n\n## Fluxograma\n\n### Intoxicado Na Sala Vermelha\n\n```mermaid\nflowchart TD\n    A[Paciente intoxicado ou exposição suspeita] --> B[ABCDE + EPI + glicemia + ECG + temperatura]\n    B --> C{Instável?}\n    C -->|Hipoventila| D[Ventilar/O2; considerar naloxona se opioide]\n    C -->|Convulsão ou agitação grave| E[Benzodiazepínico; resfriar se hipertermia]\n    C -->|Choque/bradiarritmia| F[Volume seletivo + vasopressor; pensar CCB/BB/digoxina]\n    C -->|QRS largo| G[Bicarbonato de sódio]\n    C -->|Acidose com gap/osmolar| H[Fomepizol/etanol, bicarbonato e avaliar diálise]\n    C -->|estável| I[Toxidrome + história + exames dirigidos]\n    D --> I\n    E --> I\n    F --> I\n    G --> I\n    H --> I\n    I --> J{Descontaminação segura é útil?}\n    J -->|Sim| K[Carvão/PEG/lavagem excepcional]\n    J -->|Não| L[Suporte e observação]\n    K --> M[antídoto específico se indicado]\n    L --> M\n    M --> N[CIATox, destino: alta observada, enfermaria, UTI ou diálise]\n```\n\n### Picada/Ferroada/Contato Com Animal Peçonhento\n\n```mermaid\nflowchart TD\n    A[Acidente por animal peçonhento] --> B[ABCDE, analgesia, limpar, remover adornos, sem torniquete/cortes/gelo]\n    B --> C{Síndrome predominante}\n    C -->|Dor/edema/sangramento/coagulopatia| D[Bothrops/Lachesis: coagulograma, renal, soro conforme gravidade]\n    C -->|Ptose + mialeia + urina escura| E[Crotalus: CK/renal/EAS, hidratar, soro]\n    C -->|Ptose/disfagia/paralisia com pouco local| F[Elapidico: suporte ventilatório + soro]\n    C -->|Autonômico/cardiogênico em criança| G[Escorpião: analgesia, ECG/eco se grave, soro moderado/grave]\n    C -->|Necrose ou hemólise| H[Loxosceles: labs, soro se moderado/grave/precoce]\n    C -->|Sangramento tardio após lagarta| I[Lonomia: coagulograma/fibrinogênio, soro antilonomico]\n    D --> J[Notificar, observar e reavaliar gravidade]\n    E --> J\n    F --> J\n    G --> J\n    H --> J\n    I --> J\n```\n\n## Doses, alvos e números\n\n### antídotos e medidas de toxicologia\n\n| Item | Número | observação TEME |\n|---|---:|---|\n| Carvão ativado | 1 g/kg VO/SNG; adulto comum 50 g | Preferir até 1 h, substância adsorvível, via aérea segura |\n| Naloxona | 0,04-0,4 mg IV titulando; 0,4-2 mg se apneia/grave | Alvo é FR/ventilação, não abstinência; repetir ou infundir se rebaixar de novo |\n| Flumazenil | 0,2 mg IV, repetir a cada 60 s até resposta | Apenas BZD isolado/não habituado; evitar em TCA, convulsão, abstinência |\n| NAC oral | 140 mg/kg, depois 70 mg/kg 4/4 h x17 | Protocolo clássico; iniciar cedo se dúvida grave |\n| NAC IV | 300 mg/kg em 21 h | Não parar se APAP detectavel ou lesão hepática em piora |\n| Bicarbonato em TCA | 1-2 mEq/kg IV bolus; repetir | QRS >100 ms, hipotensão, arritmia, convulsão; alvo QRS <100 e pH 7,45-7,55 |\n| Atropina organofosforado | Adulto 1-3 mg IV; criança 0,05 mg/kg | Dobrar a cada 5 min até secar secreção pulmonar; depois infusão |\n| Infusão de atropina | 10-20% da dose total de ataque por hora | Ajustar por broncorreia/broncoespasmo |\n| Pralidoxima | Adulto 1-2 g IV em 30 min; criança 25-50 mg/kg | Mais útil se organofosforado precoce; não atrasar atropina |\n| Fomepizol | 15 mg/kg IV, depois 10 mg/kg 12/12 h | Metanol/etilenoglicol; ajustar se diálise |\n| Etanol | Protocolo local/CIATox | Alternativa quando não há fomepizol |\n| Hidroxocobalamina | 5 g IV; pode repetir 5 g | Cianeto/smoke inalation com choque/RNC/lactato alto |\n| Azul de metileno | 1-2 mg/kg IV | MetaHb sintomática; cuidado com G6PD/serotoninérgicos |\n| Insulina em alta dose | Bolus 1 U/kg + 1 U/kg/h, titular até 10 U/kg/h | CCB/BB em choque; glicose e K de perto |\n| Glucagon em BB | 5-10 mg IV bolus, depois infusão | Mais útil em beta-bloqueador; vômitos comuns |\n| Cálcio em CCB | Gluconato 10% 30-60 mL IV ou cloreto 10% 10-20 mL central | Repetir conforme ECG/hemodinâmica/calcemia |\n| Emulsao lipídica 20% | 1,5 mL/kg bolus + 0,25 mL/kg/min | LAST; repetir bolus/dobrar se instável; max 12 mL/kg |\n| CO | O2 100% | Considerar hiperbárica se COHb >25-30%, RNC, isquemia, acidose ou gestante |\n\n### Antivenenos de alta recorrência\n\n| Acidente | Leve | Moderado | Grave | observação TEME |\n|---|---:|---:|---:|---|\n| Bothrops | 3 FA | 6 FA | 12 FA | PCDT ofídicos MS 2026; coagulopatia pode ocorrer mesmo com edema pequeno |\n| Crotalus | 5 FA | 10 FA | 20 FA | Neuro + mialeia/mioglobinúria/oligúria definem gravidade |\n| Lachesis | - | 10 FA | 20 FA | Não há leve clássico; sinais vagais pesam |\n| Elapidico | - | 5 FA | 10 FA | Leve observa; miastenia/paralisia pede soro |\n| Escorpionismo | - | 3 FA | 6 FA | PCDT escorpiônico MS 2026; não passar de 6 FA |\n| Phoneutria | - | 2-4 FA | 5-10 FA | Especialmente criança/sistêmico; analgesia e bloqueio local ajudam |\n| Loxosceles | - | 5 FA | 10 FA | Melhor se precoce; forma sistêmica/hemólise pesa |\n| Lonomia | - | 5 FA | 10 FA | Sangramento/coagulopatia; evitar AAS/IM |\n\nFA = frascos-ampolas. A dose e definida por gravidade, não por peso.\n\n## Pegadinhas TEME\n\n- **Carvão para todo mundo:** errado. Precisa ser cedo, adsorvível e com via aérea segura.\n- **Lavagem gástrica porque chegou há 30 minutos:** errado. Mesmo cedo, é exceção; risco de aspiração/trauma pesa.\n- **Naloxona para \"qualquer sonolento\":** errado. O alvo é depressão respiratória. Sem pulso, RCP/ACLS primeiro.\n- **Flumazenil no coma desconhecido:** armadilha clássica. Pode precipitar convulsão, principalmente com TCA.\n- **TCA com QRS largo e cardioversão/antiarritmico:** a resposta de prova e bicarbonato.\n- **Cocaína hipertensa e beta-bloqueador isolado:** para TEME, evite; benzo e vasodilatador são mais seguros.\n- **Salicilato intubado como qualquer outro:** perigoso. Se intubar, mantenha hiperventilação compensatoria e bicarbonato.\n- **álcool tóxico sem osmolar gap:** não exclui. Gap osmolar cai quando vira acidose.\n- **Organofosforado: parar atropina por taquicardia/midríase:** errado. Pare pelo pulmão seco e perfusão.\n- **Chumbinho:** pense carbamato/organofosforado; na estação pediátrica, atropina em bolus foi ponto de prova.\n- **Bothrops filhote com pouco edema:** pode ser botrópico com coagulopatia importante.\n- **Crotalus vs coral:** Crotalus dá miotoxicidade/urina escura/AKI; coral dá paralisia com pouco local e sem rabdomiólise marcante.\n- **Escorpião em criança com vômitos e EAP:** não é \"só dor\"; é grave até prova em contrário.\n- **Multiplas abelhas:** pode ser envenenamento sistêmico, não apenas anafilaxia.\n- **Lonomia:** contato com lagarta + sangramento/coagulopatia; não precisa ter mordida/picada evidente.\n\n## Erros fatais na prática\n\n- Intubar intoxicado sem preparar vasopressor, capnografia e plano de ventilação, especialmente salicilato/acidose.\n- Dar carvão para paciente sonolento sem proteger via aérea.\n- Atrasar bicarbonato em TCA com QRS largo enquanto espera dosagem toxicológica.\n- Tratar hipertermia simpatomimética só com antitérmico; o tratamento e sedação e resfriamento físico.\n- Usar succinilcolina em organofosforado/carbamato grave ou hipertermia/rabdomiólise por estimulante.\n- Fazer \"dose única\" de atropina em organofosforado e abandonar secreção pulmonar.\n- Transferir acidente peçonhento grave sem soro disponível no serviço de origem quando o soro está indicado e acessível.\n- Fazer torniquete/corte/succao em picada de serpente.\n- Confundir escorpionismo grave pediátrico com sepse/bronquiolite e perder janela do soro.\n- Dar adrenalina como eixo para envenenamento por múltiplas abelhas sem reconhecer rabdomiólise/hemólise/CIVD/AKI; adrenalina é para anafilaxia.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** se o caso tem opioide + hipoventilação, responda naloxona e ventilação; se tem TCA + QRS largo, bicarbonato; se tem organofosforado/chumbinho, atropina até secar secreção e pralidoxima; se tem Bothrops, soro antibotrópico; se tem escorpião grave em criança, soro antiescorpiônico/antiaracnídico.\n>\n> **Na prática clínica:** ligue cedo para CIATox, ajuste antídotos à disponibilidade local, peso, diálise é tempo de exposição. Protocolos de NAC, EXTRIP/diálise e manejo de cocaína com beta-bloqueio mudam com evidências e contexto. O material marca a resposta provável da banca, mas a assistência real deve seguir protocolo institucional e especialista quando possível.\n\n> **Para prova TEME:** soro antiveneno é por gravidade, não por kg; criança recebe a mesma quantidade de FA.\n>\n> **Na prática clínica:** confira tabela atual do Ministério da Saúde e estoque local. O PCDT ofídicos 2026 usa Bothrops 3/6/12 FA; materiais antigos podem trazer 2-4/4-8/12.\n\n## Checklist de revisão\n\n- [ ] No intoxicado grave, eu faco ABCDE, glicemia, ECG, temperatura e suporte antes de \"nomear\" o veneno.\n- [ ] Sei quando usar e quando evitar carvão, lavagem e flumazenil.\n- [ ] Sei reconhecer opioide, colinérgico, simpatomimético, TCA, CCB/BB e álcool tóxico.\n- [ ] Sei as doses centrais: naloxona, bicarbonato, atropina, pralidoxima, NAC, fomepizol, hidroxocobalamina, HDI e lipídica.\n- [ ] Sei que naloxona não substitui RCP em PCR.\n- [ ] Sei que salicilato intubado precisa manter ventilação minuto alta.\n- [ ] Sei diferenciar Bothrops, Crotalus, Lachesis, elapídico, escorpião, Loxosceles, Phoneutria e Lonomia.\n- [ ] Sei as doses de soro mais prováveis: Bothrops 3/6/12, Crotalus 5/10/20, escorpião 0/3/6.\n- [ ] Sei as pegadinhas de Bothrops filhote, coral vs Crotalus, escorpião grave em criança e múltiplas abelhas.\n- [ ] Sei quando acionar CIATox/toxicologista.\n\n## Questões e estações relacionadas\n\n- **TEME22 Q55:** insuficiência respiratória tipo II e intoxicação por opioide/inhalacao como mecanismos possíveis.\n- **TEME22 Q85:** abstinência álcoolica, crise convulsiva e avaliação de causas associadas.\n- **TEME22 Q96:** descontaminação gastrointestinal, carvão, lavagem, diálise e risco de procedimento invasivo.\n- **TEME22 Q108:** álcool tóxico com acidose/gap e necessidade de antídoto + hemodialise.\n- **TEME22 Q114:** acidentes por animais peçonhentos e diferença entre escorpião, crotalico e elapídico.\n- **TEME23 Q30:** etilenoglicol com acidose e cristais de oxalato.\n- **TEME23 Q40:** inalação de fumaça, CO/cianeto e hidroxocobalamina.\n- **TEME23 Q70:** escorpionismo e pancreatite aguda.\n- **TEME23 Q73/Q82:** opioide, naloxona, miose ausente e ventilação.\n- **TEME23 Q97:** chumbo/encefalopatia e quelação.\n- **TEME24 Q1/Q65:** Bothrops filhote, coagulopatia importante e pouco achado local.\n- **TEME24 Q2:** descontaminação gástrica e lavagem.\n- **TEME24 Q23:** LAST e emulsão lipídica 20%.\n- **TEME24 Q30:** TCA com QRS largo, bicarbonato e contraindicação ao flumazenil.\n- **TEME24 Q57:** paraquat.\n- **TEME24 Q79:** múltiplas picadas de abelha e envenenamento sistêmico.\n- **TEME24 Q82:** PCR associada a drogas: RCP/ACLS antes de antídoto.\n- **TEME25 prática pediátrica:** chumbinho/carbamato-organofosforado e atropina.\n- **TEME25 Q1:** cocaína, hipertermia, benzodiazepínico, resfriamento e rocurônio.\n- **TEME25 Q11:** escorpionismo grave em criança com disfunção ventricular/EAP.\n- **TEME25 Q27:** arsenico, diarreia intensa, QT/torsades, Rx radiopaco e quelação antes de confirmação se sintomático.\n- **TEME25 Q36:** naloxona/flumazenil e marcadores clínicos de resposta.\n- **TEME25 Q38:** botulismo alimentar e paralisia descendente.\n- **TEME25 Q64:** CCB/BB com choque bradicardico e insulina em alta dose.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26.\n- Referências bibliográficas TEME26.\n- Provas teóricas TEME22, TEME23, TEME24 e TEME25.\n- Estações práticas TEME25, especialmente pediatria/chumbinho.\n\n**Material local**\n\n- Emergency Talks: Aula 53 - Abordagem geral do paciente intoxicado.\n- Emergency Talks: Aula 54 - Manejo específico das intoxicações I.\n- Emergency Talks: Aula 55 - Manejo específico das intoxicações II.\n- Emergency Talks: Aula 62 - Animais peçonhentos.\n- Emergency Talks: Resumo do Emergency.docx.\n- Emergency Talks: Adendos para complementar.docx.\n\n**Atualização clínica**\n\n- Ministério da Saúde. PCDT dos acidentes ofídicos, 2026: https://www.gov.br/saude/pt-br/centrais-de-conteudo/publicacoes/svsa/animais-peconhentos/pcdt-dos-acidentes-ofidicos.pdf/@@download/file\n- Ministério da Saúde. PCDT dos acidentes escorpiônicos, 2026: https://bvsms.saude.gov.br/bvs/publicacoes/pcdt_acidentes_escorpionicos.pdf\n- Ministério da Saúde. Guia de bolso, orientação terapêutica nos acidentes por animais peçonhentos: https://bvsms.saude.gov.br/bvs/publicacoes/guia_bolso_6ed.pdf\n- American Heart Association. Adult and Pediatric Special Circumstances of Resuscitation: https://cpr.heart.org/en/resuscitation-science/cpr-and-ecc-guidelines/adult-and-pediatric-special-circumstances-of-resuscitation\n- American College of Medical Toxicology. Duration of IV NAC Therapy Following Acetaminophen Overdose, 2026: https://www.acmt.net/wp-content/uploads/2026/01/ACMT-Duration-of-IV-NAC-STATEMENT-1_21_26.pdf\n- EXTRIP Workeroup. Recommendations for extracorporeal treatment in poisonine: https://www.extrip-workgroup.org/\n- CDC. Clinical Overview of Botulism: https://www.cdc.gov/botulism/hcp/clinical-overview/\n- ATSDR/CDC. Arsenic Medical Management Guidelines: https://wwwn.cdc.gov/tsp/MMG/MMGDetails.aspx?mmgid=1424&toxid=3\n- CDC. Clinical Guidance for Carbon Monoxide Poisonine: https://www.cdc.gov/carbon-monoxide/hcp/clinical-guidance/index.html\n- ASRA. Local Anesthetic Systemic Toxicity Checklist, 2020: https://asra.com/docs/default-source/guidelines-articles/local-anesthetic-systemic-toxicity-rgb.pdf\n"},{"id":"temas/009_emergencias-obstetricas-ginecologicas.md","title":"009 - Emergências obstétricas E Ginecológicas","markdown":"# 009 - Emergências obstétricas E Ginecológicas\n\n## Leitura de 30 segundos\n\n- Mulher em idade fertil com dor abdominal, síncope, choque ou sangramento vaginal: faça beta-hCG e pense em gravidez ectópica até provar o contrário.\n- Gestante/puérpera com convulsão, cefaleia, escotomas, epigastralgia ou PA >=160/110: trate como pré-eclampsia grave/eclampsia com sulfato de magnésio e controle pressor, sem esperar proteinúria.\n- Hemorragia pós-parto e pacote simultâneo: chamar ajuda, massagem uterina/bimanual se atonia, 2 acessos, protocolo transfusional, ocitocina, TXA precoce, procurar os 4 T e escalar para balão/cirurgia.\n- Sangramento na segunda metade: placenta prévia e sangramento vivo indolor; DPP e dor, hipertonia uterina, sofrimento fetal e fibrinogênio baixo; não fazer toque vaginal antes de excluir placenta prévia.\n- Gineco aguda de prova: DIP é diagnóstico clínico com baixo limiar para antibiótico; torção ovariana pode ter Doppler normal; violência sexual não exige boletim de ocorrência para atendimento.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME22-25 cobrou eclampsia/pré-eclampsia grave, cesárea perimortem/histerotomia de reanimação, hemorragia puérperal, SUA, violência sexual, DIP, prolapso de cordão, gravidez ectópica e DPP/fibrinogênio.\n- **O que a banca costuma testar:** primeira conduta, droga de escolha, quando pedir TC na eclampsia, quando não tocar a gestante sangrando, quando operar/transferir, e qual exame/laboratório muda gravidade.\n- **Como costuma aparecer:** caso com distrator \"obstétrico\" que não pode atrasar sala vermelha. A resposta costuma ser ABCDE + intervenção tempo-dependente, não uma investigação longa.\n\n## Abordagem prática\n\n### 1. Mulher em idade fertil na emergência\n\n1. **Teste de gravidez cedo:** dor abdominal, síncope, choque, sangramento, vômitos persistentes, sepse, trauma, cefaleia/convulsão ou antes de medicação/procedimento relevante.\n2. **Se instável:** sala vermelha, 2 acessos calibrosos ou IO, hemograma/coag/tipagem/prova cruzada, lactato/gaso, US beira-leito quando ajudar, gineco/obstetrícia e banco de sangue.\n3. **Defina o eixo:** gestante? idade gestacional? primeira metade, segunda metade, parto/pós-parto ou não gestante?\n4. **Evite o erro clássico:** em gestante com sangramento depois de 20 semanas, não faça toque vaginal digital antes de excluir placenta prévia.\n5. **Feto importa, mas a mãe vem primeiro:** no trauma, choque, PCR, eclampsia e hemorragia, salvar perfusão/oxigenação materna é a melhor ressuscitação fetal.\n\n### 2. Convulsão/PA alta na gestante ou puérpera\n\n1. ABCDE, lateralizar, O2 se hipoxemia, aspirar secreção, glicemia, acesso, monitor, proteger via aérea se coma/aspiração/hipoxemia.\n2. Se gestante >20 semanas ou puérpera com crise convulsiva: **sulfato de magnésio imediato.**\n3. Se PA >=160/110 mmHg persistente: anti-hipertensivo de ação rápida, sem normalizar PA.\n4. Coletar: hemograma/plaquetas, creatinina, TGO/TGP, DHL, bilirrubina, urina/proteinúria se possível, coagulograma se sangramento/HELLP.\n5. Acionar obstetrícia/UTI/anestesia/neonatal. O tratamento definitivo da eclampsia e interrupção da gestação, depois de estabilizar a mãe.\n\n> **Resposta de prova TEME:** convulsão em gestante/puérpera com pré-eclampsia = sulfato de magnésio. Benzodiazepínico e fenitoína não são primeira linha.\n>\n> **Na prática clínica:** se crise persiste apesar de MgSO4 adequado, faça dose adicional de 2 g e trate status epilepticus com suporte de via aérea/UTI e outro anticonvulsivante. Déficit focal, coma persistente ou convulsão recorrente pedem neuroimagem.\n\n### 3. Sangramento vaginal: primeira metade\n\n1. **Instável ou peritonite:** pense em ectópica rota, rotura de cisto, abortamento complicado; ressuscite e chame cirurgia/gineco.\n2. **Beta-hCG + US transvaginal:** intrauterina? ectópica? sem saco? massa anexial? líquido livre?\n3. **Ameaça de abortamento:** pouco sangramento, colo fechado, dor leve, vitalidade presente; orientação e seguimento.\n4. **Abortamento inevitável/incompleto:** sangramento/cólica, colo aberto, restos; AMIU/curetagem ou misoprostol conforme idade gestacional, estabilidade e protocolo.\n5. **Abortamento infectado:** febre, dor importante, secreção fétida, peritonite ou sepse; antibiótico EV amplo + esvaziamento uterino após estabilização.\n6. **Ectópica:** dor + sangramento + atraso menstrual. Instável = cirurgia; estável selecionada = metotrexato e seguimento rigoroso.\n7. **Molar:** sangramento + uterino maior que idade, hiperemese/hipertireoidismo/pré-eclampsia precoce, US em \"tempestade de neve\"; estabilizar e esvaziar por aspiração.\n\n### 4. Sangramento vaginal: segunda metade\n\n| Diagnóstico | Pistas | Conduta TEME |\n|---|---|---|\n| Placenta prévia | Sangramento vermelho vivo, indolor, útero relaxado | US antes de toque; suporte; obstetrícia; cesárea se instável/termo/sangramento importante |\n| DPP | Dor, sangramento escuro, útero hipertônico, hipertensão/trauma, sofrimento fetal | Ressuscitar, coagulograma/fibrinogênio, parto conforme mãe/feto, sangue cedo |\n| Rotura uterina | Dor súbito intensa, perda de estação fetal, BCF some, choque, cicatriz uterina | Laparotomia/cesárea imediata |\n| Vasa prévia | Sangramento após rotura de membranas + sofrimento fetal | Cesarea emergencial |\n\n**Fibrinogênio cai cedo no DPP/HPP grave.** Na prova, se pereuntarem qual exame se correlaciona com severidade, CIVD e transfusão no DPP, marque fibrinogênio.\n\n### 5. Hemorragia pós-parto\n\nPense nos **4 T**:\n\n- **Tone:** atonia uterina, causa mais comum.\n- **Trauma:** laceracao cervical/vaginal/perineal, rotura uterina, hematoma.\n- **Tissue:** placenta/restos retidos.\n- **Thrombin:** coagulopatia, DPP, HELLP, anticoagulante, CIVD.\n\nConduta inicial:\n\n1. Chamar obstetrícia/anestesia/enfermagem/banco de sangue; estimar perda e calcular índice de choque.\n2. Massagem uterina se atonia; compressão bimanual se sangramento importante.\n3. 2 acessos calibrosos, cristaloide aquecido com parcimonia, hemocomponentes cedo se choque/sangramento persistente.\n4. Ocitocina e TXA precoce; não esperar resposta lenta se a paciente está sangrando.\n5. Esvaziar bexiga; revisar canal de parto; procurar restos placentários; avaliar coagulopatia.\n6. Se refratária: uterotônicos de segunda linha, balão intrauterino, suturas compressivas, embolização ou cirurgia/histerectomia.\n\n> **Resposta de prova TEME:** atonia = útero flácido + sangramento pós-parto. A primeira manobra mecânica clássica e massagem/compressão uterina bimanual, associada a ocitocina e ressuscitação.\n>\n> **Atualização clínica:** OMS/FIGO/OPAS caminham para pacote simultâneo de primeira resposta: massagem uterina, uterotonico, TXA, fluidos IV, exame do trato genital e escalonamento. TXA deve ser precoce, idealmente até 3 h do parto.\n\n### 6. Parto, RPM, trabalho prematuro e prolapso de cordão\n\n- **Trabalho de parto prematuro:** contrações + modificação cervical antes de 37 semanas. Entre 24 e 34 semanas, tocolise por até 48 h pode ganhar tempo para corticoide/transferência se não houver contraindicação.\n- **RPM:** perda de líquido antes do trabalho de parto. Diagnóstico por história + especular; evite toque digital repetido. Sinais de corioamnionite mudam tudo.\n- **Prolapso de cordão:** cordão abaixo/apresentação, bradicardia fetal ou cordão palpável/visível. Elevar apresentação com mão, posição genupeitoral/Trendelenburg, evitar manipular cordão, chamar cesárea emergencial se feto viável.\n- **HIV em trabalho de parto sem adesão/viral load desconhecida:** zidovudina IV e via de parto conforme obstetrícia/protocolo, mas prolapso de cordão é emergência obstétrica de cesárea.\n\n### 7. Trauma e PCR na gestante\n\n- Avaliação primária **focada na mãe**; feto sofre antes de a PA materna cair.\n- Gestante pode mascarar choque por hipervolemia fisiológica; FC maior e PA menor podem confundir.\n- Oxigenação, controle de hemorragia, pelve, eFAST, TXA quando indicado, hemocomponentes, evitar hipotermia.\n- Deslocamento uterino manual para esquerda se útero acima do umbigo.\n- Rh negativo com trauma abdominal: imunoglobulina anti-D idealmente até 72 h; teste de Kleihauer-Betke ajuda a quantificar hemorragia feto-materna.\n- PCR gestante com útero no nível/acima do umbigo: RCP de alta qualidade, deslocamento uterino, via aérea antecipada, desfibrilação normal. Se sem RCE rápido, histerotomia de reanimação a partir de 4 min, nascimento em torno de 5 min.\n\n### 8. Emergências ginecológicas não obstétricas\n\n**Sangramento uterino anormal (SUA):**\n\n1. Excluir gestação.\n2. Instabilidade/anemia sintomática: ressuscitar, tipagem/prova cruzada, corrigir coagulopatia, gineco.\n3. Tratamento pode incluir estrogênio IV, progestágeno, anticoncepcional combinado, AINE, TXA, tamponamento vaginal/uterino e procedimento conforme causa.\n4. pós-menopausa, massa cervical, sangramento pós-coito, instabilidade, dor/peritonite ou suspeita de câncer = avaliação ginecológica urgente.\n\n**Torção ovariana:**\n\n- Dor unilateral intensa/intermitente + náuseas/vômitos; pode ocorrer com cisto/massa e em idade reprodutiva.\n- US pode mostrar ovario aumentado, massa/cisto, líquido livre; **Doppler normal não exclui**.\n- Diagnóstico definitivo e cirúrgico. Suspeita alta = gineco/centro cirúrgico, não alta por Doppler.\n\n**DIP:**\n\n- Dor pélvica/baixo ventre + dor a mobilização do colo, dor uterina ou anexial, corrimento/febre/dispareunia.\n- Diagnóstico é clínico; imagem ajuda a excluir apendicite, ectópica e abscesso, mas não deve atrasar antibiótico.\n- Internar se gravidez, abscesso tubo-ovariano, doença grave, vômitos/intolerância VO, falha em 72 h, impossibilidade de excluir emergência cirúrgica ou seguimento ruim.\n\n**Miocardiopatia periparto:**\n\n- Dispneia, ortopneia, edema, linhas B difusas, VE hipocinetico/dilatado no fim da gestação ou meses após parto.\n- Fatores de risco: pré-eclampsia/hipertensão, idade materna avançada, multiparidade, gestação multipla, ascendencia africana, história prévia.\n- Trate como IC aguda ajustada a gestação/lactacao: O2/VNI se necessário, diurético se congestão, vasodilatador se PA permite, UTI/cardio/obstetrícia.\n\n### 9. Violência sexual\n\n1. Atender primeiro: acolhimento, privacidade, consentimento, analgesia, tratar trauma, risco suicida e segurança.\n2. **Boletim de ocorrência não é condição para atendimento.** Exame genital não deve ser forçado; exame físico completo e documentação cuidadosa.\n3. Notificação compulsória em até 24 h pelo serviço de saúde.\n4. Coletar exames e vestígios conforme tempo, consentimento e rede local, sem atrasar profilaxias.\n5. Contracepção de emergência, PEP HIV se risco e até 72 h, profilaxia IST, hepatite B e HPV conforme status.\n\n> **Resposta de prova TEME:** em vítima adolescente de violência sexual, levonorgestrel dose única é alternativa correta; BO não é indispensável; notificação não é \"em até 72 h\", e sim em até 24 h.\n>\n> **Na prática clínica:** siga fluxo local de violência sexual, preserve autonomia, evite revitimizar e acione rede psicossocial/proteção. Em menor de idade, há dimensões legais e tutelares obrigatórias.\n\n## Conceitos que sustentam a conduta\n\n### pré-eclampsia, eclampsia e HELLP\n\npré-eclampsia não é apenas PA + proteinúria. Hipertensão após 20 semanas com lesão de órgão-alvo também fecha gravidade: plaquetas baixas, creatinina alta, TGO/TGP elevadas, dor epigástrica/hipocôndrio direito, edema pulmonar, cefaleia persistente ou distúrbio visual. Eclampsia é crise convulsiva no contexto de pré-eclampsia, inclusive no pós-parto.\n\nHELLP é hemólise, enzimas hepáticas elevadas e plaquetopenia. Dor epigástrica/hipocôndrio direito, náuseas, mal-estar e plaquetas baixas podem aparecer antes de crise. A conduta é estabilização materna, MgSO4 se grave/eclampsia/risco, controle pressor e parto conforme idade gestacional e gravidade.\n\n### O que não esperar na eclampsia\n\nNão espere proteinúria para tratar. Não espere obstetra para dar MgSO4. Não espere TC antes do anticonvulsivante se o quadro é típico. TC entra se crise persistente, déficit focal, coma prolongado, cefaleia explosiva, trauma, anticoagulação ou dúvida diagnóstica relevante.\n\n### Por que fibrinogênio importa em DPP/HPP\n\nNa gestação, fibrinogênio basal e alto. Um valor \"normal baixo\" para não gestante pode já ser preocupante na obstetrícia. DPP consome fibrinogênio e pode evoluir com CIVD; por isso fibrinogênio se correlaciona melhor com sangramento grave e necessidade transfusional que INR/plaquetas isolados.\n\n### Por que Doppler normal não exclui torção ovariana\n\nO ovário tem duplo suprimento arterial e a torção pode ser intermitente. Primeiro ocorre obstrução venosa/linfática, edema e congestão; fluxo arterial pode permanecer. Se história e exame gritam torção, a resposta segura é consulta cirúrgica.\n\n## Fluxograma\n\n### Gestante/Puérpera Com Convulsão Ou PA Grave\n\n```mermaid\nflowchart TD\n    A[Gestante >20 sem ou puérpera com crise, cefaleia, escotomas ou PA grave] --> B[ABCDE, lateralizar, glicemia, acesso, monitor]\n    B --> C{Convulsão ou alto risco?}\n    C -->|Sim| D[MgSO4 ataque 4-6 g IV + manutenção 1-2 g/h]\n    C -->|Não| E[Avaliar critérios de gravidade e labs]\n    D --> F{PA >=160/110 persistente?}\n    E --> F\n    F -->|Sim| G[Nifedipina VO ou hidralazina/labetalol IV]\n    F -->|Não| H[Monitorar mãe e feto]\n    G --> H\n    H --> I[Hemograma, plaquetas, creatinina, TGO/TGP, DHL, proteinúria, coagulograma se sangra]\n    I --> J{Déficit focal, coma persistente ou crise recorrente?}\n    J -->|Sim| K[TC/angio conforme caso + UTI/neuro]\n    J -->|Não| L[Obstetrícia: definir parto após estabilização]\n```\n\n### Sangramento Vaginal Na Emergência\n\n```mermaid\nflowchart TD\n    A[Sangramento vaginal] --> B[ABCDE, sinais de choque, beta-hCG, Hb, coagulograma, tipagem]\n    B --> C{Instável?}\n    C -->|Sim| D[2 acessos, sangue, TXA se hemorragia, gineco/obst, US beira-leito]\n    C -->|Não| E{Gestante?}\n    E -->|Não| F[SUA: excluir coagulopatia/câncer; tratar e definir urgência]\n    E -->|Sim| G{Idade gestacional}\n    G -->|1a metade| H[Ectópica/abortamento/molar: beta-hCG + USTV]\n    G -->|>20 sem antes do parto| I[Sem toque digital até excluir placenta prévia]\n    G -->|pós-parto| J[HPP: 4T + massagem + ocitocina + TXA + sangue]\n    I --> K{Dor/útero hipertônico?}\n    K -->|Sim| L[DPP: fibrinogênio, sangue, parto conforme mãe/feto]\n    K -->|Não| M[Placenta prévia: US, suporte, obstetrícia]\n```\n\n## Doses, alvos e números\n\n### Hipertensão/eclampsia\n\n| Item | Número | observação TEME |\n|---|---:|---|\n| PA grave na gestação/puerpério | >=160 sistolica ou >=110 diastolica | Tratar se persistente; não esperar lesão irreversível |\n| Alvo após tratamento | manter <160/110; comum 140-150/90-100 | Evitar queda brusca e hipoperfusão placentaria/cerebral |\n| MgSO4 ataque | 4-6 g IV em 15-20 min | Primeira linha na eclampsia |\n| MgSO4 manutenção | 1-2 g/h IV | Manter conforme protocolo, geralmente até 24 h pós-parto/última crise |\n| Nova crise em MgSO4 | 2 g IV adicional | Depois pensar UTI, neuroimagem e outro anticonvulsivante |\n| Monitorar MgSO4 | FR >=12/min, reflexos presentes, diurese >=25-30 mL/h | Creatinina >1,3: reduzir dose/medir magnésio conforme MS |\n| antídoto MgSO4 | Gluconato de cálcio 10%, 10 mL IV lento | Depressao respiratória, arreflexia ou toxicidade |\n| Hidralazina | 5-10 mg IV, repetir em 20-30 min | opção se inconsciente/sem VO |\n| Nifedipina IR | 10 mg VO, repetir conforme resposta | Não usar sublingual como rotina |\n| Labetalol | 20 mg IV, depois 40/80 mg escalonado | Evitar em asma grave, IC, BAV/bradicardia |\n\n### Hemorragia obstétrica\n\n| Item | Número | observação TEME |\n|---|---:|---|\n| HPP clássica | >=500 mL vaginal, >=1000 mL cesárea ou qualquer sangramento com instabilidade | Na prova, clínica supera volume estimado |\n| Índice de choque | FC/PAS >1 alerta; >1,4 sugere gravidade/transfusão maciça | TEME23 cobrou SI >1,4 |\n| Ocitocina HPP | 10 UI IM ou 5 UI IV lento + 20-40 UI em 500 mL SF | Evitar bolus EV rápido de dose alta |\n| TXA HPP | 1 g IV em 10 min, ideal até 3 h | Repetir 1 g se sangramento persiste/recorre conforme protocolo |\n| Metilereometrina | 0,2 mg IM | Contraindicada em hipertensão/pré-eclampsia |\n| Carboprost | 250 mcg IM a cada 15-90 min, max 2 mg | Contraindicado em asma |\n| Misoprostol | 800-1000 mcg VO/SL/retal | Útil se sem acesso/uterotonico indisponivel |\n| Fibrinogênio | <200 mg/dL grave; <300 já preocupa em obstetrícia | DPP/HPP: queda precoce e preditiva |\n\n### Gineco/violência sexual\n\n| Item | Número | observação TEME |\n|---|---:|---|\n| Metotrexato ectópica | 50 mg/m2 IM dose única | Só estável, sem hemoperitônio, massa <4 cm, sem BCF, beta-hCG baixo e seguimento |\n| Abortamento infectado | Clindamicina 900 mg IV 8/8 h + gentamicina | Associar ampicilina/metronidazol conforme protocolo/sepse |\n| DIP ambulatorial | Ceftriaxona 500 mg IM dose única + doxiciclina 100 mg 12/12 h 14 d + metronidazol 500 mg 12/12 h 14 d | CDC 2021; imagem não deve atrasar se clínica forte |\n| Violência sexual: CE | Levonorgestrel 1,5 mg VO dose única | Preferir até 72 h; pode considerar até 120 h conforme MS |\n| PEP HIV | iniciar o quanto antes, max 72 h; 28 dias | Não atrasar por exames pendentes |\n| HBV violência sexual | Vacina + IGHAHB 0,06 mL/kg IM se não imunizada/incompleta | Ideal 24-48 h; max 14 dias |\n| IST não virais violência sexual BR | Penicilina benzatina 2,4 mi UI IM + ceftriaxona 500 mg IM + azitro 1 g VO + metronidazol 2 g VO | Metronidazol pode ser postergado se CE/PEP; evitar 1º trimestre |\n\n## Pegadinhas TEME\n\n- **Eclampsia = diazepam/fenitoína primeiro:** errado. E MgSO4.\n- **pré-eclampsia precisa sempre de proteinúria:** errado. Lesão de órgão-alvo basta.\n- **PA 140/90 = cesárea imediata:** errado. Urgência e PA grave/LOA; parto depende de contexto.\n- **Nitroprussiato e droga de escolha na pré-eclampsia grave:** errado. Use nifedipina, hidralazina ou labetalol.\n- **TC antes de MgSO4 na eclampsia típica:** errado. TC é para déficit focal, coma/crise persistente ou dúvida.\n- **Placenta prévia pode receber toque para avaliar dilatação:** armadilha. Primeiro US.\n- **DPP depende de sangramento externo volumoso:** errado. Pode ser oculto e grave.\n- **HPP e retenção placentaria como causa principal:** errado; causa mais comum e atonia uterina.\n- **Ocitocina só EV:** errado. Pode ser IM, muito útil no APH/sem acesso.\n- **Massagem uterina bimanual está em desuso:** errado na hemorragia por atonia.\n- **Torção ovariana com Doppler normal excluída:** errado; até 60% podem ter fluxo.\n- **DIP precisa imagem para diagnóstico:** errado; diagnóstico é clínico é tratamento empirico precoce.\n- **Ectópica excluída por ausência de sangramento vaginal/estabilidade:** errado.\n- **Violência sexual precisa BO para atendimento:** errado.\n- **Notificação de violência sexual em 72 h:** errado; notificação compulsória em até 24 h.\n\n## Erros fatais na prática\n\n- Dar benzodiazepínico e esquecer MgSO4/controle pressor na eclampsia.\n- Intubar eclâmptica sem tratar hipertensão grave, hipoxemia e risco de broncoaspiração.\n- Fazer toque vaginal digital em sangramento de segunda metade sem excluir placenta prévia.\n- Subestimar choque na gestante porque PAS ainda parece \"aceitável\".\n- Tratar HPP em sequência lenta, esperando uma droga falhar antes de chamar ajuda/sangue.\n- Fazer bolus rápido de grande dose de ocitocina EV e causar hipotensão.\n- Dar metilereometrina para paciente hipertensa/pré-eclâmptica.\n- Dar alta para dor pélvica com Doppler normal quando a história sugere torção.\n- Esperar imagem/laboratório para iniciar antibiótico em DIP clínica com risco.\n- Revitimizar paciente de violência sexual ou condicionar atendimento a boletim de ocorrência.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** euarde respostas secas: eclampsia = MgSO4; HPP por atonia = massagem/compressão uterina + ocitocina; DPP grave = fibrinogênio; torção = cirurgia mesmo com Doppler normal; violência sexual = atendimento sem BO + levonorgestrel + profilaxias.\n>\n> **Na prática clínica:** use protocolos locais, obstetrícia e CI/UTI cedo. Muitas condutas obstétricas dependem de idade gestacional, vitalidade fetal, recurso neonatal, banco de sangue, disponibilidade de centro cirúrgico e desejo/consentimento da paciente.\n\n> **Para prova TEME:** TXA aparece como 1 g EV e pode haver material antigo falando em repetir após 8 h.\n>\n> **Atualização clínica:** OMS/FIGO recomendam TXA precoce na HPP, idealmente até 3 h do parto, com segunda dose se sangramento persiste após 30 min ou recorre em até 24 h, conforme protocolo.\n\n## Checklist de revisão\n\n- [ ] Toda mulher em idade fertil com dor/sangramento/choque tem beta-hCG considerado.\n- [ ] Sei diagnosticar eclampsia e dar MgSO4 antes de benzo/fenitoína.\n- [ ] Sei tratar PA >=160/110 na gestação/puerpério.\n- [ ] Sei quando pedir TC na eclampsia.\n- [ ] Sei diferenciar placenta prévia, DPP, rotura uterina e vasa prévia.\n- [ ] Sei os 4 T da HPP e o pacote inicial.\n- [ ] Sei doses de MgSO4, hidralazina/nifedipina/labetalol, ocitocina e TXA.\n- [ ] Sei critérios de ectópica para cirurgia vs metotrexato.\n- [ ] Sei que DIP é clínica e que torção pode ter Doppler normal.\n- [ ] Sei o fluxo mínimo de violência sexual: acolher, não exigir BO, notificar 24 h, CE/PEP/IST/HBV.\n\n## Questões e estações relacionadas\n\n- **TEME22 Q21:** doenças hipertensivas da gestação; MgSO4, TC se déficit neurológico e anti-hipertensivos corretos.\n- **TEME22 Q82:** PCR gestante e cesárea/histerotomia perimortem após 4 min se PCR persiste.\n- **TEME22 Q107:** HPP por atonia: útero flácido, sangramento e massagem/compressão uterina.\n- **TEME22 Q109:** violência sexual; exame físico completo e lesões extragenitais.\n- **TEME22 Q113:** SUA em não gestante e opções de manejo.\n- **TEME23 Q7:** PCR em gestante, RCP otimizada, desfibrilação e histerotomia precoce.\n- **TEME23 Q59:** hemorragia puérperal, shock index, ocitocina IM/EV e massagem uterina.\n- **TEME23 Q84:** pré-eclampsia grave; trombocitopenia grave é indicação de parto; MgSO4 não é só após convulsão.\n- **TEME23 Q92:** SUA não gestante é indicação de avaliação ginecológica emergencial.\n- **TEME24 Q14:** PCR gestante 32 semanas, histerotomia de reanimação.\n- **TEME24 Q18:** DIP clínica; dor a mobilização do colo e imagem para diferenciais/complicações.\n- **TEME24 Q78:** prolapso de cordão em gestante termo; cesárea emergencial.\n- **TEME24 Q96:** mulher em choque com líquido livre; pensar ectópica rota/hemoperitônio.\n- **TEME25 Q2:** eclampsia com rebaixamento/risco de aspiração é indicação de via aérea sem atrasar MgSO4/PA.\n- **TEME25 Q37:** eclampsia no 10o dia pós-parto; primeira conduta MgSO4.\n- **TEME25 Q59-Q60:** violência sexual, levonorgestrel, notificação, HBV/IST/PEP.\n- **TEME25 Q61:** miocárdiopatia periparto e fatores de risco.\n- **TEME25 Q85:** DPP e fibrinogênio como marcador de gravidade/transfusão.\n- **Emergency Talks:** Aulas 46, 51, 52, 57 e 58.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26.\n- Referências bibliográficas TEME26.\n- Provas teóricas TEME22, TEME23, TEME24 e TEME25.\n- Estações práticas TEME22-25.\n\n**Material local**\n\n- Emergency Talks: Aula 46 - Trauma em populações especiais I: idoso e gestante.\n- Emergency Talks: Aula 51 - intercorrências da 1a metade da gestação.\n- Emergency Talks: Aula 52 - intercorrências do parto e pós-parto.\n- Emergency Talks: Aula 57 - Emergências ginecológicas.\n- Emergency Talks: Aula 58 - intercorrências da 2a metade da gestação.\n- Emergency Talks: Resumo do Emergency.docx.\n- Emergency Talks: Adendos para complementar.docx.\n\n**Atualização clínica**\n\n- Ministério da Saúde. Manual de Gestação de Alto Risco, 2022: https://bvsms.saude.gov.br/bvs/publicacoes/manual_gestacao_alto_risco.pdf\n- Ministério da Saúde. Violência sexual: https://www.gov.br/saude/pt-br/assuntos/saude-de-a-a-z/s/saude-da-mulher/saude-sexual-e-reprodutiva/violencia-sexual\n- Ministério da Saúde. PEP pós-exposição ao HIV, ISTs e hepatites virais: https://www.gov.br/aids/pt-br/assuntos/prevencao-combinada/pep-profilaxia-pos-exposicao-ao-hiv\n- Ministério da Saúde. PCDT Atenção Integral as Pessoas com IST, seção violência sexual: https://bvsms.saude.gov.br/bvs/publicacoes/protocolo_clinico_diretrizes_terapeutica_atencao_integral_pessoas_infeccoes_sexualmente_transmissiveis.pdf\n- Hospital das Clínicas UFMG/Ebserh. Protocolo Hemorragia Pós-parto, 2024: https://www.gov.br/hubrasil/pt-br/hospitais-universitarios/regiao-sudeste/hc-ufmg/saude/protocolos-assistenciais-hc-ufmg-ebserh/PRT_UMUL_380_Hemorragia_posparto_V01.pdf\n- WHO. Recommendations on assessment of postpartum blood loss and treatment bundle for postpartum haemorrhage, 2023: https://www.who.int/publications/i/item/9789240085398\n- CDC. Pelvic Inflammatory Disease, STI Treatment Guidelines: https://www.cdc.gov/std/treatment-guidelines/pid.htm\n- CDC. Sexual Assault and Abuse and STIs, STI Treatment Guidelines: https://www.cdc.gov/std/treatment-guidelines/sexual-assault-adults.htm\n- CDC. Nonoccupational HIV Postexposure Prophylaxis Recommendations, 2025: https://www.cdc.gov/mmwr/volumes/74/rr/rr7401a1.htm\n"},{"id":"temas/010_emergencias-pediatricas.md","title":"010 - Emergências pediátricas","markdown":"# 010 - Emergências pediátricas\n\n## Leitura de 30 segundos\n\n- Criança grave não avisa com hipotensão cedo. Letargia, TEC prolongado, extremidade fria, pulso ruim, taquipneia e taquicardia são choque até prova em contrário.\n- Parada pediátrica costuma ser respiratória. Se a criança está bradicárdica, hipóxica ou exausta, ventile bem antes de procurar Explicação rara.\n- Bronquiolite e suporte; asma grave e SABA + ipratrópio + corticoide precoce + MgSO4 se refratária. Intubação em asma é último recurso, com ventilação protetora contra auto-PEEP.\n- Choque hipovolêmico/desidratação em prova TEME: cristaloide isotônico 20 mL/kg e reavaliação. Sepse atual: bolus de 10-20 mL/kg, reavaliar a cada etapa e vasoativo cedo se refratário.\n- Trauma pediátrico: PECARN para TCE, imagem cervical com critério pediátrico, FAST tem menor sensibilidade, concentrado de hemácias 10 mL/kg se hemorragia.\n- Estação prática pediátrica premia o simples: glicemia capilar, oxigênio, aquecer, estimular, acesso IV/IO, reconhecer toxíndrome e usar dose por peso.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME22-25 cobrou choque hipovolêmico/desidratação, via aérea pediátrica, succinilcolina e trismo, bronquiolite com bradicardia, asma grave, exantemas, síndrome do choque tóxico, trauma pediátrico, FAST negativo, PECARN, imagem cervical e intoxicação por \"chumbinho\".\n- **O que a banca costuma testar:** primeira conduta, diferença entre criança compensada e descompensada, ventilação antes de atropina, bolus em mL/kg, TOT por idade, critérios de imagem é tratamento de doenças respiratórias comuns.\n- **Como costuma aparecer:** caso curto com sinais vitais que parecem \"quase normais\". O candidato aprovado reconhece gravidade por perfusão, consciência e trabalho respiratório, não apenas por PA.\n\n## Abordagem prática\n\n### 1. Primeiro minuto da criança grave\n\n1. **Triâneulo de avaliação pediátrica:** aparência, trabalho respiratório e circulação da pele. Criança quieta, sonolenta, pálida/cianótica/moteada ou com gemência/retrações entra direto na sala vermelha.\n2. **ABCDE com duas medidas obrigatórias:** glicemia capilar e temperatura. Hipoglicemia e hipotermia mudam consciência, perfusão e prognóstico.\n3. **Peso estimado cedo:** fita, comprimento, peso informado ou formula local. Toda droga e fluido depende disso.\n4. **Monitor, O2, acesso:** se IV não sai rápido, intraosseo. Em choque/convulsão/parada, IO e via definitiva, não \"plano B vereonhoso\".\n5. **Reavaliar depois de cada intervenção:** FC, FR, SatO2, PA, TEC, pulso, ausculta, hepatomegalia, diurese e nível de consciência.\n\n> **Resposta de prova TEME:** na estação pediátrica de 2025, a sequência pontuava glicemia capilar, oxigênio, aquecer, estimular e acesso venoso periférico.\n>\n> **Na prática clínica:** se a criança está em choque ou convulsão e o IV falhou em 60-90 s ou 2 tentativas, faça IO sem perder tempo.\n\n### 2. Desconforto respiratório e insuficiência respiratória\n\nClassifique rápido:\n\n- **Sem comando/drive:** TCE, intoxicação, pós-ictal, hipoglicemia, lesão medular, fraqueza neuromuscular.\n- **Obstrução alta:** crupe, epiglotite, corpo estranho, anafilaxia, edema de via aérea.\n- **Obstrução baixa:** bronquiolite, asma, corpo estranho bronquico.\n- **Parênquima/difusao:** pneumonia, edema pulmonar, SDRA, sepse.\n\nConduta inicial:\n\n1. Posicionar, aspirar secreção, abrir via aérea e dar O2.\n2. Se esforço ineficaz, apneia, rebaixamento ou bradicardia: **ventilação com bolsa-valvula-máscara e O2.**\n3. Se falha de BVM, proteção de via aérea ou exaustão: chamar ajuda para via aérea avançada.\n4. Depois de estabilizar, trate a causa provável.\n\n### 3. Bronquiolite\n\n- Lactente, IVAS viral, piora entre dias 2-5, taquipneia, retrações, sibilos/crepitantes, dificuldade de mamar.\n- Avalie gravidade por apneia, exaustão, hipoxemia persistente, desidratação, idade pequena, prematuridade, cardiopatia ou pneumopatia.\n- Tratamento: aspiração nasal se secreção, hidratação, O2 se hipoxemia persistente, considerar cateter nasal de alto fluxo/CPAP se trabalho respiratório importante.\n- Não pedir RX/labs de rotina se quadro típico e estável.\n\n> **Resposta de prova TEME:** lactente com bronquiolite, SatO2 70%, inconsciente e FC 48 precisa de ventilação com pressão positiva e O2; se FC segue <60 com má perfusão apesar de ventilação, iniciar compressão.\n>\n> **Atualização clínica:** AAP/NICE recomendam não usar salbutamol, adrenalina, corticoide, antibiótico ou RX de rotina na bronquiolite típica. Um teste de broncodilatador pode aparecer em protocolos locais para criança maior/atópica, mas não é tratamento padrão do lactente clássico.\n\n### 4. Crupe, anafilaxia e corpo estranho\n\n**Crupe:**\n\n- Tosse ladrante, rouquidão, estridor, piora noturna, geralmente após IVAS.\n- Manter criança calma, evitar procedimentos desnecessários.\n- Dexametasona para todos os quadros relevantes; adrenalina nebulizada se estridor em repouso/moderado-grave; observar 2-4 h após adrenalina.\n\n**Anafilaxia:**\n\n- Exposição possível + pele/mucosa, respiratório, hipotensão/síncope ou gastrointestinal agudo.\n- Primeira droga é adrenalina IM na face anterolateral da coxa. Anti-H1, beta-2 e corticoide são adjuvantes, não substituem adrenalina.\n- Choque: cristaloide 20 mL/kg e repetir conforme resposta.\n\n**Corpo estranho:**\n\n- Tosse/engasgo abrupto, assimetria auscultatoria ou estridor.\n- Se tosse efetiva: estimular tosse e monitorar.\n- Se obstrução grave: manobras de desobstrução por idade; se inconsciente, RCP e olhar boca antes de ventilar.\n\n### 5. Asma aguda grave\n\n1. O2 para hipoxemia, monitor e gravidade por fala, tiragem, SatO2, ausculta, consciência e fadiga.\n2. Salbutamol inalatorio em doses repetidas na primeira hora.\n3. Ipratrópio nas crises moderadas/graves na primeira hora.\n4. Corticoide sistêmico precoce, de preferencia VO se tolerar.\n5. Se grave/refratária: MgSO4 IV, considerar NIV se colaborativa, chamar UTI.\n6. Intubar se exaustão, rebaixamento, hipoxemia persistente, parada iminente, silêncio auscultatório ou hipercapnia progressiva com fadiga.\n\nPontos de ventilação pós-IOT na asma:\n\n- Baixa frequência respiratória, tempo expiratório longo, permissão de hipercapnia se pH aceitável.\n- Evitar empilhar volume: auto-PEEP mata.\n- Sedação profunda; ketamina pode ajudar pela broncodilatacao.\n\n> **Resposta de prova TEME:** MgSO4 em asma grave pediátrica pode ser feito 50-75 mg/kg EV em 20 min quando indicado; não precisa esperar magnesemia normal para usar. Adrenalina/terbutalina não são rotina na asma, salvo anafilaxia ou protocolo específico.\n>\n> **Na prática clínica:** muitos protocolos usam MgSO4 25-50 mg/kg, max 2 g. Use protocolo local, mas a lógica de prova é \"asma grave refratária = magnésio\".\n\n### 6. Pneumonia e sepse respiratória\n\n- Criança toxemiada, hipoxêmica, com tiragem, incapaz de beber, vomitando tudo, convulsão, gemência, saturação baixa ou com comorbidade merece sala vermelha/observação.\n- Primeira conduta: O2, acesso, glicemia, antitérmico/analgesia, hidratação cuidadosa, antibiótico quando suspeita bacteriana/sepse e imagem depois de estabilizar se necessaria.\n- Não intube pneumonia só porque há febre e taquipneia; intube se falência ventilatória/oxigenatória, rebaixamento, choque refratário ou exaustão.\n\n### 7. Choque, desidratação e sepse\n\nChoque em criança e hipoperfusão, não hipotensão. Procure:\n\n- Estado mental alterado, irritabilidade ou letargia.\n- TEC >2-3 s, extremidades frias, pele marmórea, pulso fino ou diferencial central/periférico.\n- Taquicardia persistente, taquipneia, oligúria.\n- Hipotensão e bradicardia: sinais tardios.\n\nConduta:\n\n1. ABCDE, O2, monitor, glicemia, temperatura, acesso IV/IO.\n2. Se hipovolemia/desidratação com choque: cristaloide isotônico 20 mL/kg e reavaliar.\n3. Se sepse/choque séptico: antibiótico precoce, culturas se não atrasarem, bolus de 10-20 mL/kg, reavaliar sobrecarga, perfusão e pulmão.\n4. Se choque refratário a fluidos ou risco de sobrecarga: vasoativo cedo, inclusive periférico/IO enquanto obtém acesso melhor.\n5. Se sangramento/trauma: hemocomponente cedo, aquecer, TXA quando indicado por protocolo de trauma, controle de fonte.\n\n> **Resposta de prova TEME:** lactente com diarreia, vômitos, TEC 3-4 s, PA baixa e sonolência = choque hipovolêmico; tratamento inicial = SF 0,9% 20 mL/kg.\n>\n> **Atualização clínica:** em sepse pediátrica, diretrizes atuais favorecem bolus menores de 10-20 mL/kg, guiados por reavaliação frequente, com limite e vasoativo precoce se não melhorar. Em desidratação hipovolêmica clássica, a banca ainda cobra 20 mL/kg.\n\n### 8. Convulsão, crise febril e status epilepticus\n\n**Crise em andamento:**\n\n1. ABC, lateralizar, aspirar se necessário, O2 se hipoxemia, glicemia capilar.\n2. Se >5 min ou crise repetida sem recuperar: benzodiazepínico.\n3. Pode repetir benzodiazepínico uma vez; depois, segunda linha sem atrasar.\n4. refratário: UTI, via aérea, anestésico e EEG quando disponível.\n\n**Crise febril simples:**\n\n- 6 meses a 5 anos, generalizada, <15 min, única em 24 h, criança volta ao basal e não há infecção do SNC.\n- Tratamento e procurar causa da febre, antitérmico para conforto e orientação familiar.\n- Não fazer CT, EEG, anticonvulsivante crônico ou punções/exames extensos de rotina se criança bem, vacinada e sem sinais de menineite.\n\n**Red flags:**\n\n- <6 meses ou >5 anos, crise focal, >15 min, repetida em 24 h, déficit persistente, menineismo, petéquias/púrpura, imunossupressão, trauma, rebaixamento prolongado, fontanela abaulada ou antibiótico prévio com suspeita de menineite.\n\n### 9. DKA, hipoglicemia e distúrbios metabólicos\n\n**Hipoglicemia:** sempre medir em criança rebaixada, convulsionando, hipotermica, séptica, intoxicada ou lactente que não mama.\n\n**Cetoacidose diabetica:**\n\n- Suspeite em vômitos, dor abdominal, Kussmaul, desidratação, perda de peso, poliuria/polidipsia ou rebaixamento.\n- ABCDE, glicemia, cetona, gasometria, eletritos, potássio e ECG se grave.\n- Fluido inicial se choque/desidratação importante, insulina IV sem bolus depois de iniciar fluido e conhecer potássio.\n- Repor potássio conforme K e diurese.\n- Edema cerebral: cefaleia, bradicardia, hipertensão, queda do nível de consciência, vômitos recorrentes. Tratar com salina hipertônica ou manitol e UTI.\n\n> **Pegada de prova:** não dar bolus de insulina na DKA pediátrica e não corrigir bicarbonato de rotina.\n\n### 10. Trauma pediátrico\n\n1. **XABCDE com controle térmico:** criança perde calor fácil; hipoglicemia também confunde choque e TCE.\n2. **Via aérea:** língua proporcionalmente maior, epiglote maior/floppy, occipital proeminente. Pequenos muitas vezes precisam coxim sob ombros, não sob a cabeça.\n3. **TCE:** evitar hipóxia e hipotensão. IOT se GCS <=8, proteger cervical, cabeceira elevada quando possível.\n4. **Hernia cerebral:** salina hipertônica 3% 2-5 mL/kg ou manitol 0,5-1 g/kg.\n5. **Imagem de crânio:** use PECARN em TCE leve. Na estação TEME24, a banca queria TC de crânio e citar PECARN.\n6. **Coluna cervical:** regra de adulto não resolve tudo em criança. Na estação TEME24, a banca queria radiografia cervical, não TC cervical/coluna total.\n7. **Abdome:** FAST tem menor sensibilidade em crianças. FAST negativo não exclui abdome, pelve, retroperitônio, ossos longos ou sangramento externo.\n8. **Hemorragia:** concentrado de hemácias 10 mL/kg; pensar em protocolo maciço quando necessidade >40 mL/kg em adolescente ou >50 mL/kg em criança/bebê.\n\n> **Resposta de prova TEME:** criança atropelada, perfusão ruim e FAST negativo ainda pode estar em choque hemorrágico. Não tranquilize pelo FAST. Procure abdômen, pelve, retroperitônio, membros e sangramento externo.\n\n### 11. Queimaduras e maus-tratos\n\n1. ABCDE, retirar roupas/adornos, interromper queimadura, analgesia forte, cobrir com campo limpo e seco, aquecer a criança.\n2. Suspeite lesão inalatória se queimadura facial, vibrissas chamuscadas, fuligem, rouquidão, estridor, queimadura em ambiente fechado ou rebaixamento.\n3. Estimar SCQ com tabela pediátrica/Lund-Browder quando disponível. Cabeça pesa mais em lactentes; regra dos 9 do adulto erra.\n4. Queimadura extensa: cristaloide aquecido conforme protocolo de queimados + manutenção com glicose em crianças pequenas; titule por perfusão e diurese.\n5. Procurar hipotermia, hipoglicemia, intoxicação por CO/cianeto em incêndio e trauma associado.\n6. Transferir cedo se queimadura profunda/extensa, face/mãos/pés/genital/períneo/articulações, elétrica/quimica, inalatória, comorbidade, maus-tratos ou recurso local insuficiente.\n\nRed flags de maus-tratos: história incompatível com desenvolvimento, demora em procurar atendimento, lesões em diferentes idades, queimadura por imersão com borda nítida, marcas de objeto, fraturas inexplicadas, lesões em orelha/pescoço/tronco ou cuidador muda historia.\n\n### 12. Exantemas, Kawasaki e choque tóxico\n\n| Diagnóstico | Pistas | Conduta de prova/prática |\n|---|---|---|\n| Exantema súbito | Lactente, febre alta 3-5 dias, rash depois da defervescencia | Suporte; pode ter crise febril |\n| Escarlatina | Farineite, febre, língua em framboesa, rash em lixa, linhas de Pastia | Penicilina/amoxicilina; prevenir febre reumatica |\n| Eritema infeccioso | \"Face esbofeteada\", rash rendilhado, parvovirus B19 | Suporte; cuidado em gestante, hemólise e imunossupressão |\n| Mão-pe-boca | Vesiculas orais, mãos e pes, Coxsackie/enterovirus | Suporte e hidratação; avaliar desidratação |\n| Sarampo | Febre, tosse, coriza, conjuntivite, Koplik, rash cefalocaudal | Isolamento respiratório/aerossol, notificar, suporte/vitamina A conforme protocolo |\n| Kawasaki | Febre >=5 dias + conjuntivite, mucosa oral, rash, extremidades, linfonodo | IVIG + AAS e ecocardiograma; considerar incompleto |\n| Choque tóxico | Febre, hipotensão, rash/descamação, GI/mucosa, disfunção orgânica | Ressuscitação, vasopressor, clindamicina + cobertura staph/strep e controle de foco |\n\n> **Resposta de prova TEME:** criança com febre, hipotensão, língua em framboesa, rash difuso/descamativo e disfunção inflamatoria pode ser síndrome do choque tóxico estafilococico/estreptococico, não apenas escarlatina simples.\n\n### 13. Intoxicações e animais peçonhentos em criança\n\n- Criança com rebaixamento, miose, sialorreia, broncorreia, vômitos/diarreia, bradicardia ou fasciculações: pense em organofosforado/carbamato, inclusive \"chumbinho\".\n- Conduta inicial de estação: EPI, ABCDE, glicemia, O2, aspiração, acesso, monitor, descontaminação segura quando indicada, contato com CIATox.\n- Atropina e para sinais muscarínicos graves, principalmente broncorreia/broncoespasmo/bradicardia/choque.\n- Escorpionismo em criança pode evoluir com vômitos, sudorese, taquicardia, hipertensão/choque e edema pulmonar; classificar gravidade e indicar soro quando moderado/grave conforme protocolo.\n\n> **Resposta de prova TEME25:** diante do \"pote de chumbinho\", identificar carbamato/aldicarb e fazer atropina EV em bolus; a estação pontuava atropina 0,5 mg.\n\n## Conceitos que sustentam a conduta\n\n### Criança compensa até despencar\n\nA criança aumenta FC e resistência vascular para manter PA. Por isso, PA normal não exclui choque. Quando aparece hipotensão, já houve perda de reserva. O exame de perfusão, a consciência e a tendência dos sinais vitais importam mais que um único número.\n\n### Respiratório vem antes do circulatório em muitas paradas pediátricas\n\nHipoxia leva a bradicardia, má perfusão e PCR. Em bronquiolite grave, pneumonia, asma e intoxicação, a primeira intervenção que salva pode ser uma BVM bem feita. Atropina sem corrigir ventilação é uma armadilha.\n\n### Bronquiolite mudou mais que os slides antigos\n\nMuitos cursos ainda mostram salbutamol, salina hipertônica ou corticoide em aleoritmos antigos. A resposta atual para lactente típico é suporte: nariz, hidratação, oxigenação e ventilação não invasiva/invasiva se falência. A exceção é a criança maior com fenótipo de sibilância recorrente/asma, onde um teste de broncodilatador pode ser razoável.\n\n### Trauma pediátrico exige humildade com imagem\n\nFAST negativo não \"limpa\" abdome pediátrico. PECARN ajuda a reduzir TC desnecessária no TCE leve, mas criança instável, rebaixada, com déficit, sinais de fratura ou mecanismo de alto risco sai do modo calculadora e entra no modo trauma.\n\n## Fluxograma\n\n```mermaid\nflowchart TD\n    A[Criança grave] --> B[PAT: aparência, respiração, pele]\n    B --> C[ABCDE + glicemia + temperatura + peso]\n    C --> D{Respiracao inadequada, apneia, hipoxemia ou bradicardia?}\n    D -->|Sim| E[BVM com O2, posicionar, aspirar, chamar ajuda]\n    E --> F{FC <60 e má perfusão apesar de ventilação?}\n    F -->|Sim| G[RCP pediátrica + adrenalina + causas reversíveis]\n    F -->|Não| H[Tratar causa respiratória]\n    D -->|Não| I{Hipoperfusao?}\n    I -->|Sim| J[Acesso IV/IO + cristaloide/hemocomponente conforme causa + antibiótico se sepse]\n    I -->|Não| K[Diagnóstico dirigido e observação]\n```\n\n```mermaid\nflowchart TD\n    A[Sibilância/dispneia em criança] --> B{Lactente com IVAS e 1o episódio?}\n    B -->|Sim| C[Bronquiolite: suporte, O2 se persistente <90%, hidratação, considerar alto fluxo]\n    B -->|Não| D{Asma ou sibilância recorrente?}\n    D -->|Sim| E[SABA repetido + ipratrópio se moderada/grave + corticoide precoce]\n    E --> F{Refratária/grave?}\n    F -->|Sim| G[MgSO4 IV, UTI, NIV se apropriado, preparar IOT se exaustão]\n    F -->|Não| H[Reavaliar e espacamento]\n    D -->|Não| I[Procurar corpo estranho, anafilaxia, pneumonia, cardiopatia]\n```\n\n```mermaid\nflowchart TD\n    A[Choque pediátrico] --> B{Hemorragia/trauma?}\n    B -->|Sim| C[Controle de fonte + CH 10 mL/kg + aquecer + cirurgia/trauma]\n    B -->|Não| D{Diarreia/vômitos/desidratação?}\n    D -->|Sim| E[Cristaloide isotônico 20 mL/kg + reavaliar]\n    D -->|Não| F{Febre/infecção suspeita?}\n    F -->|Sim| G[Sepse: antibiótico precoce + bolus 10-20 mL/kg + vasoativo se refratário]\n    F -->|Não| H[Considerar cardiogênico, anafilaxia, tóxico, endócrino/metabólico]\n```\n\n## Doses, alvos e números\n\n| Item | Número | observação TEME |\n|---|---:|---|\n| PA sistolica minima 1-10 anos | 70 + 2 x idade | Hipotensão e tardia; não espere PA cair para chamar choque |\n| Cristaloide no choque hipovolêmico/desidratação | 20 mL/kg | TEME22/23 cobrou SF 0,9% 20 mL/kg |\n| Bolus em sepse pediátrica atual | 10-20 mL/kg por bolus | Reavaliar perfusão e sobrecarga; vasoativo cedo se refratário |\n| Concentrado de hemácias no trauma | 10 mL/kg | Estação TEME24 |\n| Transfusão maciça pediátrica | >40 mL/kg adolescente; >50 mL/kg criança/bebê | Associar plasma/plaquetas conforme protocolo |\n| Glicose hipoglicemia | D10 5 mL/kg | Lactente/neonato pode usar D10 2-3 mL/kg conforme protocolo |\n| Adrenalina anafilaxia IM | 0,01 mg/kg de 1 mg/mL | Max 0,3 mg prepubere; 0,5 mg adolescente; repetir 5-15 min |\n| Fluido na anafilaxia com choque | 20 mL/kg | Repetir conforme resposta |\n| Salbutamol MDI asma | 4-10 jatos a cada 20 min x 3 | Usar espacador; depois espaciar conforme resposta |\n| Salbutamol nebulizado | 2,5-5 mg/dose | Pode ser contínuo em UTI/sala vermelha conforme protocolo |\n| Ipratrópio asma moderada/grave | 250-500 mcg a cada 20 min x 3 | Melhor benefício na primeira hora |\n| Prednisolona asma | 1-2 mg/kg/dia | Max usual 40-60 mg; VO se possível |\n| Dexametasona crupe | 0,6 mg/kg dose única | VO/IM/EV; doses menores existem em protocolos |\n| Adrenalina nebulizada crupe | L-adrenalina 1 mg/mL: 0,5 mL/kg, max 5 mL | Ou racemica 2,25% 0,5 mL; observar 2-4 h |\n| MgSO4 asma grave | 50 mg/kg EV em 20 min | TEME25 aceita 50-75 mg/kg; max usual 2 g |\n| Midazolam crise convulsiva | 0,2 mg/kg IN/IM/bucal ou 0,1 mg/kg EV | Repetir uma vez se necessário |\n| Diazepam crise convulsiva | 0,2 mg/kg EV ou 0,5 mg/kg retal | Cuidado com depressão respiratória |\n| Levetiracetam status | 40-60 mg/kg EV | Alternativa de segunda linha |\n| Fenitoína/fosfenitoina | 20 mg/kg EV ou 20 mg PE/kg | Monitorar ECG/PA; não misturar com SG |\n| Insulina na DKA pediátrica | 0,05-0,1 U/kg/h EV | Sem bolus; após fluido inicial e avaliação do K |\n| Salina hipertônica 3% no TCE/HIC | 2-5 mL/kg | Herniação ou edema cerebral |\n| Manitol no TCE/HIC | 0,5-1 g/kg | Se hemodinamicamente tolerado |\n| TOT sem cuff | idade/4 + 4 | Formula clássica |\n| TOT com cuff | idade/4 + 3,5 | Confirmar por capnografia e ausculta |\n| Profundidade oral do TOT | 3 x diâmetro interno | Ex: TOT 5,5 -> cerca de 16,5 cm |\n| Estação TEME24 TOT | 5,5 | Criança do caso prático |\n| Ventilação com pulso/avançada PALS 2025 | 20-30/min | Evitar hiper e hipoventilação |\n| RCP pediátrica | 30:2 um socorrista; 15:2 dois | Com via aérea avançada, compressões continuas + ventilações |\n| Bradicardia com má perfusão | FC <60 após O2/ventilação | Iniciar compressão |\n| Desfibrilacao pediátrica | 2 J/kg, depois 4 J/kg | Seguir algoritmo PALS |\n| Adrenalina na PCR | 0,01 mg/kg EV/IO | 0,1 mL/kg da solução 0,1 mg/mL, a cada 3-5 min |\n| Diurese alvo em criança queimada/choque | >=1 mL/kg/h | Em queimadura, associar manutenção com glicose em crianças pequenas |\n\nSinais vitais aproximados para não cair em \"normal para idade\":\n\n| Idade | FR | FC | PAS aproximada |\n|---|---:|---:|---:|\n| 0-1 mes | 30-60 | 110-180 | 50-70 |\n| 1 mes-1 ano | 25-50 | 100-160 | 70-95 |\n| 1-3 anos | 20-30 | 90-150 | 80-100 |\n| 3-6 anos | 20-25 | 80-140 | 80-100 |\n| 6-12 anos | 15-20 | 70-120 | 80-110 |\n| 12-18 anos | 12-16 | 60-100 | 90-110 |\n\n## Pegadinhas TEME\n\n- **\"PA normal, então não é choque\":** falso. Choque pediátrico e perfusão ruim; hipotensão e tardia.\n- **\"Bronquiolite grave com FC 48: atropina primeiro\":** falso. É hipóxia até prova em contrário; ventile com O2.\n- **\"Bronquiolite sempre melhora com salbutamol/corticoide\":** falso na prática atual. Suporte é o padrão.\n- **\"Asma com silêncio auscultatório está melhorando\":** falso. Pode ser falência ventilatória.\n- **\"CO2 normal em asma grave tranquiliza\":** cuidado. Em criança exausta, normalizar/subir CO2 e mau sinal.\n- **\"Crise febril simples pede TC/EEG/anticonvulsivante\":** falso.\n- **\"FAST negativo exclui lesão abdominal\
