opera; SJS/TEN para droga e suporte; monoartrite febril = artrocentese; arterite temporal = corticoide antes da confirmação; crise renal esclerodérmica = captopril/IECA.\n>\n> **Na prática clínica:** protocolos locais variam em icatibant/C1-INH/FFP no angioedema por bradicinina, escolha de antibiótico para SSTI/MRSA e uso de imunomoduladores em SJS/TEN. A regra operacional permanece: via aérea, choque, faça, punção e corticoide tempo-dependente quando indicados.\n\n## Checklist de revisão\n\n- [ ] Sei diagnosticar anafilaxia mesmo sem urticária.\n- [ ] Sei dose de adrenalina IM e intervalo de repeticao.\n- [ ] Sei diferenciar angioedema histaminérgico de bradicinina.\n- [ ] Sei quando chamar via aérea difícil no angioedema.\n- [ ] Sei celulite vs abscesso vs fasciite necrosante.\n- [ ] Sei que fasciite e cirurgia, não TC.\n- [ ] Sei reconhecer SJS/TEN e parar a droga.\n- [ ] Sei punir monoartrite antes de antibiótico se não houver sepse.\n- [ ] Sei que cristal não exclui infecção articular.\n- [ ] Sei tratar crise de gota sem iniciar alopurinol como analgésico.\n- [ ] Sei arterite temporal e crise renal esclerodérmica.\n\n## Questões e estações relacionadas\n\n- **TEME22 Q63:** crise renal esclerodérmica: PA alta, creatinina/proteinúria/hematúria e manifestações neurológicas; captopril/IECA.\n- **TEME23:** celulite/erisipela: diagnóstico clínico, etiologia estrepto/staph e US quando há dúvida/abscesso, não como regra universal.\n- **TEME24 Q52:** angioedema por enalapril com língua/lábios, disfagia e estridor: indicação de intubação acordada pelo risco de falha de resgate.\n- **TEME24 Q71:** queimadura térmica com bolhas: reconhecer segundo grau e manejo local/analgesia/cobertura, sem tratar todo caso como grande queimado.\n- **TEME24 Q79:** abelhas: diferenciar anafilaxia de síndrome de envenenamento por múltiplas picadas; esta pode cursar com CIVD, alterações neuro/cardiovasculares e IRA.\n- **TEME25:** mordeduras e infecção de partes moles: gatos infectam muito; profilaxia e cobertura dependem de animal, ferida, local e risco.\n- **Emergency Talks Aula 19:** emergências reumato e dermato: rash perigoso, infecções de pele, monoartrite e vasculites.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26.\n- Provas teóricas TEME22, TEME23, TEME24 e TEME25.\n- Referências oficiais do edital: Tratado ABRAMEDE 2024, Medicina de Emergência HCFMUSP e capítulos de alergia, dermatologia, reumatologia, infecções de partes moles e toxicologia.\n\n**Material local**\n\n- Emergency Talks: Aula 19 - Emergências reumato e dermato.\n- Emergency Talks: Aula 37 - Trauma ambiental I.\n- Emergency Talks: Aula 53 - Abordagem geral do paciente intoxicado.\n- Emergency Talks: Aula 62 - Animais peçonhentos.\n- Resumo do Emergency.docx.\n- Adendos para complementar.docx.\n\n**Atualização clínica**\n\n- World Allerey Organization. Anaphylaxis Guidance 2020. https://pmc.ncbi.nlm.nih.gov/articles/PMC7607509/\n- AAAAI/ACAAI. Anaphylaxis: 2023 practice parameter update. https://www.guidelinecentral.com/guideline/7615/\n- WAO/EAACI. Hereditary angioedema guideline, 2021 revision/update. https://pmc.ncbi.nlm.nih.gov/articles/PMC9023902/\n- IDSA. Skin and Soft Tissue Infections Guideline, 2014. https://www.idsociety.org/practice-guideline/skin-and-soft-tissue-infections/\n- WSES/SIS-E. Skin and soft-tissue infections consensus, 2018. https://pmc.ncbi.nlm.nih.gov/articles/PMC6295010/\n- British Association of Dermatologists. SJS/TEN guideline, 2016. https://academic.oup.com/bjd/article/174/6/1194/6617016\n- SANJO. Guideline for management of septic arthritis in native joints, 2023. https://jbji.copernicus.org/articles/8/29/2023/\n- American College of Rheumatology. Gout Guideline, 2020. https://pmc.ncbi.nlm.nih.gov/articles/PMC10563586/\n- EULAR. Large vessel vasculitis recommendations, 2018 update. https://ard.bmj.com/content/79/1/19\n- EULAR. Systemic sclerosis treatment recommendations, 2023 update. https://ard.bmj.com/content/early/2024/10/17/ard-2024-226430\n"},{"id":"temas/017_paliativos-vulnerabilidades-etica-gestao.md","title":"017 - Paliativos, Vulnerabilidades, Ética, Legislação E Gestão","markdown":"# 017 - Paliativos, Vulnerabilidades, Ética, Legislação E Gestão\n\n## Leitura de 30 segundos\n\n- Cuidado paliativo não é \"não fazer nada\": é tratar sofrimento, alinhar metas, evitar distanásia e manter cuidado proporcional.\n- Código de não reanimar, limitação de suporte e terminalidade precisam de decisão clínica, comunicação, registro e plano de cuidado. Não são ordem para abandonar o paciente.\n- Paciente capaz pode recusar tratamento eletivo após informação adequada; em urgência com risco relevante/morte, o médico pode intervir se não há consentimento valido disponível.\n- Diretivas antecipadas de vontade devem ser consideradas se conhecidas e aplicaveis, desde que não contrariem o Código de Ética.\n- Sedação paliativa exige sintoma refratário, proporcionalidade, intenção de aliviar sofrimento, consentimento/representante quando possível e registro.\n- Violência sexual: acolher, tratar antes de burocracia, não exigir boletim de ocorrência, oferecer PEP HIV até 72 h por 28 dias, contracepção, profilaxias, coleta quando possível e notificação obrigatória.\n- Tentativa/risco suicida: estabilizar, retirar meios, observação segura, avaliar risco/proteção, notificar e não dar alta se alto risco sem plano robusto.\n- Gestão TEME: classificação de risco, coordenador de fluxo, registro, comunicação, transferência segura e limite de permanência no pronto-socorro importam tanto quanto conduta clínica.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME22-25 cobrou violência sexual/PEP, morte encefálica, regulação/CFM, classificação de risco/fluxo, alta segura, tentativa de suicídio, dor total em câncer, responsabilidade médica em transferência, documentação e vulnerabilidades.\n- **O que a banca costuma testar:** diferenciar cuidado proporcional de abandono, saber quando tratar sem consentimento, conhecer PEP/notificação, reconhecer alto risco suicida, saber papel do emergencista na morte encefálica e no fluxo do DE.\n- **Como costuma aparecer:** caso ético com alternativa sedutora e absoluta. A resposta certa costuma ser a que acolhe, informa, registra, protege vulnerável e mantem cuidado clínico proporcional.\n\n## Abordagem prática\n\n### 1. Paliativo no DE: abordagem de plantão\n\n1. Estabilize sintomas agora: dor, dispneia, delirium, náusea, secreção, ansiedade, sangramento.\n2. Identifique trajetória: câncer avançado, demência, DPOC/IC/DRC terminal, fragilidade extrema, doença neurológica, falência multiorgânica.\n3. Pergunte sobre valores: \"O que é mais importante se o tempo for curto?\", \"O que ele não aceitaria?\", \"Existe diretiva/procurador?\"\n4. Defina reversibilidade: infecção tratável? sangramento reversível? obstrução drenável? ou processo final irreversível?\n5. Escreva plano: o que fazer, o que não fazer, quando reavaliar e quem foi informado.\n6. Não confunda limite de suporte com limite de cuidado: analgesia, higiene, presença familiar, comunicação e alívio de sintomas seguem obrigatórios.\n\nFrase útil:\n\n> \"Vamos continuar tratando tudo que trouxer conforto e aquilo que tiver chance real de ajuda. O que queremos evitar são procedimentos que só prolonguem sofrimento sem mudar o desfecho.\"\n\n### 2. Sintomas no fim de vida\n\n**Dor**\n\n- Titular opioide pelo sofrimento, não pela saturação isolada.\n- Se virgem de opioide e dor forte: morfina EV em pequenas doses repetidas ou fentanil se instável/DRC.\n- Sempre prevenir constipação se expectativa de dias/semanas.\n\n**Dispneia**\n\n- Trate causa reversível se alinhada a meta: broncoespasmo, edema, derrame, ansiedade, secreção.\n- Opioide em baixa dose reduz fome de ar.\n- Oxigênio ajuda se hipoxemia; se não hipoxêmico, ventilador/ambiente/calor humano e opioide podem ajudar mais que máscara.\n\n**Delirium/agitação**\n\n- Procure gatilhos proporcionais: dor, retenção urinária, constipação, hipóxia, infecção, abstinência, medicação.\n- Haloperidol é comum; benzodiazepínico se abstinência, ansiedade extrema ou sedação paliativa.\n\n**Secreção terminal**\n\n- Reposicionamento, explicar para família, reduzir fluidos desnecessários.\n- Anticolinérgico pode reduzir ruido, mas funciona melhor se iniciado cedo.\n\n### 3. Sedação paliativa\n\nIndicar apenas quando:\n\n- Paciente tem doença avançada/terminal.\n- Sintoma é refratário a medidas proporcionais ou medidas causariam sofrimento excessivo.\n- Objetivo e aliviar sofrimento, não apressar morte.\n- Há consentimento do paciente ou representante quando possível.\n- A equipe documenta indicação, fármacos, proporcionalidade e reavaliação.\n\nSintomas comuns: dispneia refratária, delirium/agitação refratária, dor intratável, sangramento/sofrimento extremo.\n\n> **Pegada TEME:** sedação paliativa não é eutanásia. É tratamento proporcional para sintoma refratário.\n\n### 4. Capacidade, consentimento e recusa\n\nCapacidade decisional no DE:\n\n- Entende informação?\n- Aprecia consequências para si?\n- Raciocina comparando opções?\n- Comunica escolha consistente?\n\nSe capaz:\n\n- Informar diagnóstico, risco, benefícios, alternativas e consequências da recusa.\n- Verificar coerência e ausência de delirium/intoxicação/psicose incapacitante.\n- Registrar conversa, testemunhas e plano de retorno.\n\nSe incapaz:\n\n- Procurar representante/família/diretiva.\n- Em risco de morte/urgência, tratar pelo melhor interesse.\n\nRecusa terapêutica:\n\n- E direito em tratamentos eletivos quando paciente e maior, capaz, lucido, orientado e consciente.\n- Pode ser rejeitada em abuso de direito, risco a terceiros, doença transmissivel relevante ou urgência/emergência com risco relevante.\n\n### 5. Diretivas, ortotanásia e morte encefálica\n\n**Diretivas antecipadas**\n\n- Preferencias registradas previamente pelo paciente sobre cuidados futuros.\n- O médico deve considera-las quando o paciente não puder decidir.\n- Representante designado ajuda a interpretar valores.\n- Não valem para exigir conduta antiética ou sem indicação técnica.\n\n**Ortotanásia**\n\n- Permitir morte natural em doença terminal, limitando ou suspendendo intervenções futeis/desproporcionais.\n- Manter tratamento de sintomas e suporte humano.\n- Distanásia é o excesso que prolonga sofrimento sem benefício real.\n\n**Morte encefálica**\n\n- Diagnóstico médico-legal de morte, não \"coma profundo\".\n- Exige causa conhecida e irreversível, ausência de fatores confundidores e protocolo completo.\n- No Brasil: dois exames clínicos por médicos capacitados, teste de apneia e exame complementar conforme CFM.\n- Médicos examinadores não podem integrar equipe de transplante; um deve ter especialidade/qualificação prevista.\n- Comunicar família com clareza; doação de órgãos e conversa posterior por equipe adequada.\n\n### 6. Violência sexual e outras vulnerabilidades\n\nViolência sexual:\n\n1. Acolher e garantir segurança.\n2. Atendimento não depende de boletim de ocorrência.\n3. Consentimento para exame, coleta e fotografias quando aplicável.\n4. Tratar lesões, dor, ansiedade e risco de gravidez/IST.\n5. PEP HIV se exposição de risco é tempo <=72 h; 28 dias.\n6. Contracepção de emergência conforme tempo e gestação excluída/risco.\n7. Hepatite B: vacina e imunoglobulina conforme status.\n8. Profilaxia de IST conforme protocolo.\n9. Notificação compulsória imediata/autoridade de saúde; criança/adolescente/idoso exige rede de proteção.\n10. Seguimento psicossocial, infectologia/gineco/serviço especializado.\n\nOutras vulnerabilidades:\n\n- Criança/adolescente, idoso, pessoa com deficiência, rua, migrante, população LGBTQIA+, violência doméstica, tráfico humano, custódia policial.\n- Use acompanhante/intérprete quando ajuda, mas entreviste sozinho se houver suspeita de coerção.\n- Preservar sigilo, dignidade e nome social.\n- Notificação não é denuncia policial automática em todos os casos; conheça fluxo local.\n\n### 7. Risco suicida e crise psiquiátrica\n\nPrimeiro:\n\n- Tratar intoxicação, trauma, abstinência, hipoglicemia, delirium, psicose, mania, dor e causas orgânicas.\n- Retirar meios letais e manter observação segura.\n- Não deixar sozinho em sala sem visibilidade se risco alto.\n\nAlto risco:\n\n- Tentativa recente com alta letalidade ou planejamento.\n- Ideação persistente, desesperança, psicose, intoxicação, agitação grave.\n- Tentativas prévias, transtorno mental sem tratamento, acesso a arma/medicamentos.\n- Falta de suporte, luto/perda recente, dor/doença grave, violência.\n- Não aceita plano, minimiza, quer ir embora, sem acompanhante confiável.\n\nAlta só se:\n\n- Risco baixo/moderado com melhora, avaliação psiquiátrica/clínica, plano de segurança, acompanhante responsável, retirada de meios e seguimento definido.\n\n> **Resposta de prova TEME25:** tentativa por benzodiazepínico + álcool, tristeza, tentativas prévias, sem seguimento e pouca proteção = alto risco; não é alta simples por estar orientado.\n\n### 8. Gestão, fluxo e responsabilidade no DE\n\nPontos CFM/gestão que caem:\n\n- Serviço hospitalar de urgência deve ter acolhimento com classificação de risco.\n- Classificação de risco não é diagnóstico médico definitivo; médico pode reclassificar no contato.\n- Coordenador de fluxo é função médica relevante, não apenas administrativa.\n- Paciente grave deve ter atendimento imediato, independentemente de burocracia.\n- permanência prolongada no DE é problema de segurança; CFM 2077 trabalha limite de 24 h para permanência no setor e necessidade de internação/transferência/fluxo.\n- Transferência exige estabilização proporcional, contato com receptor, documento clínico e transporte compatível.\n- Registro protege o paciente: horários, reavaliações, orientações, recusas, familiares, chamadas, regulação e justificativas.\n\nGestão de risco:\n\n- Superlotação: rounds de fluxo, alta segura, leitos de retaguarda, sala de decisão, protocolos e priorização.\n- Evento adverso: reconhecer, tratar dano, comunicar liderança/paciente conforme política, registrar e aprender.\n- Passagem de plantão: diagnóstico, gravidade, pendências, limites de cuidado, riscos e plano se piorar.\n\n## Conceitos que sustentam a conduta\n\n### Autonomia não é abandono\n\nRespeitar escolha exige informar, checar capacidade, registrar e oferecer alternativas. Se o paciente recusa IOT, ainda recebe opioide para dispneia, antibiótico se desejar, família junto e reavaliação.\n\n### Beneficência também tem freio\n\nFazer tudo pode virar dano. RCP, IOT, vasopressor e UTI podem ser proporcionais em sepse reversível e desproporcionais em morte ativa irreversível. O mesmo procedimento muda de valor conforme meta.\n\n### Vulnerabilidade muda o dever de proteção\n\nO emergencista não é juiz nem policial, mas deve proteger, notificar, acionar rede e evitar revitimização. Acolher bem e parte do tratamento tempo-dependente.\n\n### Gestão é clínica\n\nFluxo ruim mata: atraso, perda de informação, paciente sem monitor, transferência improvisada e alta sem plano. A prova gosta de lembrar que Medicina de Emergência também é sistema.\n\n## Fluxograma\n\n```mermaid\nflowchart TD\n    A[Paciente grave com doença avançada] --> B[Tratar sintomas e estabilizar o que é proporcional]\n    B --> C{Tem capacidade agora?}\n    C -->|Sim| D[Explicar opções, riscos e valores; registrar decisão]\n    C -->|Não| E[Buscar DAV, representante é melhor interesse]\n    D --> F{Intervenção proporcional a meta?}\n    E --> F\n    F -->|Sim| G[Oferecer tratamento e reavaliar]\n    F -->|Não| H[Limitar/suspender intervenção fútil + manter conforto]\n    H --> I[Plano escrito: sintomas, escalonamento, família, equipe]\n```\n\n```mermaid\nflowchart TD\n    A[Violência sexual] --> B[Acolhimento + segurança + consentimento]\n    B --> C[Tratar lesões e sofrimento]\n    C --> D{Exposição <=72h e risco HIV?}\n    D -->|Sim| E[PEP HIV 28 dias + exames base]\n    D -->|Não| F[Avaliar IST/HBV/gravidez e seguimento]\n    E --> G[Contracepção de emergência + IST/HBV conforme protocolo]\n    F --> G\n    G --> H[Coleta de vestígios se possível/consentido]\n    H --> I[Notificação obrigatória + rede psicossocial]\n```\n\n```mermaid\nflowchart TD\n    A[Risco suicida] --> B[ABCDE + tratar intoxicação/trauma/delirium]\n    B --> C[Retirar meios + observação segura]\n    C --> D{Alto risco?}\n    D -->|Sim| E[Não dar alta; psiquiatria/rede; internação/observação]\n    D -->|Não| F{Plano seguro e suporte confiável?}\n    F -->|Sim| G[Alta com plano, acompanhante, seguimento e sinais de alarme]\n    F -->|Não| E\n```\n\n```mermaid\nflowchart TD\n    A[Paciente no DE] --> B[Acolhimento + classificação de risco]\n    B --> C{Grave?}\n    C -->|Sim| D[Atendimento imediato + sala vermelha]\n    C -->|Potencial gravidade| E[Área observação/decisão + reavaliação]\n    C -->|Sem gravidade| F[Fluxo rápido/orientação/APS conforme rede]\n    D --> G[Plano: alta, internação, transferência ou paliativo]\n    E --> G\n    F --> G\n    G --> H[Registro + comunicação + coordenador de fluxo se bloqueio]\n```\n\n## Doses, alvos e números\n\n| Item | Número | observação TEME |\n|---|---:|---|\n| Morfina dor intensa opioid-naive | 2-4 mg EV a cada 10-15 min até alívio | Reduzir em idoso/fráeil/DRC |\n| Morfina dispneia paliativa | 1-2 mg EV/SC ou 2,5-5 mg VO | Titular por conforto |\n| Fentanil | 25-50 mcg EV titulados | Útil se DRC/instabilidade, conforme contexto |\n| Haloperidol delirium/náusea | 0,5-2 mg VO/SC/EV | Cuidado QT/parkinsonismo |\n| Midazolam agitação/sedação | 1-2 mg EV/SC titulados; infusão conforme protocolo | Sedação paliativa exige critério |\n| Butilbrometo/hioscina secreção | 20 mg SC/EV 4/4-6/6 h | Alternativas variam por serviço |\n| PEP HIV | Iniciar até 72 h | Dura 28 dias |\n| Contracepção de emergência | Quanto antes; levonorgestrel até 5 dias | Melhor eficácia precoce |\n| HBIG hepatite B | 0,06 mL/kg IM | Se indicada por status vacinal/fonte |\n| Morte encefálica | 2 exames clínicos + teste apneia + exame complementar | Médicos capacitados e sem equipe transplante |\n| permanência DE | 24 h como limite de referência CFM 2077 | Depois fluxo/internação/transferência |\n| Sedação paliativa | Sintoma refratário | Proporcional, consentida e documentada |\n\n## Pegadinhas TEME\n\n- **Paliativo = não tratar:** falso. Trata sofrimento e condutas proporcionais.\n- **DNR = não fazer analgesia/antibiótico/O2:** falso. DNR fala de RCP, não de abandono.\n- **Sedação paliativa = eutanásia:** falso se sintoma refratário, proporcionalidade e intenção de conforto.\n- **Paciente capaz nunca pode recusar tratamento:** falso em tratamento eletivo informado.\n- **Recusa em urgência com risco de morte sempre paralisa o médico:** falso; depende de capacidade, contexto e risco.\n- **DAV e pedido para qualquer conduta:** falso. Não obriga conduta antiética ou sem indicação.\n- **Violência sexual exige BO para atender:** falso.\n- **PEP pode esperar consulta ambulatorial:** falso se dentro de 72 h.\n- **Tentativa de suicídio orientada e arrependida sempre recebe alta:** falso; risco longitudinal importa.\n- **Classificação de risco é diagnóstico médico:** falso.\n- **Coordenador de fluxo é apenas administrativo:** falso; é função médica de segurança/fluxo.\n- **Morte encefálica depende de concordância familiar para ser morte:** falso. Família participa da comunicação/doação, não valida o diagnóstico.\n\n## Erros fatais na prática\n\n- Fazer RCP/IOT em morte ativa irreversível sem discutir proporcionalidade quando havia tempo e dados.\n- Suspender cuidado básico ao limitar suporte.\n- Não documentar conversa de metas, recusa ou DAV.\n- Usar opioide em dose insuficiente por medo de \"apressar morte\" e deixar dispneia/dor intensa.\n- Sedar sem tratar causas reversíveis proporcionais ou sem registrar refratariedade.\n- Revitimizar pessoa em violência sexual com interrogatório policialesco.\n- Exigir BO, familiar ou autorização policial para profilaxias.\n- Dar alta para suicida de alto risco por aparente calma pós-tentativa.\n- Não notificar violência autoprovocada/interpessoal quando obrigatório.\n- Transferir paciente instável sem comunicação, equipe ou documento.\n- Deixar paciente grave \"classificado\" aguardando sem reavaliação.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** cuidado paliativo é ativo; ortotanásia é permitida quando há terminalidade e proporcionalidade; diretivas antecipadas devem ser consideradas; recusa terapêutica exige capacidade e informação; violência sexual não precisa BO e pede PEP até 72 h; tentativa de suicídio de alto risco não recebe alta simples; morte encefálica segue CFM 2173/2017; fluxo do DE segue CFM 2077/2014.\n>\n> **Na prática clínica:** detalhes de notificação, coleta de vestígios, PEP, transferência, sedação paliativa e limite de suporte devem seguir protocolo local, comissão de ética, NIR/regulação e rede municipal/estadual. O que não muda é: acolher, proteger, informar, registrar e reavaliar.\n\n## Checklist de revisão\n\n- [ ] Sei diferenciar paliativo, terminalidade, ortotanásia, distanásia e eutanásia.\n- [ ] Sei conduzir uma conversa curta de metas no DE.\n- [ ] Sei tratar dor, dispneia, delirium e secreção terminal.\n- [ ] Sei critérios básicos de sedação paliativa.\n- [ ] Sei avaliar capacidade decisional.\n- [ ] Sei lidar com recusa terapêutica e urgência.\n- [ ] Sei reconhecer e aplicar diretivas antecipadas.\n- [ ] Sei os passos da violência sexual, PEP <=72 h e notificação.\n- [ ] Sei avaliar alto risco suicida e quando não dar alta.\n- [ ] Sei pontos centrais de morte encefálica.\n- [ ] Sei CFM 2077: classificação de risco, coordenador de fluxo e limite de permanência.\n- [ ] Sei que registro e comunicação são condutas de segurança.\n\n## Questões e estações relacionadas\n\n- **TEME23 Q12:** violência sexual: acolhimento, profilaxias, PEP/IST/hepatite, contracepção e seguimento.\n- **TEME23 Q23:** óbito em cena/APH e decisão de reanimação conforme contexto legal e clínico.\n- **TEME25:** dor total em câncer: sofrimento físico, psicológico, social e espiritual; opioide não é único cuidado.\n- **TEME25 Q78:** febre baixa/risco epidemiológico e alta segura com sinais de alarme quando sem gravidade.\n- **TEME25 Q81/Q87:** regulação, responsabilidade médica, CFM 2077 e papel do médico/coordenador de fluxo.\n- **TEME25 Q88:** tentativa de suicídio com tentativas prévias e baixo suporte: alto risco, não alta simples.\n- **TEME22-25 práticas:** comunicação, decisão compartilhada, segurança do paciente, transferência e registro aparecem como critérios de avaliação mesmo quando a estação é técnica.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26.\n- Provas teóricas TEME22, TEME23, TEME24 e TEME25.\n- Referências oficiais do edital: Tratado ABRAMEDE 2024, Medicina de Emergência HCFMUSP, legislação/ética médica e capítulos de cuidados paliativos, gestão, vulnerabilidades e psiquiatria de emergência.\n\n**Material local**\n\n- Emergency Talks: Aula 23 - Emergências psiquiátricas.\n- Emergency Talks: Aula 07 - Princípios do APH.\n- Emergency Talks: Aula 11 - Incidentes com múltiplas vítimas.\n- Emergency Talks: Aulas obstétricas/ginecológicas e infectológicas relacionadas a vulnerabilidades.\n- Resumo do Emergency.docx.\n- Adendos para complementar.docx.\n\n**Atualização clínica, normativa e legal**\n\n- Ministério da Saúde. Manual de Cuidados Paliativos, 2ª edição, 2023. https://www.gov.br/saude/pt-br/centrais-de-conteudo/publicacoes/guias-e-manuais/2023/manual-de-cuidados-paliativos-2a-edicao/view\n- WHO. Palliative care fact sheet. https://www.who.int/news-room/fact-sheets/detail/palliative-care\n- NICE NG31. Care of dying adults in the last days of life. https://www.nice.org.uk/guidance/ng31\n- EAPC. Framework for palliative sedation. https://bmcpalliatcare.biomedcentral.com/articles/10.1186/1472-684X-9-20\n- CFM. Resolução 1.805/2006, ortotanásia. https://sistemas.cfm.org.br/normas/visualizar/resolucoes/BR/2006/1805\n- CFM. Resolução 1.995/2012, diretivas antecipadas de vontade. https://sistemas.cfm.org.br/normas/visualizar/resolucoes/BR/2012/1995\n- CFM. Resolução 2.173/2017, morte encefálica. https://sistemas.cfm.org.br/normas/visualizar/resolucoes/BR/2017/2173\n- CFM. Resolução 2.232/2019, recusa terapêutica. https://sistemas.cfm.org.br/normas/arquivos/resolucoes/BR/2019/2232_2019.pdf\n- CFM. Resolução 2.077/2014, serviços hospitalares de urgência e emergência. https://sistemas.cfm.org.br/normas/visualizar/resolucoes/BR/2014/2077\n- Ministério da Saúde. Violência sexual: etapas do atendimento e notificação. https://www.gov.br/saude/pt-br/assuntos/saude-de-a-a-z/s/saude-da-mulher/saude-sexual-e-reprodutiva/violencia-sexual\n- Ministério da Saúde/CONITEC. PCDT PEP HIV, IST e hepatites virais, 2024/2025. https://www.gov.br/conitec/pt-br/midias/protocolos/PCDTPEP.pdf/view\n- Ministério da Saúde. Prevenção do suicídio. https://www.gov.br/saude/pt-br/assuntos/saude-de-a-a-z/s/suicidio-prevencao/suicidio-prevencao\n- Ministério da Saúde. Linha de cuidado ansiedade/crise em emergência e notificação de violência autoprovocada. https://linhasdecuidado.saude.gov.br/portal/ansiedade/unidade-de-pronto-atendimento/avaliacao-conduta/\n"},{"id":"temas/018_infectologia-emergencia.md","title":"018 - Infectologia na Emergência","markdown":"# 018 - Infectologia na Emergência\n\n## Leitura de 30 segundos\n\n- Infectologia no TEME é menos \"decorar germe\" e mais reconhecer gravidade, coletar o possível sem atrasar tratamento e iniciar antibiótico/antiviral/PEP quando tempo importa.\n- Febre + disfunção orgânica = tratar como sepse enquanto procura foco. Febre + cefaleia/RNC/rigidez = meningite/encefalite até prova em contrário.\n- HIV/TB, dengue/arboviroses, meningite, infecção urinária complicada, IST/violência sexual e doenças de notificação aparecem nas provas e no edital 2026.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME22-25 cobrou HIV com manifestações neurológicas, meningite tuberculosa, dengue, tuberculose, PEP HIV, infecção pulmonar/sepse e febre sem gravidade com alta segura.\n- **O que a banca costuma testar:** prioridade, isolamento, notificação, antibiótico empírico, quando não esperar exame, sinais de alarme de dengue e profilaxias pós-exposição.\n- **Como costuma aparecer:** paciente febril com um detalhe que muda tudo: imunossupressão, RNC, choque, viagem/área endêmica, exposição sexual, mordida, ferida contaminada ou obstrução.\n\n## Abordagem prática\n\n### 1. Febre no pronto-socorro\n\n1. ABCDE e sinais de gravidade: hipotensão, confusão, hipoxemia, lactato alto, oligúria, petéquias, rigidez nucal, dor desproporcional, imunossupressão.\n2. Se grave: monitor, acesso, lactato/gaso, hemoculturas se não atrasar, antibiótico na primeira hora, fluido/vasopressor conforme choque.\n3. Procure foco por síndrome: respiratório, urinário, SNC, abdominal, pele/partes moles, cateter, gineco/obstétrico.\n4. Decida isolamento: respiratório para TB suspeita, meningite com gotículas conforme agente, contato para diarreia/C. difficile, precaução padrão sempre.\n5. Alta só se estável, sem red flags, com hipótese provável benigna, orientação escrita, retorno claro e seguimento.\n\n### 2. Meningite e encefalite\n\n- Suspeite: febre + cefaleia intensa, rigidez, vômitos, fotofobia, petéquias, rebaixamento, crise convulsiva ou imunossupressão.\n- Antibiótico e dexametasona quando indicado não podem esperar TC/LP se houver atraso.\n- TC antes da punção se RNC importante, déficit focal, papiledema, crise recente, imunossupressão ou suspeita de massa.\n- Encefalite: febre + alteração comportamental/RNC/crise/focalidade. Adicione aciclovir se suspeita de HSV/VZV.\n- TB/criptococo em HIV/imunossuprimido: pense em evolução subaguda, cefaleia, febre, perda ponderal, meningismo discreto.\n\n### 3. HIV, TB e infecções oportunistas\n\n- HIV novo ou irregular + dispneia/subagudo: TB, pneumocistose, pneumonia bacteriana e COVID/influenza entram no diferencial.\n- TB pulmonar: tosse prolongada, febre vespertina, sudorese, perda ponderal, cavitação ou contato; isolar se suspeita respiratória.\n- Pneumocistose: dispneia progressiva, hipoxemia, infiltrado intersticial; considerar SMX-TMP e corticoide se hipoxemia relevante conforme protocolo.\n- Neuro em HIV: toxoplasmose, criptococo, TB meníngea, linfoma, PML; imagem/LP conforme estabilidade.\n- Não iniciar TARV \"no automático\" na sala vermelha sem coordenar com infecto/protocolo, especialmente em TB meníngea/criptococo pelo risco de IRIS.\n\n### 4. Dengue e arboviroses\n\n- Dengue provável: febre em área de risco + mialgia, cefaleia, dor retro-orbitária, exantema, leucopenia ou prova do laço.\n- Sinais de alarme: dor abdominal intensa, vômitos persistentes, sangramento de mucosa, letargia/irritabilidade, hipotensão postural, hepatomegalia, derrame/ascite, Ht subindo com plaqueta caindo.\n- Dengue grave: choque, sangramento grave ou órgão-alvo grave.\n- Evite AAS/AINE. Use hidratação guiada por gravidade, reavaliação e hemograma seriado quando indicado.\n- Chikungunya: artralgia intensa; Zika: exantema/prurido/conjuntivite; febre amarela/leptospirose/malária entram se icterícia, sangramento, IRA, viagem ou epidemiologia.\n\n### 5. IST, violência sexual e PEP\n\n- Acolher e tratar antes de burocracia; boletim de ocorrência não é pré-requisito para cuidado.\n- PEP HIV: iniciar o quanto antes se exposição de risco em até 72 h; curso de 28 dias.\n- Cobrir IST conforme protocolo local: gonococo, clamídia, sífilis quando indicado, hepatite B e contracepção de emergência.\n- Notificação e rede de seguimento são parte da conduta.\n\n### 6. Infecções que exigem controle de foco\n\n- Pielonefrite obstrutiva: antibiótico EV + desobstrução.\n- Colangite grave: antibiótico + drenagem/CPRE.\n- Fasciite necrosante: antibiótico amplo + cirurgia imediata.\n- Empiema: antibiótico + drenagem.\n- Abscesso: antibiótico não substitui drenagem quando há coleção.\n\n## Conceitos que sustentam a conduta\n\nInfecção grave mata por disfunção orgânica, carga microbiana, toxinas e resposta inflamatória desregulada. Por isso a resposta de prova é fisiológica: reconhecer gravidade, iniciar tratamento tempo-dependente, fazer controle de foco e ajustar depois com cultura/epidemiologia. Exame complementar confirma; não deve ser usado como freio quando o paciente está grave.\n\n## Fluxograma\n\n```mermaid\nflowchart TD\n    A[Febre ou suspeita infecciosa] --> B{Instável, RNC, hipoxemia, lactato alto ou imunossupressão?}\n    B -->|Sim| C[Sepse/infecção grave: ABCDE, culturas se não atrasar, ATB precoce, fluido/DVA]\n    B -->|Não| D{Síndrome tempo-dependente?}\n    D -->|SNC| E[Meningite/encefalite: dexametasona se indicada + ATB +/- aciclovir; TC/LP conforme risco]\n    D -->|Dengue| F[Classificar: sem alarme, com alarme ou grave; hidratação e reavaliação]\n    D -->|PEP| G[Exposição <=72 h: PEP HIV 28 dias + IST/HBV + seguimento]\n    D -->|Foco cirúrgico| H[Controle de foco: drenagem/desobstrução/cirurgia]\n    D -->|Baixo risco| I[Alta segura com sinais de alarme e retorno]\n```\n\n## Doses, alvos e números\n\n| Item | Número | Observação TEME |\n|---|---:|---|\n| Antibiótico na sepse/choque | idealmente até 1 h | Coletar cultura se não atrasar |\n| PEP HIV | até 72 h, por 28 dias | Urgência; iniciar quanto antes |\n| Dexametasona meningite adulto | 10 mg EV 6/6 h | Antes ou junto da primeira dose se suspeita pneumococo |\n| Aciclovir encefalite | 10 mg/kg EV 8/8 h | Ajustar renal; pensar HSV/VZV |\n| Dengue: choque | cristaloide em bolus e reavaliação | Evitar coloide/AINE/AAS como rotina |\n| TB suspeita respiratória | isolamento respiratório | Máscara/fluxo local; proteger equipe |\n| Raiva pós-exposição | lavar ferida + vacina +/- imunoglobulina | Conforme risco animal/exposição e protocolo local |\n\n## Pegadinhas TEME\n\n- **Esperar TC para tratar meningite:** errado se isso atrasar antibiótico.\n- **Dengue = hidratar muito todo mundo:** errado. Classificar risco e reavaliar; excesso de volume também mata.\n- **Dengue pode AINE porque dor é intensa:** errado. Prefira dipirona/paracetamol conforme protocolo e função hepática.\n- **PEP HIV depois de 72 h como rotina:** errado. Até 72 h é a janela clássica de prova; depois individualizar com especialista.\n- **Antibiótico resolve obstrução infectada:** errado. Obstrução urinária/colangite/empiema/fasciite exigem controle de foco.\n- **HIV febril é sempre pneumonia comum:** errado. TB, pneumocistose, criptococo, toxoplasmose e sepse comum entram no jogo.\n\n## Erros fatais na prática\n\n- Dar alta para febre com hipotensão postural, confusão, petéquias, imunossupressão ou dor desproporcional.\n- Atrasar antibiótico/aciclovir em meningite/encefalite para \"fechar o diagnóstico\".\n- Não isolar TB suspeita.\n- Não notificar doenças compulsórias quando indicado.\n- Não chamar urologia/cirurgia/endoscopia quando o problema é controle de foco.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** febre + disfunção orgânica = sepse; meningite/encefalite não espera exame se houver atraso; dengue se classifica por sinais de alarme; PEP HIV é até 72 h por 28 dias; foco obstruído/infectado precisa controle de foco.\n>\n> **Na prática clínica:** antibiótico empírico depende de epidemiologia local, resistência, alergia, foco, gravidade, gestação, imunossupressão e protocolos institucionais. Em HIV/TB/meningites crônicas, coordene cedo com infectologia.\n\n## Checklist de revisão\n\n- [ ] Sei diferenciar febre baixa segura de febre com sinal de gravidade.\n- [ ] Sei quando meningite/encefalite não espera TC/LP.\n- [ ] Sei sinais de alarme e gravidade da dengue.\n- [ ] Sei PEP HIV: até 72 h e 28 dias.\n- [ ] Sei que antibiótico não substitui drenagem/desobstrução/cirurgia.\n- [ ] Sei isolar TB suspeita e notificar quando indicado.\n\n## Questões e estações relacionadas\n\n- **TEME22:** HIV com crise/cefaleia, meningite tuberculosa, dengue, odontogênica, febre em contexto de vulnerabilidade.\n- **TEME23:** HIV/infecção e pielonefrite obstrutiva como controle de foco.\n- **TEME24:** HIV/TB, meningite/encefalite, dengue e contenção/delirium com diferencial clínico.\n- **TEME25:** HIV/TB/pneumocistose, meningite/criptococo/TB, dengue, febre sem gravidade com alta segura.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26.\n- Referências bibliográficas TEME26: Tratado ABRAMEDE 2024; PCDT HIV adultos; PCDT coinfecções e infecções oportunistas; Portaria 2048/2002; referências de toxicologia/POCUS conforme tema.\n\n**Material local**\n\n- Emergency Talks: Aula 12 - Convulsões e infecções do SNC; Aula 21 - HIV e tuberculose; Aula 22 - Sepse; Aula 63 - Emergências infecciosas.\n\n**Atualização clínica**\n\n- Ministério da Saúde. Profilaxia Pós-Exposição: https://www.gov.br/saude/pt-br/assuntos/saude-de-a-a-z/a/aids-hiv/pep\n- CDC. Clinical Guidance for PEP, 2025: https://www.cdc.gov/hivnexus/hcp/pep/index.html\n- WHO. Dengue outbreak toolbox e sinais de alarme: https://www.who.int/emergencies/outbreak-toolkit/disease-outbreak-toolboxes/dengue-outbreak-toolbox\n- CDC. Rabies post-exposure prophylaxis: https://www.cdc.gov/rabies/hcp/clinical-care/post-exposure-prophylaxis.html\n\n"},{"id":"temas/019_oftalmo-otorrino-odonto.md","title":"019 - Oftalmo, Otorrino e Odonto","markdown":"# 019 - Oftalmo, Otorrino e Odonto\n\n## Leitura de 30 segundos\n\n- A prova cobra o que o emergencista não pode perder: glaucoma agudo, descolamento de retina, queimadura química ocular, trauma ocular, epistaxe grave, vertigem central e infecção odontogênica com risco de via aérea.\n- \"Encaminhar ao especialista\" pode ser correto, mas só depois de proteger olho, via aérea, hemodinâmica e dor.\n- Olho vermelho com dor intensa, baixa visual, pupila alterada, córnea opaca, trauma/químico ou imunossupressão não é conjuntivite simples.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME22-25 trouxe olho/ocular/glaucoma, fotoceratite por solda, POCUS ocular, vertigem/otorrino, epistaxe, dente/infecção odontogênica e trauma facial.\n- **O que a banca costuma testar:** separar benigno de ameaçador, conduta inicial antes da transferência, quando imagem/POCUS ajuda e quando não atrasar especialista.\n- **Como costuma aparecer:** enunciado pequeno com uma palavra decisiva: flashes, cortina, halos, vômitos, solda, produto químico, estridor, epistaxe posterior, HINTS perigoso.\n\n## Abordagem prática\n\n### 1. Olho vermelho ou dor ocular\n\n1. Cheque visão de cada olho, dor, fotofobia, trauma/químico, lente de contato, imunossupressão e cirurgia recente.\n2. Examine pupila, córnea, câmara anterior, fluoresceína, pressão ocular se disponível e sem suspeita de perfuração.\n3. Químico: irrigar imediatamente, retirar lentes/partículas e medir pH se possível. Não espere oftalmo para começar.\n4. Red flags: baixa acuidade, dor forte, náusea/vômito, halos, pupila média fixa, córnea turva, hifema, perfuração, úlcera em usuário de lente.\n5. Analgesia/antiemético/proteção ocular e oftalmo cedo quando ameaça visual.\n\n### 2. Glaucoma agudo de ângulo fechado\n\n- Dor ocular intensa, olho vermelho, halos, cefaleia, náuseas/vômitos, baixa visual.\n- Pupila médio-dilatada/fixa, córnea turva, pressão intraocular alta se medida.\n- Conduta inicial: antiemético/analgesia, colírios hipotensores conforme protocolo, acetazolamida se sem contraindicação e oftalmo urgente para tratamento definitivo.\n\n### 3. Retina e POCUS ocular\n\n- Flashes, moscas volantes novas, \"cortina\" ou perda de campo = suspeitar rasgo/descolamento.\n- POCUS ocular pode ajudar quando não há fundo de olho adequado, mas não substitui oftalmo.\n- Evite pressão no globo se suspeita de perfuração/trauma aberto.\n- ONSD aumentado pode sugerir HIC no contexto certo, mas não é diagnóstico isolado.\n\n### 4. Trauma ocular\n\n- Suspeite globo aberto: mecanismo penetrante, deformidade pupilar, hifema, Seidel positivo, acuidade muito reduzida.\n- Não comprimir, não manipular, não medir PIO, não retirar objeto empalado.\n- Protetor rígido, antiemético, analgesia, jejum, antibiótico conforme protocolo e oftalmo/cirurgia.\n\n### 5. Epistaxe e via aérea alta\n\n1. ABCDE se sangramento importante, anticoagulado, idoso ou instável.\n2. Compressão firme na parte mole do nariz 10-15 min, cabeça levemente para frente.\n3. Vasoconstrictor tópico se disponível, cautério se ponto anterior e visualizado.\n4. Tamponamento anterior se persistente; suspeitar posterior se sangramento volumoso, bilateral, pela orofaringe ou falha do anterior.\n5. Reverter anticoagulação se ameaça vida conforme droga/risco.\n\n### 6. Vertigem\n\n- Distinguir vertigem episódica posicional, vestibular periférica contínua e AVC posterior.\n- Red flags centrais: déficit neurológico, cefaleia nova intensa, incapacidade de ficar sentado/em pé, nistagmo vertical/direcional cambiante, skew positivo, perda auditiva súbita com sinais centrais, fatores vasculares fortes.\n- HINTS só deve ser usado em síndrome vestibular aguda contínua e por examinador treinado.\n- Vertigem + neuro red flag = imagem/neurologia, não \"labirintite\".\n\n### 7. Odonto e infecção cervical\n\n- Dor dentária simples não é sala vermelha; mas trismo, disfagia, sialorreia, voz abafada, elevação de assoalho, edema submandibular ou estridor = via aérea difícil prevista.\n- Angina de Ludwig/abscesso profundo: antibiótico EV amplo, cirurgia/otorrino/bucomaxilo e plano de via aérea acordada se progressivo.\n- Nunca drene \"às cegas\" coleção profunda no pescoço.\n\n## Conceitos que sustentam a conduta\n\nOlho e via aérea compartilham uma regra: tempo é tecido. Retina, glaucoma, queimadura química e globo aberto perdem visão; infecção cervical perde via aérea. A prova costuma punir a resposta passiva que só encaminha, sem iniciar proteção, irrigação, analgesia, antiemético, antibiótico ou chamada precoce.\n\n## Fluxograma\n\n```mermaid\nflowchart TD\n    A[Queixa olho/ouvido/nariz/boca] --> B{ABCDE ou ameaça de via aérea/visão?}\n    B -->|Sim| C[Conduta imediata: proteger via aérea/olho, irrigar químico, controlar sangramento, chamar especialista]\n    B -->|Não| D{Olho vermelho/doloroso?}\n    D -->|Sim| E{Baixa visual, dor forte, halos, córnea turva, trauma ou químico?}\n    E -->|Sim| F[Oftalmo urgente + tratamento inicial]\n    E -->|Não| G[Conjuntivite/blefarite/abrasão simples conforme exame]\n    D -->|Não| H{Vertigem?}\n    H -->|Red flags centrais| I[AVC posterior: neuro/imagem]\n    H -->|Periférica provável| J[Sintomáticos, manobras se BPPV, retorno]\n    H -->|Epistaxe/odontogênica| K[Controle local ou ATB/cirurgia se profunda]\n```\n\n## Doses, alvos e números\n\n| Item | Número | Observação TEME |\n|---|---:|---|\n| Irrigação ocular química | imediata até pH neutro | Não esperar especialista |\n| Compressão epistaxe | 10-15 min | Parte mole do nariz, cabeça para frente |\n| Acetazolamida glaucoma | 500 mg VO/EV | Se sem contraindicação; protocolo local |\n| Dor ocular/trauma | antiemético + analgesia | Evitar Valsalva/vômitos no globo aberto |\n| Antibiótico infecção cervical | precoce EV amplo | Associar drenagem/controle de foco |\n| HINTS | só em vertigem contínua | Não usar em tontura episódica ou examinador inseguro |\n\n## Pegadinhas TEME\n\n- **Olho vermelho = conjuntivite:** falso se dor forte, baixa visual, fotofobia, pupila/córnea alterada ou trauma/químico.\n- **Queimadura química espera oftalmo:** falso. Irrigação é imediata.\n- **Descolamento de retina dói muito:** geralmente não. Flashes, moscas e cortina são pistas.\n- **PIO deve ser medida em todo trauma ocular:** falso se suspeita globo aberto.\n- **HINTS normal por qualquer médico exclui AVC:** falso. Exige cenário e técnica corretos.\n- **Infecção dentária é sempre ambulatorial:** falso se trismo, disfagia, assoalho de boca, sialorreia ou estridor.\n\n## Erros fatais na prática\n\n- Mandar para casa usuário de lente de contato com dor/fotofobia sem excluir úlcera de córnea.\n- Atrasar irrigação ocular por busca de material perfeito.\n- Comprimir globo aberto ou retirar corpo estranho empalado.\n- Chamar \"labirintite\" em AVC de circulação posterior.\n- Perder via aérea em angina de Ludwig/abscesso cervical.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** ameaça visual recebe conduta imediata e oftalmo; químico irriga já; glaucoma agudo é emergência; flashes/cortina sugerem retina; vertigem com sinais centrais é AVC até prova em contrário; infecção odontogênica com sinais de via aérea é emergência.\n>\n> **Na prática clínica:** protocolos de colírios, antibióticos e disponibilidade de oftalmo/otorrino/bucomaxilo variam. O emergencista deve iniciar as medidas que preservam visão, via aérea e segurança antes da transferência.\n\n## Checklist de revisão\n\n- [ ] Sei red flags do olho vermelho.\n- [ ] Sei glaucoma agudo: dor, halos, vômitos, pupila média, córnea turva.\n- [ ] Sei retina: flashes, moscas novas e cortina.\n- [ ] Sei que químico ocular é irrigação imediata.\n- [ ] Sei epistaxe anterior vs posterior.\n- [ ] Sei quando vertigem é AVC posterior.\n- [ ] Sei sinais de infecção odontogênica ameaçando via aérea.\n\n## Questões e estações relacionadas\n\n- **TEME22:** fotoceratite/lesão ocular por solda; glaucoma agudo; questões com termos ocular/oftalmo/otorrino/odonto.\n- **TEME24:** olho vermelho/glaucoma, vertigem/otorrino, epistaxe e POCUS ocular em contexto de prova.\n- **TEME25:** POCUS ocular/descolamento de retina; ONSD/HIC em POCUS/neuro; vertigem e deficiência visual.\n- **Práticas:** temas de via aérea difícil podem envolver infecção cervical/angioedema e necessidade de chamar ajuda cedo.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26: grandes síndromes, olho vermelho, trauma ocular/facial, emergências infecciosas e POCUS ocular.\n- Referências bibliográficas TEME26: Tratado ABRAMEDE 2024; POCUS ABRAMEDE 2024; Manual de Via Aérea 2025.\n\n**Material local**\n\n- Emergency Talks: Aula 41 - Emergências otorrino e odonto; Aula 64 - Emergências oftalmológicas; Aula 18 - POCUS trauma/vascular/neuro.\n\n**Atualização clínica**\n\n- AAO/EyeWiki. Retinal Detachment: https://eyewiki.aao.org/Retinal_Detachment\n- AAO/EyeWiki. Acute angle closure/drug-induced angle closure: https://eyewiki.aao.org/Drug-induced_Acute_Angle_Closure_Glaucoma\n- AAO/EyeWiki. Laser Peripheral Iridotomy: https://eyewiki.aao.org/Laser_Peripheral_Iridotomy\n\n"},{"id":"temas/020_urologia-emergencia.md","title":"020 - Urologia na Emergência","markdown":"# 020 - Urologia na Emergência\n\n## Leitura de 30 segundos\n\n- Urologia no TEME é reconhecer tempo-dependência: torção testicular, pielonefrite obstrutiva, priapismo isquêmico, parafimose, retenção complicada e trauma urogenital.\n- Dor testicular súbita com náuseas/vômitos e reflexo cremastérico ausente é torção até prova em contrário. Doppler não pode atrasar urologia quando a clínica é forte.\n- Obstrução + infecção não melhora só com antibiótico: precisa drenagem/desobstrução.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME23 cobrou pielonefrite obstrutiva/hidronefrose; TEME25 cobrou torção testicular; TEME22-25 trazem termos testicular, hidronefrose, ureterolitíase, priapismo e retenção.\n- **O que a banca costuma testar:** primeira conduta, quando chamar urologia, analgesia, controle de foco e armadilhas com imagem.\n- **Como costuma aparecer:** dor lombar/flanco com febre, dor escrotal súbita, ereção prolongada dolorosa, prepúcio preso ou trauma pélvico com uretrorragia.\n\n## Abordagem prática\n\n### 1. Dor escrotal aguda\n\n1. ABCDE se grave, analgesia e antiemético.\n2. Pergunte início súbito, náusea/vômito, trauma, febre, sintomas urinários, atividade sexual.\n3. Examine posição testicular, reflexo cremastérico, edema, dor à elevação e sinais de Fournier.\n4. Clínica forte de torção = urologia imediata, jejum, preparo cirúrgico. US Doppler se disponível sem atrasar.\n5. Orquiepididimite provável: febre/disúria/corrimento/dor gradual; ATB conforme idade/risco IST/enterobactéria.\n\n### 2. Cólica renal e obstrução infectada\n\n- Cólica simples: AINE se função renal/risco permitir, antiemético, hidratação sem \"forçar\", avaliação de complicações.\n- Internar/desobstruir se febre, sepse, rim único, anúria, IRA, dor/vômitos intratáveis, gestação, imunossupressão ou cálculo grande/proximal complicado.\n- Pielonefrite obstrutiva: antibiótico EV + descompressão por duplo J ou nefrostomia.\n\n### 3. Retenção urinária\n\n- Dor suprapúbica, bexigoma, oligúria/anúria.\n- Sonda vesical de demora se sem suspeita de lesão uretral.\n- Suspeita de lesão uretral: sangue no meato, trauma pélvico, períneo/scroto equimótico, próstata alta, dificuldade de sondagem = urologia/uretrografia; não insistir.\n\n### 4. Priapismo\n\n- Ereção >4 h, geralmente dolorosa e rígida = priapismo isquêmico até prova em contrário.\n- Analgesia, gasometria cavernosa quando disponível, urologia urgente.\n- Tratamento de prova: aspiração/irrigação cavernosa e fenilefrina intracavernosa titulada, além de tratar causa.\n- Falciforme: oxigênio se hipoxemia, analgesia, hidratação cuidadosa, hematologia; não atrasar manejo local se isquêmico.\n\n### 5. Parafimose e fratura de pênis\n\n- Parafimose: glande edemaciada com anel constritor; analgesia/bloqueio, compressão/redução manual; urologia se falha/necrose.\n- Fratura de pênis: estalo, dor, detumescência, hematoma em berinjela. Cirurgia precoce.\n- Não sondar às cegas se uretrorragia ou retenção após trauma peniano/pélvico.\n\n### 6. Fournier e infecção genital grave\n\n- Dor intensa, edema, crepitação, necrose, febre, choque, diabetes/imunossupressão.\n- Antibiótico amplo, ressuscitação, cirurgia/urologia imediata. Imagem não deve atrasar se instável ou suspeita alta.\n\n## Conceitos que sustentam a conduta\n\nMuitas emergências urológicas são síndromes compartimentais ou obstrutivas: torção corta fluxo arterial/venoso; priapismo isquêmico acidifica o corpo cavernoso; obstrução urinária infectada prende pus sob pressão; parafimose estrangula glande. O tratamento certo é aliviar a obstrução/isquemia, não apenas medicar sintomas.\n\n## Fluxograma\n\n```mermaid\nflowchart TD\n    A[Queixa urológica aguda] --> B{Choque, sepse, necrose ou trauma grave?}\n    B -->|Sim| C[Ressuscitar + ATB se infecção + urologia/cirurgia imediata]\n    B -->|Não| D{Dor testicular súbita?}\n    D -->|Sim| E{Torção provável?}\n    E -->|Sim| F[Urologia agora; Doppler só se não atrasar]\n    E -->|Não| G[Orquiepididimite/trauma: ATB/imagem conforme caso]\n    D -->|Não| H{Flanco + febre/hidronefrose/IRA?}\n    H -->|Sim| I[Pielonefrite obstrutiva: ATB EV + desobstrução]\n    H -->|Não| J{Priapismo >4 h ou parafimose?}\n    J -->|Sim| K[Analgesia + redução/aspiração/fenilefrina + urologia]\n    J -->|Não| L[Retenção/cólica simples: analgesia, sonda se seguro, seguimento]\n```\n\n## Doses, alvos e números\n\n| Item | Número | Observação TEME |\n|---|---:|---|\n| Torção testicular | ideal <6 h | Não atrasar cirurgia por Doppler se clínica forte |\n| Priapismo isquêmico | >4 h | Emergência; corpo cavernoso funciona como compartimento |\n| Fenilefrina intracavernosa | 100-500 mcg a cada 3-5 min | Monitorar PA/ECG; urologia/protocolo local |\n| Cólica renal | AINE primeira linha se seguro | Evitar se DRC avançada, sangramento, hipovolemia importante |\n| Pielonefrite obstrutiva | ATB EV + drenagem | Controle de foco obrigatório |\n| Retenção urinária | sondagem se sem trauma uretral | Não insistir se sangue no meato/trauma pélvico |\n\n## Pegadinhas TEME\n\n- **Torção espera Doppler se clínica forte:** falso.\n- **Reflexo cremastérico presente exclui torção:** falso, mas ausência aumenta suspeita.\n- **Obstrução infectada trata com antibiótico e observa:** falso. Precisa desobstruir.\n- **Cólica renal deve receber litros de soro para expulsar cálculo:** falso. Analgesia e avaliação de complicação.\n- **Priapismo é urgência ambulatorial:** falso se >4 h e doloroso.\n- **Sangue no meato e trauma pélvico = passar sonda com cuidado:** falso. Chame urologia/uretrografia.\n\n## Erros fatais na prática\n\n- Liberar dor testicular súbita porque o Doppler demoraria.\n- Não reconhecer Fournier em dor genital desproporcional.\n- Insistir em sonda em trauma uretral.\n- Tratar pielonefrite obstrutiva sem acionar drenagem.\n- Subtratar dor escrotal/cólica renal e perder reavaliação.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** torção testicular é clínica e cirúrgica; obstrução infectada exige ATB EV + desobstrução; priapismo isquêmico >4 h exige aspiração/fenilefrina/urologia; parafimose é redução urgente; trauma uretral não deve ser sondado às cegas.\n>\n> **Na prática clínica:** escolha de antibiótico, via de drenagem e técnica de priapismo depende de recurso, urologia, idade, risco de IST, cultura e protocolo local.\n\n## Checklist de revisão\n\n- [ ] Sei sinais de torção testicular.\n- [ ] Sei que Doppler não atrasa urologia se clínica forte.\n- [ ] Sei identificar pielonefrite obstrutiva.\n- [ ] Sei priapismo isquêmico >4 h.\n- [ ] Sei parafimose e fratura de pênis.\n- [ ] Sei quando não passar sonda.\n- [ ] Sei suspeitar Fournier.\n\n## Questões e estações relacionadas\n\n- **TEME23 Q32:** lombar/testicular, hidronefrose e infecção = pielonefrite obstrutiva; antibiótico EV + desobstrução.\n- **TEME24 Q40:** cólica/flanco com POCUS/hidronefrose e risco de obstrução.\n- **TEME25 Q99/Q100:** dor testicular súbita, náuseas/vômitos e sinais clínicos de torção.\n- **TEME22-25:** termos hidronefrose, testicular, priapismo e retenção aparecem como distratores ou diagnósticos associados.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26: emergências urológicas, escroto agudo, emergências penianas, ITU complicada e POCUS renal/litíase.\n- Referências bibliográficas TEME26: Tratado ABRAMEDE 2024; POCUS ABRAMEDE 2024.\n\n**Material local**\n\n- Emergency Talks: Aula 24 - Emergências Urológicas; Aula 14/15 - Abdome agudo; Aula 35 - POCUS procedimentos.\n\n**Atualização clínica**\n\n- EAU. Urological Trauma Guidelines: https://uroweb.org/guidelines/urological-trauma/chapter/urogenital-trauma-guidelines\n- EAU. Priapism: https://uroweb.org/guidelines/sexual%20-and-reproductive-health/chapter/priapism\n\n"},{"id":"temas/021_ortopedia-extremidades-queimaduras.md","title":"021 - Ortopedia, Trauma de Extremidades e Queimaduras","markdown":"# 021 - Ortopedia, Trauma de Extremidades e Queimaduras\n\n## Leitura de 30 segundos\n\n- Extremidade no TEME é MARCH/ABCDE: hemorragia, perfusão, função neurovascular, alinhamento, analgesia, antibiótico/profilaxia e ortopedia.\n- Fratura exposta recebe cobertura estéril, antibiótico precoce, profilaxia antitetânica, irrigação grosseira se contaminada, imobilização e cirurgia. Não é \"fechar no PS\".\n- Queimado grave mata por via aérea, CO/cianeto, choque, hipotermia e erro de cálculo de superfície/profundidade.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME22-25 cobrou fratura exposta, controle de hemorragia em extremidade, START com fratura, luxações, síndrome compartimental, queimadura, lesão inalatória, blast, bloqueios e analgesia.\n- **O que a banca costuma testar:** primeira conduta, torniquete, antibiótico, imobilização, redução urgente, quando chamar centro de queimados e quando não atrasar fasciotomia/cirurgia.\n- **Como costuma aparecer:** membro deformado, dor intensa, ferida contaminada, pulso alterado, queimadura com bolhas, incêndio em local fechado ou fratura/luxação com risco neurovascular.\n\n## Abordagem prática\n\n### 1. Extremidade no trauma\n\n1. Controle hemorragia: pressão direta, curativo compressivo, torniquete se sangramento ameaçador em membro.\n2. Avalie e documente neurovascular antes e depois de manipular: pulso, perfusão, motricidade, sensibilidade.\n3. Analgesia cedo: dipirona/paracetamol, opioide, cetamina baixa dose, bloqueio guiado por US se treinado.\n4. Alinhe deformidade grosseira com isquemia/pele ameaçada quando seguro; imobilize articulação acima e abaixo.\n5. Ferida aberta: cobrir estéril, antibiótico, tétano, ortopedia.\n\n### 2. Fratura exposta\n\n- Não atrasar antibiótico para raio X.\n- Remover contaminação grosseira, irrigar de forma simples se sujo, cobrir com curativo estéril úmido/seco conforme protocolo.\n- Não fechar ferida no pronto-socorro.\n- Ortopedia precoce para desbridamento, estabilização e decisão cirúrgica.\n- Gustilo ajuda prognóstico, mas a primeira hora é controle de hemorragia, antibiótico e imobilização.\n\n### 3. Luxações e reduções\n\n- Reduzir urgente se déficit neurovascular, pele ameaçada, luxação de joelho/quadril, dor intratável ou atraso de especialista.\n- Ombro posterior pode passar no AP; suspeite após convulsão/choque elétrico com rotação interna.\n- Quadril luxado: reduzir cedo pelo risco de necrose avascular.\n- Joelho luxado: risco de lesão poplítea; ABI/angioTC conforme pulso/índice e protocolo.\n\n### 4. Síndrome compartimental\n\n- Dor desproporcional, dor à extensão passiva, parestesia, tensão compartimental.\n- Pulso pode estar presente até tarde; ausência de pulso é sinal tardio.\n- Medir pressão se dúvida e disponível, mas clínica forte exige ortopedia/fasciotomia.\n- Risco: fratura de tíbia/antebraço, esmagamento, reperfusão, queimadura circunferencial, anticoagulação.\n\n### 5. Queimaduras\n\n1. Cena segura, retirar da fonte, remover roupas/acessórios não aderidos, resfriar queimadura térmica recente com água corrente se precoce e sem hipotermia.\n2. ABCDE: rouquidão, estridor, queimadura facial, fuligem, queimadura em ambiente fechado, rebaixamento ou edema progressivo = via aérea cedo.\n3. CO: oximetria comum pode ser falsamente normal; O2 100%.\n4. Cianeto: incêndio fechado + lactato alto/choque/RNC = hidroxocobalamina conforme disponibilidade.\n5. Calcular SCQ: não contar primeiro grau para fórmula.\n6. Cobrir limpo, analgesia, aquecer, tétano e transferir se critério.\n\n### 6. Critérios práticos de centro de queimados\n\n- Parcial profunda/total relevante, face/mãos/pés/genitália/períneo/grandes articulações.\n- Inalatória, elétrica/química, trauma associado, comorbidade, crianças, idosos, suspeita de violência/necessidade social.\n- Grande queimado: ressuscitação guiada por fórmula e diurese, evitando tanto sub quanto hiper-hidratação.\n\n## Conceitos que sustentam a conduta\n\nExtremidade ferida pode matar por sangue, perder função por isquemia/compartimento e infectar por osso exposto. Queimadura é trauma sistêmico: edema de via aérea evolui, CO desloca oxigênio sem derrubar oximetria, e fluido demais causa complicações. A banca gosta de conduta ordenada, não de heroísmo improvisado.\n\n## Fluxograma\n\n```mermaid\nflowchart TD\n    A[Trauma de extremidade ou queimadura] --> B{Ameaça imediata?}\n    B -->|Hemorragia maciça| C[Pressão/torniquete + horário + reavaliação]\n    B -->|Via aérea queimado| D[O2 100%, via aérea precoce, CO/cianeto]\n    B -->|Isquemia/deformidade| E[Analgesia + alinhamento/redução se indicado + imobilizar]\n    B -->|Não| F[Exame neurovascular + imagem dirigida]\n    F --> G{Aberta, compartimental, luxação grave ou queimadura com critério?}\n    G -->|Sim| H[ATB/tétano/cobertura + ortopedia/centro queimados]\n    G -->|Não| I[Analgesia, imobilização, orientação e seguimento]\n```\n\n## Doses, alvos e números\n\n| Item | Número | Observação TEME |\n|---|---:|---|\n| Antibiótico fratura exposta | o mais precoce possível | Cefazolina é base comum; ampliar conforme gravidade/contaminação |\n| Torniquete | registrar horário | Não afrouxar intermitentemente |\n| Síndrome compartimental | dor à extensão passiva | Pulso presente não exclui |\n| Queimadura: fórmula inicial | 2-4 mL x kg x %SCQ em 24 h | Só 2º/3º grau; metade nas primeiras 8 h desde o trauma |\n| Diurese adulto queimado | 0,5 mL/kg/h | Maior alvo em elétrica/rabdomiólise conforme protocolo |\n| Centro de queimados | face, mãos, pés, períneo, articulações, inalatória, elétrica/química | Critérios variam; usar referência oficial/local |\n| CO | O2 100% | SatO2 pode enganar |\n\n## Pegadinhas TEME\n\n- **Fratura exposta espera ortopedia para antibiótico:** falso.\n- **Pulso presente exclui compartimental:** falso.\n- **Primeiro grau entra na fórmula de Parkland:** falso.\n- **Oximetria normal exclui intoxicação por CO:** falso.\n- **Queimado de face sempre precisa IOT imediata:** não sempre; mas sinais de via aérea/ambiente fechado/edema progressivo exigem agressividade.\n- **Luxação posterior de ombro aparece fácil no AP:** falso.\n\n## Erros fatais na prática\n\n- Esquecer exame neurovascular antes/depois da redução.\n- Sedar/reduzir sem preparo de via aérea, monitor e analgesia adequada.\n- Cobrir fratura exposta e esquecer antibiótico/tétano.\n- Hiper-hidratar queimado e piorar edema/compartimento.\n- Perder lesão inalatória em incêndio fechado.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** controle hemorragia, documente neurovascular, antibiótico precoce na fratura exposta, redução urgente se risco neurovascular/pele, compartimental é clínica e queimadura exige via aérea/CO/cálculo correto de SCQ.\n>\n> **Na prática clínica:** antibiótico e critério de centro de queimados seguem protocolo regional. Bloqueios e sedação são excelentes quando há equipe treinada, monitorização e plano de resgate.\n\n## Checklist de revisão\n\n- [ ] Sei passo inicial da fratura exposta.\n- [ ] Sei avaliar neurovascular antes/depois.\n- [ ] Sei sinais de síndrome compartimental.\n- [ ] Sei luxações que não podem esperar.\n- [ ] Sei critérios de via aérea no queimado.\n- [ ] Sei calcular SCQ sem contar primeiro grau.\n- [ ] Sei que CO pode ter oximetria normal.\n\n## Questões e estações relacionadas\n\n- **TEME22:** fratura exposta, controle de hemorragia em extremidade, START com fratura, blast/queimadura.\n- **TEME23:** fraturas expostas, luxação/compartimental, lesão por fumaça e queimadura.\n- **TEME24:** queimadura térmica com bolhas, analgesia/bloqueio e trauma de extremidades.\n- **TEME25:** síndrome compartimental, fraturas/luxações, fratura exposta de tíbia, bloqueio guiado por US, cálculo de queimadura e trauma prático com torniquete.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26: trauma de extremidades, reduções, queimaduras, explosão, eletrocussão e causas ambientais.\n- Referências bibliográficas TEME26: Tratado ABRAMEDE 2024; APH ABRAMEDE 2025; diretriz europeia de sangramento no trauma.\n\n**Material local**\n\n- Emergency Talks: Aula 37 - Trauma ambiental I; Aula 39 - Trauma de extremidades; Aula 44 - Trauma de partes moles; Aula 56 - Trauma ambiental II e áreas remotas.\n\n**Atualização clínica**\n\n- American Burn Association. Burn Patient Referral Guidelines: https://www.ameriburn.org/burn-care-team/resources/guidelines-for-burn-patient-referral\n\n"},{"id":"temas/022_psiquiatria-agitacao-contencao.md","title":"022 - Psiquiatria, Agitação e Contenção","markdown":"# 022 - Psiquiatria, Agitação e Contenção\n\n## Leitura de 30 segundos\n\n- Agitação na emergência é diagnóstico sindrômico, não \"psiquiatria até prova em contrário\". Primeiro proteja equipe/paciente e procure causa clínica reversível.\n- Desescalada verbal e ambiente seguro vêm antes de contenção quando possível; contenção física/química precisa indicação, monitorização, reavaliação e registro.\n- Tentativa de suicídio com aparente arrependimento não é alta automática. Risco longitudinal, letalidade, suporte e acesso a meios importam.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME22-25 cobrou agitação psicomotora, investigação clínica em sintomas psiquiátricos, abstinência, contenção, BARS e tentativa de suicídio.\n- **O que a banca costuma testar:** diferenciar delirium/intoxicação/psicose, quando investigar causas clínicas, contenção segura, medicação por provável etiologia e alta segura.\n- **Como costuma aparecer:** paciente agitado com hipoglicemia, hipóxia, abstinência, intoxicação, idoso, primeiro surto ou tentativa suicida \"calma\".\n\n## Abordagem prática\n\n### 1. Segurança e primeiro minuto\n\n1. Chame equipe, retire objetos perigosos, mantenha saída livre e fale com distância segura.\n2. ABCDE à distância: hipoxemia, trauma, hipoglicemia, pupilas, temperatura, toxidrome, sinais focais.\n3. Glicemia capilar e sinais vitais são \"exame psiquiátrico\" obrigatório no DE.\n4. Desescalada: voz baixa, frases curtas, escolha limitada, validar sem concordar com delírio.\n5. Se risco imediato: medicação e/ou contenção com monitorização.\n\n### 2. Diferencie grandes causas\n\n| Padrão | Pistas | Conduta base |\n|---|---|---|\n| Delirium | flutuação, desatenção, idoso, infecção, hipoxemia, droga | Tratar causa, evitar contenção prolongada |\n| Psicose/mania | delírios organizados, alucinação, insônia, história psiquiátrica | Antipsicótico +/- benzo |\n| Intoxicação estimulante | midríase, sudorese, hipertensão, hipertermia | Benzodiazepínico + resfriar se hipertermia |\n| Abstinência álcool/benzo | tremor, taquicardia, hipertensão, alucinose, convulsão | Benzodiazepínico, tiamina, suporte |\n| Anticolinérgico | pele seca/quente, retenção, midríase, delirium | Suporte, benzo; ECG/toxico |\n\n### 3. BARS e intensidade\n\n- BARS 4: quieto/acordado, comportamento normal.\n- BARS 5: sinais de atividade, mas redirecionável.\n- BARS 6: extremamente ativo, sem necessidade imediata de contenção em todos os casos; risco alto.\n- BARS 7: violento, exige proteção imediata.\n\n> **Pegada TEME25:** BARS 6 não significa automaticamente \"contenção física imediata\" se há alternativa segura; primeiro segurança, desescalada/medicação conforme risco e causa.\n\n### 4. Medicação prática\n\n- Agitação indiferenciada sem instabilidade: haloperidol/droperidol/olanzapina ou benzodiazepínico conforme provável causa e protocolo.\n- Estimulante, abstinência, catatonia ou hipertermia: benzodiazepínico é central.\n- Psicose/mania: antipsicótico costuma ser base; associar benzo se muito agitado.\n- Idoso/delirium: doses menores, evitar benzodiazepínico salvo abstinência ou indicação clara.\n- Sempre monitorar sedação, via aérea, QT, hipotensão e interação com álcool/opioide.\n\n### 5. Contenção física\n\n- Indicação: risco iminente a si/equipe/terceiros e falha/impossibilidade de medidas menos restritivas.\n- Técnica: equipe treinada, 4/5 pontos, proteger cabeça/via aérea, evitar prona, checar circulação.\n- Depois: medicação para sofrimento/agitação, monitorização, reavaliação frequente, retirar assim que seguro, documentar indicação e alternativas tentadas.\n\n### 6. Suicídio e alta segura\n\n- Alto risco: tentativa recente de alta letalidade, tentativas prévias, plano persistente, psicose, intoxicação, impulsividade, desesperança, pouco suporte, acesso a meios, doença/dor grave.\n- Baixo risco exige: avaliação completa, melhora sustentada, plano de segurança, acompanhante, retirada de meios, seguimento definido e retorno orientado.\n- Notificação/acionamento de rede conforme violência/autolesão e regra local.\n\n## Conceitos que sustentam a conduta\n\nAgitação é uma falência temporária de segurança e comunicação. O erro é disputar narrativa com o paciente ou rotular tudo como psiquiátrico. No DE, a pergunta é: alguém vai se machucar nos próximos minutos? existe causa clínica reversível? qual intervenção menos restritiva funciona agora?\n\n## Fluxograma\n\n```mermaid\nflowchart TD\n    A[Paciente agitado] --> B[Segurança: equipe, ambiente, rota de saída]\n    B --> C{Risco imediato de violência/autoagressão?}\n    C -->|Sim| D[Medicação +/- contenção, monitor e registro]\n    C -->|Não| E[Desescalada verbal + avaliação clínica]\n    D --> F[ABCDE, glicemia, sinais vitais, toxidrome, trauma]\n    E --> F\n    F --> G{Causa provável?}\n    G -->|Delirium/clínica| H[Tratar causa orgânica]\n    G -->|Estimulante/abstinência| I[Benzodiazepínico + suporte]\n    G -->|Psicose/mania| J[Antipsicótico +/- benzo]\n    G -->|Suicídio| K[Avaliar risco; alta só com plano seguro]\n```\n\n## Doses, alvos e números\n\n| Item | Número | Observação TEME |\n|---|---:|---|\n| Glicemia capilar | imediata | Todo agitado/confuso/rebaixado |\n| Haloperidol | 2,5-5 mg IM/EV/VO | Dose menor em idoso; cuidado QT/EPS |\n| Droperidol | 2,5-5 mg IM/EV | Conforme disponibilidade/protocolo |\n| Midazolam | 2-5 mg IM/EV/IN | Cuidado depressão respiratória, álcool/opioide |\n| Diazepam abstinência | 5-10 mg EV/VO repetido | Titular por sedação leve/controle autonômico |\n| Tiamina | 100 mg EV/IM | Alcoolismo/desnutrição; não atrasar glicose grave |\n| BARS | 1-7 | 6 = muito ativo; 7 = violento |\n\n## Pegadinhas TEME\n\n- **Primeiro episódio psiquiátrico não precisa exame clínico:** falso.\n- **Idoso agitado é psiquiátrico até prova em contrário:** falso; delirium é comum.\n- **BARS 6 = contenção obrigatória:** falso; avalie risco e possibilidade de desescalada/medicação.\n- **Benzodiazepínico serve para toda agitação:** falso; pode piorar delirium/respiração, mas é bom em abstinência/estimulante.\n- **Paciente suicida calmo e arrependido pode ir embora:** falso se alto risco longitudinal.\n- **Contenção é castigo:** falso; é medida temporária de segurança com monitorização e retirada precoce.\n\n## Erros fatais na prática\n\n- Ser o único profissional em sala com paciente violento.\n- Contenção prona ou sem monitorização.\n- Sedar sem avaliar via aérea, hipoglicemia, hipóxia, trauma e hipertermia.\n- Dar alta para tentativa suicida de alto risco.\n- Não reavaliar circulação e respiração após contenção/medicação.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** agitação exige segurança, glicemia/sinais vitais/ABCDE, busca de causa orgânica, desescalada se possível, contenção apenas se risco e medicação conforme etiologia. Suicídio de alto risco não recebe alta simples.\n>\n> **Na prática clínica:** protocolos de droperidol, olanzapina, haloperidol, cetamina e benzodiazepínicos variam. Use a menor restrição eficaz, com equipe, monitorização e documentação.\n\n## Checklist de revisão\n\n- [ ] Sei abordar segurança no primeiro minuto.\n- [ ] Sei red flags de causa clínica.\n- [ ] Sei diferenciar delirium, psicose, estimulante e abstinência.\n- [ ] Sei BARS 6 vs 7.\n- [ ] Sei regras de contenção segura.\n- [ ] Sei alto risco suicida.\n- [ ] Sei doses básicas e riscos respiratórios/QT.\n\n## Questões e estações relacionadas\n\n- **TEME22:** tentativa de suicídio/trauma, agitação psicomotora, abstinência e investigação clínica em sintomas psiquiátricos.\n- **TEME24:** agitação, contenção e delirium em casos clínicos.\n- **TEME25 Q86:** BARS e conduta na agitação.\n- **TEME25 Q88:** tentativa de suicídio com tentativas prévias e baixo suporte = alto risco, sem alta simples.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26: agitação psicomotora, delirium, tentativa de suicídio, emergências psiquiátricas e manejo de psicofármacos.\n- Referências bibliográficas TEME26: Tratado ABRAMEDE 2024; Código de Ética Médica; CFM 2077/2014.\n\n**Material local**\n\n- Emergency Talks: Aula 23 - Emergências psiquiátricas; Aula 53-55 - Toxicologia; Aula 17 - Paliativos/vulnerabilidades no material local.\n\n**Atualização clínica**\n\n- ACEP. Clinical Policy: Severe Agitation: https://www.acep.org/siteassets/new-pdfs/clinical-policies/severe-agitation-cp.pdf\n- ACEP. Use of Patient Restraints: https://www.acep.org/siteassets/new-pdfs/policy-statements/use-of-patient-restraints.pdf\n- Project BETA overview: https://onlinelibrary.wiley.com/doi/full/10.1002/emp2.12138\n\n"},{"id":"temas/023_procedimentos-analgesia-sedacao.md","title":"023 - Procedimentos, Analgesia e Sedação","markdown":"# 023 - Procedimentos, Analgesia e Sedação\n\n## Leitura de 30 segundos\n\n- Procedimento em emergência é pré-procedimento, execução e pós-procedimento. A banca pune quem sabe a técnica mas esquece consentimento, monitorização, via aérea, analgesia e complicações.\n- Analgesia não mascara abdome agudo; melhora exame e cuidado. Sedação procedural não é anestesia improvisada.\n- POCUS guiando agulha, toracocentese, paracentese, bloqueios, acesso vascular e analgesia regional já apareceram nas provas e práticas.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME22-25 cobrou analgesia em abdome/trauma, bloqueios guiados por US, toracocentese, paracentese, punção guiada na prática de POCUS, sedação pós-IOT e sedação contínua no TCE.\n- **O que a banca costuma testar:** indicação, contraindicação, preparo, monitorização, escolha de droga, técnica segura e complicações.\n- **Como costuma aparecer:** paciente com dor e procedimento necessário, alternativa que nega analgesia, ou estação pedindo verbalizar monitor/via aérea/agulha.\n\n## Abordagem prática\n\n### 1. Antes de qualquer procedimento\n\n1. Indicação clara e alternativa: por que fazer agora?\n2. Risco/benefício, consentimento se possível e time-out.\n3. Checar alergia, anticoagulação/coagulopatia, plaquetas, jejum quando aplicável, gestação, via aérea e acesso.\n4. Monitor: PA, FC, SpO2, ECG se sedação/risco; capnografia quando sedação moderada/profunda disponível.\n5. Material de resgate: O2, aspiração, BVM, via aérea, reversores quando aplicáveis, drogas de emergência.\n6. Analgesia antes da técnica.\n\n### 2. Analgesia multimodal\n\n- Dor leve/moderada: dipirona/paracetamol, AINE se seguro.\n- Dor forte: opioide titulado, cetamina em dose analgésica, bloqueio regional quando treinado.\n- Trauma de costelas: analgesia sistêmica + bloqueio plano eretor/intercostal/serrátil conforme local.\n- Abdome agudo: analgesia é correta; reexaminar depois.\n\n### 3. Sedação procedural\n\n- Objetivo: nível de sedação suficiente para procedimento com segurança.\n- Separar papéis: quem faz procedimento não deve ser o único monitorando sedação.\n- Escolha por fisiologia: cetamina preserva drive/PA em muitos cenários; propofol é rápido mas hipotensor; midazolam/fentanil somam depressão respiratória; etomidato pode ser útil em cardioversão/redução curta conforme protocolo.\n- Reavaliar até retorno ao basal, via aérea protegida e critérios de alta/observação.\n\n### 4. Bloqueios guiados por US\n\n- Verbalizar: probe correto, assepsia, imagem do nervo/plano, agulha em plano ou fora de plano, aspiração, injeção fracionada, visualizar dispersão.\n- Sempre calcular dose máxima de anestésico local.\n- LAST: zumbido, gosto metálico, agitação, convulsão, arritmia/choque. Tratamento com suporte, benzo e emulsão lipídica 20%.\n\n### 5. Toracocentese e drenagem pleural\n\n- Indicações: diagnóstico de derrame relevante, alívio, suspeita de empiema; drenagem se pus/pH baixo/glicose baixa/loculado ou pneumotórax/hemotórax conforme caso.\n- Use US se disponível: reduz complicação.\n- Evitar punção às cegas em derrame pequeno, coagulopatia grave não corrigida quando não emergente, instabilidade sem preparo.\n\n### 6. Paracentese\n\n- Cirrótico internado com ascite nova/piora, dor, febre, HDA, IRA, encefalopatia ou hipotensão merece paracentese diagnóstica.\n- POCUS ajuda local e profundidade.\n- PBE: PMN >=250/mm3 no líquido ascítico; antibiótico precoce.\n- Albumina quando PBE com risco renal ou grande volume conforme protocolo.\n\n### 7. Acesso vascular e punção guiada\n\n- Linear, veia compressível, diferenciar artéria/veia, técnica estéril.\n- Visualizar ponta da agulha. Na prática 2025 isso pontuou.\n- Confirmar posição conforme contexto: US, retorno, flush, Rx se CVC, sinais de complicação.\n\n## Conceitos que sustentam a conduta\n\nProcedimento bom é aquele que resolve um problema sem criar outro. Na emergência, o risco não vem só da agulha: vem da dor, hipóxia, hipotensão, anticoagulação, anatomia difícil, sedação excessiva e falta de plano de resgate. Por isso o checklist vale ponto.\n\n## Fluxograma\n\n```mermaid\nflowchart TD\n    A[Procedimento necessário] --> B{Emergente para salvar vida?}\n    B -->|Sim| C[ABCDE + analgesia/sedação possível + executar + tratar complicações]\n    B -->|Não| D[Indicação, consentimento, riscos, exames se necessários]\n    D --> E[Monitor + acesso + material de via aérea/resgate]\n    E --> F{Precisa sedação?}\n    F -->|Sim| G[Escolher droga pela fisiologia + profissional monitorando]\n    F -->|Não| H[Anestesia local/analgesia]\n    G --> I[Executar com técnica/US quando indicado]\n    H --> I\n    I --> J[Reavaliar, documentar, observar até retorno seguro]\n```\n\n## Doses, alvos e números\n\n| Item | Número | Observação TEME |\n|---|---:|---|\n| Morfina | 0,05-0,1 mg/kg EV titulado | Cuidado hipotensão/DRC; reavaliar |\n| Fentanil | 0,5-1 mcg/kg EV titulado | Rápido; dose alta/rápida pode dar rigidez |\n| Cetamina analgesia | 0,1-0,3 mg/kg EV | Pode ajudar trauma/procedimento |\n| Cetamina dissociativa | 1-2 mg/kg EV ou 4-5 mg/kg IM | Preparar salivação/vômito/agitação |\n| Propofol | 0,5-1 mg/kg EV, titular | Hipotensão/apneia |\n| Midazolam | 1-2 mg EV titulado | Idoso/álcool/opioide: cuidado respiratório |\n| Lidocaína sem adrenalina | 4,5 mg/kg | Checar dose total |\n| Lidocaína com adrenalina | 7 mg/kg | Evitar em locais/protocolos contraindicados |\n| Bupivacaína | 2-2,5 mg/kg | Mais cardiotóxica; cuidado LAST |\n| Emulsão lipídica LAST | bolus 1,5 mL/kg a 20% | Depois infusão conforme protocolo |\n\n## Pegadinhas TEME\n\n- **Analgesia mascara abdome agudo:** falso.\n- **Sedação sem capnografia é proibida:** falso se indisponível, mas monitorização e via aérea são obrigatórias; capnografia é desejável.\n- **Quem faz o procedimento também monitora sedação sozinho:** armadilha.\n- **Bloqueio guiado por US elimina LAST:** falso. Calcular dose e injetar fracionado.\n- **Paracentese só se dor abdominal:** falso; cirrótico internado/descompensado tem várias indicações.\n- **Toracocentese às cegas é igual ao US:** falso quando US está disponível.\n\n## Erros fatais na prática\n\n- Sedar paciente sem BVM/aspiração/O2/acesso.\n- Não calcular dose máxima de anestésico local.\n- Não reconhecer LAST.\n- Fazer paracentese/toracocentese sem revisar anticoagulação, plaqueta e anatomia quando não emergente.\n- Não reavaliar após opioide/sedação.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** analgesia é parte da conduta; sedação exige monitor, via aérea e resgate; US deve guiar procedimentos quando disponível; paracentese é obrigatória em cirrótico descompensado/internado; bloqueio exige dose máxima e vigilância de LAST.\n>\n> **Na prática clínica:** drogas, doses e exigência de jejum/capnografia dependem de protocolo, treinamento e recurso. Emergência verdadeira não espera jejum, mas exige preparo proporcional.\n\n## Checklist de revisão\n\n- [ ] Sei checklist antes de procedimento.\n- [ ] Sei doses básicas de sedação/analgesia.\n- [ ] Sei dose máxima de anestésico local.\n- [ ] Sei reconhecer e tratar LAST.\n- [ ] Sei indicações de paracentese no cirrótico.\n- [ ] Sei quando usar US em toracocentese/acesso/bloqueio.\n- [ ] Sei critérios de observação pós-sedação.\n\n## Questões e estações relacionadas\n\n- **TEME22 Q97/Q63:** analgesia em dor abdominal e emergências reumato/renal.\n- **TEME24 Q63:** analgesia em dor abdominal aguda.\n- **TEME25 Q52/Q63:** bloqueio ESP e bloqueio guiado por US em trauma.\n- **TEME25 prática POCUS:** punção guiada, escolha do transdutor e visualização da agulha.\n- **TEME25 prática caso clínico:** sedação/analgesia contínua no neurocrítico.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26: analgesia e sedação procedural adulto/pediátrica, monitorização, POCUS procedimentos, bloqueios periféricos, toracocentese e paracentese.\n- Referências bibliográficas TEME26: Tratado ABRAMEDE 2024; POCUS ABRAMEDE 2024; Manual de Via Aérea 2025.\n\n**Material local**\n\n- Emergency Talks: Aula 35 - POCUS procedimentos; Aula 29 - POCUS cardíaco; Aula 39 - Trauma de extremidades; Aula 32 - HDA/hepatopatia.\n\n**Atualização clínica**\n\n- ACEP. Clinical Policy: Severe Agitation/Sedation context: https://www.acep.org/siteassets/new-pdfs/clinical-policies/severe-agitation-cp.pdf\n\n"},{"id":"temas/024_cardiovascular-complementar.md","title":"024 - Cardiovascular Complementar","markdown":"# 024 - Cardiovascular Complementar\n\n## Leitura de 30 segundos\n\n- Este capítulo fecha o que ficou fora de SCA/arritmia/PA: pericardite, miocardite, endocardite, tamponamento, doenças da aorta, TVP/TEV e complicações mecânicas do IAM.\n- Choque com turgência, abafamento, pulso paradoxal ou POCUS com derrame/colapso = tamponamento até prova em contrário.\n- Dor torácica rasgando, déficit de pulso/neuro, síncope ou dor migratória = dissecção. Controle FC/PA antes de vasodilatar.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME22-25 trouxe tamponamento/pericárdio, miocardite, endocardite, aorta/dissecção, aneurisma, TVP/TEV e choque obstrutivo/cardiogênico.\n- **O que a banca costuma testar:** reconhecer fenótipo grave, usar POCUS, não trombolisar dissecção, controlar PA corretamente e chamar hemodinâmica/cirurgia.\n- **Como costuma aparecer:** dor torácica com ECG confuso, choque com POCUS, paciente pós-IAM deteriorando, febre+sopro, dor lombar/síncope com AAA.\n\n## Abordagem prática\n\n### 1. Pericardite e tamponamento\n\n- Pericardite típica: dor pleurítica/posicional, atrito, supra difuso/PR baixo, derrame.\n- Miopericardite: troponina elevada, disfunção ventricular ou arritmia.\n- Tamponamento: hipotensão/choque, turgência, abafamento, pulso paradoxal, taquicardia, POCUS com derrame + colapso AD/VD + VCI cheia.\n- Instável: pericardiocentese como ponte, cirurgia quando traumático/purulento/dissecção/iatrogênico conforme caso.\n\n### 2. Miocardite\n\n- Pode parecer SCA, sepse, arritmia, IC ou choque.\n- Pistas: viral recente, jovem, dor torácica, troponina, arritmia, disfunção de VE, choque desproporcional.\n- Evitar exercício; internar se troponina alta, ECG alterado, arritmia, síncope, IC, disfunção ventricular ou instabilidade.\n- Choque: suporte hemodinâmico, in
