<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Material de estudo Intensivão TEME26 para prova de RQE em Medicina de Emergência." />
  <title>Intensivão TEME26</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" onerror="this.onerror=null;this.href='https://unpkg.com/docsify@4/lib/themes/vue.css'" />
  <style>
    :root {
      --text: #1f2937;
      --muted: #5f6472;
      --link: #0f6b5f;
      --bg: #f8f8f4;
      --panel: #fbfbf7;
      --sidebar-width: 320px;
      --max-content: 1180px;
      --pad-main: 1.4rem;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    #app {
      min-height: 100vh;
      background: #fff;
      background: linear-gradient(180deg, #fbfbf9 0%, #f7f8f4 100%);
    }

    #main {
      margin-left: 0;
    }

    #main .content {
      width: min(calc(100vw - (2 * var(--pad-main)), var(--max-content)));
      margin: 0 auto;
      padding: 0 var(--pad-main) 2.5rem;
    }

    .markdown-section {
      max-width: 100%;
      line-height: 1.62;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3 {
      letter-spacing: 0;
      line-height: 1.25;
    }

    .markdown-section p,
    .markdown-section li,
    .markdown-section td,
    .markdown-section th,
    .markdown-section blockquote {
      font-size: 1.05rem;
    }

    .sidebar {
      width: var(--sidebar-width);
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 15;
      background: var(--panel);
      border-right: 1px solid #e5e7ea;
    }

    .sidebar-toggle {
      color: var(--text);
      top: 0.75rem;
      left: 0.75rem;
    }

    .sidebar .app-name {
      font-size: 1rem;
      padding: 0.6rem 0;
    }

    .sidebar-nav a {
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .markdown-section table {
      width: 100%;
      display: block;
      overflow-x: auto;
    }

    .mermaid {
      width: 100%;
      overflow-x: auto;
      margin: 1rem auto;
    }

    .mermaid svg {
      width: min(100%, 1000px) !important;
      height: auto;
      max-width: 100%;
    }

    .search input {
      font-size: 1rem;
      border-radius: 8px;
    }

    .fallback-msg {
      max-width: 860px;
      margin: 4rem auto;
      padding: 1rem;
      border: 1px solid #dee3de;
      border-radius: 10px;
      background: #fff;
      font-size: 1rem;
      color: var(--muted);
      text-align: center;
    }

    .fallback-msg a {
      color: var(--link);
      font-weight: 600;
      text-decoration: none;
    }

    .loading-msg {
      max-width: 860px;
      margin: 4rem auto;
      padding: 2rem 1rem;
      color: var(--muted);
      border-radius: 10px;
      text-align: center;
      background: #ffffffea;
      border: 1px solid #e4e7e2;
    }

    @media (min-width: 900px) {
      #main {
        margin-left: var(--sidebar-width);
      }

      #main .content {
        width: min(calc(100vw - var(--sidebar-width) - (2 * var(--pad-main)), var(--max-content)));
        max-width: 100%;
      }

      .sidebar {
        position: fixed;
      }
    }

    @media (max-width: 640px) {
      .sidebar {
        width: 78vw;
      }

      .app-nav {
        padding-right: 0;
      }

      .loading-msg,
      .fallback-msg {
        margin: 2.5rem 1rem;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-msg" id="loading-msg">
      <p>Carregando o Intensivão TEME26...</p>
      <p><a href="LEITURA_OFICIAL.md">Leitura principal</a> · <a href="MAPA_DE_QUESTOES_TEME22-25.md">Mapa de questões</a></p>
      <p id="file-help" style="display:none;">
        Você abriu por <code>file://</code>. Neste modo, o Docsify costuma falhar.
        Use em 2 minutos:  
        <br />
        1) No terminal: <code>python -m http.server 8000</code>
        <br />
        2) Abra: <a href="http://localhost:8000/Intensivao/index.html">http://localhost:8000/Intensivao/index.html</a>
      </p>
    </div>
  </div>

  <script>
    function normalizeThemeLinks() {
      document.querySelectorAll('a[href*="temas/temas/"]').forEach((link) => {
        const href = link.getAttribute("href");
        if (!href) return;
        link.setAttribute("href", href.replace(/temas\/temas\//g, "temas/"));
      });
    }

    function ensureMermaidInit() {
      if (window.__mermaidReady || typeof window.mermaid !== "object" || typeof window.mermaid.initialize !== "function") return;
      window.mermaid.initialize({
        startOnLoad: false,
        securityLevel: "loose",
        flowchart: {
          htmlLabels: true,
          useMaxWidth: true
        },
        theme: "neutral",
        themeVariables: {
          fontFamily: "Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif",
          fontSize: "16px"
        }
      });
      window.__mermaidReady = true;
    }

    function renderMermaid(attempt = 0) {
      ensureMermaidInit();

      const nodes = document.querySelectorAll("pre code.language-mermaid, pre code.lang-mermaid");
      if (!nodes.length) return;

      if (typeof window.mermaid !== "object" || typeof window.mermaid.run !== "function") {
        if (attempt < 12) {
          window.setTimeout(() => renderMermaid(attempt + 1), 200);
        }
        return;
      }

      const wrappers = [];
      nodes.forEach((codeBlock) => {
        const pre = codeBlock.closest("pre");
        if (!pre || pre.dataset.mermaidConverted === "1") return;

        const source = (codeBlock.textContent || "").trim();
        const wrapper = document.createElement("div");
        wrapper.className = "mermaid";
        wrapper.textContent = source;
        pre.replaceWith(wrapper);
        pre.dataset.mermaidConverted = "1";
        wrappers.push(wrapper);
      });

      if (!wrappers.length) return;

      window.mermaid.run({ nodes: wrappers }).catch(() => {
        wrappers.forEach((wrapper) => {
          wrapper.setAttribute("data-mermaid-error", "1");
          wrapper.style.opacity = "0.85";
        });
      });
    }

    const isFileProtocol = location.protocol === "file:";
    if (!isFileProtocol) {
      window.$docsify = {
        name: "Intensivão TEME26",
        loadSidebar: "_sidebar.md",
        homepage: "LEITURA_OFICIAL.md",
        loadNavbar: false,
        auto2top: true,
        executeScript: true,
        maxLevel: 4,
        subMaxLevel: 2,
        relativePath: false,
        search: {
          maxAge: 86400000,
          depth: 3,
          noData: "Nenhum resultado."
        },
        notFoundPage: true,
        markdown: {
          smartypants: false
        },
        formatUpdated: "{DD}/{MM}/{YYYY}",
        plugins: [
          function(hook) {
            const onRendered = () => {
              normalizeThemeLinks();
              renderMermaid();
              const app = document.getElementById("app");
              if (app) app.dataset.loaded = "1";
            };
            hook.ready(onRendered);
            hook.doneEach(onRendered);
          }
        ]
      };
    } else {
      const help = document.getElementById("file-help");
      if (help) help.style.display = "block";
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js" onerror="this.onerror=null; this.src='https://unpkg.com/docsify@4/lib/docsify.min.js'"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js" onerror="this.onerror=null; this.src='https://unpkg.com/docsify@4/lib/plugins/search.min.js'"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js" onerror="this.onerror=null; this.src='https://unpkg.com/mermaid@10/dist/mermaid.min.js'"></script>
  <script>
    setTimeout(() => {
      const app = document.getElementById("app");
      if (location.protocol === "file:") return;
      if (!app || app.dataset.loaded === "1") return;
      app.innerHTML = `
        <div class="fallback-msg">
          <p>O app está demorando para carregar.</p>
          <p><a href="LEITURA_OFICIAL.md">Abrir leitura principal</a></p>
          <p><a href="MAPA_DE_QUESTOES_TEME22-25.md">Abrir mapa de questões</a></p>
          <p><a href="javascript:location.reload()">Recarregar</a></p>
        </div>
      `;
    }, 10000);
  </script>
</body>
</html>
