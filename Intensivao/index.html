":** falso, especialmente em criança.\n- **\"NEXUS/Canadian C-spine resolvem cervical pediátrica\":** cuidado. TEME24 cobrou imagem cervical pediátrica e radiografia.\n- **\"Masseter travou após IOT: foi rocurônio\":** TEME23 apontou succinilcolina; lembrar hipertermia maligna/trismo.\n- **\"Kawasaki e escarlatina são iguais porque tem língua em framboesa\":** falso. Kawasaki tem febre persistente, conjuntivite, extremidades, linfonodo, risco coronariano e precisa IVIG/eco.\n- **\"Chumbinho e sempre organofosforado\":** no Brasil, frequentemente carbamato/aldicarb; trate toxíndrome colinérgico com atropina se muscarínico grave.\n\n## Erros fatais na prática\n\n- Não ventilar uma criança bradicárdica e hipóxica porque está tentando pegar acesso.\n- Dar varios bolus sem reavaliar hepatomegalia, estertores, perfusão e estado mental.\n- Intubar asma grave e ventilar com frequência alta, causando auto-PEEP e PCR.\n- Alta de lactente com bronquiolite que não mama, faz apneia, dessatura persistente ou está exausto.\n- Tratar anafilaxia com corticoide/anti-histamínico antes de adrenalina IM.\n- Esquecer glicemia em convulsão, choque, rebaixamento ou hipotermia.\n- Confiar em FAST negativo em criança instável por trauma.\n- Não aquecer criança traumatizada/queimada/choque, piorando coagulopatia e acidose.\n- Usar dose de adulto \"aproximada\" sem peso estimado em droga de alto risco.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** desidratação grave/choque hipovolêmico = SF 0,9% 20 mL/kg; bronquiolite com bradicardia/hipoxemia = ventilação com pressão positiva; trauma pediátrico = PECARN, radiografia cervical na estação, TOT 5,5, CH 10 mL/kg e FAST com menor sensibilidade.\n>\n> **Na prática clínica:** em sepse, faça bolus de 10-20 mL/kg com reavaliação estreita e comece vasoativo cedo se refratário; em bronquiolite típica, evite broncodilatador/corticoide/antibiótico de rotina; em asma grave, MgSO4 e suporte ventilatório devem seguir protocolo local e experiência da equipe.\n\n## Checklist de revisão\n\n- [ ] Sei reconhecer criança grave pelo triâneulo de avaliação pediátrica.\n- [ ] Sei que hipotensão e bradicardia são sinais tardios.\n- [ ] Sei ventilar primeiro na bronquiolite grave/bradicardia hipóxica.\n- [ ] Sei diferenciar bronquiolite, crupe, anafilaxia, corpo estranho e asma.\n- [ ] Sei as doses: bolus 20 mL/kg, sepsis 10-20 mL/kg, CH 10 mL/kg, adrenalina IM 0,01 mg/kg, MgSO4, midazolam e D10.\n- [ ] Sei quando tratar crise febril simples sem excesso de exames.\n- [ ] Sei que DKA pediátrica não recebe bolus de insulina.\n- [ ] Sei conduzir queimadura pediátrica inicial com aquecimento, analgesia, SCQ pediátrica, manutenção com glicose e diurese alvo.\n- [ ] Sei usar PECARN e não confiar no FAST negativo.\n- [ ] Sei as pistas de Kawasaki, sarampo, escarlatina, exantema súbito e choque tóxico.\n- [ ] Sei a conduta da estação de chumbinho: ABCDE, glicemia/O2/aquecer/estimular/acesso, carbamato/aldicarb e atropina EV se toxíndrome colinérgico.\n\n## Questões e estações relacionadas\n\n- **TEME22 Q12-13:** lactente com diarreia/vômitos, choque hipovolêmico e SF 0,9% 20 mL/kg.\n- **TEME23 Q14:** particularidades de via aérea pediátrica; lâmina reta pode elevar epiglote; criança pequena pode precisar coxim sob ombros; máscara laríngea não é proibida só por idade <2 anos.\n- **TEME23 Q16:** espasmo de masseter após medicação de IOT associado a succinilcolina.\n- **TEME23 Q17:** febre, hipotensão, rash/língua em framboesa e inflamação sistêmica = síndrome do choque tóxico.\n- **TEME23 Q50-51:** choque hipovolêmico/desidratação e cristaloide 20 mL/kg.\n- **TEME24 Q15:** bronquiolite com rebaixamento, SatO2 70% e FC 48: ventilação com pressão positiva e O2; compressão se FC <60 persistir com má perfusão.\n- **TEME24 Q16/Q38:** asma grave pediátrica, corticoide, MgSO4 e indicações de via aérea.\n- **TEME24 Q32:** exantemas, especialmente exantema súbito/HHV6-7.\n- **TEME24 Q95:** fatores de risco para imagem cervical pediátrica.\n- **TEME24 Estação I:** trauma pediátrico: TC crânio/PECARN, radiografia cervical, TOT 5,5, CH 10 mL/kg, FAST menos sensível e fontes ocultas de choque.\n- **TEME25 Estação Ped:** \"chumbinho\": glicemia, O2, aquecer, estimular, acesso; carbamato/aldicarb; atropina 0,5 mg EV em bolus.\n- **TEME25 Q39:** trauma pediátrico com perfusão ruim e FAST negativo; não excluir choque/lesão oculta.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26.\n- Provas teóricas TEME22, TEME23, TEME24 e TEME25.\n- Estações práticas TEME24 e TEME25.\n- Referências oficiais do edital: Tratado ABRAMEDE 2024, Manual de Via aérea 2025 e materiais correlatos de emergência pediátrica/trauma/reanimação.\n\n**Material local**\n\n- Emergency Talks: Aula 30 - Emergências pediátricas I.\n- Emergency Talks: Aula 43 - Emergências pediátricas II - respiratórias.\n- Emergency Talks: Aula 49 - Trauma em populações especiais II - Pediátrico.\n- Resumo do Emergency.docx.\n- Adendos para complementar.docx.\n\n**Atualização clínica**\n\n- American Heart Association/American Academy of Pediatrics. Pediatric Basic Life Support: 2025 Guidelines. https://publications.aap.org/pediatrics/article/157/1/e2025074350/205235/Part-6-Pediatric-Basic-Life-Support-2025-American\n- American Heart Association/American Academy of Pediatrics. Pediatric Advanced Life Support: 2025 Guidelines. https://cpr.heart.org/en/resuscitation-science/cpr-and-ecc-guidelines/pediatric-advanced-life-support\n- Survivine Sepsis Campaign. International Guidelines for the Management of Septic Shock and Sepsis-Associated Organ Dysfunction in Children, 2020. https://www.sccm.org/survivingsepsiscampaign/guidelines-and-resources/surviving-sepsis-campaign-pediatric-guidelines\n- American Academy of Pediatrics. Clinical Practice Guideline: The Diagnosis, Management, and Prevention of Bronchiolitis. https://publications.aap.org/pediatrics/article/134/5/e1474/75848/Clinical-Practice-Guideline-The-Diagnosis\n- NICE NG9. Bronchiolitis in children: diagnosis and management. https://www.nice.org.uk/guidance/ng9/chapter/Recommendations\n- Global Initiative for Asthma. 2025 GINA Summary Guide/Report. https://ginasthma.org/2025-gina-summary-guide/\n- Canadian Paediatric Society. Acute management of croup in the emergency department. https://cps.ca/en/documents/position/acute-management-of-croup\n- American Academy of Pediatrics. Anaphylaxis. https://publications.aap.org/pediatriccare/article/doi/10.1542/aap.ppcqr.396245/136/Anaphylaxis\n- CDC. Clinical Overview of Measles. https://www.cdc.gov/measles/hcp/clinical-overview/index.html\n- American Heart Association. Kawasaki disease complications and treatment. https://www.heart.org/en/health-topics/kawasaki-disease/kawasaki-disease-complications-and-treatment\n- PECARN cervical spine injury prediction rule, 2024. https://www.sciencedirect.com/science/article/pii/S2352464224001044\n- PECARN pediatric head trauma rule, Lancet 2009/PubMed. https://pubmed.ncbi.nlm.nih.gov/19758692/\n- ISPAD Clinical Practice Consensus Guidelines 2022: Diabetic ketoacidosis and hyperelycemic hyperosmolar state. https://onlinelibrary.wiley.com/doi/10.1111/pedi.13406\n- American Burn Association. Clinical Practice Guidelines on Burn Shock Resuscitation. https://pubmed.ncbi.nlm.nih.gov/?term=38051821\n"},{"id":"temas/011_disturbios-metabolicos-renais-gasometria.md","title":"011 - Distúrbios Metabólicos, endócrinos, Renais E Gasometria","markdown":"# 011 - Distúrbios Metabólicos, endócrinos, Renais E Gasometria\n\n## Leitura de 30 segundos\n\n- Metabólico grave na sala vermelha: ABCDE, glicemia, ECG, gaso/lactato, Na/K/Ca/Mg/P, ureia/creatinina, cetona, osmolaridade quando indicado e busca ativa de gatilho.\n- Gasometria de prova: pH -> distúrbio primário -> compensação -> anion gap corrigido -> delta/delta -> oxigenação. Não pule a compensação.\n- HiperK com ECG, arritmia, fraqueza ou K muito alto: cálcio primeiro, depois deslocar K para dentro da célula e remover K do corpo. Resina não é tratamento de emergência.\n- Hiponatremia com convulsão/coma: salina 3% em bolus. O alvo inicial e melhorar sintoma/subir 4-6 mEq/L, não normalizar o sódio.\n- CAD/EHH: volume e potássio antes de insulina plena. TEME cobrou CAD como glicemia >250 + pH <7,3 + cetonemia positiva.\n- IRA/rabdomiólise: trate causa, pare nefrotóxicos, monitore K/acidose/volume e lembre AEIOU para diálise.\n- Endócrino que mata: hipoglicemia, crise tireotóxica, coma mixedematoso e crise adrenal. Na dúvida de adrenal, hidrocortisona não espera laboratório.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME22-25 cobrou CAD, conduta inicial em CAD com choque/infecção, definição de CAD, gasometria/ácido-base em VM/DPOC/choque, etilenoglicol por anion gap + oxalato, crise renal esclerodérmica, bicarbonato em antidepressivo tricíclico, insuficiência renal por abelhas, torsades/magnésio, bicarbonato não rotineiro pós-RCE e crise tireotóxica.\n- **O que a banca costuma testar:** primeira conduta segura, formula simples, quando não dar bicarbonato, quando não iniciar insulina, quando fazer cálcio, quando dialisar, e diferença entre resposta de prova e prática atual.\n- **Como costuma aparecer:** caso com muitos números. A alternativa correta costuma evitar intervenção automática perigosa: insulinizar sem K, corrigir sódio até normal, usar bicarb em toda acidose, dar resininha para hiperK emergente ou esperar exame em crise adrenal.\n\n## Abordagem prática\n\n### 1. Primeiro minuto do metabólico grave\n\n1. ABCDE, monitor, ECG de 12 derivações se K/Ca/Mg/tóxico/torácico/síncope.\n2. Glicemia capilar imediata em rebaixamento, convulsão, choque, sepse, hipotermia, intoxicação e criança.\n3. Gasometria venosa ou arterial conforme Pergunta clínica: pH/CO2/HCO3/lactato; arterial se precisa avaliar oxigenação real.\n4. Laboratório: Na, K, Cl, HCO3, Ca, Mg, P, ureia, creatinina, osmolaridade, cetona/beta-hidroxibutirato, EAS, CPK, função hepática conforme caso.\n5. Procurar gatilho: infecção, IAM/AVC, trauma/esmagamento, pancreatite, gestação, uso irregular de insulina, diurético, IECA/BRA, AINE, contraste, corticoide, antipsicótico, álcool/tóxico.\n\n> **Resposta de prova TEME:** em paciente com glicemia alta, choque e suspeita de CAD, a conduta imediata pode ser volume + tratamento do gatilho. Insulina, potássio e bicarbonato \"em pacote\" sem K/pH e sem reavaliação é armadilha.\n>\n> **Na prática clínica:** use protocolos institucionais para CAD/EHH e eletrolitos. O importante e não atrasar intervenção tempo-dependente: cálcio na hiperK instável, salina 3% na hiponatremia grave, glicose na hipoglicemia e hidrocortisona na crise adrenal.\n\n### 2. Gasometria em 5 passos\n\n1. **pH:** acidemia <7,35; alcalemia >7,45.\n2. **Primário:** HCO3 baixo/alto = metabólico; PaCO2 alto/baixo = respiratório.\n3. **Compensação:** se não bate com a formula, existe distúrbio misto.\n4. **Anion gap:** AG = Na - (Cl + HCO3). Corrija pela albumina se disponível.\n5. **Delta/delta e contexto:** acidose metabólica com AG alto pode esconder alcalose metabólica ou acidose hipercloremica associada.\n\nPontos de prova:\n\n- Saturação boa não exclui hipoventilação. Oxímetro não mede CO2.\n- Gasometria venosa costuma servir para pH/HCO3 em muitos cenários, mas PaO2/hipoxemia exige gasometria arterial ou outra avaliação de oxigenação.\n- Lactato, BE, diurese e perfusão ajudam a acompanhar choque, mas não substituem exame clínico.\n\n### 3. Acidose metabólica com anion gap aumentado\n\nPense em ácido novo no sangue: lactato, cetonas, uremia, tóxicos.\n\nConduta prática:\n\n1. Tratar choque/hipóxia/sepses/convulsão/hipoperfusão.\n2. Checar glicemia, cetona, lactato, função renal, osmolar gap e história tóxica.\n3. Não dar bicarbonato automaticamente. Corrigir causa costuma corrigir pH.\n4. Considerar bicarbonato em situações específicas: antidepressivo tricíclico com QRS largo/choque, salicilato selecionado, hipercalemia com acidose grave, DKA com pH extremamente baixo, acidose grave refratária com indicação de diálise.\n\n> **Resposta de prova TEME23:** acidose metabólica com anion gap aumentado + QT prolongado + cristais de oxalato de cálcio na urina = etilenoglicol.\n\n### 4. Hiperpotassemia\n\nTrate como emergência se:\n\n- ECG alterado, arritmia, PCR, fraqueza/paralisia.\n- K >=6,5 ou subida rápida.\n- IRA/DRC, rabdomiólise, lise tumoral, queimadura, esmagamento, uso de IECA/BRA/espironolactona ou acidose importante.\n\nSequência:\n\n1. **Estabilizar membrana:** cálcio EV se ECG/instabilidade/hiperK grave.\n2. **Deslocar para dentro:** insulina regular + glicose; beta-2 agonista nebulizado; bicarbonato se acidose metabólica relevante.\n3. **Remover do corpo:** diurético se urina e volume permitem; diálise se grave/refratária/renal; resinas/quelantes não resolvem emergência.\n4. **Rechecar:** K e glicemia seriados; hipoglicemia pós-insulina é comum.\n\n> **Pegada TEME:** ECG normal não exclui hiperK grave; ECG alterado com suspeita forte não deve esperar laboratório para cálcio.\n\n### 5. Hipopotassemia, cálcio e magnésio\n\n**HipoK:**\n\n- Grave se <2,5, fraqueza/paralisia, arritmia, QT/U wave, uso de digoxina, IAM/IC.\n- Corrija Mg junto, porque hipomagnesemia impede corrigir K.\n- Evite glicose na infusão se hipoK importante: estimula insulina e piora K.\n\n**Hipocalcemia:**\n\n- Parestesia, tetania, broncoespasmo, convulsão, hipotensão, QT longo, pós-transfusão maciça, pancreatite, lise tumoral.\n- sintomática/ECG = cálcio EV.\n\n**Hipercalcemia:**\n\n- Desidratação, constipação, confusão, coma, QT curto, malignidade/hiperPTH.\n- Tratamento inicial: SF 0,9% se tolera volume; calcitonina para efeito rápido; bisfosfonato para efeito sustentado; diálise se grave/refratária/DRC/instabilidade.\n- Furosemida não é primeira linha; use apenas se sobrecarga.\n\n**Magnésio:**\n\n- Hipomagnesemia causa torsades, QT longo, convulsão e hipoK refratária.\n- Hipermagnesemia iatrogênica/DRC: hiporreflexia, hipotensão, bradicardia, bloqueios, depressão respiratória; trate com cálcio EV se instável, suporte, diurese/diálise.\n\n### 6. Hiponatremia e hipernatremia\n\n**Hiponatremia:**\n\n1. Confirmar se e hipotonica quando possível: glicose alta, hiperlipidemia/proteina e manitol podem enganar.\n2. Classificar por sintomas: convulsão, coma, rebaixamento importante, vômitos persistentes, cefaleia intensa = grave.\n3. Se grave: salina hipertônica 3% em bolus, repetir até melhora clínica ou aumento inicial de 4-6 mEq/L.\n4. Depois, corrigir devagar. Risco de mielinólise aumenta com álcoolismo, desnutrição, hepatopatia, hipocalemia e Na muito baixo.\n5. Hipovolêmica = cristaloide isotônico; euvolêmica/hipervolêmica = restrição hídrica e tratar causa, com exceções.\n\n**Hipernatremia:**\n\n1. Se choque/hipoperfusão: primeiro SF 0,9% ou Ringer, mesmo com Na alto.\n2. Depois, calcular déficit de água e repor água livre por VO/SNE ou SG 5%.\n3. Se crônica/desconhecida, reduzir em geral até 10-12 mEq/L/dia.\n4. Se aguda por carea de sódio, pode corrigir mais rápido com monitorização.\n\n> **Resposta de prova/local:** aula Emergency Talks usa salina 3% 100 mL em 10 min na hiponatremia com convulsão refratária.\n>\n> **Atualização clínica:** diretrizes europeias usam bolus de 150 mL de NaCl 3% em 20 min para sintomas graves. O conceito comum e igual: bolus pequeno, reavaliar e não normalizar rápido.\n\n### 7. CAD e EHH\n\n**CAD clássica de prova:**\n\n- Glicemia >250 mg/dL.\n- pH <7,3 ou bicarbonato baixo.\n- Cetonemia positiva.\n\n**EHH clássico:**\n\n- Glicemia geralmente >600 mg/dL.\n- Osmolaridade efetiva alta, típicamente >320 mOsm/kg nos materiais de prova.\n- Pouca ou nenhuma cetose; pH geralmente >=7,3.\n- Desidratação mais intensa e sintomas neurológicos comuns.\n\nConduta:\n\n1. ABCDE, monitor, 2 acessos, glicemia horaria, gaso, cetona, Na/K/Cl/HCO3/Mg/P, ureia/creatinina, ECG e gatilho.\n2. Cristaloide isotônico inicial. Em choque, ressuscitar primeiro.\n3. Potássio manda na insulina:\n   - K baixo: repor K e segurar insulina.\n   - K normal: iniciar insulina e repor K na solução.\n   - K alto: iniciar insulina sem K inicial, monitorando de perto.\n4. Insulina regular EV depois de volume inicial e avaliação do K.\n5. Quando glicose cair, trocar para solução com dextrose e manter insulina até fechar cetose/AG.\n6. Tratar gatilho: infecção, IAM, AVC, pancreatite, omissão de insulina, gestação, drogas.\n\n> **Resposta de prova TEME22:** adolescente com suspeita de CAD, choque/infecção e glicemia 390: a alternativa correta foi hidratação com SF 0,9% + antibiótico na primeira hora, evitando bolus de insulina, bicarbonato e KCl as cegas.\n>\n> **Atualização clínica 2024:** o consenso internacional reduziu o limiar diagnóstico de hiperglicemia da CAD para >=200 mg/dL ou diabetes conhecido, quando há cetose significativa e acidose. Para TEME, memorize a tríade cobrada: >250 + pH <7,3 + cetonemia.\n\n### 8. Hipoglicemia\n\n1. Se acordado e consegue eneolir: carboidrato VO e reavaliar em 15 min.\n2. Se rebaixado, convulsionando, NPO ou risco de aspiração: glicose EV.\n3. Sem acesso: glucagon IM/SC/IN se disponível, mas em álcoolismo/desnutrição/hepatopatia pode falhar por pouco glicogênio.\n4. Desnutrido/álcoolista/risco de Wernicke: tiamina 100 mg EV/IM junto, sem atrasar glicose se grave.\n5. Sempre procurar causa: insulina/sulfonilureia, sepse, insuficiência adrenal, renal/hepática, álcool, jejum, erro de dose.\n\n### 9. IRA, DRC descompensada e diálise de urgência\n\n**Definição KDIGO de IRA:**\n\n- Creatinina +0,3 mg/dL em 48 h; ou\n- Creatinina >=1,5 vezes basal em até 7 dias; ou\n- Diurese <0,5 mL/kg/h por 6 h.\n\nAbordagem:\n\n1. pré-renal: hipovolemia, choque, sepse, ICC/cirrose com baixo volume efetivo, IECA/BRA/diurético/AINE.\n2. Renal: NTA por sepse/isquemia/tóxico, glomerulonefrite, NIA, vasculite, microangiopatia, rabdomiólise.\n3. pós-renal: bexigoma, HPB, sonda obstruída, cálculo, tumor, coagulação. POCUS de bexiga/hidronefrose ajuda muito.\n4. Manejo: restaurar perfusão, aliviar obstrução, parar nefrotóxicos, ajustar dose, tratar K/acidose/volume/uremia.\n\n**Diálise de urgência: AEIOU**\n\n- **A:** acidose metabólica grave/refratária.\n- **E:** eletrólito, principalmente hiperK grave/refratária.\n- **I:** intoxicações dializaveis, como lítio, salicilato grave, etilenoglicol/metanol selecionados.\n- **O:** overload, hipervolemia/edema pulmonar refratário.\n- **U:** uremia sintomática: encefalopatia, pericardite, sangramento, convulsão.\n\n> **Pegada TEME:** creatinina alta sozinha não indica diálise. A indicação é complicação clínica/laboratorial ameaçadora ou refratária.\n\n### 10. Rabdomiolise e esmagamento\n\n- Suspeite em trauma/esmagamento, crise convulsiva prolongada, hipertermia, drogas, estatina, imobilização prolongada, choque elétrico, exercício extremo, infecção viral.\n- Exames: CPK, K, Ca, P, ácido úrico, creatinina, EAS/mioglobinúria, gaso se grave.\n- Tratamento principal: volume cristaloide precoce se não houver contraindicação, alvo de diurese 200-300 mL/h ou 2-3 mL/kg/h.\n- Monitorar compartimental, hiperK, hipocalcemia inicial, hipercalcemia tardia, acidose e IRA.\n- Bicarbonato/manitol/alcalinização não são rotina universal; podem aparecer em protocolos de esmagamento selecionados.\n- Diálise não remove mioglobina por si só de forma preventiva: diálise por AEIOU.\n\n> **Resposta de aula/prova:** além da hidratação, não há \"padrão-ouro\" obrigatório para rabdomiólise. Furosemida, manitol e alcalinização não substituem volume e monitorização.\n\n### 11. Crise tireotóxica, mixedema e adrenal\n\n**Crise tireotóxica:**\n\n- Diagnóstico clínico: febre, taquicardia/descompensação cardíaca, agitação/delirium, vômitos/diarreia, disfunção hepática e hipertireoidismo conhecido ou TSH suprimido/T4 alto.\n- Tratamento em blocos: suporte/UTI, tratar gatilho, beta-bloqueio se tolerado, tionamida, iodo depois da tionamida, corticoide, resfriamento e antitérmico sem AAS.\n- Se choque/IC grave, cuidado com propranolol; considerar beta-bloqueio curto/titulado e suporte intensivo.\n\n**Coma mixedematoso:**\n\n- Nem sempre está em coma. Pense em hipotireoidismo + rebaixamento, hipotermia, bradicardia, hipoventilação, hiponatremia/hipoglicemia, derrame/pericárdico, gatilho infeccioso/frio/sedativo.\n- Tratamento: suporte ventilatório/hemodinâmico, aquecimento passivo, hidrocortisona antes/junto, levotiroxina EV, tratar gatilho.\n\n**Crise adrenal:**\n\n- Choque ou hipotensão refratária + vômitos/dor abdominal, hipoglicemia, hiponatremia, hipercalemia, hiperpigmentação, uso crônico/suspensao de corticoide, sepse ou doença autoimune.\n- Não espere cortisol se instável: hidrocortisona imediata + SF 0,9% + dextrose se hipoglicemia.\n\n> **Resposta de prova TEME25:** crise tireotóxica provável = antitireoidiano + beta-bloqueador + corticoide, com iodeto após antitireoidiano. Em hepatopatia importante, metimazol pode ser preferido a PTU.\n\n## Conceitos que sustentam a conduta\n\n### Bicarbonato não é \"antídoto da acidose\"\n\nAcidose é marcador de causa: choque, hipóxia, cetose, uremia, tóxico, diarreia, hipoventilação. Bicarbonato pode piorar CO2, sódio/osmolaridade e volume. Use quando há mecanismo em que ele muda desfecho: tricíclico com QRS largo, salicilato, hiperK com acidose, acidemia extrema selecionada, ou como ponte para diálise.\n\n### Insulina sem potássio pode parar o coração\n\nNa CAD, o K corporal total costuma estar baixo mesmo quando o K serico está normal/alto. Insulina desloca K para dentro da célula. Se K já está baixo, iniciar insulina antes de repor K pode precipitar arritmia fatal.\n\n### Corrigir sódio é uma maratona com sprint inicial\n\nHiponatremia grave sintomática precisa de bolus de salina 3% para tirar o cérebro do risco imediato. Depois disso, a correção deve desacelerar. A prova gosta de alternativas que tentam \"normalizar\" o sódio em poucas horas: isso é perigoso.\n\n### IRA é diagnóstico de processo, não de creatinina isolada\n\nCreatinina sobe tarde e depende de massa muscular. Em emergência, diurese, K, acidose, congestão, uremia, exposições e obstrução importam mais para conduta imediata.\n\n## Fluxograma\n\n```mermaid\nflowchart TD\n    A[Paciente com alteração metabólica grave] --> B[ABCDE + glicemia + ECG + acesso + monitor]\n    B --> C{Ameaça imediata?}\n    C -->|Hipoglicemia| D[Glicose EV/VO conforme consciência]\n    C -->|HiperK/ECG| E[Cálcio EV -> insulina/glicose -> beta2 -> remover K]\n    C -->|Hiponatremia com convulsão/coma| F[NaCl 3% em bolus + reavaliar]\n    C -->|Crise adrenal| G[Hidrocortisona + SF 0,9% + dextrose se preciso]\n    C -->|CAD/EHH/choque| H[Cristaloide + K antes da insulina + gatilho]\n    C -->|Nenhuma| I[Interpretar gaso, eletrólitos, renal, tóxico e endócrino]\n```\n\n```mermaid\nflowchart TD\n    A[Gasometria] --> B{pH}\n    B -->|<7,35| C[Acidemia]\n    B -->|>7,45| D[Alcalemia]\n    C --> E{HCO3 baixo ou PaCO2 alto?}\n    D --> F{HCO3 alto ou PaCO2 baixo?}\n    E -->|HCO3 baixo| G[Acidose metabólica]\n    E -->|PaCO2 alto| H[Acidose respiratória]\n    F -->|HCO3 alto| I[Alcalose metabólica]\n    F -->|PaCO2 baixo| J[Alcalose respiratória]\n    G --> K[Calcular compensação de Winter]\n    K --> L[Calcular AG corrigido e delta]\n    H --> M[Aguda vs crônica pela resposta do HCO3]\n```\n\n```mermaid\nflowchart TD\n    A[CAD/EHH suspeita] --> B[Volume inicial + exames + ECG + cetona + K]\n    B --> C{K <3,3-3,5?}\n    C -->|Sim| D[Repor K e segurar insulina]\n    C -->|Não| E[Iniciar insulina EV conforme protocolo]\n    E --> F{Glicose caiu para 200-250 CAD ou 250-300 EHH?}\n    F -->|Sim| G[Adicionar dextrose e manter insulina até fechar cetose/AG]\n    F -->|Não| H[Reavaliar queda 50-70 mg/dL/h, volume, bomba e gatilho]\n    G --> I[Transicao SC com sobreposicao 1-2 h]\n```\n\n```mermaid\nflowchart TD\n    A[IRA/DRC descompensada] --> B[Volume/perfusão + urina + EAS + eletrólitos + POCUS]\n    B --> C{Obstrução?}\n    C -->|Sim| D[Desobstruir: SVD/urologia/nefro]\n    C -->|Não| E[Parar nefrotóxicos, ajustar dose, tratar causa]\n    E --> F{AEIOU?}\n    F -->|Sim| G[Nepro/UTI e terapia renal substitutiva]\n    F -->|Não| H[Monitor seriado: K, pH, volume, ureia, diurese]\n```\n\n## Doses, alvos e números\n\n| Item | Número | observação TEME |\n|---|---:|---|\n| pH normal | 7,35-7,45 | pH define acidemia/alcalemia |\n| PaCO2 normal | 35-45 mmHg | Oxímetro não avalia ventilação |\n| HCO3 normal | 22-26 mEq/L | Metabólico gira em torno dele |\n| AG | Na - (Cl + HCO3) | Normal local: 10 +/- 2 |\n| AG corrigido albumina | AG + 2,5 x (4 - albumina) | Hipoalbumina máscara AG alto |\n| Winter | PaCO2 esperada = 1,5 x HCO3 + 8 +/- 2 | Acidose metabólica |\n| Alcalose metabólica | PaCO2 esperada = 0,7 x HCO3 + 21 +/- 5 | Se fora, distúrbio misto |\n| Na corrigido glicemia | Na + 0,02 x (glicose - 100) | Formula da aula; equivale a 2 mEq por 100 mg/dL |\n| Osm efetiva | 2 x Na + glicose/18 | Ureia não conta para tonicidade efetiva |\n| Osm calculada total | 2 x Na + glicose/18 + BUN/2,8 | BUN = ureia/2,14 |\n| Osmolar gap | Osm medida - osm calculada | Alto sugere álcool tóxico, entre outros |\n| CAD prova | Glicose >250 + pH <7,3 + cetonemia | TEME22/23 |\n| EHH prova | Glicose >600 + osm >320 + pouca/sem cetose | Desidratação e SNC |\n| Queda glicêmica alvo CAD | 50-70 mg/dL/h | Aula Emergency Talks |\n| Insulina regular CAD adulto | 0,1 U/kg/h EV | Iniciar após volume e K adequado; muitos protocolos não usam bolus |\n| Segurar insulina | K <3,3-3,5 mEq/L | Repor K primeiro |\n| Bicarbonato na DKA | pH <6,9-7,0 | Não é rotina |\n| Resolução CAD | pH >7,3, HCO3 >=18, cetose/AG resolvendo | Cetonuria pode enganar |\n| Glicose hipoglicemia adulto | 15-20 g VO se alerta; 25 g EV se grave | D50 50 mL ou D10 250 mL, conforme protocolo |\n| Tiamina | 100 mg EV/IM | Alcoolismo/desnutrição; não atrasar glicose grave |\n| Hidrocortisona crise adrenal | 100 mg EV/IM, depois 200 mg/24 h ou 50 mg 6/6 h | Não esperar cortisol se instável |\n| HiperK emergente | K >=6,5 ou ECG/sintomas | Cálcio primeiro se instável/ECG |\n| Gluconato de cálcio 10% | 10-30 mL EV | Repetir se ECG não melhora |\n| Cloreto de cálcio 10% | 10 mL EV | Preferir acesso central/PCR |\n| Insulina hiperK | Regular 10 U EV + glicose 25 g | Monitorar hipoglicemia por 4-6 h |\n| Salbutamol hiperK | 10-20 mg nebulizado | Adjuvante, não substitui cálcio/insulina |\n| KCl IV | 10 mEq/h periférico; até 20 mEq/h monitorizado | Corrigir Mg junto |\n| NaCl 3% hiponatremia grave | 100 mL em 10 min ou 150 mL em 20 min | Bolus e reavaliação; alvo inicial +4-6 |\n| Limite correção Na crônica | 8-10 mEq/L em 24 h | Mais conservador se alto risco |\n| Hipernatremia crônica | Reduzir até 10-12 mEq/L/dia | Primeiro tratar choque com isotônico |\n| Hipocalcemia sintomática | Gluconato Ca 10% 10-20 mL EV | Convulsão, QT, tetania, instabilidade |\n| Hipermagnesemia instável | Cálcio EV | Depois volume/diurese/diálise |\n| Mg torsades | 1-2 g EV | Mesmo se Mg normal |\n| IRA KDIGO | Cr +0,3/48h; 1,5x/7d; diurese <0,5 mL/kg/h por 6h | Definição |\n| Rabdomiolise | CPK >1000 ou >5x LSN | Risco maior com >5000 |\n| Diurese alvo rabdo | 200-300 mL/h ou 2-3 mL/kg/h | Se tolera volume |\n| Crise renal esclerodérmica | IECA/captopril | TEME22 Q63: captopril |\n| Tricíclico com QRS largo/choque | Bicarbonato 1-2 mEq/kg EV | Alvo QRS estreitar/pH 7,45-7,55 |\n| Crise tireotóxica | Tionamida + beta-bloq + corticoide + iodo depois | Tratar gatilho e evitar AAS |\n| Mixedema | Hidrocortisona + levotiroxina EV + suporte | Aquecimento passivo |\n\n## Pegadinhas TEME\n\n- **CAD = glicemia >600:** falso. Isso é mais EHH. CAD de prova e >250 + pH <7,3 + cetonemia.\n- **Insulina em bolus sempre primeiro na CAD:** falso. Primeiro volume e K; no caso TEME22, a melhor resposta imediata foi SF 0,9% + antibiótico.\n- **Bicarbonato em toda acidose metabólica:** falso. Trate causa; reserve para indicações específicas.\n- **K alto com ECG alterado: glicose-insulina primeiro:** incompleto. Cálcio estabiliza membrana e vem antes se ECG/instabilidade.\n- **ECG normal exclui hiperK:** falso.\n- **Resina/Sorcal resolve hiperK emergente:** falso. início tardio e efeitos GI; não é resposta de sala vermelha.\n- **Hiponatremia grave precisa normalizar Na:** falso. Bolus inicial para sintomas; depois corrigir devagar.\n- **Hipernatremia com choque não pode receber SF 0,9%:** falso. Perfusão vem primeiro.\n- **Furosemida para hipercalcemia como rotina:** falso. Volume, calcitonina e bisfosfonato são base; furosemida só se sobrecarga.\n- **Creatinina alta isolada indica diálise:** falso. Use AEIOU.\n- **Rabdomiolise tem que alcalinizar urina/manitol:** falso como rotina.\n- **Crise tireotóxica espera TSH/T4 ou rastreio infeccioso:** falso. Diagnóstico é clínico; tratar cedo.\n- **Crise adrenal espera cortisol:** falso se instável.\n- **Cetonuria negativa encerra CAD:** falso. Beta-hidroxibutirato/cetose e AG importam mais.\n\n## Erros fatais na prática\n\n- Dar insulina em CAD com K baixo ou sem checar K.\n- Não fazer ECG em hipercalemia/hipocalemia/hipocalcemia/tóxico.\n- Tratar hipoglicemia rebaixada com dieta VO.\n- Corrigir Na de 110 para normal em poucas horas.\n- Dar volume agressivo em IRA congesta sem reavaliar pulmão/VCI/perfusão.\n- Não procurar obstrução urinária reversível em IRA.\n- Intubar acidose metabólica grave e hipoventilar depois, piorando pH.\n- Usar propranolol em crise tireotóxica com choque/IC grave sem cautela.\n- Não dar corticoide antes de levotiroxina em mixedema ou diante de suspeita de crise adrenal.\n- Liberar rabdomiólise com K/creatinina/CPK subindo ou risco compartimental.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** CAD = glicemia >250 + pH <7,3 + cetonemia; CAD com choque/infecção pede SF 0,9% e antibiótico antes de insulinizar as cegas; etilenoglicol = AG alto + oxalato; crise renal esclerodérmica = captopril/IECA; TCA instável = bicarbonato; hiperK emergente = cálcio.\n>\n> **Na prática clínica:** CAD adulta atual pode ser diagnosticada com glicemia >=200 se houver diabetes/cetose/acidose; salina balanceada pode reduzir acidose hipercloremica; protocolos de sódio usam limites de correção mais conservadores em alto risco; beta-bloqueio na tireotoxicose deve ser individualizado se choque/IC.\n\n## Checklist de revisão\n\n- [ ] Sei interpretar gasometria em 5 passos e calcular compensação.\n- [ ] Sei calcular AG, corrigir por albumina e pensar em osmolar gap.\n- [ ] Sei tratar hiperK emergente na ordem: cálcio, shift, remoção.\n- [ ] Sei que ECG normal não exclui hiperK.\n- [ ] Sei tratar hiponatremia grave com bolus de NaCl 3% sem normalizar rápido.\n- [ ] Sei diferenciar CAD e EHH e não iniciar insulina com K baixo.\n- [ ] Sei quando bicarbonato ajuda e quando atrapalha.\n- [ ] Sei AEIOU da diálise de urgência.\n- [ ] Sei manejar rabdomiólise com volume, diurese alvo e monitorização de K/IRA.\n- [ ] Sei reconhecer crise tireotóxica, mixedema e crise adrenal.\n- [ ] Sei as questões TEME: CAD >250/pH<7,3/cetonemia; etilenoglicol; captopril na crise renal esclerodérmica; bicarbonato no TCA.\n\n## Questões e estações relacionadas\n\n- **TEME22 Q51:** suspeita de CAD com choque/infecção: hidratação com SF 0,9% + antibiótico na primeira hora; evitar bolus de insulina/bicarbonato/KCl as cegas.\n- **TEME22 Q58:** definição de CAD: glicemia >250 mg/dL + pH <7,3 + cetonemia positiva.\n- **TEME22 Q63:** crise renal esclerodérmica com PA alta, convulsão, creatinina/proteinúria/hematúria: captopril.\n- **TEME22 Q57:** melhora pós-ressuscitação no choque: queda de lactato, melhora de BE e diurese.\n- **TEME23 Q30:** etilenoglicol: acidose metabólica com anion gap aumentado, QT prolongado e cristais de oxalato de cálcio.\n- **TEME23 Q63:** repetiu definição de CAD.\n- **TEME24 Q30:** intoxicação por tricíclico com instabilidade/ECG: bicarbonato de sódio, volume/vasoativo e via aérea após estabilização inicial.\n- **TEME24 Q79:** múltiplas picadas de abelha podem causar síndrome de envenenamento com IRA e necessidade de hemodialise.\n- **TEME25 Q83:** pós-RCE pediátrico: não usar bicarbonato de sódio rotineiramente para acidose metabólica.\n- **TEME25 Q97:** crise tireotóxica: antitireoidiano + beta-bloqueio + corticoide, iodeto após antitireoidiano.\n- **Emergency Talks Aula 16:** IRA, DRC, indicações de diálise e rabdomiólise.\n- **Emergency Talks Aula 33:** gasometria, compensações, AG, delta e osmolar gap.\n- **Emergency Talks Aula 42:** K, Na, Ca, Mg é tratamento emergente.\n- **Emergency Talks Aula 59:** hipoglicemia, CAD/EHH, mixedema, tireotoxicose e adrenal.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26.\n- Provas teóricas TEME22, TEME23, TEME24 e TEME25.\n- Referências oficiais do edital: Tratado ABRAMEDE 2024, Medicina de Emergência HCFMUSP, POCUS ABRAMEDE e demais capítulos de clínica de emergência.\n\n**Material local**\n\n- Emergency Talks: Aula 16 - Insuficiência renal e rabdomiólise.\n- Emergency Talks: Aula 33 - Gasometria.\n- Emergency Talks: Aula 42 - Distúrbios hidroeletrolíticos e ácido-básicos.\n- Emergency Talks: Aula 59 - Emergências endocrinológicas.\n- Resumo do Emergency.docx.\n- Adendos para complementar.docx.\n\n**Atualização clínica**\n\n- ADA/EASD/JBDS/AACE/DTS. Hyperelycemic Crises in Adults With Diabetes: A Consensus Report, 2024. https://diabetesjournals.org/care/article/47/8/1257/156808/Hyperglycemic-Crises-in-Adults-With-Diabetes-A\n- UK Kidney Association. Clinical Practice Guideline: Treatment of Acute Hyperkalaemia in Adults, 2023. https://guidelines.ukkidney.org/hyperkalaemia/\n- European Society of Endocrinology/ERA-EDTA/ESICM. Clinical Practice Guideline on Diagnosis and Treatment of Hyponatraemia. https://academic.oup.com/ejendo/article/170/3/G1/6668025\n- KDIGO. Clinical Practice Guideline for Acute Kidney Injury. https://kdigo.org/guidelines/acute-kidney-injury/\n- AAST Critical Care Committee. Rhabdomyolysis: Clinical Consensus Document, 2022. https://tsaco.bmj.com/content/7/1/e000836\n- Society for Endocrinology. Emergency Guidance: Adrenal Crisis. https://www.endocrinology.org/clinical-practice/clinical-guidance/adrenal-crisis/\n- American Thyroid Association. Hyperthyroidism and Other Causes of Thyrotoxicosis Guidelines, 2016. https://www.liebertpub.com/doi/10.1089/thy.2016.0229\n- American Thyroid Association. Guidelines for the Treatment of Hypothyroidism, 2014. https://www.liebertpub.com/doi/10.1089/thy.2014.0028\n"},{"id":"temas/012_emergencias-respiratorias.md","title":"012 - Emergências Respiratórias","markdown":"# 012 - Emergências Respiratórias\n\n## Leitura de 30 segundos\n\n- Dispneia grave e sala vermelha até prova em contrário: aparência, fala, musculatura acessoria, consciência, choque, SpO2, ausculta, ECG, gaso e POCUS.\n- Oxigênio e droga: alvo 94-98% na maioria dos agudos; 88-92% se risco de retenção de CO2, como DPOC grave, obesidade-hipoventilação e neuromuscular.\n- DPOC com pH <7,35 + PaCO2 alta + desconforto, se acordado e protegendo via aérea: VNI/BiPAP cedo. Não afogue o paciente em O2 sem alvo.\n- Asma grave: SABA + ipratrópio + corticoide precoce + MgSO4 se refratária. Silêncio auscultatório, sonolência ou CO2 normal/subindo são falência iminente.\n- Pneumonia: gravidade decide local e tempo. CURB-65/PSI ajudam, mas choque, hipoxemia, confusão e necessidade de VM mandam mais. Hospitalar clássico: beta-lactâmico + macrolídeo.\n- TEP: estável = probabilidade clínica + D-dimero/angioTC; instável = suporte, heparina se possível, eco/POCUS e reperfusão se alto risco sem contra.\n- SDRA: trate causa e ventile protegendo pulmão: VC 4-8 mL/kg peso predito, Pplat <30, driving <=15, PEEP adequada e prona se P/F <150.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME22-25 cobrou POCUS pulmonar, escolha de dispositivo de O2, metas de saturação, gasometria arterial para hipoxemia, DPOC hipercápnico/VNI, pneumonia/choque, TEP pós-operatório, pneumotórax por POCUS, mecanismos de IRpA hipoxêmica, SDRA/prona, auto-PEEP, síndrome torácica aguda e asma grave com fadiga.\n- **O que a banca costuma testar:** primeira conduta, alvo de SpO2, diferença entre VNI e IOT, quando trombolisar TEP, como não errar DPOC, quando usar prona, e leitura de POCUS/curvas.\n- **Como costuma aparecer:** caso de dispneia com distratores cardíacos, infecciosos e obstrutivos. A resposta certa é a que estabiliza fisiologia e usa exame beira-leito para encurtar o caminho.\n\n## Abordagem prática\n\n### 1. Primeiro minuto da dispneia grave\n\n1. **Olhe antes de auscultar:** fala frases? postura tripode? uso de acessorios? sudorese? cianose? confusão? exaustão?\n2. **ABCDE:** via aérea, ventilação, circulação, consciência, temperatura e exposição.\n3. **Oxigênio com alvo:** não deixe hipóxico; depois ajuste para alvo, principalmente no retentor de CO2.\n4. **Monitor + ECG + acesso + gaso/lactato:** ECG pode revelar SCA, arritmia, TEP, hiperK; gaso separa hipoxemia de hipercapnia e acidose.\n5. **POCUS cedo:** pulmão, coração, VCI e veias de MMII quando muda conduta.\n6. **Decida suporte ventilatório:** O2 simples/CNAF, VNI ou IOT.\n\nSinais de falência iminente:\n\n- Rebaixamento, agitação que impedé tratamento, apneia, exaustão, fala impossivel.\n- Hipoxemia refratária, choque, arritmia instável.\n- PaCO2 subindo com acidemia e trabalho respiratório.\n- Secreção/vômito/aspiração ou incapacidade de proteger via aérea.\n\n### 2. Classifique a insuficiência respiratória\n\n| Eixo | Pistas | Causas que matam |\n|---|---|---|\n| Via aérea alta | Estridor, voz abafada, edema, engasgo | Anafilaxia, corpo estranho, angioedema, tumor/abscesso |\n| Via aérea baixa | Sibilos, expiração prolongada, tórax silencioso | Asma, DPOC, broncoespasmo por anafilaxia |\n| Parênquima | Febre, crepitantes, infiltrado, linhas B/consolidação | Pneumonia, SDRA, edema pulmonar, contusão |\n| Pleura | Dor pleuritica, assimetria, MV abolido, POCUS | Pneumotórax, Hemotórax, derrame volumoso/empiema |\n| Cardiovascular | Sincopa, hipotensão, VD/VE alterado, edema | TEP, IC aguda, valvopatia, tamponamento |\n| Neuromuscular | Fraqueza, disfagia, tosse fraca, hipercapnia | Guillain-Barre, miastenia, botulismo, lesão medular |\n| Sistêmica | Gaso/metabólico desproporcional | Sepse, CAD, IRA, intoxicação, anemia grave |\n\n> **Resposta de prova TEME:** IRpA hipoxêmica se diferencia melhor pelos mecanismos e pelo gradiente alvéolo-arterial; SDRA não é hipoventilação simples.\n\n### 3. Oxigênio, VNI e IOT\n\n**Alvos de SpO2:**\n\n- Maioria dos pacientes agudos: 94-98%.\n- Risco de hipercapnia: 88-92% até gasometria orientar.\n- Crítico instável/trauma/choque: O2 alto inicialmente, depois titule quando estabilizar e tiver gaso.\n\n**Dispositivos que a banca gosta:**\n\n- Cateter nasal: baixo fluxo, pouca FiO2, paciente leve.\n- Venturi: FiO2 controlada, útil no DPOC/retentor.\n- máscara não reinalante: hipoxemia grave/ponte para suporte avançado.\n- CNAF: hipoxemia com alto drive, paciente acordado; monitorar falha.\n- BVM: ventilação de resgate.\n\n**VNI funciona melhor em:**\n\n- DPOC exacerbado com acidose respiratória.\n- Edema agudo cardiogênico.\n- Aleuns imunossuprimidos/pós-extubação selecionados.\n\n**Evite ou pare VNI se:**\n\n- Rebaixamento, vômitos, aspiração, secreção importante, trauma de face, instabilidade grave, parada iminente, pneumotórax não drenado, incapacidade de cooperar ou piora em 1-2 h.\n\n**IOT se:**\n\n- Não protege via aérea, não oxigena, não ventila, exaustão, choque/rebaixamento, curso clínico de piora previsível.\n\n> **Resposta de prova TEME22:** DPOC com SpO2 86% em ar ambiente = máscara de Venturi com FiO2 controlada. Hipoventilacao por obesidade pode ter alvo 88-92%.\n\n### 4. Asma aguda grave\n\nTratamento inicial:\n\n1. O2 para alvo 94-98%.\n2. Salbutamol repetido ou contínuo conforme gravidade.\n3. Ipratrópio nas crises moderadas/graves na primeira hora.\n4. Corticoide sistêmico precoce.\n5. MgSO4 EV se grave/refratária.\n6. Considerar VNI apenas em paciente colaborativo e equipe experiente; não atrasar IOT se falência.\n\nSinais de alto risco:\n\n- História de IOT/UTI, uso excessivo de SABA, atraso de corticoide, má adesão, comorbidade psiquiátrica/social.\n- Fala palavras, exaustão, confusão, tórax silencioso, SpO2 baixa apesar de O2, PaCO2 normal/subindo.\n\nPós-IOT na asma:\n\n- Tubo calibroso quando possível.\n- Baixa FR, tempo expiratório longo, fluxo alto, VC 6 mL/kg, permissão de hipercapnia se pH tolerável.\n- Sedação profunda; ketamina e boa opção se broncoespasmo/choque.\n- Procurar auto-PEEP se hipotensão pós-IOT.\n\n> **Atualização clínica:** GINA 2025 reforca que SABA isolado não deve ser plano de alta. Depois de controlar a crise, revisar corticoide inalatorio/formoterol ou controlador com ICS, técnica inalatória e plano escrito.\n\n### 5. DPOC exacerbado\n\nPense em DPOC, mas procure o que imita/mata: pneumonia, TEP, pneumotórax, IC, arritmia, SCA e sedativos.\n\nConduta:\n\n1. O2 controlado com alvo 88-92% até gaso.\n2. Salbutamol + ipratrópio inalatorios.\n3. Corticoide sistêmico curto.\n4. Antibiótico se escarro purulento com piora de dispneia/volume, necessidade de ventilação, pneumonia ou alta suspeita bacteriana.\n5. Gasometria: pH <7,35 + PaCO2 alta + desconforto = VNI se não houver contra.\n6. Reavaliar em 30-60 min: pH, PaCO2, FR, consciência, sincronia e fadiga.\n\nVNI/BiPAP inicial de prova:\n\n- Comece com EPAP 4-5 cmH2O e IPAP 10-12 cmH2O, ajuste para reduzir trabalho e melhorar pH/PaCO2.\n- O2 acoplado para SpO2 88-92%.\n\nIOT em DPOC:\n\n- Rebaixamento, falha de VNI, choque, secreção/aspiração, acidose grave com deterioração.\n- Ventile como obstrutivo: FR baixa, tempo expiratório longo, evitar auto-PEEP.\n\n> **Resposta de prova TEME:** DPOC com pH 7,25, PaCO2 70, consciente e obedecendo comandos = iniciar VNI por BiPAP, não intubar automaticamente.\n>\n> **Atualização clínica GOLD 2026:** antibiótico deve ser mais dirigido: purulência, infecção bacteriana documentada ou necessidade de ventilação. Corticoide sistêmico curto, em geral 5 dias, e suficiente.\n\n### 6. Pneumonia e sepse respiratória\n\nDiagnóstico:\n\n- Sintomas respiratórios + sinal sistêmico + infiltrado novo quando possível.\n- Nenhum achado clínico isolado exclui pneumonia.\n- POCUS pode mostrar consolidação, broncograma aéreo, derrame/parapneumonico e linhas B focais.\n\nGravidade:\n\n- CURB-65: confusão, ureia >43 mg/dL, FR >=30, PAS <90 ou PAD <=60, idade >=65.\n- Critérios fortes de UTI: choque com vasopressor ou necessidade de VM.\n- Cuidado com hipoxemia, confusão, hipotensão, multilobar, plaqueta baixa, hipotermia, leucopenia, BUN alto.\n\nTratamento:\n\n1. O2, acesso, culturas se grave e não atrasarem, lactato se sepse, antibiótico precoce.\n2. internação comum: beta-lactâmico + macrolídeo ou fluoroquinolona respiratória conforme protocolo/local.\n3. CAP grave: beta-lactâmico + macrolídeo tende a ser a dupla mais cobrada.\n4. Cobrir MRSA/Pseudomonas se isolamento prévio ou internação recente com antibiótico EV, ou risco local forte.\n5. Aspiração: pneumonite química logo após macroaspiracao não pede antibiótico automático; pneumonia aspirativa infectada trata. Cobertura anaerobia rotineira não é necessaria salvo abscesso/empiema/periodontal grave.\n\n> **Resposta de prova TEME22:** paciente pós-trauma torácico com febre, choque, base opacificada e derrame/hipotransparência = infecção pulmonar com sepse/choque séptico; expansão volêmica e antibiótico imediato.\n>\n> **Na prática clínica:** corticoide na PAC grave mudou bastante. ATS/IDSA 2019 não recomendava rotina salvo choque refratário; estudos recentes apoiam hidrocortisona em PAC grave selecionada. Para prova, use corticoide quando houver indicação explicita: choque refratário, DPOC/asma associada, COVID ou protocolo local de PAC grave.\n\n### 7. Derrame pleural, empiema e pneumotórax\n\n**Derrame pleural:**\n\n- Punir se: derrame novo sem causa clara, febre/sepsis, suspeita de empiema, alívio sintomático, neoplasia/TB, unilateral importante.\n- Light: exsudato se proteina pleural/soro >0,5, LDH pleural/soro >0,6 ou LDH pleural >2/3 do limite superior serico.\n\n**Parapneumonico/empiema:**\n\n- Pus, Gram/cultura positiva, loculacao, pH baixo ou glicose baixa indicam drenagem.\n- Atualização BTS 2023: pH pleural <=7,2 = alto risco e deve drenar se houver colecao acessível.\n\n**Pneumotórax:**\n\n- Hipertensivo é diagnóstico clínico: choque/hipoxemia + assimetria/enfisema/desvio. Descomprimir antes de RX.\n- No POCUS: ausência de lung sliding + linhas A; lung point praticamente confirma.\n\n### 8. Tromboembolismo pulmonar\n\n**estável:**\n\n1. Probabilidade clínica: Wells/Geneva ou gestalt estruturada.\n2. Baixa probabilidade: PERC pode excluir sem exames se todos negativos.\n3. Baixa/intermediaria: D-dimero; considerar corte ajustado por idade/probabilidade.\n4. Alta probabilidade: angioTC, e anticoagulação enquanto aguarda se baixo risco de sangramento.\n5. Estratificar risco: PESI/sPESI, VD no eco/CT, troponina/BNP.\n\n**instável/alto risco:**\n\n- Hipotensão persistente, choque, PCR, necessidade de vasopressor por suspeita de TEP.\n- Suporte: O2, norepinefrina se choque, bolus pequeno de cristaloide se necessário, evitar excesso de volume no VD.\n- Heparina não fracionada se reperfusão/procedimento provável e sem contra.\n- Eco/POCUS pode sustentar decisão se paciente não vai ao TC: VD dilatado/disfuncional, trombo em transito, TVP em compressão.\n- reperfusão: trombólise sistêmica se alto risco e sem contra; alternativa catheter/surgical se contra/falha e recurso disponível.\n\n> **Resposta de prova TEME22:** pós-operatório com dor torácica, dispneia, hipotensão e suspeita de TEP não é \"alteplase automática\" se há alto risco de sangramento e ainda sem confirmação; a banca aceitou suporte inicial com pequeno bolus de Ringer 500 mL.\n>\n> **Na PCR por TEP:** considerar trombólise durante RCP quando suspeita forte, especialmente com VD dilatado no eco. O material local usa alteplase 50 mg em bolus e reanimação prolongada.\n\n### 9. SDRA\n\nDefinição prática:\n\n- início em até 1 semana de insulto.\n- Opacidades bilaterais não explicadas completamente por IC/hipervolemia.\n- PEEP/CPAP >=5 cmH2O.\n- P/F: leve 200-300, moderada 100-200, grave <=100.\n\nConduta:\n\n1. Tratar causa: pneumonia, sepse, pancreatite, trauma, aspiração, transfusão, COVID etc.\n2. VM protetora: VC 4-8 mL/kg peso predito, usual 6; Pplat <30; driving pressure <=15 se possível.\n3. PEEP adequada e FiO2 pela tabela, evitando hiperoxia prolongada.\n4. Se P/F <150 apesar de ajuste: prona precoce por sessões longas.\n5. Considerar bloqueio neuromuscular em SDRA grave com assincronia/hipoxemia; ECMO em centro experto para refratários.\n6. Estratégia de fluidos mais conservadora após choque resolvido.\n\n> **Resposta de prova TEME:** paciente intubado, FiO2 100%, PaO2 81, P/F 81 = SDRA grave; conduta de prova é posição prona, não oxido nitrico/ECMO antes do básico.\n\n### 10. POCUS pulmonar na dispneia\n\n| Achado | Significado prático | Armadilha |\n|---|---|---|\n| Linhas A + sliding | pulmão aerado | Asma/DPOC possível; não exclui TEP |\n| Linhas A sem sliding | Pneumotórax possível | Confirme com lung point se possível |\n| Lung point | Pneumotórax | Altissima especificidade |\n| Linhas B difusas bilaterais | Síndrome intersticial/congestão | Pneumonia/SDRA também podem dar B, olhe distribuição |\n| Linhas B focais | Lesão focal | Pneumonia, contusão, atelectasia |\n| Consolidação + broncograma | Pneumonia/atelectasia | Broncograma dinâmico favorece pneumonia |\n| Derrame anecoico | Líquido pleural | Use US para punir com segurança |\n| VD dilatado | TEP/cor pulmonale/hipertensão pulmonar | Não diagnostica TEP isoladamente |\n\n> **Resposta de prova TEME22:** POCUS pulmonar avalia pleura e artefatos ar-tecido. Perfil A' com lung point = pneumotórax, não TEP.\n\n### 11. Hemoptise em 6 linhas\n\n- Primeiro: diferenciar hemoptise de hematemese/epistaxe.\n- Ameaçadora = risco de asfixia, não apenas volume. Instabilidade, hipoxemia, sangramento ativo ou grande volume vao para sala vermelha.\n- Lado sangrante para baixo, O2, acesso, tipagem, corrigir coagulopatia, chamar broncoscopia/intervenção.\n- TC/angioTC costuma localizar causa se estável.\n- Causas comuns: bronquite/bronquiectasia, TB, câncer, pneumonia, TEP, anticoagulação.\n- Hemoptise pequena com RX normal pode seguir investigação ambulatorial/TC conforme risco, mas não se alto risco oncológico/TB/recorrente.\n\n## Conceitos que sustentam a conduta\n\n### O2 demais também faz mal\n\nHipoxemia mata rápido; hiperoxia e hipercapnia iatrogênica também machucam. A resposta elegante é dar O2 alto quando necessário e titular assim que possível para alvo. Na TEME, DPOC/obesidade-hipoventilação = 88-92%.\n\n### VNI e teste terapêutico com relógio\n\nVNI que melhora pH, FR, sincronia e consciência salva intubação. VNI que não melhora em 1-2 h só atrasa IOT e aumenta aspiração/parada. O candidato precisa escrever reavaliação, não apenas \"colocar BiPAP\".\n\n### Dispneia sem alteração pulmonar pode ser TEP\n\npulmão limpo, dor torácica/síncope/hipotensão, VD grande, TVP ou pós-operatório recente devem puxar TEP para cima. D-dimero em paciente de alta probabilidade ou instável só atrasa.\n\n### SDRA é uma estratégia, não uma P/F isolada\n\nP/F classifica; conduta e pacote: causa, VC baixo, pressão baixa, PEEP, prona, sincronia, fluido, infecção e evitar lesão induzida pelo ventilador.\n\n## Fluxograma\n\n```mermaid\nflowchart TD\n    A[Dispneia grave] --> B[ABCDE + O2 com alvo + monitor + ECG + acesso]\n    B --> C{Falência de via aérea/ventilação ou choque?}\n    C -->|Sim| D[BVM/IOT ou VNI se DPOC/EAP e critérios favoraveis]\n    C -->|Não| E[Gaso + RX/POCUS + labs dirigidos]\n    E --> F{POCUS/clínica sugere?}\n    F -->|A com sibilos| G[Asma/DPOC: broncodilatador, corticoide, VNI se hipercapnia]\n    F -->|B difuso| H[EAP/SDRA: PEEP, causa, diurético se cardiogênico]\n    F -->|Consolidação/derrame| I[Pneumonia/pleural: antibiótico, drenagem se empiema]\n    F -->|A' ou lung point| J[Pneumotórax: descompressão/dreno se instável]\n    F -->|VD grande/TVP| K[TEP: anticoagular, reperfusão se alto risco]\n```\n\n```mermaid\nflowchart TD\n    A[DPOC exacerbado] --> B[O2 alvo 88-92 + SABA/SAMA + corticoide]\n    B --> C[Gaso arterial/venosa]\n    C --> D{pH <7,35 e PaCO2 alta com desconforto?}\n    D -->|Sim, cooperativo| E[VNI BiPAP + reavaliar 30-60 min]\n    E --> F{Melhora pH/FR/consciência?}\n    F -->|Sim| G[Manter VNI, tratar gatilho, desmame gradual]\n    F -->|Não| H[IOT e VM obstrutiva]\n    D -->|Não| I[Tratamento clínico e observação]\n```\n\n```mermaid\nflowchart TD\n    A[Suspeita de TEP] --> B{instável/choque/PCR?}\n    B -->|Sim| C[O2, noradrenalina, UFH se possível, POCUS/eco/TVP]\n    C --> D{Alta probabilidade e sem contra maior?}\n    D -->|Sim| E[Trombólise/reperfusão]\n    D -->|Não| F[Suporte + angioTC se estabilizar + equipe especializada]\n    B -->|Não| G[Wells/Geneva/PERC]\n    G --> H{Baixa e PERC negativo?}\n    H -->|Sim| I[Excluir sem exame]\n    H -->|Não| J[D-dimero se baixa/intermediaria; angioTC se alto ou positivo]\n```\n\n```mermaid\nflowchart TD\n    A[SDRA suspeita] --> B[P/F <=300 + opacidades bilaterais + PEEP >=5]\n    B --> C[Tratar causa + VM protetora]\n    C --> D[VC 4-8 mL/kg PBW; Pplat <30; DP <=15]\n    D --> E{P/F <150?}\n    E -->|Sim| F[Prona precoce 16h ou mais + PEEP adequada]\n    E -->|Não| G[Manter pacote e reavaliar]\n    F --> H{Hipoxemia refratária?}\n    H -->|Sim| I[NMBA/ECMO conforme recurso e perfil]\n    H -->|Não| G\n```\n\n## Doses, alvos e números\n\n| Item | Número | observação TEME |\n|---|---:|---|\n| SpO2 alvo maioria aguda | 94-98% | Titular O2, evitar hiperoxia prolongada |\n| SpO2 alvo risco hipercapnia | 88-92% | DPOC grave, obesidade-hipoventilação, neuromuscular |\n| PaO2 hipoxemia | <60 mmHg | IR hipoxêmica clássica |\n| PaCO2 hipercapnia | >45 mmHg | Interpretar com pH e HCO3 |\n| VNI DPOC | pH <7,35 + PaCO2 >45 + desconforto | Se consciente/cooperativo |\n| BiPAP inicial | IPAP 10-12 / EPAP 4-5 cmH2O | Ajustar por trabalho, VT, escape e gaso |\n| Salbutamol asma/DPOC | 4-10 jatos q20min x3 ou 2,5-5 mg neb | Pode ser contínuo em grave |\n| Ipratrópio | 0,5 mg neb q20min x3 | Primeira hora em crise grave |\n| Prednisona/prednisolona asma/DPOC | 40-50 mg VO/dia | DPOC geralmente 5 dias |\n| MgSO4 asma grave adulto | 2 g EV em 20 min | Refratária/grave |\n| Saturação alta no DPOC | Evitar >92% se retentor | Fazer gaso e titular |\n| CURB-65 | C, U>43, R>=30, BP baixa, idade >=65 | Ajuda internação, não substitui julgamento |\n| PAC grave ATS/IDSA maior | VM invasiva ou choque com vasopressor | Um critério maior = grave |\n| PAC grave menor | RR>=30, P/F<=250, multilobar, confusão, BUN>=20, leucopenia, plaqueta<100k, T<36, hipotensão com fluidos | 3 menores sugerem grave |\n| Derrame parapneumonico | pH <=7,2 | Drenar se colecao acessível |\n| Light exsudato | Prot P/S >0,5; LDH P/S >0,6; LDH P >2/3 LSN | Qualquer um = exsudato |\n| TEP alto risco | Choque/hipotensão/PCR | reperfusão se sem contra |\n| Alteplase TEP | 100 mg em 2 h | PCR: material local usa 50 mg bolus, repetir se RCE |\n| Anticoagulação TEP instável | Heparina não fracionada | Fácil suspender se procedimento/trombólise |\n| Bolus no TEP com VD ruim | 250-500 mL se necessário | Evitar excesso de volume |\n| P/F SDRA leve | 200-300 | Com PEEP/CPAP >=5 |\n| P/F SDRA moderada | 100-200 | Considerar UTI/prona se piora |\n| P/F SDRA grave | <=100 | Alto risco |\n| VC SDRA | 4-8 mL/kg PBW, usual 6 | Peso predito, não peso real |\n| Pplat SDRA | <30 cmH2O | Básico de prova |\n| Driving pressure | <=15 cmH2O | Meta fisiológica útil |\n| Prona | P/F <150 | Sessao prolongada, idealmente >=16 h |\n| Auto-PEEP obstrutivo | Fluxo expiratório não zera | Reduzir FR, aumentar tempo expiratório |\n| POCUS linhas B | >=3 por espaco | Síndrome intersticial |\n| Lung point | - | Confirma pneumotórax com alta especificidade |\n\n## Pegadinhas TEME\n\n- **DPOC hipóxico precisa MNR até 100%:** falso. Oxigênio controlado, alvo 88-92%, e gaso.\n- **PaO2/FiO2 pode ser calculada com qualquer O2 sem saber FiO2:** cuidado. Para prova, gaso arterial em ar ambiente define gravidade de hipoxemia.\n- **VNI serve para todo rebaixado:** falso. Rebaixamento/aspiração/choque grave pedem IOT.\n- **Asma mais calma sempre melhorou:** falso. Pode ser fadiga e falência.\n- **Silêncio auscultatório na asma e bom sinal:** falso.\n- **DPOC com pH 7,25 acordado deve ser intubado imediatamente:** falso em geral; VNI se sem contra.\n- **Pneumonia aspirativa sempre precisa anaerobicida:** falso. Anaerobio só em abscesso, empiema, necrose ou forte risco periodontal.\n- **Pneumonite aspirativa química precisa antibiótico imediato:** falso se sem infecção.\n- **D-dimero positivo diagnostica TEP:** falso. É exame de exclusão em baixa/intermediária probabilidade.\n- **TEP instável sempre vai primeiro para angioTC:** falso se não tolera transporte; use eco/POCUS e trate choque.\n- **VD dilatado no eco diagnostica TEP sozinho:** falso. Ajuda no contexto.\n- **SDRA grave vai direto para ECMO:** falso. Primeiro pacote: VC baixo, Pplat, PEEP, prona.\n- **Linhas B sempre são edema cardiogênico:** falso. Pneumonia, SDRA, fibrose e contusão podem dar B.\n\n## Erros fatais na prática\n\n- Não reconhecer exaustão respiratória porque a SpO2 ainda parece aceitável.\n- Sedar demais DPOC/neuromuscular e perder drive sem plano de ventilação.\n- Atrasar IOT em asma silenciosa, confusa e hipóxica.\n- Intubar asma/DPOC e usar FR alta, gerando auto-PEEP, hipotensão e PCR.\n- Tentar VNI em vômitos/rebaixamento/aspiração.\n- Deixar paciente com TEP alto risco em excesso de volume, piorando VD.\n- Esperar RX para descomprimir pneumotórax hipertensivo.\n- Tratar SDRA com volume corrente por peso real em obeso.\n- Esquecer antibiótico precoce e controle de sepse em pneumonia grave.\n- Fazer toracocentese sem US quando ele está disponível.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** Venturi no DPOC; alvo 88-92% em hipoventilação/retentor; gaso arterial em ar ambiente para gravidade da hipoxemia; DPOC hipercápnico acordado = VNI; PAC hospitalar = beta-lactâmico + macrolídeo; P/F <150 = prona; POCUS pulmonar = pleura + artefatos ar-tecido.\n>\n> **Na prática clínica:** O2 alto e correto no paciente criticamente hipóxico enquanto você estabiliza; depois titule. TEP alto risco exige decisão por risco de sangramento e recurso local. Corticoide em PAC grave selecionada está mais aceito em diretrizes e estudos recentes, mas não é automático para toda pneumonia.\n\n## Checklist de revisão\n\n- [ ] Sei reconhecer falência respiratória iminente pela aparência, não só pela SpO2.\n- [ ] Sei os alvos de O2 94-98% e 88-92%.\n- [ ] Sei escolher Venturi no DPOC e MNR como ponte para hipoxemia grave.\n- [ ] Sei indicar VNI no DPOC hipercápnico e parar se falhar.\n- [ ] Sei tratar asma grave e ventilar obstrutivo sem auto-PEEP.\n- [ ] Sei usar CURB-65/critérios de gravidade sem atrasar antibiótico.\n- [ ] Sei quando cobrir MRSA/Pseudomonas e quando não cobrir anaerobio.\n- [ ] Sei pH pleural <=7,2 como indicação de drenagem em parapneumonico.\n- [ ] Sei algoritmo de TEP estável vs instável.\n- [ ] Sei pacote inicial de SDRA é indicação de prona.\n- [ ] Sei perfis POCUS: A, A', B, B', C, PLAPS e lung point.\n\n## Questões e estações relacionadas\n\n- **TEME22 Q9:** POCUS pulmonar avalia pleura e artefatos ar-tecido.\n- **TEME22 Q28:** melhor dispositivo: DPOC com SatO2 86% = Venturi FiO2 controlada.\n- **TEME22 Q29:** POCUS com perfil A' e lung point = pneumotórax.\n- **TEME22 Q34:** alvo 88-92% em hipoventilação por obesidade/risco hipercápnico.\n- **TEME22 Q36:** melhor exame para definir gravidade da hipoxemia = gasometria arterial em ar ambiente.\n- **TEME22 Q38:** suspeita de TEP pós-operatório instável; suporte inicial com pequeno bolus, não trombólise automática.\n- **TEME22 Q43:** infecção pulmonar com sepse/choque = expansão volêmica e antibiótico imediato.\n- **TEME22 Q46:** deterioração súbita no ventilador em SDRA/COVID: abordagem sistemática e ventilações de resgate quando necessário.\n- **TEME22 Q48:** mecanismos de IRpA hipoxêmica e gradiente alvéolo-arterial.\n- **TEME22 Q78-79:** DPOC/pneumonia com acidose e VNI/BiPAP.\n- **TEME22 Q89:** SDRA grave com P/F muito baixo = posição prona.\n- **TEME24 Q34:** meta de saturação em risco de depressão/hipoventilação.\n- **TEME24 Q38:** asma grave pediátrica, corticoide EV se não deglute e MgSO4 quando indicado.\n- **TEME25 Q64:** curva fluxo-tempo com auto-PEEP; reduzir FR/aumentar tempo expiratório.\n- **TEME25 Q72:** síndrome torácica aguda na falciforme: O2, ceftriaxona + azitromicina e considerar transfusão se queda de Hb.\n- **TEME25 Q91:** asma com \"melhora\" da agitação + hipoxemia/esforço persistente = fadiga/falência iminente.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26.\n- Provas teóricas TEME22, TEME23, TEME24 e TEME25.\n- Referências oficiais do edital: Tratado ABRAMEDE 2024, Medicina de Emergência HCFMUSP, POCUS ABRAMEDE e Manual de Via aérea 2025.\n\n**Material local**\n\n- Emergency Talks: Aula 09 - POCUS pulmonar.\n- Emergency Talks: Aula 20 - Pneumonia e doença pleural.\n- Emergency Talks: Aula 28 - Insuficiência respiratória aguda.\n- Emergency Talks: Aula 31 - Obstrução das vias aéreas inferiores.\n- Emergency Talks: Aulas 25 e 26 - Ventilação Mecânica I e II.\n- Resumo do Emergency.docx.\n- Adendos para complementar.docx.\n\n**Atualização clínica**\n\n- British Thoracic Society. Guideline for oxygen use in adults in healthcare and emergency settings. https://bmjopenrespres.bmj.com/content/4/1/e000170\n- Global Initiative for Asthma. 2025 GINA Strategy Report. https://ginasthma.org/2025-gina-strategy-report/\n- Global Initiative for Chronic Obstructive Lung Disease. GOLD Report 2026. https://goldcopd.org/wp-content/uploads/2026/01/GOLD-REPORT-2026-v1.3-8Dec2025_WMV2.pdf\n- ATS/IDSA. Diagnosis and Treatment of Adults with Community-acquired Pneumonia, 2019. https://www.atsjournals.org/doi/10.1164/rccm.201908-1581ST\n- IDSA. CAP Clinical Pathway. https://www.idsociety.org/globalassets/idsa/practice-guidelines/community-acquired-pneumonia-in-adults/cap-clinical-pathway-final-online.pdf\n- ESC/ERS. 2019 Guidelines for diagnosis and management of acute pulmonary embolism. https://academic.oup.com/eurheartj/article/41/4/543/5556136\n- CHEST. Antithrombotic Therapy for VTE Disease, 2021 update. https://journal.chestnet.org/article/S0012-3692(21)01506-3/fulltext\n- American Thoracic Society. Update on Management of Adult Patients with ARDS, 2024. https://www.atsjournals.org/doi/10.1164/rccm.202311-2011ST\n- British Thoracic Society. Guideline for pleural disease, 2023. https://thorax.bmj.com/content/78/Suppl_3/s1\n"},{"id":"temas/013_aph-regulacao-imv-desastres-transporte.md","title":"013 - APH, Regulação, IMV, Desastrês E Transporte","markdown":"# 013 - APH, Regulação, IMV, Desastrês E Transporte\n\n## Leitura de 30 segundos\n\n- APH comeca antes do ABCDE: segurança da cena, EPI, posicionamento da viatura, avaliação de riscos, número de vítimas e pedido precoce de recursos.\n- No SAMU, o médico regulador não é telefonista: ele classifica gravidade, orienta, decide recurso, acompanha atendimento/transporte e define destino dentro da rede.\n- IMV é medicina de massa: se os recursos são insuficientes, a meta muda de \"melhor para cada um\" para \"maior benefício para o maior número\".\n- START de adulto: anda = verde; não respira após abrir via aérea = preto; respira após abrir = vermelho; FR >30, perfusão ruim ou não obedece comandos = vermelho; o restante = amarelo.\n- Transporte e intervenção de risco: estabilize o que mata agora, escolha o recurso correto, comunique destino e registre mudanças. Grave/riscos exige equipe e ambulância compatíveis.\n- Temas ambientais que caem: afogamento = ventilação/rescue breaths; intermação = resfriar cedo; altitude = parar subida/descer; mergulho = O2 100%; hipotermia = manuseio gentil e aquecimento de tronco.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME22-25 cobrou cena de rodovia, cinemática, explosão, transporte aeromédico, mergulho/descompressão, altitude, afogamento, atendimento tático, intermação, papel do médico regulador e logística em contexto remoto/rural.\n- **O que a banca costuma testar:** prioridade da primeira equipe, diferença entre APH é tratamento definitivo, START/SCI, \"vaga zero\", responsabilidades do regulador/transporte/receptor, zonas taticas, blast injury e condutas ambientais simples.\n- **Como costuma aparecer:** caso cheio de distratores. A resposta certa geralmente protege equipe, organiza recurso, comúnica a rede e não faz procedimento heroico em cena insegura ou com acesso limitado.\n\n## Abordagem prática\n\n### 1. Primeiro minuto do APH\n\n1. **Pare antes de entrar:** cena segura? EPI? tráfego? violência? eletricidade? fogo? produto químico? água? estrutura instável?\n2. **Posicione a viatura como proteção:** em acidente rodoviário, use a ambulância para proteger a área e sinalizar fluxo; outros veículos ficam no mesmo lado e fora do fluxo de tráfego.\n3. **Dimensione a cena:** mecanismo, número de vítimas, gravidade aparente, necessidade de bombeiros, polícia, concessionária, HazMat, suporte avançado, transporte múltiplo ou aeromédico.\n4. **Declare e comunique:** informe regulação cedo. Em incidente grande, uma mensagem estruturada evita caos.\n5. **Trate ameaças imediatas:** hemorragia massiva, via aérea, ventilação, choque, rebaixamento, hipotermia e dor.\n6. **Defina destino e modo de transporte:** levar para o lugar certo vale mais do que ficar fazendo procedimento que não muda segurança do transporte.\n\nUse uma mensagem tipo METHANE:\n\n| Letra | Conteúdo | Exemplo prático |\n|---|---|---|\n| M | Major incident? | \"Possível IMV\" |\n| E | Exact location | Rodovia, km, sentido, acesso |\n| T | Type of incident | Capotamento, explosão, colisao multipla |\n| H | Hazards | Fogo, produto químico, violência, eletricidade |\n| A | Access/egress | Melhor entrada e saída |\n| N | Number/severity | Número estimado e cores/críticos |\n| E | Emergency services | Recursos já na cena e solicitados |\n\nCrítico para transporte rápido:\n\n- Via aérea ameacada ou ventilação inadequada.\n- FR <10 ou >29, dispneia importante, tórax instável/deformidade grave.\n- Sangramento ativo que exige torniquete, compressão ou tamponamento.\n- Choque, mesmo compensado.\n- Alteração de consciência, convulsão, déficit neurológico novo ou suspeita de TRM.\n- Trauma penetrante exceto extremidade distal isolada.\n- Amputação ou quase amputação proximal a punho/tornozelo.\n- Extricacao prolongada, ejeccao, morte no mesmo compartimento ou intrusao importante.\n\n> **Resposta de prova TEME:** a primeira equipe em cena não \"sai tratando todo mundo\". Ela protege a cena, dimensiona, pede recurso, organiza e só então executa intervenções que mudam sobrevida/transporte.\n\n### 2. Médico regulador, CRU e SAMU 192\n\nO fluxo mental:\n\n1. TARM identifica solicitante, local, callback e dados basicos.\n2. Todo pedido de socorro de urgência deve chegar ao médico regulador.\n3. O regulador interroga, estima gravidade, da orientação, classifica prioridade e decide recurso.\n4. Pode resolver por orientação, enviar USB, USA, motolancia, aeromédico/hidroviario ou articular outro recurso.\n5. Acompanha a equipe, reavalia com dados da cena, define destino e avisa/repassa informações ao receptor.\n6. Registra decisões, horários, orientações e intercorrências.\n\nO que cai:\n\n- O regulador tem função técnica e gestora.\n- A central regula acesso ao APH e aos serviços hospitalares de urgência.\n- experiência como intervencionista/urgência ajuda a estimar gravidade e coordenar recursos. Isso apareceu como armadilha no TEME25.\n- Transporte e transferência não são responsabilidade \"exclusiva\" de uma ponta. Origem, regulador, equipe de transporte e receptor tem deveres proprios.\n\n**Vaga zero, em uma linha:** em urgência com risco iminente e necessidade de recurso especializado, a unidade receptora deve acatar a determinação do médico regulador, independentemente de leito vago, com comunicação, registro e continuidade do cuidado.\n\n> **Na prática clínica:** \"vaga zero\" não é autorização para jogar paciente sem estabilização, sem informação ou sem plano. É ferramenta regulatória excepcional para garantir acesso quando não aceitar o paciente seria mais perigoso.\n\n### 3. Transporte terrestre e aeromédico\n\nAntes de sair:\n\n- Via aérea segura ou plano claro de resgate.\n- Ventilação/oxigênio com reserva suficiente.\n- Sangramento controlado, acesso venoso/IO funcional, drogas e bombas conferidas.\n- Monitor, desfibrilador, aspiração, material de via aérea e analgesia disponíveis.\n- Relatório MIST/SBAR para destino: mecanismo, lesões/queixa, sinais vitais, tratamentos, resposta.\n- Documentos, exames e consentimentos quando aplicável.\n\nInter-hospitalar de paciente grave:\n\n- Avaliação médica antes da remoção.\n- Estabilização respiratória e hemodinâmica antes do transporte sempre que possível.\n- Paciente grave ou de risco deve ir com equipe compatível, em geral suporte avançado com médico, enfermagem e condutor.\n- Se o transporte for tecnicamente impossivel conforme a regra ideal, compare risco de transportar versus risco de permanecer sem recurso.\n\nAeromédico que a banca gosta:\n\n| Tema | Ponto de prova |\n|---|---|\n| Primário | Equipe/aeronave vai até a cena |\n| Secundário | Transferência inter-hospitalar |\n| Asa rotativa | Acesso remoto/urbano, resgate, pouso próximo; pouca cabine, ruido, vibracao |\n| Asa fixa | Distância maior, mais velocidade, cabine melhor; exige pista e transbordos |\n| Altitude | Pressão cai e gases expandem na subida |\n| Pneumotórax | Tratar/drenar antes do voo se risco relevante; estar pronto para descompressão |\n| Cabine pressurizada | Geralmente equivale a 5.000-8.000 ft, não necessariamente nível do mar |\n| Não pressurizada | Classicamente até 10.000 ft para compensação fisiológica em muitos protocolos |\n\nSegurança com helicóptero:\n\n- Zona de pouso isolada, sem pessoas/veículos próximos.\n- Aproximar apenas com autorização da tripulacao.\n- Aproximar pela frente/lateral, abaixado, com objetos abaixo dos ombros.\n- Nunca aproximar pela cauda.\n- Em terreno inclinado, aproximar pelo lado mais baixo.\n\n### 4. IMV, SCI e desastres\n\nIMV e quando a demanda ultrapassa a resposta disponível. O primeiro erro e transferir o caos para o hospital mais próximo.\n\nPrimeira equipe:\n\n1. Estabelecer comando.\n2. Confirmar segurança e zonas.\n3. Dimensionar número de vítimas e recursos.\n4. Comunicar regulação/defesa civil/bombeiros/hospitais.\n5. Criar área de concentracao de vítimas (ACV), triagem, tratamento e transporte.\n6. Distribuir pacientes por capacidade da rede, não por impulso.\n\nSistema de Comando de Incidentes (SCI/ICS):\n\n- Estrutura modular: comando, operações, planejamento, logística e administracao/financas.\n- Pode ser comando único ou unificado.\n- Span of control clássico: 1-7 subordinados por lider; 5 é o número ideal.\n- Objetivo: usar recursos disponíveis de forma eficiente, com linguagem comum e cadeia clara.\n\nRegra de ouro:\n\n| Cenário | Prioridade |\n|---|---|\n| Recursos suficientes | Mais graves primeiro |\n| Recursos insuficientes | Sobrevida do maior número |\n| Hospital em sobrecarga | Triagem reversa, alta segura, expansão de área e fluxo |\n\n### 5. START adulto\n\nSTART e triagem rápida, não tratamento completo. Em geral, 60-90 segundos por vítima.\n\n1. **Consegue andar?** Verde.\n2. **Não anda e não respira:** abrir via aérea.\n3. **Não respira após abrir via aérea:** Preto.\n4. **Respira após abrir via aérea:** Vermelho.\n5. **FR >30/min:** Vermelho.\n6. **Perfusão ruim:** sem pulso radial ou TEC >2 s = Vermelho.\n7. **Não obedece comando simples:** Vermelho.\n8. **Obedece, perfusão ok, FR <=30:** Amarelo.\n\nCategorias:\n\n| Cor | Nome | Significado |\n|---|---|---|\n| Verde | Mínimo | Deambula, baixo risco imediato |\n| Amarelo | Tardio | Grave, mas pode esperar horas |\n| Vermelho | Imediato | Intervenção/transporte em minutos |\n| Preto | Obito/expectante | Sem chance com recurso disponível ou sem respiração após abertura |\n\nLimites:\n\n- START não é ideal para crianças pequenas: use JumpSTART se disponível.\n- CBRN/HazMat pode exigir triagem/descontaminação específica.\n- Triagem muda com tempo e recursos. Re-triagem é obrigatória.\n\n### 6. Atendimento tático\n\n| Zona | Prioridade | O que fazer |\n|---|---|---|\n| Ameaça direta / hot zone | Sobreviver e sair da linha de ameaça | Cobertura, autoajuda, torniquete em hemorragia exsanguinante, extrair para local mais seguro |\n| Ameaça indireta / warm zone | MARCH | Hemorragia massiva, via aérea, respiração, circulação, hipotermia/head |\n| Evacuação / cold zone | APH convencional | ABCDE, analgesia, imobilização seletiva, transporte e comunicação |\n\nNa hot zone, não perca tempo com via aérea invasiva, RCP completa ou restrição espinhal formal. Se ainda há tiro/risco ativo, o tratamento e mover e controlar hemorragia que mata em minutos.\n\n### 7. HazMat, CBRN e descontaminação\n\nSequência:\n\n1. Não entrar sem EPI adequado.\n2. Isolar área e definir zonas quente, morna e fria.\n3. Identificar produto quando possível sem se expor.\n4. Retirar vítimas da zona quente.\n5. Remover roupas contaminadas e descontaminar antes de colocar na ambulância/hospital, se a contaminação permitir.\n6. Só depois fazer atendimento clínico convencional, antídotos e transporte.\n\nPegada de prova: vítima contaminada não deve contaminar equipe, ambulância, sala vermelha e outros pacientes. Cena insegura é indicação de recuar, não de \"coragem\".\n\n### 8. Explosão, esmagamento e queimaduras em cena\n\nExplosão:\n\n| Tipo | Mecanismo | Exemplo que cai |\n|---|---|---|\n| Primária | Onda de pressão | Ruptura timpânica, barotrauma pulmonar, concussao |\n| secundária | Fragmentos/projeteis | Ferimentos penetrantes, lacerações |\n| Terciária | Corpo arremessado/esmagado | Fraturas, trauma contuso |\n| Quaternaria | Calor/gases/ambiente | Queimaduras, inalação, intoxicação |\n| Quinaria | Agentes adicionados | Químico, biológico, radiológico |\n\nEsmagamento/rabdomiólise em APH:\n\n- Controle hemorragia e dor.\n- Pense em hiperK antes/depois de extricacao prolongada.\n- Acesso, ECG, cristaloide se indicado e coordenacao com destino.\n- Não libere vítima de esmagamento prolongado sem plano de sala vermelha/nefro/UTI se risco alto.\n\nQueimadura/elétrica/quimica:\n\n- Cena primeiro: eletricidade e produto químico matam equipe.\n- Resfriar queimadura térmica recente, remover roupas/acessorios não aderidos, analgesia, cobrir limpo/seco.\n- Alta voltagem, inalação, trauma associado, face/mãos/genital, grandes áreas ou criança = regular para centro adequado.\n- Em queimadura química: descontaminar conforme agente e protocolo local; não neutralizar as cegas.\n\n### 9. Ambiental e áreas remotas\n\n**Afogamento**\n\n- Problema central é hipóxia. Comece por via aérea/ventilação.\n- Inconsciente/apneico: posicionar via aérea e fazer 5 ventilações/rescue breaths quando aplicável.\n- Não tente \"drenar água\" com manobra de Heimlich ou cabeça para baixo.\n- O2, VNI se alerta e hipoxemia leve-moderada; IOT se rebaixado, vômitos, hipoxemia grave ou falência.\n- Rx inicial pode ser normal. Se assintomático, normaliza e não piora, observação de 4-6 h costuma ser aceitável em diretriz atual; aula local usa até 8 h.\n\n**Intermação/heat stroke**\n\n- Suspeite se hipertermia + alteração neurológica, especialmente após esforço/calor.\n- Antitermico não resolve.\n- ABCDE e resfriamento agressivo. Se houver estrutura para resfriar, \"cool first, transport second\" é a mensagem de prova.\n- Imersão em água fria é o método mais rápido quando viável; evaporativo/gelo em axila-virilha-pescoço se não.\n- Alvo prático: interromper resfriamento quando temperatura central chegar perto de 38,6-39 C ou houver melhora/protocolo local.\n\n**Altitude**\n\n- Risco em não aclimatados acima de 2.500 m.\n- AMS: cefaleia + fadiga, náuseas/vômitos, tontura, sono ruim após subida.\n- Conduta: parar ascensão, repouso, analgesia/antiemético; descer se moderado/grave ou se piora. TEME cobrou descida de pelo menos 300 m.\n- HACE: ataxia + alteração mental = descer/O2/dexametasona.\n- HAPE: dispneia, queda de performance, tosse, hipoxemia/crepitantes = descer/O2/nifedipina se indicado.\n\n**Mergulho**\n\n- Pressão aumenta cerca de 1 atm a cada 10 m, somada a 1 atm da superfície. A 40 m, pressão absoluta é cerca de 5 ATA.\n- Narcose por nitrogênio: parece embriaguez, clássica a partir de 30 m.\n- Doença descompressiva: dor articular, rash/prurido, sintomas neurológicos ou vestibulares após mergulho/subida.\n- Primeira conduta: O2 100% por máscara bem vedada/demand valve ou não reinalante 15 L/min, repouso, hidratação se alerta, contato com medicina hiperbárica/DAN e transporte.\n\n**Hipotermia**\n\n- Hipotermia acidental: temperatura central <=35 C ou quadro compatível quando não dá para medir bem.\n- Manuseio gentil, retirar do frio, remover roupa molhada, barreira de vapor/isolamento e aquecer tronco.\n- Moderada/grave: monitorização, evitar movimento brusco e aquecimento periférico isolado que favorece afterdrop.\n- Se aparentemente sem pulso, checar pulso por até 1 minuto antes de iniciar RCP.\n- Gasometria: não corrija valores pela temperatura para tomar decisões usuais de ventilação.\n\n## Conceitos que sustentam a conduta\n\n### Cena segura é tratamento\n\nEquipe ferida vira mais vítima e reduz capacidade do sistema. Em APH, \"entrar rápido\" só e bom quando entrar e seguro. O primeiro procedimento pode ser estacionar bem, pedir recurso e isolar risco.\n\n### Regulação e ato médico\n\nRegulação de urgência envolve telemedicina, julgamento de gravidade e gestão de recursos escassos. A decisão não é só qual ambulância mandar; é orientar o solicitante, proteger a equipe, acompanhar a cena, escolher destino e garantir fluxo.\n\n### Medicina individual vs medicina de massa\n\nNo plantão normal, a prioridade é o paciente mais grave. No IMV com recurso insuficiente, a prioridade é salvar o maior número possível. Isso explica por que uma vítima em PCR pode ser preto/expectante enquanto uma vítima vermelha respirando recebe recurso.\n\n### Transporte pode descompensar\n\nambulância e aeronave são ambientes pequenos, barulhentos e com recursos finitos. Hipotensão, hipoxemia, pneumotórax, extubação, falta de O2 e falha de bateria acontecem no trajeto. Transporte seguro é checklist, não improviso.\n\n## Fluxograma\n\n```mermaid\nflowchart TD\n    A[Chegada ao APH] --> B{Cena segura?}\n    B -->|Não| C[Recuar, EPI, isolar, acionar recurso especializado]\n    B -->|Sim| D[Dimensionar cena: vítimas, mecanismo, riscos, recursos]\n    D --> E{IMV provável?}\n    E -->|Sim| F[Estabelecer comando + comunicar METHANE + ACV]\n    E -->|Não| G[XABCDE e intervenções que salvam transporte]\n    F --> H[Triagem START + tratamento mínimo + transporte distribuido]\n    G --> I[Decidir destino, recurso e comunicar regulação]\n    H --> I\n```\n\n```mermaid\nflowchart TD\n    A[Chamado 192] --> B[TARM: local, solicitante, telefone, dados básicos]\n    B --> C{Pedido de socorro de urgência?}\n    C -->|Não/informacao simples| D[Orientação e registro conforme protocolo]\n    C -->|Sim| E[Médico regulador]\n    E --> F[Interrogatório + classificação + orientação]\n    F --> G{Recurso necessário?}\n    G -->|Orientação apenas| H[Orientar, registrar e encerrar/monitorar]\n    G -->|APH/transferência| I[Despachar recurso adequado]\n    I --> J[Acompanhar equipe, reclassificar e definir destino]\n    J --> K[Comunicar receptor + registrar transporte e encerramento]\n```\n\n```mermaid\nflowchart TD\n    A[START adulto] --> B{Anda?}\n    B -->|Sim| C[Verde]\n    B -->|Não| D{Respira?}\n    D -->|Não| E[Abrir via aérea]\n    E --> F{Respira agora?}\n    F -->|Não| G[Preto]\n    F -->|Sim| H[Vermelho]\n    D -->|Sim| I{FR >30?}\n    I -->|Sim| H\n    I -->|Não| J{Pulso radial ausente ou TEC >2s?}\n    J -->|Sim| H\n    J -->|Não| K{Obedece comando simples?}\n    K -->|Não| H\n    K -->|Sim| L[Amarelo]\n```\n\n```mermaid\nflowchart TD\n    A[Vítima em evento tático/HazMat] --> B{Ameaça ativa ou contaminação?}\n    B -->|Hot zone| C[Segurança, cobertura, autoajuda, torniquete, extrair]\n    B -->|Contaminado| D[EPI, isolamento, retirada e descontaminação]\n    C --> E[Warm zone: MARCH]\n    D --> E\n    E --> F[Cold zone: ABCDE, analgesia, transporte, regulação]\n```\n\n## Doses, alvos e números\n\n| Item | Número | observação TEME |\n|---|---:|---|\n| START por vítima | 60-90 s | Triagem rápida, não atendimento completo |\n| START vermelho | FR >30/min | Ou respira após abrir VA, perfusão ruim, não obedece comando |\n| START perfusão ruim | Sem pulso radial ou TEC >2 s | Depende do protocolo/local |\n| START preto | Não respira após abrir VA | Em recurso insuficiente |\n| SCI span of control | 1-7; ideal 5 | Banca cobrou estrutura flexivel |\n| Queda de altura alto risco | >3 m | Cinemática de trauma |\n| Intrusao veicular alto risco | >0,3 m no ocupante ou >0,5 m em qualquer área | Alem de extricacao, ejeccao, morte no mesmo compartimento |\n| SpO2 trauma/crítico APH | >=94% | O2 e ventilação, depois titular |\n| Aeromédico não pressurizado | Até 10.000 ft clássico | TEME22 Q66 foi anulada, cuidado com absolutos |\n| Cabine pressurizada | 5.000-8.000 ft usual | Não afirmar que e nível do mar |\n| Helicóptero | 30 m zona livre; espectadores 60 m; sem correr/fumar 15 m | Números de aula |\n| Pressão no mergulho | +1 atm/10 m + 1 atm superfície | 40 m ~= 5 ATA |\n| Narcose por nitrogênio | Típica a partir de 30 m | Parece embriaguez |\n| DCS/mergulho | O2 100%; MNR 15 L/min se sem dem
