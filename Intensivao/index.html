and valve | Chamar medicina hiperbárica/DAN |\n| Altitude risco | >2.500 m em não aclimatado | Pode ocorrer mais baixo em suscetiveis |\n| AMS TEME | Descer pelo menos 300 m se sintomático relevante | Descida é mais efetiva |\n| Heat stroke | SNC alterado + hipertermia | Antitermico não trata |\n| Alvo de resfriamento | 38,6-39 C | Evitar overcooline; seguir protocolo |\n| Afogamento | 5 ventilações iniciais em apneico/inconsciente | Não drenar água |\n| observação afogamento | 4-6 h atual; até 8 h aula local | Se normal e sem deterioração |\n| Hipotermia | <=35 C | Diagnóstico clínico se sem termometro confiável |\n| Hipotermia grave | <28 C | Alto risco de arritmia/PCR |\n| Checar pulso hipotermia | Até 1 min | Antes de declarar sem pulso |\n| Queimadura importante adulto | >20% SCQ | Aula local; depende de contexto e recurso |\n| Queimadura importante criança | >10% SCQ | Regular para centro adequado |\n| Torniquete | Alto e apertado se hemorragia exsanguinante | Registrar horário |\n\n## Pegadinhas TEME\n\n- **Cena insegura e \"ABCDE heroico\":** falso. Segurança vem antes.\n- **Primeira equipe em IMV deve iniciar tratamento detalhado:** falso. Primeiro comando, dimensionamento, recursos e triagem.\n- **IMV = salvar o paciente mais grave sempre:** falso se recurso insuficiente; e maior benefício coletivo.\n- **START verde e paciente sem lesão:** falso. Verde deambula, mas ainda precisa reavaliação.\n- **Não respira = preto imediatamente:** em START adulto, abra via aérea primeiro; se passar a respirar, e vermelho.\n- **FR 28 no START e vermelho:** não pelo critério respiratório isolado; vermelho se >30 ou outros critérios.\n- **START serve para qualquer CBRN/HazMat:** cuidado. Pode haver algoritmo e descontaminação específicos.\n- **SCI e estrutura fixa e burocratica:** falso. E modular e escalavel.\n- **Span ideal do SCI e 12 por lider:** falso. Ideal clássico e 5.\n- **Médico regulador só aciona viatura:** falso. Ele orienta, classifica, acompanha, decide recurso/destino e coordena fluxo.\n- **Transferência assistida e responsabilidade exclusiva do regulador:** falso. Origem, transporte, regulação e receptor compartilham deveres.\n- **Vaga zero dispensa estabilização/comunicação:** falso.\n- **Aeronave pressurizada sempre equivale a nível do mar:** falso. Cabine costuma ficar em altitude equivalente.\n- **Pneumotórax pequeno sempre pode voar sem plano:** falso. Avalie risco, pressão, ventilação positiva e capacidade de descompressão.\n- **Intermação se trata com antitérmico e transporte imediato:** falso. Resfriamento agressivo é prioridade.\n- **Afogamento: virar de cabeça para baixo para tirar água:** falso. Ventile.\n- **Doença descompressiva leve pode apenas observar:** falso na prova. O2 100% e contato hiperbarico.\n- **Ruptura timpânica em explosão é lesão secundária:** falso. É primária.\n- **Hot zone tática pede RCP/VA invasiva:** falso. Controle hemorragia exsanguinante e evacue.\n\n## Erros fatais na prática\n\n- Entrar em cena com risco de atropelamento, violência, fogo, eletricidade ou contaminação.\n- Não pedir recurso cedo e descobrir tarde que há mais vítimas do que equipe.\n- Fazer procedimento demorado em paciente crítico que precisa de centro de trauma/UTI.\n- Não comunicar destino, chegando com paciente grave sem preparo receptor.\n- Transportar intubado sem O2/bateria/aspiração/droga suficiente.\n- Não reconhecer IMV e levar todos para o hospital mais próximo.\n- Misturar área contaminada com ambulância/sala vermelha.\n- Errar triagem por compaixão individual e gastar recurso escasso no expectante.\n- Não reavaliar verde/amarelo que deteriora.\n- Levar paciente de mergulho/altitude/calor para observação simples sem tratar fisiologia tempo-dependente.\n- Aquecer hipotermico grave movimentando demais e aquecendo periferia isoladamente.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** cena segura antes do ABCDE; rodovia exige posicionamento protetor da ambulância; START adulto usa andar, respiração, FR >30, perfusão e comando; IMV exige comando e maior benefício coletivo; médico regulador tem papel técnico/gestor; intermação deve ser resfriada antes de transporte quando possível; afogamento apneico recebe abertura de VA e 5 ventilações; DCS recebe O2 100%; ruptura timpânica e blast primário.\n>\n> **Na prática clínica:** protocolos locais de SAMU, bombeiros, defesa civil, polícia, concessionária e hospitais definem detalhes operacionais. START é muito cobrado, mas sistemas como SALT/JumpSTART podem ser preferidos em serviços específicos. Em \"vaga zero\", documentação, comunicação e estabilização proporcional ao risco protegem paciente, equipe e rede.\n\n## Checklist de revisão\n\n- [ ] Sei que APH comeca por segurança, cena, EPI e recursos.\n- [ ] Sei comunicar IMV com METHANE.\n- [ ] Sei diferenciar APH normal de medicina de massa.\n- [ ] Sei montar mentalmente comando, ACV, triagem, tratamento e transporte.\n- [ ] Sei START adulto sem olhar.\n- [ ] Sei as categorias verde, amarelo, vermelho e preto.\n- [ ] Sei as funções do médico regulador e a lógica de vaga zero.\n- [ ] Sei checar transporte antes de sair: VA, ventilação/O2, drogas, monitor, comunicação e relatório.\n- [ ] Sei riscos do aeromédico: altitude, gases, pneumotórax e cabine.\n- [ ] Sei zonas hot/warm/cold no atendimento tático.\n- [ ] Sei que HazMat exige EPI, isolamento e descontaminação antes de contaminar a rede.\n- [ ] Sei blast primário, secundário, terciario, quaternario e quinario.\n- [ ] Sei afogamento, intermação, altitude, mergulho e hipotermia em uma linha cada.\n\n## Questões e estações relacionadas\n\n- **TEME22 Q1:** rodovia com vítima em faixa de rolamento: melhor posicionamento da ambulância para proteger a cena e desviar fluxo.\n- **TEME22 Q25:** cinemática de trauma e risco por mecanismo.\n- **TEME22 Q30:** triagem/priorização também aloca recursos, não apenas ordem de chegada.\n- **TEME22 Q41:** mergulho profundo com dor articular/rash/prurido = doença descompressiva; O2 por máscara não reinalante 15 L/min.\n- **TEME22 Q54:** mal agudo da montanha em 3.000 m; conduta de prova = descer pelo menos 300 m.\n- **TEME22 Q56:** explosão com ruptura de membrana timpânica = lesão primária por blast.\n- **TEME22 Q66:** transporte aeromédico; questão anulada, mas revisar primário/secundário, altitude e cabine.\n- **TEME23 Q19:** narcose por nitrogênio, com quadro semelhante a embriaguez, clássica a partir de 30 m.\n- **TEME23 Q27:** atendimento tático sob ameaça direta: autoajuda sempre que possível e controle de hemorragia exsanguinante.\n- **TEME23 Q33:** afogamento inconsciente/apneico: abrir via aérea e realizar 5 ventilações.\n- **TEME23 Q93:** intermação/heat stroke: resfriamento prioritário, antes do transporte quando há condição.\n- **TEME25 Q70:** contexto rural/remoto: POCUS pode antecipar decisão, regulação e logística.\n- **TEME25 Q75:** via aérea em cena/extricacao: considerar acesso limitado, segurança e manobras simples enquanto se organiza resgate.\n- **TEME25 Q79:** médico regulador e atribuições/experiência na Central de Regulação das Urgências.\n- **Emergency Talks Aula 11:** SCI, START, ACV, IMV e \"não transferir o caos\".\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26.\n- Provas teóricas TEME22, TEME23, TEME24 e TEME25.\n- Referências oficiais do edital: Tratado ABRAMEDE 2024, Medicina de Emergência HCFMUSP, POCUS ABRAMEDE, Manual de Via aérea 2025 e demais capítulos de APH/desastres/trauma ambiental.\n\n**Material local**\n\n- Emergency Talks: Aula 07 - Princípios do APH.\n- Emergency Talks: Aula 11 - Incidentes com múltiplas vítimas.\n- Emergency Talks: Aula 37 - Trauma ambiental I.\n- Emergency Talks: Aula 56 - Trauma ambiental II e áreas remotas.\n- Emergency Talks: Aula 04 - Avaliação inicial do politraumatizado.\n- Resumo do Emergency.docx.\n- Adendos para complementar.docx.\n\n**Atualização clínica e normativa**\n\n- Ministério da Saúde. Regulação Médica das Urgências. https://www.gov.br/saude/pt-br/composicao/saes/samu-192/publicacoes/regulacao_medica_urgencias.pdf/view\n- Ministério da Saúde. Portaria GM/MS 2.048/2002, Regulamento Técnico dos Sistemas Estaduais de Urgência e Emergência. https://bvs.saude.gov.br/bvs/saudelegis/gm/2002/anexo/anexo_prt2048_05_11_2002.pdf\n- Ministério da Saúde. Portaria GM/MS 1.010/2012, SAMU 192 e Central de Regulação das Urgências. https://bvsms.saude.gov.br/bvs/saudelegis/gm/2012/prt1010_21_05_2012_atual.html\n- Ministério da Saúde. Centrais de Regulação. https://www.gov.br/saude/pt-br/composicao/saes/drac/regulacao/regulacao-do-acesso/centrais-de-regulacao/centrais-de-regulacao\n- Conselho Federal de Medicina. Resolução CFM 2.110/2014, serviços pré-hospitalares móveis. https://sistemas.cfm.org.br/normas/visualizar/resolucoes/BR/2014/2110\n- Conselho Federal de Medicina. Resolução CFM 1.672/2003, transporte inter-hospitalar de pacientes. https://sistemas.cfm.org.br/normas/visualizar/resolucoes/BR/2003/1672\n- Conselho Federal de Medicina. Resolução CFM 2.077/2014, serviços hospitalares de urgência e emergência. https://sistemas.cfm.org.br/normas/visualizar/resolucoes/BR/2014/2077\n- CHEMM/ASPR/HHS. START Adult Triage Algorithm. https://chemm.hhs.gov/startadult.htm\n- CHEMM/ASPR/HHS. SALT Mass Casualty Triage Algorithm. https://chemm.hhs.gov/salttriage.htm\n- FEMA. National Incident Management System, 2017. https://www.fema.gov/sites/default/files/2020-07/fema_nims_doctrine-2017.pdf\n- Wilderness Medical Society. Heat Illness Clinical Practice Guidelines, 2024 update. https://journals.sagepub.com/doi/full/10.1177/10806032241227924\n- Wilderness Medical Society. Acute Altitude Illness Clinical Practice Guidelines, 2024 update. https://journals.sagepub.com/doi/10.1016/j.wem.2023.05.013\n- Wilderness Medical Society. Drownine Clinical Practice Guidelines, 2024 update. https://journals.sagepub.com/doi/10.1177/10806032241227460\n- Wilderness Medical Society. Accidental Hypothermia Clinical Practice Guidelines, 2019 update. https://journals.sagepub.com/doi/10.1016/j.wem.2019.10.002\n- Divers Alert Network. Decompression Illness: What Is It and What Is the Treatment? https://dan.org/health-medicine/health-resources/diseases-conditions/decompression-illness-what-is-it-and-what-is-the-treatment/\n"},{"id":"temas/014_gastro-hepatologia-abdome-agudo.md","title":"014 - Gastro, Hepatologia E Abdome Agudo","markdown":"# 014 - Gastro, Hepatologia E Abdome Agudo\n\n## Leitura de 30 segundos\n\n- Abdome agudo no DE e primeiro fisiologia, depois etiqueta diagnóstica: choque, peritonite, sangramento, isquemia, perfuração, obstrução, gestação ectópica e AAA.\n- Analgesia não atrapalha diagnóstico. Dor tratada deixa o exame melhor; não espere cirurgião para aliviar sofrimento.\n- Cirrótico no pronto-socorro tem infecção e sangramento até prova em contrário: paracentese se ascite, antibiótico se HDA varicosa, lactulose se encefalopatia e cuidado com rim.\n- HDA: estabilize, acesso, tipagem/prova cruzada, transfusão restritiva, PPI se não varicosa provável; se cirrose/variz, vasoativo + ceftriaxone + EDA precoce.\n- Pancreatite: 2 de 3 critérios, analgesia, cristaloide balanceado moderado, alimentar cedo quando tolera; CPRE urgente só se colangite ou obstrução biliar persistente.\n- Biliar: colecistite = cirurgia precoce; colangite = antibiótico + drenagem biliar/CPRE, principalmente se grave.\n- Isquemia mesenterica, perfuração, AAA roto e obstrução estrangulada são diagnósticos de tempo: TC/angioTC e cirurgia/intervenção cedo.\n- Ureterolitíase infectada e torção testicular são \"abdome\" que você não pode perder: obstrução + infecção = desobstruir; testículo torcido = urologia agora.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME22-25 cobrou HDA em cirrótico, PBE, encefalopatia/cirrose, pancreatite biliar, diverticulite, apendicite, dor abdominal em mulher, ferimento abdominal, POCUS/FAST, perfuração, ureterolitíase com obstrução, colangite, C. difficile e torção testicular.\n- **O que a banca costuma testar:** primeira conduta, indicação de TC/US/POCUS, quando chamar cirurgia/urologia/endoscopia, quando não atrasar antibiótico, quando fazer paracentese, e diferença entre colecistite, colangite e pancreatite biliar.\n- **Como costuma aparecer:** caso com dor abdominal + sinais discretos. A resposta certa geralmente identifica gravidade por idade, comorbidade, choque, lactato, peritonite, imunossupressão/cirrose ou falha de melhora.\n\n## Abordagem prática\n\n### 1. Primeiro minuto do abdome agudo\n\n1. **ABCDE e sinais vitais repetidos:** choque, febre, hipoxemia, rebaixamento e dor desproporcional mudam prioridade.\n2. **Perguntas que matam:** gestação? anticoagulante? cirrose? aneurisma? cirurgia prévia? imunossupressão? trauma? diálise? dor testicular? melena/hematemese?\n3. **Exame dirigido:** peritonismo, distensão, hernias, pulsos, pele, flancos, toque retal/vaginal quando muda conduta, testículo no homem com dor baixa/lombar.\n4. **Analgesia e antiemético cedo:** não espere diagnóstico fechado.\n5. **Exames base:** hemograma, eletrólitos/renal, função hepática, bilirrubina, lipase, lactato/gaso se grave, coagulograma se sangramento/cirrose/anticoagulante, EAS, beta-hCG em mulher em idade fertil.\n6. **Imagem por risco:** US para biliar/gineco/AAA/POCUS; TC com contraste para abdome agudo sem diagnóstico, idoso, peritonite, obstrução, diverticulite complicada, perfuração, isquemia.\n7. **Fonte control:** cirurgia, endoscopia, radiologia intervencionista, CPRE ou urologia quando há foco que não resolve com remedio.\n\nSinais de abdome que mata:\n\n- Dor desproporcional ao exame, acidose/lactato, FA/aterosclerose: isquemia mesenterica.\n- Dor epigástrica/dorso, hipotensão, massa pulsavel, idoso: AAA roto.\n- Pneumoperitonio, rigidez, peritonite: perfuracao.\n- Vômitos persistentes, distensão, parada de flatos/fezes, hernia dolorosa: obstrução/estrangulamento.\n- Dor HCD + febre + icterícia ou choque/confusão: colangite.\n- Cirrótico com ascite + dor/febre/confusão/IRA: PBE.\n- HDA + cirrose: variz até prova em contrário.\n- Dor testicular súbita + náusea/vômito: torção.\n\n> **Resposta de prova TEME:** leucograma normal não exclui abdome agudo inflamatório. Analgesia adequada não \"máscara\" o diagnóstico.\n\n### 2. Exame, imagem e POCUS\n\n| Cenário | Melhor próximo passo prático |\n|---|---|\n| Instável com trauma | eFAST/POCUS + ressuscitação + cirurgia/intervenção |\n| Instável sem trauma e suspeita AAA | POCUS aorta; se instável, cirurgia vascular; se tolera, angioTC |\n| Peritonite franca | Cirurgia; TC se não atrasar e paciente tolera |\n| Idoso com dor vaga | Baixo limiar para TC com contraste |\n| Mulher em idade fertil | beta-hCG antes de \"abdome clínico\" |\n| HCD/biliar | US, labs hepaticos; POCUS pode encurtar caminho |\n| Flanco/cólica renal | EAS, creatinina; POCUS hidronefrose; TC sem contraste se dúvida/complicação |\n| Suspeita isquemia mesenterica | AngioTC, não espere lactato |\n| HDA/HDB instável | Reanimação + endoscopia/angioTC conforme fonte provável |\n\nPOCUS ajuda, mas não absolve:\n\n- FAST negativo não exclui lesão intra-abdominal significativa, especialmente em estável.\n- Líquido livre em trauma presume sangue até prova em contrário.\n- Líquido livre em cirrótico provavelmente ascite, não hemoperitônio, se contexto e POCUS compatíveis.\n- Apendicite no POCUS pode ser altamente sugestiva, mas exame negativo não exclui.\n- Hidronefrose + febre/sepse sugere obstrução infectada: urologia.\n\n### 3. Hemorragia digestiva alta\n\nPrimeiras medidas:\n\n1. ABCDE, dois acessos calibrosos, monitor, tipagem/prova cruzada, Hb seriada, coagulograma, plaquetas, lactato se grave.\n2. Ressuscitar antes de endoscopia. Se choque/rebaixamento/vômito ativo, planejar via aérea.\n3. Transfusão restritiva na maioria: alvo Hb 7-9 g/dL; considerar limiar maior em isquemia ativa/cardiopatia grave.\n4. Não varicosa provável: PPI em alta dose, EDA em até 24 h após estabilização.\n5. Varicosa/cirrose provável: vasoativo imediato + ceftriaxone + EDA idealmente em até 12 h após estabilização.\n6. Falha endoscópica/choque persistente: radiologia intervencionista, cirurgia ou TIPS conforme causa/recurso.\n\nVaricosa até prova em contrário se:\n\n- Cirrose, ascite, icterícia, telangiectasias, esplenomegalia, plaqueta baixa.\n- Hematemese importante, melena, choque.\n- História de varizes ou ligadura prévia.\n\nConduta de variz:\n\n- Octreotide/terlipressina assim que suspeitar, antes da EDA.\n- Antibiótico profilatico: ceftriaxone e clássico em cirrótico com HDA.\n- EDA com ligadura elastica se variz esofágica.\n- Lactulose se encefalopatia, mas sem atrasar controle de sangramento.\n- Evite excesso de volume/transfusão: aumenta pressão portal e ressangramento.\n\n> **Pegada TEME:** em HDA varicosa, antibiótico não é \"para quando tiver febre\"; e profilaxia/tratamento preventivo de infecção e PBE.\n\n### 4. Cirrose descompensada: ascite, PBE, encefalopatia e rim\n\nTodo cirrótico internado com ascite nova, dor abdominal, febre, HDA, hipotensão, encefalopatia, IRA ou piora clínica merece paracentese diagnóstica.\n\nPBE:\n\n- Diagnóstico: PMN no líquido ascítico >=250 cel/mm3, independentemente de cultura.\n- Tratamento clássico: ceftriaxone ou cefotaxime.\n- Albumina reduz risco renal/mortalidade em PBE de maior risco: 1,5 g/kg no dia 1 e 1 g/kg no dia 3.\n- Não espere cultura se o paciente está grave.\n\nEncefalopatia hepática:\n\n1. Procurar gatilho: HDA, PBE, constipação, sedativo/opioide, infecção, hipocalemia, alcalose, IRA, desidratação, TIPS.\n2. Lactulose para 2-3 evacuações pastosas/dia.\n3. Rifaximina se recorrente, grave ou resposta parcial, conforme disponibilidade.\n4. Não intube só por amônia alta; intube se não protege via aérea.\n\nAscite tensa:\n\n- Paracentese de alívio se desconforto respiratório/dor/tensao importante.\n- Se retirar >5 L, repor albumina 6-8 g por litro removido.\n\nRim no cirrótico:\n\n- Pare diuréticos/nefrotóxicos se IRA/hipovolemia.\n- Trate infecção e sangramento.\n- Albumina quando indicado.\n- Suspeite síndrome hepatorrenal após excluir hipovolemia, choque, nefrotóxicos e lesão renal estrutural.\n\n### 5. Pancreatite aguda\n\nDiagnóstico: 2 de 3.\n\n- Dor típica epigástrica, irradiando para dorso.\n- Lipase/amilase >=3 vezes limite superior.\n- Imagem compatível.\n\nConduta inicial:\n\n1. Analgesia forte, antiemético, jejum só enquanto vomita/dor intensa.\n2. Cristaloide balanceado, em geral Ringer lactato, com estratégia moderada e reavaliação.\n3. Procurar etiologia: biliar, álcool, triglicerídeos, cálcio, medicações, trauma, CPRE, escorpião.\n4. US de abdome para litiase biliar.\n5. Alimentacao oral/enteral precoce quando tolera; não precisa \"zerar dieta\" por dias.\n6. Antibiótico não é rotina em pancreatite esteril.\n7. TC precoce não é obrigatória se diagnóstico claro e evolução boa; considerar se dúvida, grave, falha de melhora ou complicação.\n8. CPRE urgente se colangite ou obstrução biliar persistente.\n\nGravidade:\n\n- SIRS persistente, falência orgânica, hipotensão, hipoxemia, IRA, necrose/infecção, idade/comorbidade.\n- BISAP ajuda, mas o plantão manda: lactato, diurese, BUN/ureia, creatinina, hematocrito, oxigenação e pressão.\n\n> **Resposta de prova TEME:** pancreatite biliar sem colangite não vai automaticamente para CPRE urgente. Colangite muda tudo.\n\n### 6. Colecistite, colangite e icterícia\n\n| Quadro | Pistas | Conduta que cai |\n|---|---|---|\n| cólica biliar | Dor HCD/epigástrio pós-prandial, sem febre/peritonite, labs normais | Analgesia, antiemético, US, cirurgia eletiva se recorrente |\n| Colecistite | Dor HCD >6 h, Murphy, febre/leuco, parede espessada/líquido perivesicular | Antibiótico + colecistectomia precoce se candidato |\n| Colangite | Febre + icterícia + dor HCD; grave se choque/confusão | Antibiótico + drenagem biliar/CPRE urgente |\n| Coledocolitiase | Icterícia/colestase, dilatação de via biliar, dor | Estratificar; CPRE se alto risco/colangite |\n| Hepatite aguda | Icterícia + transaminase muito alta, dor inespecifica | Suporte, etiologia, sinais de falência hepática |\n\nColangite grave:\n\n- Charcot: febre, icterícia, dor HCD.\n- Reynolds: Charcot + hipotensão/confusão.\n- Reanimação, hemoculturas se não atrasarem, antibiótico amplo e chamada precoce para CPRE/drenagem.\n\n### 7. Apendicite, diverticulite e dor em mulher\n\n**Apendicite**\n\n- Migração da dor para FID, anorexia, náusea/vômito, febre baixa, dor localizada, peritonismo.\n- US pode ser primeiro em criança/gestante; TC com contraste em adulto se dúvida.\n- Antibiótico não deve ser postergado em paciente com suspeita relevante/perfuracao/sepse.\n- Cirurgia é resposta clássica, especialmente complicada. Tratamento não operatório pode ser opção selecionada, mas não é \"sem risco\".\n\n**Gestante/mulher em idade fertil**\n\n- Sempre beta-hCG.\n- Ectópica: dor + atraso/sangramento/síncope; US transvaginal e gineco.\n- Torção ovariana: dor pélvica súbita, náusea/vômito; US Doppler ajuda, mas Doppler normal não exclui.\n- DIP/abscesso tubo-ovariano: dor pélvica, febre, corrimento/dor mobilização colo; antibiótico e gineco.\n\n**Diverticulite**\n\n- Dor FIG, febre, alteração intestinal; TC confirma e classifica.\n- Uncomplicada, imunocompetente, leve e sem sepse: pode não precisar antibiótico na prática atual.\n- Antibiótico se imunossuprimido, comorbido, sepse, sintomas importantes, abscesso, perfuração, obstrução ou falha de melhora.\n- Abscesso grande: drenagem percutanea quando possível.\n- Peritonite/instabilidade/perfuracao livre: cirurgia.\n\n> **Para prova TEME:** se alternativa antiga disser diverticulite aguda não complicada com antibiótico, cuidado com o ano/fonte. A prática atual aceita selecionar sem antibiótico; a banca pode cobrar conduta clássica ou atual conforme enunciado.\n\n### 8. Obstrução, perfuração, isquemia e AAA\n\n**Obstrução intestinal**\n\n- Dor cólica, distensão, vômitos, parada de eliminacao de fezes/flatos.\n- Passado de cirurgia = aderência; hernia = encarceramento; idoso = neoplasia/volvo.\n- Instável, peritonite, febre, leucocitose importante, lactato, dor contínua, pneumatoses ou ar portal = estrangulamento/isquemia.\n- Conduta: NPO, analgesia, cristaloide, corrigir eletrólitos, sonda se vômitos/distensão importante, TC com contraste, cirurgia se complicação.\n\n**Volvo**\n\n- Sigmoide estável sem peritonite: descompressão endoscópica pode ser inicial, depois cirurgia definitiva.\n- Cecal: geralmente cirúrgico; descompressão endoscópica não é confiável.\n\n**Perfuração**\n\n- Dor súbita, peritonite, pneumoperitonio.\n- Antibiótico amplo, ressuscitação e cirurgia.\n- Úlcera perfurada pode aparecer como dor epigástrica com POCUS/RX sugerindo ar livre.\n\n**Isquemia mesenterica**\n\n- Dor desproporcional, FA, aterosclerose, baixo fluxo/choque, diarreia/sangue, lactato/acidosé tardios.\n- AngioTC é exame-chave. Lactato normal não exclui.\n- Antibiótico, heparina se arterioembólica/trombose sem contra, cirurgia/intervenção vascular cedo.\n\n**AAA roto**\n\n- Idoso, dor abdominal/lombar/síncope/choque. Nem sempre tem massa palpável.\n- POCUS aorta no instável; angioTC se tolera.\n- Não normalize PA as cegas se suspeita de ruptura; vascular agora.\n\n### 9. Urológicas que simulam abdome\n\n**cólica renal/ureterolitíase**\n\n- Dor em flanco irradiada para virilha/testículo, náusea/vômito, hematúria.\n- AINE e analgésico de primeira linha se rim/perfusão permitem; opioide se necessário.\n- TC sem contraste é mais sensível; POCUS hidronefrose ajuda no beira-leito.\n- Alta possível se dor controla, sem infecção, rim único, IRA, obstrução importante, vômitos incoercíveis ou diagnóstico alternativo.\n\n**Pielonefrite obstrutiva**\n\n- Febre/sepse + hidronefrose/cálculo/obstrução = antibiótico EV + drenagem urgente por duplo J ou nefrostomia.\n- Não é \"esperar o antibiótico fazer efeito\".\n\n**Torção testicular**\n\n- Dor testicular súbita, náusea/vômito, testículo alto/horizontal, reflexo cremasterico ausente.\n- Diagnóstico é clínico quando forte; US não deve atrasar exploração.\n- Janela clássica: ideal antes de 6 h.\n\n### 10. Diarreia, colite e C. difficile\n\nAvalie gravidade:\n\n- Desidratação, sangue, febre alta, dor intensa, imunossupressão, idoso, gestante, sepse, surtos, uso recente de antibiótico/internação.\n- Diarreia aquosa leve sem risco: hidratação e sintomático.\n- Disenteria, sepse, viajante grave ou imunossuprimido: investigar e considerar antibiótico conforme contexto.\n\nC. difficile:\n\n- Suspeite após antibiótico recente, internação, idade, IPP, dor cólica, febre, leucocitose.\n- Testar se diarreia não explicada, geralmente >=3 evacuações liquidas/24 h.\n- Inicial não fulminante: fidaxomicina preferida nas diretrizes atuais; vancomicina VO alternativa muito usada.\n- Fulminante: hipotensão/choque, ileo ou megacólon = vancomicina VO/NG em dose alta + metronidazol EV; considerar vancomicina retal se ileo e cirurgia precoce se deteriora.\n- Evitar loperamida em colite grave/tóxica.\n\n## Conceitos que sustentam a conduta\n\n### Dor tratada melhora diagnóstico\n\nO mito da analgesia que máscara abdome agudo ainda aparece em prova. No DE moderno, dor controlada permite exame seriado melhor. O que máscara diagnóstico e não reavaliar.\n\n### Abdome do idoso e do cirrótico fala baixo\n\nIdoso, diabético, imunossuprimido e cirrótico podem ter pouca febre, pouca leucocitose e pouco peritonismo. A banca gosta de \"abdome quase normal\" com fisiologia ruim.\n\n### Controle de foco é a palavra-chave\n\nAntibiótico compra tempo; não drena bile infectada, não opera perfuração, não desobstrui ureter infectado, não resolve estrangulamento e não liga variz. Pergunte sempre: existe foco que precisa de procedimento?\n\n### Cirrose muda o risco de tudo\n\nHDA em cirrótico infecta, PBE encefalopata, diurético derruba rim, benzodiazepínico piora consciência, transfusão demais aumenta pressão portal. A conduta boa e fisiológica, não \"pacote único\".\n\n## Fluxograma\n\n```mermaid\nflowchart TD\n    A[Dor abdominal aguda] --> B[ABCDE + analgesia + acesso + labs + beta-hCG se aplicável]\n    B --> C{Choque, peritonite ou sangramento ativo?}\n    C -->|Sim| D[Ressuscitar + cirurgia/endoscopia/vascular/IR conforme suspeita]\n    C -->|Não| E{Red flag: idoso, cirrose, imunossupressão, lactato, dor desproporcional?}\n    E -->|Sim| F[TC/angioTC ou US dirigido com baixo limiar + especialista]\n    E -->|Não| G[Imagem dirigida: US biliar/gineco, TC, POCUS, EAS]\n    G --> H{Fonte control?}\n    F --> H\n    H -->|Sim| I[Cirurgia, CPRE, drenagem, endoscopia ou urologia]\n    H -->|Não| J[Tratamento clínico + reavaliação seriada]\n```\n\n```mermaid\nflowchart TD\n    A[HDA suspeita] --> B[ABCDE + 2 acessos + tipagem + Hb/coag + ressuscitar]\n    B --> C{Cirrose/variz provável?}\n    C -->|Sim| D[Vasoativo + ceftriaxone + EDA precoce]\n    C -->|Não| E[PPI alta dose + EDA até 24h após estabilizar]\n    D --> F{Choque persistente ou sangramento sem controle?}\n    E --> F\n    F -->|Sim| G[Endoscopia terapêutica, IR/cirurgia/TIPS conforme causa]\n    F -->|Não| H[Monitorar, tratar causa, plano de prevenção]\n```\n\n```mermaid\nflowchart TD\n    A[Cirrótico no DE] --> B{Ascite + internação/dor/febre/HDA/HE/IRA?}\n    B -->|Sim| C[Paracentese diagnóstica]\n    C --> D{PMN >=250?}\n    D -->|Sim| E[Ceftriaxone/cefotaxime + albumina se alto risco]\n    D -->|Não| F[Procurar outros gatilhos]\n    A --> G{Confusao/sonolência?}\n    G -->|Sim| H[Buscar gatilho + lactulose para 2-3 evacuações/dia]\n    A --> I{Hematemese/melena?}\n    I -->|Sim| J[HDA varicosa até prova: vasoativo + ATB + EDA]\n```\n\n```mermaid\nflowchart TD\n    A[Dor HCD/epigástrio + febre/icterícia/lipase] --> B{Lipase >=3x e dor típica?}\n    B -->|Sim| C[Pancreatite: analgesia + RL moderado + US biliar]\n    C --> D{Colangite ou obstrução persistente?}\n    D -->|Sim| E[CPRE urgente]\n    D -->|Não| F[Suporte, alimentar cedo, cirurgia biliar quando indicado]\n    B -->|Não| G{Febre + icterícia + dor HCD?}\n    G -->|Sim| H[Colangite: ATB + drenagem/CPRE]\n    G -->|Não| I{Murphy/febre/leuco/US?}\n    I -->|Sim| J[Colecistite: ATB + colecistectomia precoce]\n```\n\n## Doses, alvos e números\n\n| Item | Número | observação TEME |\n|---|---:|---|\n| Transfusão HDA | Hb <7 g/dL na maioria | Considerar maior se isquemia/cardiopatia ativa |\n| EDA HDA não varicosa | Até 24 h após estabilizar | Antes se instável/alto risco e recurso |\n| EDA varicosa | Ideal até 12 h após estabilizar | Vasoativo + ATB antes |\n| Pantoprazol alta dose | 80 mg EV bolus + 8 mg/h ou alta dose intermitente | pós/endoscopia conforme risco; muitos serviços iniciam pré-EDA |\n| Octreotide | 50 mcg EV bolus, depois 50 mcg/h | Variz suspeita |\n| Terlipressina | 2 mg EV 4/4 h inicialmente | Alternativa vasoativa, conforme disponibilidade |\n| Ceftriaxone HDA cirrótico | 1 g EV/dia por 5-7 dias | Profilaxia infecciosa/PBE |\n| PBE diagnóstico | PMN ascite >=250/mm3 | Cultura não precisa positivar |\n| Albumina PBE | 1,5 g/kg dia 1 + 1 g/kg dia 3 | Maior risco renal/grave; muito cobrado |\n| Paracentese de alívio | Albumina 6-8 g/L se >5 L retirados | Evita disfunção circulatória |\n| Lactulose HE | 20-30 g VO/SNE/retal repetido, depois ajustar | Alvo 2-3 evacuações pastosas/dia |\n| Rifaximina | 550 mg VO 12/12 h | Recorrente/parcial, conforme recurso |\n| Pancreatite diagnóstico | 2 de 3 critérios | Dor, enzima >=3x, imagem |\n| Pancreatite TC | 48-72 h se dúvida/falha/grave | TC precoce pode subestimar necrose |\n| CPRE pancreatite biliar | Urgente se colangite/obstrução persistente | Não é rotina em toda pancreatite biliar |\n| Colecistite | Colecistectomia precoce | Se candidato cirúrgico |\n| Colangite grave | Drenagem biliar urgente | Antibiótico sozinho pode falhar |\n| Diverticulite abscesso | Drenagem se grande, usual >=4-5 cm | Depende de recurso/local |\n| START urológico infecção + obstrução | Desobstrução urgente | Duplo J ou nefrostomia |\n| Torção testicular | Ideal <6 h | US não deve atrasar se clínica forte |\n| C. difficile inicial | Fidaxomicina 200 mg 12/12 h 10 d ou vanco VO 125 mg 6/6 h 10 d | Diretriz atual prefere fidaxomicina |\n| C. difficile fulminante | Vanco VO/NG 500 mg 6/6 h + metronidazol EV 500 mg 8/8 h | Considerar vanco retal se ileo |\n| Lactato/isquemia | Normal não exclui | Dor desproporcional manda angioTC |\n| AAA | Diâmetro >=3 cm define aneurisma | Instável com suspeita = vascular/POCUS |\n\n## Pegadinhas TEME\n\n- **Analgesia máscara abdome agudo:** falso. Analgesia adequada e reavaliação seriada.\n- **Leucograma normal exclui apendicite/diverticulite:** falso.\n- **FAST negativo descarta lesão abdominal:** falso, principalmente em paciente estável.\n- **Toda dor abdominal em mulher e apendicite até provar:** falso. beta-hCG primeiro.\n- **HDA em cirrótico espera EDA para iniciar vasoativo/ceftriaxone:** falso.\n- **Antibiótico na HDA varicosa só se febre:** falso.\n- **Transfundir cirrótico para Hb normal:** falso; piora pressão portal e ressangramento.\n- **Amônia alta diagnostica encefalopatia isoladamente:** falso. Diagnóstico é clínico e por exclusão de gatilhos.\n- **Ascite sem dor não precisa paracentese se internou:** falso no cirrótico descompensado/internado.\n- **Pancreatite biliar sempre CPRE urgente:** falso sem colangite/obstrução persistente.\n- **Antibiótico profilatico em pancreatite necrotica esteril:** falso.\n- **Colecistite e colangite são iguais:** falso. Colangite precisa pensar em drenagem biliar.\n- **Diverticulite sempre precisa antibiótico:** falso na prática atual para selecionados, mas leia o enunciado.\n- **Dor desproporcional com lactato normal exclui isquemia mesenterica:** falso.\n- **Volvo de ceco resolve com colonoscopia:** falso em geral; sigmoide estável pode descomprimir.\n- **Pielonefrite obstrutiva é só antibiótico:** falso; precisa drenagem.\n- **Torção testicular espera Doppler se clínica forte:** falso.\n- **Loperamida em colite grave/febril:** perigoso.\n\n## Erros fatais na prática\n\n- Dar analgesia fraca e parar de reexaminar.\n- Não pedir beta-hCG em mulher em idade fertil.\n- Atrasar TC/angioTC em idoso com dor vaga e fisiologia ruim.\n- Não reconhecer isquemia mesenterica porque o abdome \"não parece tao ruim\".\n- Tratar colangite grave só com antibiótico, sem plano de drenagem.\n- Não fazer paracentese em cirrótico com ascite e confusão/febre/IRA/HDA.\n- Esquecer ceftriaxone em HDA varicosa.\n- Transfundir demais HDA cirrotica.\n- Dar diurético/nefrotoxico em cirrótico com IRA.\n- Atrasar desobstrução de ureter infectado.\n- Perder torção testicular chamando de cólica renal.\n- Liberar diverticulite/abdome agudo sem plano claro de retorno e reavaliação.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** analgesia é correta; leucograma normal não exclui abdome agudo; HDA varicosa = vasoativo + ceftriaxone + EDA; PBE = PMN >=250 e cefalosporina; pancreatite = suporte e CPRE apenas se colangite/obstrução; colangite = antibiótico + CPRE/drenagem; pielonefrite obstrutiva = antibiótico EV + desobstrução; torção testicular = clínica e urologia urgente.\n>\n> **Na prática clínica:** diverticulite leve não complicada pode ser manejada sem antibiótico em paciente selecionado; fidaxomicina é preferida para C. difficile inicial em diretrizes atuais, mas vancomicina VO segue muito usada por custo/acesso; estratégias de fluido na pancreatite são moderadas e guiadas por resposta, não \"hidratar agressivo\" sem reavaliar.\n\n## Checklist de revisão\n\n- [ ] Sei reconhecer abdome que mata: choque, peritonite, isquemia, perfuração, AAA, obstrução estrangulada.\n- [ ] Sei que analgesia não mascara diagnóstico.\n- [ ] Sei pedir beta-hCG em mulher em idade fertil.\n- [ ] Sei diferenciar HDA varicosa de não varicosa e iniciar vasoativo/ceftriaxone quando cirrose.\n- [ ] Sei PMN >=250 para PBE e albumina 1,5/1,0 g/kg.\n- [ ] Sei lactulose para 2-3 evacuações/dia e busca de gatilho na encefalopatia.\n- [ ] Sei pancreatite: 2/3 critérios, RL moderado, sem antibiótico rotineiro, CPRE só se indicado.\n- [ ] Sei colecistite vs colangite.\n- [ ] Sei apendicite/diverticulite e quando TC/cirurgia entram.\n- [ ] Sei isquemia mesenterica: dor desproporcional e angioTC.\n- [ ] Sei obstrução: sinais de estrangulamento e necessidade de cirurgia.\n- [ ] Sei ureter infectado obstruido e torção testicular.\n- [ ] Sei C. difficile inicial vs fulminante.\n\n## Questões e estações relacionadas\n\n- **TEME22 Q14:** hemorragia digestiva alta em cirrose/hipertensão portal.\n- **TEME22 Q31:** pancreatite aguda/biliar e decisão sobre hidratação, imagem e CPRE.\n- **TEME22 Q39-40:** diverticulite/dor abdominal com imagem.\n- **TEME22 Q62:** cirrose grave/descompensação.\n- **TEME22 Q90:** peritonite bacteriana espontânea em cirrótico com ascite.\n- **TEME22 Q97:** abordagem do paciente com dor abdominal; leucograma normal não exclui abdome agudo inflamatório.\n- **TEME23 Q4:** cirrótico com ascite volumosa, icterícia e alteração de consciência.\n- **TEME23 Q13 e Q94:** ferimento por arma branca em parede anterior do abdome; conduta conforme estabilidade/peritonite/achados.\n- **TEME23 Q22:** apendicite aguda é conduta inicial.\n- **TEME23 Q32:** lombar/testicular com hidronefrose e infecção: pielonefrite obstrutiva + antibiótico EV + desobstrução.\n- **TEME23 Q58:** obstrução intestinal baixa/volvo.\n- **TEME23 Q70:** escorpião pode cursar com pancreatite aguda.\n- **TEME24 Q18:** abdome agudo em mulher; diagnósticos diferenciais ginecológicos e beta-hCG.\n- **TEME24 Q40:** cólica/flanco, POCUS é ureterolitíase/pielonefrite obstrutiva.\n- **TEME24 Q44:** dor epigástrica com POCUS/imagem sugerindo úlcera perfurada.\n- **TEME24 Q63:** analgesia em dor abdominal aguda sem etiologia definida.\n- **TEME25 Q5:** cirrótico com ascite no POCUS; pensar ascite/PBE conforme contexto, não hemoperitônio automaticamente.\n- **TEME25 Q37 e Q58:** HDA, estabilização e decisão endoscópica/transfusional.\n- **TEME25 Q57:** dor HCD + febre/icterícia: colangite e CPRE/drenagem quando grave.\n- **TEME25 Q70:** POCUS sugestivo de apendicite em contexto rural/remoto.\n- **TEME25 Q89:** diverticulite não complicada em TC, sem abscesso.\n- **TEME25 Q98:** diarreia após fluoroquinolona: suspeitar C. difficile.\n- **TEME25 Q99:** torção testicular: dor súbita, náusea/vômito e sinais clínicos.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26.\n- Provas teóricas TEME22, TEME23, TEME24 e TEME25.\n- Referências oficiais do edital: Tratado ABRAMEDE 2024, Medicina de Emergência HCFMUSP, POCUS ABRAMEDE e capítulos de gastroenterologia, hepatologia, cirurgia de emergência e urologia.\n\n**Material local**\n\n- Emergency Talks: Aula 08 - Abdome agudo I.\n- Emergency Talks: Aula 14 e 15 - Abdome agudo II, icterícia e doenças.\n- Emergency Talks: Aula 17 - Trauma abdominopelvico.\n- Emergency Talks: Aula 24 - Emergências urológicas.\n- Emergency Talks: Aula 32 - Hemorragia digestiva alta e hepatopatia crônica.\n- Resumo do Emergency.docx.\n- Adendos para complementar.docx.\n\n**Atualização clínica**\n\n- ACG. Upper Gastrointestinal and Ulcer Bleeding Guideline, 2021. https://pubmed.ncbi.nlm.nih.gov/33929377/\n- Baveno VII. Renewine consensus in portal hypertension, 2022. https://pubmed.ncbi.nlm.nih.gov/35120736/\n- AASLD. Diagnosis, Management, and Prevention of Ascites, SBP, and Hepatorenal Syndrome, 2021. https://journals.lww.com/hep/fulltext/2021/08000/diagnosis,_management,_and_prevention_of.33.aspx\n- ACG. Management of Acute Pancreatitis Guideline, 2024. https://pubmed.ncbi.nlm.nih.gov/38268429/\n- Tokyo Guidelines 2018. Acute cholaneitis and acute cholecystitis management. https://pubmed.ncbi.nlm.nih.gov/29045062/\n- WSES. Diagnosis and treatment of acute appendicitis, 2020 update. https://wjes.biomedcentral.com/articles/10.1186/s13017-020-00306-3\n- WSES. Acute colonic diverticulitis emergency setting guidelines, 2020 update. https://wjes.biomedcentral.com/articles/10.1186/s13017-020-00313-4\n- WSES. Acute mesenteric ischemia updated guidelines, 2022. https://wjes.biomedcentral.com/articles/10.1186/s13017-022-00443-x\n- WSES. Perforated and bleeding peptic ulcer guidelines, 2020. https://wjes.biomedcentral.com/articles/10.1186/s13017-019-0283-9\n- IDSA/SHEA. Clostridioides difficile infection focused update, 2021. https://academic.oup.com/cid/article/73/5/e1029/6298219\n- EAU. Urolithiasis Guidelines. https://uroweb.org/guidelines/urolithiasis\n- ESVS. Abdominal Aorto-Iliac Artery Aneurysms Guidelines, 2024. https://academic.oup.com/ejves/article/67/2/192/7474300\n"},{"id":"temas/015_hemato-oncologia-emergencia.md","title":"015 - Hemato-oncologia Na Emergência","markdown":"# 015 - Hemato-oncologia Na Emergência\n\n## Leitura de 30 segundos\n\n- Neutropenia febril e sepse até prova em contrário: cultura se não atrasar, antibiótico antipseudomonas em até 60 min e internar se alto risco.\n- Síndrome de lise tumoral: Burkitt/leucemia/linfoma + hiperK, hiperP, hiperuricemia, hipocalcemia e IRA. Trate K primeiro, hidrate, rasburicase se alto risco/estabelecida e chame nefro/heme cedo.\n- Leucostase e hiperviscosidade são diagnósticos clínicos: dispneia, neuro, visual, priapismo, sangramento. Não espere \"número mágico\" se sintomático.\n- Síndrome de veia cava superior raramente mata, mas vira emergência se edema de via aérea, edema cerebral ou instabilidade. Trombose anticoagula; compressão tumoral pode precisar stent/RT/quimio.\n- Compressão medular metastática: dor lombar nova em câncer + fraqueza/sensitivo/esfincter = dexametasona, RM urgente e radio/neurocirurgia.\n- Falciforme com dor torácica, febre, hipoxemia ou infiltrado novo = síndrome torácica aguda: O2, antibiótico, analgesia e considerar transfusão.\n- Reação transfusional: pare a transfusão, mantenha SF 0,9%, confira identificacao, avise banco de sangue e trate o fenótipo: TRALI, TACO, anafilaxia ou hemólise.\n- Sangramento em anticoagulado: reverta rápido se ICH/vida-ameaça. Varfarina = 4F-PCC + vitamina K; dabigatrana = idarucizumabe; Xa = andexanet se disponível ou PCC conforme protocolo.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME22-25 cobrou transfusão maciça, HDA/anemia, encefalopatia/cirrose, falciforme/síndrome torácica aguda, neutropenia febril, síndrome de lise tumoral, síndrome de veia cava superior, reversão de coagulopatia no AVC hemorrágico, reação transfusional e dor oncológica.\n- **O que a banca costuma testar:** primeira hora, dose/ordem de intervenção, quando não esperar especialista, quando não transfundir automaticamente, quando não dar plaquetas, e como diferenciar complicações parecidas.\n- **Como costuma aparecer:** paciente em quimioterapia, hemopatia ou anticoagulante com febre, dispneia, sangramento, IRA, alteração neurológica ou dor. A resposta certa costuma priorizar fisiologia é tratamento tempo-dependente.\n\n## Abordagem prática\n\n### 1. Primeiro minuto do paciente hemato-oncológico\n\n1. **ABCDE + sinais vitais + glicemia:** muitos chegam com sepse, hipoxemia, sangramento ou hipercalemia.\n2. **Pergunte em 30 s:** tipo de câncer/hemopatia, quimio recente, transplante, cateter, neutropenia prévia, anticoagulante, transfusão, dor óssea/coluna, febre, sangramento, queda de Hb/plaqueta.\n3. **Procure as emergências-tempo:** neutropenia febril, lise tumoral, leucostase, compressão medular, SVCS grave, síndrome torácica aguda, TTP, DIC, sangramento em anticoagulado.\n4. **Labs iniciais:** hemograma com diferencial, reticulócitos se anemia/falciforme, eletrólitos, Ca/P/Mg, ácido úrico, renal, LDH, coagulograma, fibrinogênio, gaso/lactato se grave, culturas se febre.\n5. **Imagem dirigida:** RX/TC tórax na dispneia/falciforme/neutropenia; RM coluna se déficit/dor suspeita; TC contrastada/angio conforme SVCS/TEP/sangramento.\n6. **Ligue cedo:** hematologia/oncologia, infectologia, nefro, radioterapia, neurocirurgia, banco de sangue ou intervencionista conforme o \"source control\".\n\n### 2. Neutropenia febril\n\nDefinição prática:\n\n- Febre: T >=38,3 C uma vez, ou >=38,0 C sustentada por cerca de 1 h.\n- Neutropenia: ANC <500/mm3, ou <1000/mm3 com queda prevista para <500.\n\nConduta:\n\n1. Reconheceu? Isolamento/proteção, ABCDE e sepse.\n2. Coletar culturas periféricas e de cateter se presentes, mas não atrasar antibiótico.\n3. Antibiótico EV antipseudomonas em até 60 min: cefepime, piperacilina-tazobactam ou meropenem/imipenem conforme risco local.\n4. Adicionar vancomicina apenas sé indicação: choque/instabilidade, pneumonia, pele/partes moles, cateter, mucosite grave, MRSA conhecido ou Gram+ em cultura.\n5. Alto risco = internar: choque, comorbidade, pneumonia, dor abdominal, mucosite intensa, ANC muito baixo/prolongado, disfunção renal/hepática, leucemia/transplante, MASCC <21, CISNE >=3.\n6. Baixo risco selecionado pode ir ambulatorial depois de dose inicial, observação e garantia de retorno: fluoroquinolona + amoxicilina/clavulanato e seguimento próximo, conforme protocolo.\n\n> **Resposta de prova TEME:** neutropênico febril não espera resultado de cultura, PCR/procalcitonina ou imagem para começar antibiótico.\n\n### 3. Síndrome de lise tumoral\n\nPense em:\n\n- Linfoma de Burkitt, leucemia aguda, linfoma agressivo, massa tumoral grande, LDH alto, IRA, desidratação ou quimioterapia recente.\n- Também pode ocorrer espontaneamente antes da quimio.\n\nPadrão laboratorial:\n\n- HiperK.\n- Hiperfosfatemia.\n- Hiperuricemia.\n- Hipocalcemia secundária.\n- IRA, acidose, arritmia, convulsão.\n\nConduta:\n\n1. Monitor cardíaco e ECG: hiperK mata primeiro.\n2. Cálcio EV se ECG/instabilidade por hiperK/hipocalcemia sintomática; depois insulina/glicose, beta2, bicarbonato se acidose relevante.\n3. Hidratação EV com cristaloide se não congesto; alvo de diurese, sem alcalinização rotineira da urina.\n4. Rasburicase se alto risco ou lise estabelecida com hiperuricemia/IRA. Checar G6PD quando possível, mas não atrasar se risco extremo e protocolo permite.\n5. Allopurinol e profilaxia/intermediario: impede úrico novo, não remove úrico já formado.\n6. Dosar K, P, Ca, úrico, creatinina, LDH seriados; considerar UTI.\n7. Diálise se hiperK, hipocalcemia/hiperfosfatemia sintomática, sobrecarga, uremia ou acidose refratárias.\n\n> **Resposta de prova TEME25:** Burkitt em quimioterapia com hiperK, hiperP, úrico alto, hipocalcemia e IRA = síndrome de lise tumoral clínica e laboratorial.\n\n### 4. Leucostase, hiperviscosidade e APL\n\n**Leucostase**\n\n- Mais comum em AML; sintomas importam mais que o número.\n- Pistas: dispneia/hipoxemia, cefaleia, confusão, déficit focal, visão turva, priapismo, sangramento.\n- Conduta: heme urgente, UTI, hidratação cuidadosa, rasburicase/allopurinol conforme TLS, hidroxiureia/citorreducao e considerar leucaferese.\n- Evite transfundir hemácias sem necessidade antes de reduzir viscosidade, porque pode piorar fluxo.\n\n**Hiperviscosidade**\n\n- Clássica em macroglobulinemia de Waldenstrom e mieloma.\n- Tríade que cai: sangramento mucoso, alteração visual e sintomas neurológicos.\n- Conduta: plasmaferese urgente se sintomático + tratamento da causa.\n\n**Leucemia promielocítica aguda (APL)**\n\n- Sangramento + DIC + blastos/pancitopenia: suspeitou, heme agora.\n- ATRA deve ser iniciado precocemente quando suspeita forte, sem esperar confirmação completa, conforme hematologia.\n- Suporte agressivo de coagulopatia: plaquetas, fibrinogênio/crio e plasma conforme sangramento/metas.\n\n### 5. Compressão medular e veia cava superior\n\n**Compressão medular metastática**\n\nSuspeite se câncer conhecido ou red flags:\n\n- Dor dorsal/lombar progressiva, pior noturna ou ao decubito.\n- Fraqueza, alteração sensitiva, hiperreflexia, ataxia.\n- Retencao urinária, incontinencia, anestesia em sela.\n\nConduta:\n\n1. Dexametasona se déficit neurológico/suspeita alta, salvo contraindicação forte.\n2. RM de coluna total urgente.\n3. Analgesia, imobilização se instabilidade/risco, sondagem se retenção.\n4. Radio-oncologia e neurocirurgia: radioterapia, cirurgia ou ambos conforme histologia, estabilidade e déficit.\n\n**Síndrome de veia cava superior**\n\n- Face/pescoço/MMSS inchados, pletora, veias torácicas, dispneia, tosse, rouquidão, cefaleia.\n- Grave se estridor, edema de via aérea, edema cerebral, confusão, síncope ou instabilidade.\n- Medidas: cabeceira elevada, O2 se preciso, TC com contraste se tolera, histologia antes de tratamento definitivo se estável.\n- Se trombose/cateter: anticoagulação e considerar intervenção.\n- Se grave por compressão: stent endovascular e/ou radio/quimio conforme tumor.\n- Corticoide/diurético não são rotina para todos; corticoide ajuda se linfoma/timoma, edema de via aérea/cerebral ou plano oncológico.\n\n> **Resposta de prova TEME24:** SVCS raramente e fatal, mas casos graves podem ter via aérea, edema cerebral e instabilidade. Anticoagulação não está sempre contraindicada se houver trombose.\n\n### 6. Falciforme no DE\n\n**Crise vaso-oclusiva dolorosa**\n\n1. Analgesia forte cedo: opioide titulado se dor moderada/grave, associar dipirona/paracetamol/AINE se puder.\n2. O2 apenas se hipoxemia; não precisa hiperoxia em Sat normal.\n3. Hidratar se desidratado, mas evitar hiper-hidratação.\n4. Procurar gatilhos: infecção, STA, sequestro, priapismo, AVC, osteomielite.\n5. Evite meperidina.\n\n**Síndrome torácica aguda (STA)**\n\nDefinição prática: infiltrado pulmonar novo + febre/dor torácica/tosse/dispneia/hipoxemia em falciforme.\n\nConduta:\n\n- O2 para alvo >=94% ou basal do paciente.\n- Ceftriaxone + azitromicina, hemoculturas se febre sem atrasar.\n- Analgesia, espirometria de incentivo, broncodilatador se broncoespasmo.\n- Transfusão simples se queda de Hb importante, hipoxemia, multilobar ou piora; não elevar Hb acima de 10-11.\n- Exsanguineotransfusão se grave: hipoxemia importante, falência respiratória, multilobar, deterioração, AVC ou Hb alta que impede transfusão simples.\n\n> **Resposta de prova TEME25:** criança HbSS com febre, dor torácica, infiltrado e Hb caiu de 8,2 para 6,5: ceftriaxone + azitromicina + O2 alvo >=94% e considerar transfusão pela queda >=2 g/dL.\n\n### 7. Reação transfusional\n\nQualquer piora durante transfusão:\n\n1. Pare a transfusão.\n2. Mantenha acesso com SF 0,9% em equipo novo.\n3. Reconfira paciente, bolsa e etiqueta.\n4. Avise banco de sangue e envie bolsa/equipo/amostras conforme protocolo.\n5. Trate o fenótipo.\n\n| fenótipo | Pistas | Conduta |\n|---|---|---|\n| Hemolítica aguda | Febre, dor lombar/flanco, hipotensão, hemoglobinúria, DIC | Parar, suporte, volume/diurese, UTI, banco de sangue |\n| Febril não hemolítica | Febre/calafrios sem hemólise | Parar e investigar; antitérmico; pode retomar só se protocolo liberar |\n| alérgica leve | urticária/prurido isolado | Anti-histamínico; avaliar retomar |\n| Anafilaxia | Broncoespasmo, hipotensão, angioedema | Adrenalina IM + anafilaxia |\n| TRALI | Hipoxemia e infiltrado bilateral em até 6 h, sem sobrecarga | Suporte ventilatório; não diurético como eixo |\n| TACO | Dispneia, hipertensão, JVP/B3, BNP, congestão, risco renal/cardíaco | O2, diurético, reduzir velocidade futura |\n| Sepse transfusional | Febre alta, calafrios, choque | Culturas, antibiótico amplo, suporte |\n\n### 8. Sangramento, plaquetas e anticoagulantes\n\n**Primeiro:** ABCDE, local do sangramento, gravidade, última dose, função renal, anticoagulante/antiagregante, INR/TTPa, fibrinogênio, plaquetas, tipo e prova cruzada.\n\nReversão de anticoagulante em sangramento grave/ICH:\n\n| Droga | Reversão de prova/prática |\n|---|---|\n| Varfarina | 4F-PCC + vitamina K 10 mg EV |\n| Dabigatrana | Idarucizumabe 5 g EV |\n| Rivaroxabana/apixabana/edoxabana | Andexanet alfa se disponível/indicado; 4F-PCC conforme protocolo |\n| Heparina não fracionada | Protamina |\n| HBPM | Protamina parcial, principalmente se dose recente |\n| AAS/P2Y12 em ICH | Neuro/hemo; plaqueta não é automática para todo caso |\n\nPlaquetas:\n\n- <10.000: profilaxia em paciente estável sem sangramento.\n- <20.000: febre/sepsis/mucosite ou fatores de risco.\n- <50.000: sangramento ativo, procedimento invasivo, cirurgia maior.\n- <100.000: neurocirurgia/olho posterior ou SNC, conforme protocolo.\n- TTP/HIT: evite plaquetas salvo sangramento ameaçador.\n\nCoagulopatia/DIC:\n\n- Trate causa: sepse, trauma, APL, obstétrico, malignidade.\n- Se sangrando: plaquetas, plasma, crioprecipitado/fibrinogênio conforme labs.\n- Fibrinogênio alvo em sangramento importante costuma ser >150-200 mg/dL.\n\nTTP:\n\n- Plaquetopenia + anemia hemolítica microangiopática, esquistócitos, neuro/renal/febre variáveis.\n- PLASMIC ajuda, mas não espere ADAMTS13 se suspeita alta.\n- Plasma exchange urgente + corticoide; caplacizumabe/rituximabe conforme heme.\n- Não transfundir plaquetas de rotina.\n\nITP com sangramento grave:\n\n- Corticoide em alta dose + IVIG; plaquetas se sangramento que ameaça vida, junto com terapia imunomoduladora.\n\n## Conceitos que sustentam a conduta\n\n### Antibiótico na neutropenia é uma intervenção de ressuscitação\n\nO neutropênico pode não formar pus, não fazer leucocitose e ter exame pobre. Febre pode ser o único sinal antes do choque. Por isso cultura e imagem não podem atrasar beta-lactâmico antipseudomonas.\n\n### Lise tumoral mata pelo eletrólito, não pelo nome\n\nO diagnóstico é bonito, mas a primeira morte é hiperK/arritmia. Depois vem IRA, hipocalcemia sintomática, sobrecarga e acidose. Trate o ECG enquanto chama heme/nefro.\n\n### Nem toda massa mediastinal deve receber corticoide antes de biópsia\n\nSe SVCS está estável, histologia orienta tratamento. Corticoide antes de biópsia pode atrapalhar diagnóstico de linfoma. Se há via aérea/cérebro em risco, a emergência manda.\n\n### Plaqueta baixa não significa plaqueta sempre\n\nITP, TTP, HIT, DIC e quimioterapia não são iguais. Na TTP, plaqueta pode alimentar microtrombose; em ITP com sangramento fatal, plaqueta é ponte junto com IVIG/corticoide.\n\n## Fluxograma\n\n```mermaid\nflowchart TD\n    A[Paciente oncológico/hematológico no DE] --> B[ABCDE + sinais vitais + hemograma/diferencial + labs]\n    B --> C{Febre e ANC <500 ou queda prevista?}\n    C -->|Sim| D[Culturas se não atrasar + beta-lactâmico antipseudomonas até 60 min]\n    C -->|Não| E{HiperK/hiperP/úrico alto/IRA?}\n    E -->|Sim| F[Tratar hiperK + hidratar + rasburicase/allopurinol + nefro/heme]\n    E -->|Não| G{Neuro, via aérea, sangramento ou dor coluna?}\n    G -->|Sim| H[MSCC/SVCS/leucostase/TTP: especialista e imagem/procedimento urgente]\n    G -->|Não| I[Tratamento dirigido + reavaliação seriada]\n```\n\n```mermaid\nflowchart TD\n    A[Neutropenia febril] --> B[Sepse bundle + culturas periféricas/cateter]\n    B --> C[Antipseudomonas EV: cefepime ou pip-tazo ou meropenem]\n    C --> D{Indica vancomicina?}\n    D -->|Choque, pneumonia, pele/cateter, MRSA, mucosite grave| E[Adicionar vancomicina]\n    D -->|Não| F[Sem vancomicina inicial]\n    E --> G{Baixo risco real?}\n    F --> G\n    G -->|MASCC >=21/CISNE baixo e suporte| H[Observar, dose inicial, considerar VO ambulatorial]\n    G -->|Alto risco ou dúvida| I[Internar/UTI conforme gravidade]\n```\n\n```mermaid\nflowchart TD\n    A[Síndrome de lise tumoral] --> B[ECG + monitor + K/P/Ca/úrico/Cr seriados]\n    B --> C{HiperK com ECG ou instabilidade?}\n    C -->|Sim| D[Cálcio -> insulina/glicose -> beta2 -> remover K]\n    C -->|Não| E[Hidratação e controle laboratorial]\n    D --> E\n    E --> F{Alto risco ou úrico alto/IRA?}\n    F -->|Sim| G[Rasburicase se sem contra + heme/nefro]\n    F -->|Profilaxia/intermediario| H[Allopurinol + hidratação]\n    G --> I{AEIOU/refratário?}\n    H --> I\n    I -->|Sim| J[Diálise]\n    I -->|Não| K[Monitorar e tratar tumor]\n```\n\n```mermaid\nflowchart TD\n    A[Piora durante transfusão] --> B[Parar transfusão + SF 0,9 em equipo novo]\n    B --> C[Conferir identificacao + avisar banco de sangue]\n    C --> D{fenótipo}\n    D -->|Hipotensão/dor lombar/hemoglobinúria| E[Hemolítica: suporte + investigação + UTI]\n    D -->|Hipoxemia sem congestão| F[TRALI: suporte ventilatório]\n    D -->|Hipertensão/JVP/congestão| G[TACO: O2 + diurético]\n    D -->|urticária/broncoespasmo/choque| H[alérgica/anafilaxia: anti-H1 ou adrenalina IM]\n    D -->|Febre alta/choque| I[Sepse transfusional: culturas + ATB amplo]\n```\n\n## Doses, alvos e números\n\n| Item | Número | observação TEME |\n|---|---:|---|\n| Febre na neutropenia | >=38,3 C uma vez ou >=38,0 C por ~1 h | Não esperar pico repetido se grave |\n| Neutropenia | ANC <500 ou <1000 com queda prevista | ANC = leucócitos x %neutrófilos |\n| Antibiótico FN | Até 60 min | Antipseudomonas EV |\n| Cefepime | 2 g EV 8/8 h | Ajustar renal |\n| Piperacilina-tazobactam | 4,5 g EV 6/6 h | Ajustar renal |\n| Meropenem | 1 g EV 8/8 h | Se ESBL/instável/risco local; ajustar renal |\n| MASCC | >=21 baixo risco | Não substitui julgamento |\n| CISNE | >=3 alto risco | Para aparentemente estável com tumor sólido |\n| Cairo-Bishop lab TLS | K >=6, P >=4,5 adulto, úrico >=8, Ca <=7 | Ou variação >=25%; contexto importa |\n| Rasburicase | 0,2 mg/kg EV ou dose fixa 3-6 mg conforme protocolo | Contra/risco em G6PD |\n| Allopurinol | 300 mg/dia VO, ajustar renal | Profilaxia; não remove úrico formado |\n| Hidratação TLS | Cristaloide e alvo diurese | Evitar se congesto; sem alcalinização rotineira |\n| Dexametasona MSCC | 10 mg EV, depois 4 mg 6/6 h ou 16 mg/dia | Protocolos variam |\n| ACS falciforme SpO2 | >=94% ou basal | O2 se hipoxemia |\n| Transfusão ACS | Considerar se Hb cai >=2 g/dL ou hipoxemia/piora | Evitar Hb >10-11 |\n| Hb transfusão estável | <7 g/dL em geral | AABB; individualizar oncológico/cardíaco |\n| Plaqueta profilaxia | <10.000/mm3 | Se estável sem sangramento |\n| Plaqueta febre/sepsis | <20.000/mm3 | Regra prática |\n| Plaqueta sangramento/procedimento | >50.000/mm3 alvo | CNS/neuro geralmente >100.000 |\n| Fibrinogênio sangramento | >150-200 mg/dL | Crio/concentrado conforme recurso |\n| Varfarina ICH/grave | 4F-PCC + vitamina K 10 mg EV | PCC mais rápido que PFC |\n| Dabigatrana | Idarucizumabe 5 g EV | 2 doses de 2,5 g |\n| Xa inhibitors | Andexanet ou 4F-PCC 50 U/kg | Conforme disponibilidade/protocolo |\n| Heparina UFH | Protamina 1 mg/100 U heparina recente | Max usual 50 mg, depende tempo |\n| TTP | Plasma exchange urgente | Não esperar ADAMTS13 se suspeita alta |\n| ITP grave sangrando | Corticoide + IVIG + plaqueta se vida-ameaça | Plaqueta isolada dura pouco |\n\n## Pegadinhas TEME\n\n- **neutropênico febril espera cultura para antibiótico:** falso.\n- **Ceftriaxone basta para neutropenia febril de alto risco:** falso; precisa antipseudomonas.\n- **Vancomicina para todo neutropênico febril:** falso; use por indicação.\n- **MASCC alto libera automaticamente:** falso; instabilidade, pneumonia, dor abdominal, organ dysfunction e suporte social mandam.\n- **Allopurinol trata úrico já alto rapidamente:** falso. Rasburicase degrada úrico existente.\n- **Alcalinizar urina na lise tumoral é rotina:** falso na prática atual.\n- **Hipocalcemia na lise sempre repor:** falso; repor se sintomática/ECG, pois pode piorar deposição Ca-P.\n- **Leucostase depende só do valor de leucócitos:** falso; sintoma manda.\n- **Transfundir hemacia em leucostase sempre ajuda:** pode piorar viscosidade se não indispensável.\n- **SVCS sempre é emergência fatal:** falso; grave se via aérea/cérebro/instabilidade.\n- **Corticoide em toda SVCS antes de biópsia:** falso; pode atrapalhar diagnóstico de linfoma.\n- **Dor lombar em câncer sem trauma e \"lombalgia comum\":** perigoso; pensar compressão medular.\n- **TTP recebe plaqueta porque plaqueta está baixa:** falso salvo sangramento ameaçador.\n- **Reação transfusional: diminuir velocidade e observar:** falso se suspeita relevante; pare e investigue.\n- **TRALI e TACO são iguais:** falso; TACO é sobrecarga e responde a diurético, TRALI é lesão pulmonar não cardiogênica.\n- **Falciforme com Sat 93 e infiltrado pode observar sem antibiótico:** falso; STA.\n- **AVC hemorrágico em varfarina reverte com PFC por ser mais disponível:** PCC + vitamina K é mais rápido/efetivo se disponível.\n\n## Erros fatais na prática\n\n- Atrasar beta-lactâmico antipseudomonas em neutropenia febril.\n- Não fazer ECG imediato em lise tumoral com K alto.\n- Hidratar agressivamente lise tumoral em paciente já congesto, sem plano de diálise.\n- Não chamar hematologia cedo em leucostase, APL, TTP ou TLS.\n- Dar corticoide em massa mediastinal estável antes de coletar biópsia quando linfoma e provável.\n- Não investigar compressão medular em paciente oncológico com dor lombar e retenção urinária.\n- Transfundir falciforme até Hb normal.\n- Não parar transfusão diante de febre/hipotensão/dispneia.\n- Tratar TACO como TRALI ou TRALI como TACO.\n- Usar plaquetas de rotina em TTP.\n- Reverter anticoagulante tarde em hemorragia intracraniana.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** neutropenia febril = antibiótico antipseudomonas precoce; TLS = hiperK/hiperP/úrico alto/hipocalcemia/IRA em linfoma agressivo; SVCS grave pode comprometer via aérea/cérebro; STA falciforme = O2, ceftriaxone + azitro e transfusão se queda de Hb; reação transfusional = parar transfusão; ICH em varfarina = 4F-PCC + vitamina K.\n>\n> **Na prática clínica:** protocolos locais definem cefepime vs pip-tazo vs meropenem, dose fixa de rasburicase, uso de andexanet e metas transfusionais. Em oncologia, histologia antes de corticoide/radioterapia importa quando o paciente está estável; quando via aérea, medula ou cérebro estão em risco, a emergência manda.\n\n## Checklist de revisão\n\n- [ ] Sei definir febre e ANC na neutropenia febril.\n- [ ] Sei iniciar cefepime/pip-tazo/meropenem em até 60 min.\n- [ ] Sei quando adicionar vancomicina.\n- [ ] Sei reconhecer TLS e tratar hiperK antes do resto.\n- [ ] Sei diferenciar allopurinol de rasburicase.\n- [ ] Sei suspeitar leucostase/hiperviscosidade por sintomas.\n- [ ] Sei SVCS grave vs estável e quando corticoide não é rotina.\n- [ ] Sei compressão medular metastática: dexametasona, RM e radio/neuro.\n- [ ] Sei STA falciforme e quando transfundir.\n- [ ] Sei parar transfusão e diferenciar TRALI/TACO/anafilaxia/hemólise.\n- [ ] Sei reversão de varfarina, dabigatrana, Xa e heparina.\n- [ ] Sei TTP: plasma exchange, não plaqueta de rotina.\n\n## Questões e estações relacionadas\n\n- **TEME22 Q45:** choque hemorrágico traumático persistente após cristaloide/torniquete: transfusão balanceada 1:1:1.\n- **TEME22 Q62:** encefalopatia hepática: lactulose como medida inicial.\n- **TEME22 Q90:** PBE em cirrótico: PMN no líquido ascítico >=250/mm3.\n- **TEME22 Q113:** sangramento uterino anormal: corrigir coagulopatia e transfundir se anemia sintomática; cuidado com condutas inadequadas.\n- **TEME23 Q20:** dor lombar com história de neoplasia exige imagem para rastrear metástase/causa grave.\n- **TEME24 Q39:** falciforme com dor torácica, febre e hipoxemia: síndrome torácica aguda, O2, imagem, analgesia, ATB e considerar transfusão.\n- **TEME24:** neutropenia febril em linfoma/quimioterapia: antibiótico precoce e estratificação de risco.\n- **TEME24 Q71:** síndrome de veia cava superior: grave se via aérea, edema cerebral ou instabilidade; anticoagulação não é sempre contraindicada.\n- **TEME25 Q29:** linfoma de Burkitt em quimioterapia com hiperK, hiperP, úrico alto, hipocalcemia e IRA: síndrome de lise tumoral.\n- **TEME25:** reação transfusional com TRALI/TACO/anafilaxia/sepse: parar transfusão e tratar fenótipo.\n- **TEME25 Q69:** AVC hemorrágico e reversão de coagulopatias/anticoagulantes.\n- **TEME25 Q72:** síndrome torácica aguda em criança HbSS: ceftriaxone + azitromicina, O2 e considerar transfusão se queda de Hb.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26.\n- Provas teóricas TEME22, TEME23, TEME24 e TEME25.\n- Referências oficiais do edital: Tratado ABRAMEDE 2024, Medicina de Emergência HCFMUSP, POCUS ABRAMEDE e capítulos de emergências hematológicas/oncológicas, trauma e terapia transfusional.\n\n**Material local**\n\n- Emergency Talks: Aula 60 e 61 - Emergências onco-hematológicas.\n- Emergency Talks: Aula 22 - Sepse.\n- Emergency Talks: Aula 20 - Pneumonia e doença pleural.\n- Emergency Talks: Aula 33 - Gasometria.\n- Emergency Talks: Aula 42 - Distúrbios hidroeletrolíticos e ácido-básicos.\n- Resumo do Emergency.docx.\n- Adendos para complementar.docx.\n\n**Atualização clínica**\n\n- ASCO/IDSA. Outpatient Management of Fever and Neutropenia in Adults Treated for Malignancy, 2018. https://www.idsociety.org/practice-guideline/fever-and-neutropenia-in-adults-with-cancer/\n- NCCN. Prevention and Treatment of Câncer-Related Infections, Version 3.2024. https://pubmed.ncbi.nlm.nih.gov/39536464/\n- MD Anderson. Tumor Lysis Syndrome in Adult Patients, 2025 algorithm. https://www.mdanderson.org/content/dam/mdanderson/documents/for-physicians/algorithms/clinical-management/clin-management-tumor-lysis-web-algorithm.pdf\n- NCI PDQ. Superior Vena Cava Syndrome. https://www.cancer.gov/about-cancer/treatment/side-effects/cardiopulmonary-hp-pdq\n- NICE NG234. Spinal metástases and metastatic spinal cord compression, 2023. https://www.nice.org.uk/guidance/ng234\n- ASH. Sickle Cell Disease: Transfusion Support Guidelines, 2020. https://pmc.ncbi.nlm.nih.gov/articles/PMC6988392/\n- NHLBI. Evidence-Based Management of Sickle Cell Disease Expert Panel Report. https://www.nhlbi.nih.gov/health-topics/evidence-based-management-sickle-cell-disease\n- AABB. Red Blood Cell Transfusion: 2023 International Guidelines. https://www.aabb.org/news-resources/press-releases/detail/2023/10/12/new-red-blood-cell-transfusion-guidelines-recommend-an-individualized-approach\n- AABB. Quick Reference Guide for NHSN Hemovigilance Module: Adverse Reaction Definitions. https://www.aabb.org/docs/default-source/default-document-library/resources/aabb-quick-reference-guide-nhsn-hemovigilance-module.pdf\n- AHA/ASA. 2022 Guideline for Management of Spontaneous Intracerebral Hemorrhage. https://www.ahajournals.org/doi/10.1161/STR.0000000000000407\n- ISTH. Guidelines for Diagnosis and Treatment of Thrombotic Thrombocytopenic púrpura. https://www.isth.org/TTPGuidelines\n- ASH. Immune Thrombocytopenia Guidelines, 2019. https://www.hematology.org/education/clinicians/guidelines-and-quality-care/clinical-practice-guidelines/immune-thrombocytopenia-guidelines\n"},{"id":"temas/016_dermato-reumato-alergia-anafilaxia.md","title":"016 - Dermato, Reumato, Alergia E Anafilaxia","markdown":"# 016 - Dermato, Reumato, Alergia E Anafilaxia\n\n## Leitura de 30 segundos\n\n- Anafilaxia é adrenalina IM primeiro. Anti-histamínico e corticoide são adjuntos, não salvam choque/broncoespasmo/edema de via aérea.\n- Angioedema com língua, voz, disfagia, estridor ou progressão rápida e via aérea difícil antecipada. IECA/bradicinina pode não responder a adrenalina, anti-H1 ou corticoide.\n- Celulite é clínica; abscesso drena; fasciite necrosante e cirurgia agora. Dor desproporcional, bolhas, necrose, crepitacao, anestesia cutanea ou choque não esperam TC.\n- SJS/TEN: parar droga suspeita, suporte tipo queimado, oftalmo/dermato/UTI cedo. Antibiótico profilatico não é rotina.\n- Monoartrite aguda e séptica até prova em contrário. Artrocentese antes do antibiótico, exceto se sepse/choque.\n- Gota/pseudogota não exclui infecção se há febre, imunossupressão, protese ou líquido muito inflamatório.\n- Arterite temporal: cefaleia nova >50 anos, claudicação mandibular ou sintomas visuais = corticoide imediato antes de biópsia/imagem.\n- Crise renal esclerodérmica: hipertensão + IRA/MAHA em esclerose sistêmica = IECA/captopril agora, mesmo com creatinina alta.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** TEME22-25 cobrou angioedema por IECA e via aérea acordada, acidente por abelhas/anafilaxia vs envenenamento, celulite/erisipela e papel do exame clínico/US, queimaduras/bolhas, crise renal esclerodérmica, dor lombar/neoplasia, e infecções de partes moles.\n- **O que a banca costuma testar:** primeira droga na anafilaxia, quando antecipar via aérea, diferença entre celulite e abscesso, sinais de fasciite, quando punir articulação, e emergências reumatológicas que chegam ou destroem rim.\n- **Como costuma aparecer:** caso aparentemente dermatológico, mas com risco de via aérea, choque, sepse, necrose, perda visual, articulação séptica ou lesão renal.\n\n## Abordagem prática\n\n### 1. Rash, edema ou dor de pele: primeiro minuto\n\n1. ABCDE: via aérea, estridor, sibilos, hipotensão, choque, febre, dor intensa.\n2. Expor pele toda: mucosa, palmas/plantas, períneo, dor a palpação, bolhas, púrpura, necrose, crepitacao.\n3. Medicações novas: antibiótico, anticonvulsivante, alopurinol, AINE, sulfa, IECA, imunobiológico, quimio.\n4. Risco infeccioso: diabetes, DRC, cirrose, neutropenia, HIV, corticoide, asplenia, mordida, água doce/salgada, uso de droga injetável.\n5. Pergunta-chave: é alergia simples, anafilaxia, angioedema, infecção necrosante, SJS/TEN, vasculite/púrpura ou sepse?\n\nRed flags:\n\n- Hipotensão, síncope, broncoespasmo, estridor, edema de língua/laringe.\n- Dor fora de proporcao ao exame.\n- Bolhas hemorrágicas, necrose, equimose progressiva, anestesia de pele.\n- Mucosite ocular/oral/genital, Nikolsky, descolamento epidermico.\n- púrpura palpável com renal/abdominal, ou púrpura fulminante.\n- Monoartrite febril.\n- Cefaleia nova >50 anos com sintomas visuais ou mandibulares.\n\n### 2. Anafilaxia\n\nDiagnóstico prático: reação aguda após exposição provável com pele/mucosa e respiratório/circulatório/GI, ou hipotensão/broncoespasmo/laringe após alérgeno conhecido, mesmo sem urticária.\n\nConduta:\n\n1. Chamar ajuda, retirar gatilho, deitar com pernas elevadas se tolera.\n2. Adrenalina IM no vasto lateral imediatamente.\n3. O2 alto se respiratório/choque, monitor, acesso, cristaloide em bolus se hipotensão.\n4. Repetir adrenalina IM a cada 5-15 min se resposta incompleta.\n5. Se refratária: infusão de adrenalina titulada e UTI.\n6. Salbutamol se broncoespasmo; anti-H1 para urticária/prurido; corticoide como adjunto, sem atrasar adrenalina.\n7. Beta-bloqueado com choque refratário: considerar glucagon.\n8. Observar risco de bifásica: mais tempo se grave, precisou doses repetidas, asma, hipotensão, gatilho longo ou acesso dificil.\n9. Alta: prescrever/treinar autoinjetor se disponível, plano escrito, retorno e alergologia.\n\n> **Resposta de prova TEME:** adrenalina IM é a primeira medicação. Anti-histamínico isolado em anafilaxia é erro.\n\n### 3. Angioedema\n\nSepare dois mundos:\n\n| Tipo | Pistas | Resposta esperada |\n|---|---|---|\n| Histaminérgico/alérgico | urticária, prurido, broncoespasmo, hipotensão, gatilho alimentar/veneno/remedio | Adrenalina se anafilaxia, anti-H1, corticoide |\n| Bradicinina | IECA, hereditario, sem urticária/prurido, língua/face/laringe, dor abdominal | Via aérea + C1-INH/icatibant/FFP conforme recurso |\n\nConduta:\n\n- Via aérea manda. Voz abafada, disfagia, sialorreia, estridor, língua crescente ou assoalho de boca = chamar anestesia/otorrino/cirurgia cedo.\n- Se parece alérgico ou dúvida razoável, trate como anafilaxia com adrenalina IM.\n- IECA: suspender definitivamente. Pode ocorrer mesmo após anos de uso.\n- Angioedema por bradicinina pode precisar intubação acordada/fibro, equipe cirúrgica pronta e tubo menor.\n\n> **Resposta de prova TEME24:** angioedema por enalapril com língua/lábios, dificuldade para falar/deglutir e estridor justifica intubação acordada pelo risco de falha de resgate/oxigenação.\n\n### 4. Celulite, erisipela, abscesso e fasciite\n\n**Celulite/erisipela**\n\n- Diagnóstico é clínico: eritema, calor, dor, edema; erisipela costuma ser mais superficial e bem delimitada.\n- Causas comuns: estreptococos beta-hemoliticos; S. aureus se purulência/abscesso/porta específica.\n- US ajuda a achar abscesso, corpo estranho ou fascite; não é obrigatório para celulite simples.\n- Trate porta de entrada: tinea pedis, ferida, edema, insuficiência venosa.\n\n**Abscesso**\n\n- Flutuação/pus = incisão e drenagem.\n- Antibiótico se celulite extensa, SIRS, imunossupressão, face/mão/genital, falha, múltiplos abscessos ou risco MRSA.\n\n**Fasciite necrosante**\n\nSuspeite com:\n\n- Dor desproporcional.\n- Progressão rápida, toxicidade, choque.\n- Bolhas, equimose, necrose, crepitacao.\n- Anestesia cutanea.\n- Hiponatremia, lactato, IRA, CPK alta podem ajudar, mas não excluem.\n\nConduta:\n\n1. Cirurgia agora para exploração/desbridamento.\n2. Antibiótico amplo: MRSA + Gram negativos + anaerobios + antitoxina.\n3. Ressuscitação de sepse, analgesia, UTI.\n4. Não atrasar por TC se paciente instável ou suspeita alta.\n\n> **Pegada TEME:** LRINEC baixo não exclui fasciite. Exame clínico e progressão mandam.\n\n### 5. SJS/TEN, DRESS e urticária simples\n\n**SJS/TEN**\n\n- Prodromo febre/mal-estar + dor de pele + lesões alvoides/violáceas + mucosite.\n- Descolamento epidermico: SJS <10% SCQ, overlap 10-30%, TEN >30%.\n- Medicações clássicas: alopurinol, sulfas, anticonvulsivantes, AINEs oxicam, nevirapina, antibióticos.\n\nConduta:\n\n1. Parar droga suspeita imediatamente.\n2. Internar em UTI/queimados/dermato conforme extensao.\n3. Cuidado de pele sem trauma, aquecimento, fluidos, analgesia, nutricao.\n4. Oftalmologia precoce.\n5. Culturas se suspeita, antibiótico só se infecção clínica.\n6. Calcular SCORTEN nas primeiras 24 h e reavaliar.\n\n**DRESS**\n\n- Latencia longa, típicamente 2-8 semanas após droga.\n- Febre, rash, edema facial, linfonodos, eosinofilia/linfocitos atipicos e órgão-alvo: hepatite, nefrite, pneumonite, miocardite.\n- Conduta: parar droga, avaliar órgãos, internar se orgânico; corticoide sistêmico se moderado/grave conforme dermato.\n\n**urticária simples**\n\n- Placas pruriginosas migratórias, sem hipotensão, broncoespasmo, GI importante ou via aérea.\n- Anti-H1 e observação. Oriente retorno se anafilaxia.\n\n### 6. Monoartrite e dor articular aguda\n\nMonoartrite febril = séptica até prova em contrário.\n\nConduta:\n\n1. Analgesia e avaliação de sepse.\n2. Artrocentese: Gram, cultura, celularidade/diferencial e cristais.\n3. Se sepse/choque, não espere punção para antibiótico.\n4. Empirico usual: vancomicina + ceftriaxone/cefepime conforme risco local, eonococo, imunossupressão e Gram.\n5. Drenagem seriada/artroscópica conforme articulação e ortopedia.\n\nCristais:\n\n- Gota: podagra, urato, crise rápida; tratar com AINE, colchicina ou corticoide conforme rim/GI/anticoagulação.\n- Pseudogota: idoso, joelho/punho, condrocalcinose, cristais de CPPD.\n- Cristal no líquido não exclui infecção concomitante.\n- Não iniciar alopurinol como analgésico de crise. Se já usa, em geral não suspender.\n\n### 7. Emergências reumatológicas\n\n**Arterite de células gigantes**\n\n- >50 anos, cefaleia nova, dor temporal, claudicação mandibular, hipersensibilidade couro cabeludo, polimialeia, sintomas visuais.\n- VHS/CRP ajudam, mas não espere para tratar se suspeita forte.\n- Prednisona alta dose; se sintoma visual/ameaça visual, metilprednisolona EV e oftalmo/reumato.\n- Biópsia/imagem temporal confirma depois; corticoide vem antes para evitar cegueira.\n\n**Crise renal esclerodérmica**\n\n- Esclerose sistêmica, hipertensão abrupta, IRA, proteinúria/hematúria, anemia hemolítica microangiopática, plaquetopenia.\n- Captopril/IECA imediato e titulado. Não evitar IECA por creatinina alta nesse contexto.\n- Emergência hipertensiva + nefro/reumato.\n\n**LES/vasculites**\n\n- Lupus com rebaixamento/convulsão, nefrite, pneumonite/hemorragia alveolar, pericardite/tamponamento ou citopenia grave = internar e especialista.\n- púrpura palpável + rim/GI/neuro sugere vasculite sistêmica; procure plaquetas, urina, creatinina, hemoptise, dor abdominal.\n- púrpura fulminante ou menineococcemia e sepse dermatológica: antibiótico imediato.\n\n## Conceitos que sustentam a conduta\n\n### Pele pode ser choque, via aérea ou cirurgia\n\nNem todo rash e \"alergia\". urticária com hipotensão e anafilaxia; eritema com dor desproporcional e fasciite; bolha com mucosite e SJS/TEN; púrpura com choque e sepse/vasculite.\n\n### Adrenalina não tem substituto na anafilaxia\n\nAnti-H1 melhora prurido; corticoide talvez reduza inflamação tardia, mas nenhum dos dois reverte choque, edema de laringe ou broncoespasmo no tempo certo. O atraso da adrenalina é a pegadinha principal.\n\n### O pus da articulação é uma colecao fechada\n\nArtrite séptica não é \"dar antibiótico e ver\". Precisa diagnóstico por líquido sinovial e drenagem quando confirmado/suspeito forte. Cristal e infecção podem coexistir.\n\n### Corticoide certo no paciente certo\n\nNa arterite temporal e na compressão visual, corticoide precoce previne cegueira. Em celulite simples ele pode confundir; em SJS/TEN e DRESS depende de gravidade e especialista; em infecção necrosante não substitui faça.\n\n## Fluxograma\n\n```mermaid\nflowchart TD\n    A[Rash, edema ou lesão de pele no DE] --> B[ABCDE: via aérea, broncoespasmo, hipotensão, febre, dor]\n    B --> C{Anafilaxia?}\n    C -->|Sim| D[Adrenalina IM + O2 + fluidos + repetir 5-15 min]\n    C -->|Não| E{Angioedema de via aérea?}\n    E -->|Sim| F[Equipe VA difícil + tratar alérgico/bradicinina conforme contexto]\n    E -->|Não| G{Dor desproporcional, bolhas, necrose, choque?}\n    G -->|Sim| H[Fasciite: cirurgia + ATB amplo + UTI]\n    G -->|Não| I{Mucosite/descolamento epidermico?}\n    I -->|Sim| J[SJS/TEN: parar droga + UTI/queimados + oftalmo]\n    I -->|Não| K[Celulite/abscesso/urticária simples/vasculite: tratar dirigido e reavaliar]\n```\n\n```mermaid\nflowchart TD\n    A[Anafilaxia suspeita] --> B[Adrenalina IM vasto lateral]\n    B --> C[Deitar se tolera + O2 + monitor + acesso]\n    C --> D{Hipotensão/choque?}\n    D -->|Sim| E[Cristaloide 20 mL/kg e repetir adrenalina 5-15 min]\n    D -->|Não| F[Adjuntos: salbutamol, anti-H1, corticoide]\n    E --> G{Refratária?}\n    G -->|Sim| H[Infusão adrenalina + UTI; glucagon se beta-bloqueado]\n    G -->|Não| I[observação e plano de alta]\n    F --> I\n```\n\n```mermaid\nflowchart TD\n    A[Monoartrite aguda] --> B{Sepse/choque?}\n    B -->|Sim| C[Hemoculturas se possível + antibiótico imediato + artrocentese assim que viável]\n    B -->|Não| D[Artrocentese antes do antibiótico]\n    D --> E[Gram, cultura, celularidade, cristais]\n    E --> F{Pus/Gram/cultura ou alta suspeita?}\n    F -->|Sim| G[ATB EV + drenagem + ortopedia/reumato]\n    F -->|Cristais e baixa suspeita infecção| H[AINE/colchicina/corticoide conforme perfil]\n```\n\n## Doses, alvos e números\n\n| Item | Número | observação TEME |\n|---|---:|---|\n| Adrenalina anafilaxia | 0,01 mg/kg IM de 1 mg/mL | Max adulto 0,5 mg; criança max 0,3 mg |\n| Repetir adrenalina | 5-15 min | Se resposta incompleta |\n| Cristaloide anafilaxia | 20 mL/kg, repetir conforme choque | Adulto pode precisar litros |\n| Glucagon beta-bloqueado | 1-5 mg EV, depois 5-15 mcg/min | Se choque refratário |\n| Icatibant HAE | 30 mg SC adulto | Conforme disponibilidade |\n| C1-INH HAE | 20 U/kg EV | Conforme produto/protocolo |\n| SJS | <10% SCQ | Mucosa geralmente presente |\n| SJS/TEN overlap | 10-30% SCQ | Alto risco |\n| TEN | >30% SCQ | UTI/queimados |\n| SCORTEN | 7 itens | Calcular até 24 h e reavaliar |\n| Fasciite ATB | Vancomicina + pip-tazo/carbapenem + clindamicina | Não substitui desbridamento |\n| Clindamicina antitoxina | 900 mg EV 8/8 h adulto | Strepto/clostridio suspeito |\n| Celulite simples | 5 dias pode bastar se boa resposta | IDSA; estender se lento |\n| Artrite séptica líquido | WBC >50.000 sugere, mas não define | Valor menor não exclui |\n| Colchicina crise gota | 1,2 mg VO + 0,6 mg 1 h depois | Ajustar renal/interações; max 1,8 mg dia 1 |\n| Prednisona gota | 30-40 mg/dia por 5-10 dias | opção se AINE/colchicina ruins |\n| Arterite temporal | Prednisona 40-60 mg/dia | Se visual: metilpred EV alta dose |\n| Metilpred visual GCA | 500-1000 mg EV/dia por 3 dias | Protocolos variam |\n| Crise renal esclerodérmica | Captopril 6,25-12,5 mg e titular | IECA imediato |\n\n## Pegadinhas TEME\n\n- **Anafilaxia sem urticária não existe:** falso. Pode ser choque/broncoespasmo/laringe.\n- **Anti-histamínico antes da adrenalina:** falso em anafilaxia.\n- **Corticoide previne toda reação bifásica:** falso; não substitui observação.\n- **IECA só causa angioedema no início do tratamento:** falso, pode ocorrer anos depois.\n- **Angioedema por bradicinina responde bem a adrenalina/anti-H1:** falso em geral, mas trate como anafilaxia se dúvida.\n- **Celulite precisa US para diagnóstico:** falso. US ajuda abscesso/dúvida.\n- **Abscesso trata só com antibiótico:** falso; precisa drenagem.\n- **Fasciite espera TC/LRINEC:** falso se suspeita alta.\n- **SJS/TEN recebe antibiótico profilatico:** falso; antibiótico se infecção.\n- **Cristal no líquido articular exclui artrite séptica:** falso.\n- **Gota aguda inicia alopurinol para aliviar dor:** falso.\n- **Arterite temporal espera biópsia para corticoide:** falso.\n- **Crise renal esclerodérmica não pode receber IECA porque creatinina subiu:** falso.\n\n## Erros fatais na prática\n\n- Atrasar adrenalina em anafilaxia.\n- Tentar RSI convencional em angioedema progressivo sem plano de via aérea dificil/cirúrgica.\n- Mandar para casa angioedema de língua em progressão.\n- Tratar fasciite necrosante como celulite.\n- Não examinar períneo em suspeita de Fournier.\n- Usar AINE em gota com DRC/desidratação/anticoagulação sem pesar risco.\n- Dar corticoide em monoartrite antes de excluir infecção.\n- Não punir articulação séptica.\n- Perder SJS/TEN inicial como \"alergia simples\".\n- Esperar biópsia temporal enquanto o paciente perde visão.\n- Não reconhecer crise renal esclerodérmica.\n\n## Para prova vs na prática\n\n> **Para prova TEME:** anafilaxia = adrenalina IM; angioedema por IECA com estridor = via aérea acordada/antecipada; celulite é clínica, abscesso drena, fasciite
