ou compressão ou choque, virou problema.\n\n## Por que cai\n\nPOCUS virou tema de prova e estação porque traduz raciocínio de emergência: ver rápido, decidir rápido, sem terceirizar a decisão crítica. A banca TEME cobrou POCUS em prova teórica, em estação de 2024 e em estação de 2025.\n\nO que já apareceu no padrão TEME:\n\n- POCUS pulmonar: pleura e artefatos ar-tecido, linhas A/B, lung sliding, lung point e pneumotórax.\n- Dispneia: perfil de SCAPE/EAP hipertensivo com linhas B difusas é função de VE preservada/hipertrofia.\n- Choque: RUSH, VCI, VTI, fluido-responsividade versus fluido-tolerância, iniciar noradrenalina sem esperar CVC quando necessário.\n- Trauma: eFAST, Morison, pericárdio, pneumotórax, FAST positivo + instabilidade e FAST negativo que não exclui lesão.\n- PCR: CASA, tamponamento, VD dilatado/TEP, pseudo-AESP versus AESP verdadeira.\n- Prática 2025: aorta abdominal aneurismática/trombo mural, PLAX, subxifoide, Morison, VCI colabando, coração hipercinético/kissing walls e punção guiada por US.\n\nMensagem de prova: POCUS é extensão do exame físico na emergência, mas não substitui conduta tempo-dependente nem exame definitivo quando o paciente está estável e precisa de TC/eco formal.\n\n## Abordagem prática\n\n### 1. Comece Pela Pergunta Certa\n\nAntes de encostar o probe, formule a Pergunta:\n\n| Contexto | Pergunta POCUS |\n|---|---|\n| Dispneia grave | Edema pulmonar, pneumotórax, pneumonia/consolidação, derrame, sinais indiretos de TEP? |\n| Choque indiferenciado | Bomba, tanque ou tubo? Cardiogênico, hipovolêmico, obstrutivo ou distributivo? |\n| Trauma instável | Tem hemoperitônio, tamponamento, pneumotórax ou Hemotórax? |\n| PCR/AESP | Tem tamponamento, VD muito dilatado/TEP, pneumotórax ou atividade cardíaca? |\n| Procedimento | Onde está o vaso/líquido/agulha? A ponta da agulha está visível? |\n\nSe o resultado não muda a conduta agora, provavelmente não é POCUS prioritário naquele minuto.\n\n### 2. Escolha O Transdutor Sem Sofrer\n\n| Transdutor | Melhor uso | Pegadinha |\n|---|---|---|\n| Linear alta frequência | Pleura/lung sliding, vascular, acesso, nervo, ocular, partes moles | Imagem superficial bonita, mas baixa penetração |\n| Curvilíneo/convexo | Abdome, FAST, aorta, pelve, pulmão profundo/derrame | Bom \"coringa\" quando o paciente é grande |\n| Setorial/phased array | Cardio, subxifoide, janelas entre costelas, PCR | Menor resolução superficial; exige orientação espacial |\n\nEm estação prática, verbalize: \"Escolho o probe conforme profundidade e janela: setorial para coração, curvilíneo para FAST/aorta e linear para vaso/procedimento/pleura superficial.\"\n\n### 3. Dispneia: POCUS Pulmonar/BLUE\n\nSequência curta:\n\n1. Identificar linha pleural entre sombras costais: sinal do morcego.\n2. Ver lung sliding.\n3. Procurar linhas A ou B.\n4. Procurar consolidação/derrame em pontos posteriores/laterais.\n5. Integrar com coração e veias se choque ou suspeita de TEP.\n\nO que fazer com o achado:\n\n| Achado | interpretação prática |\n|---|---|\n| Linhas A + sliding bilateral | pulmão aerado: asma/DPOC, TEP, hipovolemia ou quadro não pulmonar |\n| Linhas A + sem sliding | Pneumotórax possível; procure lung point e correlacione com clínica |\n| Linhas B difusas bilaterais + sliding | Síndrome intersticial/congestão; em hipertenso dispneico, SCAPE |\n| Linhas B focais/assimetria | Pneumonia, contusão, atelectasia, lesão focal |\n| Consolidação/hepatização + broncograma | Pneumonia se febre/infecção; contusão no trauma |\n| Derrame pleural anecoico + spine sign | Derrame; avaliar volume, septações e segurança de punção |\n\nRegra TEME: POCUS pulmonar avalia principalmente **pleura e artefatos**, não \"olha o parênquima todo\" como TC.\n\n### 4. Choque: RUSH Em Linguagem De Plantão\n\nRUSH = **Pump, Tank, Pipes**.\n\n**Pump - bomba/coração**\n\n- VE hipercontrátil e cavidade pequena: hipovolemia/distributivo inicial.\n- VE hipocontrátil: choque cardiogênico, miocardite, IAM, cardiomiopatia.\n- VD maior que VE, septo em D, TAPSE baixo: sobrecarga de VD/TEP/cor pulmonale.\n- Derrame pericárdico + colapso de câmaras direitas + VCI cheia: tamponamento.\n\n**Tank - tanque/volume e congestão**\n\n- VCI pequena e colabável: sugere baixo retorno venoso/hipovolemia.\n- VCI dilatada e pouco variável: sugere pressão atrial direita alta; cuidado com volume.\n- Linhas B difusas: baixa tolerância a volume/congestão.\n- FAST positivo: sangue/líquido livre no contexto certo.\n\n**Pipes - tubos/vasos**\n\n- Aorta abdominal maior que 3 cm = aneurisma.\n- Hipotensão/dor abdominal/dorso + AAA no POCUS = chamar cirurgia/vascular; não medir só a luz verdadeira se houver trombo.\n- Veia femoral/poplitea não compressível = TVP; com choque/VD dilatado, aumenta suspeita de TEP.\n\n### 5. Trauma: eFAST\n\nJanelas obrigatórias:\n\n| Janela | O que procurar |\n|---|---|\n| QSD/Morison | Líquido entre fígado e rim; borda caudal do fígado |\n| QSE/esplenorrenal | Líquido entre baço e rim, subdiafragmático |\n| Pelve/suprapúbica | Líquido livre em fundo de saco/reto-vesical |\n| Subxifoide/pericárdio | Derrame/tamponamento |\n| pulmão anterior/lateral | Pneumotórax: sliding ausente, estratosfera, lung point |\n| Base torácica | Hemotórax/derrame: spine sign acima do diafragma |\n\nConduta:\n\n- Instável + FAST abdominal positivo = controle cirúrgico/hemorrágico, não TC.\n- Instável + pericárdio positivo = tamponamento traumático; cirurgia/toracotomia/pericardiocentese como ponte conforme contexto.\n- Instável + pneumotórax = descompressão/drenagem imediata.\n- FAST negativo + choque = continue procurando: pelve, retroperitônio, tórax, ossos longos, neurogênico, obstrutivo e causas não traumáticas.\n- estável + mecanismo relevante = TC com contraste pode ser indicada mesmo com FAST negativo.\n\n### 6. PCR: CASA Sem Roubar Tempo\n\nDurante compressões:\n\n- Escolha janela e posicione o probe antes da pausa.\n- Combine a Pergunta da próxima pausa.\n- Adquira imagem em até 10 segundos.\n- Volte para compressões.\n\nPerguntas do CASA:\n\n1. Tem derrame pericárdico/tamponamento?\n2. Tem VD muito dilatado sugerindo TEP maciço?\n3. Existe atividade cardíaca organizada ou cardiac standstill?\n4. Há pneumotórax/hipovolemia evidente se protocolo local incluir pulmão/VCI?\n\nUso inteligente:\n\n- Pseudo-AESP: sem pulso palpável, mas com contratilidade no POCUS; trate como choque gravíssimo, procure causa e otimize vasopressor/volume/inotrópico conforme fenótipo.\n- Cardiac standstill tem prognóstico ruim, mas não deve ser o único critério de interrupção.\n- POCUS nunca deve atrasar desfibrilação, adrenalina indicada ou compressões.\n\n### 7. Procedimentos: O Que A Estação Quer Ver\n\nPara punção/acesso guiado por US:\n\n1. Escolher probe linear.\n2. Identificar vaso em eixo curto/transversal e/ou eixo longo/longitudinal.\n3. Diferenciar veia e artéria por compressibilidade, pulsatilidade e Doppler quando necessário.\n4. Planejar trajeto da agulha.\n5. Visualizar ponta da agulha, não apenas \"alguma coisa brilhando\".\n6. Confirmar fio/cateter conforme procedimento; em CVC, considerar bubble test e avaliar pneumotórax.\n\nFrase de prova: \"A técnica pode ser eixo curto, eixo longo ou oblíqua; o ponto crítico é manter a ponta da agulha visível e não transfixar estrutura profunda.\"\n\n## Conceitos que sustentam a conduta\n\n### POCUS É Integração, Não Laudo\n\nPOCUS é feito pelo médico assistente para integrar imagem, exame físico e fisiologia em tempo real. Ele deve responder Perguntas binárias ou semiquantitativas. Quando você tenta fazer laudo completo de órgão, perde a vantagem do método e aumenta erro.\n\nBons exemplos:\n\n- \"Há derrame pericárdico com sinais de tamponamento?\"\n- \"Há linhas B difusas em paciente com dispneia hipertensiva?\"\n- \"Há líquido livre em Morison no politrauma instável?\"\n- \"O VE está grosseiramente deprimido ou hiperdinâmico?\"\n- \"A VCI e os pulmões sugerem que este paciente tolera mais volume?\"\n\nMaus exemplos:\n\n- \"Qual é a fração de ejeção exata?\"\n- \"Posso excluir TEP com POCUS normal?\"\n- \"FAST negativo exclui lesão abdominal?\"\n- \"VCI sozinha decide todo volume?\"\n\n### Fluido-Responsividade Vs Fluido-tolerância\n\nEsse par cai porque evita dois erros opostos: deixar chocado seco ou afogar o cardiogênico.\n\n- **Fluido-responsivo:** o débito cardíaco sobe se eu der volume.\n- **Fluido-tolerante:** o paciente consegue receber volume sem congestionar/piorar VD/VE/pulmão.\n\nVCI colabando sugere responsividade, mas não é verdade universal. Ventilação mecânica, pressão intra-abdominal, disfunção de VD, PEEP, DPOC e esforço respiratório bagunçam a leitura.\n\nMelhor raciocínio:\n\n- Perfusão ruim + sem B-lines + VE pequeno/hipercinético + VCI pequena = volume provavelmente faz sentido.\n- Perfusão ruim + B-lines difusas + VE ruim ou VD ruim + VCI cheia = cuidado com volume; vasopressor/inotrópico/causa.\n- Se houver tempo e janela boa: use teste dinâmico, como passive leg raise com VTI. Aumento de VTI/VS em torno de 10-15% sugere fluido-responsividade.\n\n### O Que O pulmão Mostra\n\nO ultrassom pulmonar vê a interface pleura-ar e artefatos. Por isso ele é excelente para síndromes:\n\n- Muito ar: linhas A.\n- Água/interstício: linhas B.\n- Ar ausente no alvéolo: consolidação.\n- Ar onde não deveria na pleura: pneumotórax.\n- Líquido pleural: derrame.\n\nEle não substitui TC quando a Pergunta exige anatomia detalhada, mas na dispneia grave a pergunta geralmente é sindrômica e tempo-dependente.\n\n### O Que O Coração Mostra\n\nNo emergencista, o ecocardio focado não precisa ser perfeito para ser salvador. Ele precisa reconhecer extremos:\n\n- VE muito ruim.\n- VE hiperdinâmico/kissing walls.\n- VD muito dilatado.\n- Derrame pericárdico/tamponamento.\n- Ausência ou presença de atividade cardíaca na PCR.\n\nDepois, se o paciente estabiliza, eco formal e cardiologia entram para quantificar e refinar.\n\n## Fluxograma\n\n### Choque Indiferenciado\n\n```mermaid\nflowchart TD\n    A[\"Choque ou hipoperfusão\"] --> B[\"RCP/ABCDE se crítico + monitor + acesso + drogas tempo-dependentes\"]\n    B --> C[\"POCUS RUSH: Pump, Tank, Pipes\"]\n    C --> D{\"Bomba alterada?\"}\n    D -->|VE ruim + B-lines/VCI cheia| E[\"Cardiogênico: vasopressor/inotrópico, SCA/arritmia/IC\"]\n    D -->|VD grande/septo D| F[\"Obstrutivo: TEP/cor pulmonale; procurar TVP e contexto\"]\n    D -->|Derrame + colapso AD/VD| G[\"Tamponamento: drenagem/pericardiocentese/cirurgia\"]\n    D -->|VE pequeno/hipercinético| H[\"Tanque/Pipes: VCI, pulmões, FAST, aorta\"]\n    H --> I{\"Líquido livre/AAA/VCI colabando?\"}\n    I -->|FAST+ ou AAA| J[\"Hemorragia/rotura: cirurgia/vascular + sangue\"]\n    I -->|VCI pequena sem B-lines| K[\"Volume teste + reavaliar VTI/perfusão\"]\n    I -->|B-lines ou VCI cheia| L[\"Baixa tolerância: vasopressor precoce, procurar sepse/cardio/obstrutivo\"]\n```\n\n### Dispneia Aguda\n\n```mermaid\nflowchart TD\n    A[\"Dispneia grave\"] --> B[\"US pulmonar anterior/lateral + coração se instável\"]\n    B --> C{\"Sliding?\"}\n    C -->|Ausente + A-lines| D[\"Pneumotórax possível: procurar lung point; tratar se instável\"]\n    C -->|Presente| E{\"Perfil predominante\"}\n    E -->|B bilateral difuso| F[\"Edema/congestão: SCAPE/IC/SDRA conforme contexto\"]\n    E -->|A bilateral| G[\"Asma/DPOC/TEP/outros; procurar DVT/VD/PLAPS se suspeita\"]\n    E -->|Consolidação ou B focal| H[\"Pneumonia/contusão/atelectasia\"]\n    E -->|Derrame| I[\"Quantificar, etiologia, toracocentese se indicado\"]\n```\n\n### PCR/AESP\n\n```mermaid\nflowchart TD\n    A[\"PCR em RCP\"] --> B[\"Definir Pergunta antes da pausa\"]\n    B --> C[\"Probe posicionado durante compressões\"]\n    C --> D[\"Pausa <10 s: imagem CASA\"]\n    D --> E{\"Achado tratável?\"}\n    E -->|Tamponamento| F[\"Pericardiocentese/cirurgia conforme contexto\"]\n    E -->|VD muito dilatado + contexto TEP| G[\"Considerar trombólise e RCP prolongada\"]\n    E -->|Pneumotórax| H[\"Descompressão/drenagem\"]\n    E -->|Atividade cardíaca sem pulso| I[\"Pseudo-AESP: tratar choque grave/causa\"]\n    E -->|Sem achado| J[\"Voltar ao algoritmo ACLS/PALS e 5H/5T\"]\n```\n\n## Doses, alvos e números\n\n| Item | Número/achado | observação TEME |\n|---|---:|---|\n| Pausa para POCUS na PCR | < 10 s | Probe já deve estar posicionado |\n| Linhas B | >= 3 por espaco ou múltiplas zonas | Difusas bilaterais sugerem congestão/interstício |\n| VCI respiração espontânea | Colapso > 50% | Sugere baixo RAP/responsividade, mas isolado e fraco |\n| VCI plethorica | > 2,1 cm e colapso < 50% | Sugere RAP alta/baixa tolerância a volume |\n| VTI LVOT | 16-22 cm normal aproximado | Baixo VTI sugere baixo volume sistólico |\n| PLR/mini-bolus | Delta VTI/VS 10-15% | Sugere fluido-responsividade |\n| EPSS | > 7 mm | Sugere disfunção sistolica do VE |\n| TAPSE | > 17 mm normal | Reduzido sugere disfunção de VD |\n| Relação VD:VE | VD > VE | Sugere sobrecarga de VD se agudo/contexto compatível |\n| Aorta abdominal | > 3 cm | Aneurisma; medir parede externa a parede externa |\n| AAA alto risco | > 5-5,5 cm ou sintomático | Dor/choque + AAA = vascular/cirurgia |\n| FAST positivo + instabilidade | Conduta imediata | Cirurgia/controle de fonte, não TC |\n| Bainha nervo óptico | > 5 mm no curso; > 6 mm apareceu em prova | Sugere HIC; não substitui TC quando disponível |\n| Apêndice | > 6 mm, não compressível | Sugere apendicite no contexto certo |\n| Vesicula | parede > 3 mm + Murphy/líquido | Sugere colecistite no contexto certo |\n\n## Pegadinhas TEME\n\n- **POCUS pulmonar avalia parênquima inteiro:** errado. Ele avalia principalmente pleura, artefatos e achados subpleurais.\n- **Lung sliding ausente = pneumotórax:** cuidado. Também ocorre em atelectasia, intubação seletiva, apneia, aderências, pleurodese e baixa ventilação.\n- **Lung sliding presente exclui pneumotórax em todo tórax:** errado. Exclui no ponto examinado.\n- **Linhas B difusas = pneumonia:** geralmente não. Difusas bilaterais com sliding sugerem congestão/interstício; pneumonia costuma ser focal/assimétrica/consolidativa.\n- **FAST negativo libera o politrauma:** errado. FAST não avalia bem retroperitônio, pelve, intestino e lesão de órgão sólido sem líquido.\n- **Paciente instável + FAST positivo vai para TC:** errado. Vai para controle de fonte/cirurgia conforme contexto.\n- **VCI decide volume sozinha:** errado. VCI é uma peca do quebra-cabeça.\n- **B-lines impedem qualquer volume:** não exatamente. Elas indicam baixa tolerância e pedem dose pequena/reavaliação; choque hemorrágico ainda precisa sangue.\n- **VD dilatado fecha TEP:** não. Sugere sobrecarga de VD; precisa contexto e excluir crônico/cor pulmonale.\n- **POCUS na PCR melhora tudo sempre:** só se não aumentar pausa. POCUS mal cronometrado piora RCP.\n- **Aorta com luz normal exclui aneurisma:** errado se houver trombo mural. Medir diâmetro externo.\n- **Procedimento guiado = olhar a tela uma vez:** errado. Deve acompanhar ponta da agulha.\n\n## Erros fatais na prática\n\n- Fazer ultrassom enquanto compressões param por tempo prolongado.\n- Usar POCUS para atrasar toracostomia/descompressão em pneumotórax hipertensivo clínico.\n- Dar volume repetido em choque com VE ruim, VCI cheia e B-lines difusas sem reavaliar.\n- Não reconhecer tamponamento em choque com turgência jugular/derrame/colapso de câmaras direitas.\n- Tranquilizar trauma instável por FAST negativo.\n- Confundir derrame pleural com pericárdico na PLAX; use a aorta descendente como referência.\n- Medir só a luz verdadeira da aorta e ignorar trombo mural.\n- Punção guiada sem visualizar ponta da agulha.\n- Usar Doppler/medidas complexas quando o paciente precisa de decisão simples e imediata.\n- Não salvar/documentar imagens relevantes quando o sistema permite.\n\n## Para prova vs na prática\n\n| Tema | Resposta TEME | Atualização/Prática |\n|---|---|---|\n| Papel do POCUS | Ferramenta beira-leito para decisões imediatas | ACEP considera POCUS competência central da emergência, com aplicações diagnósticas, ressuscitativas, procedimentais e de monitoramento |\n| Dispneia | BLUE/perfis pulmonares e integração com clínica | Use em conjunto com ECG, gaso, Rx/TC quando necessário; POCUS acelera síndrome, não esgota diagnóstico |\n| Choque | RUSH: pump/tank/pipes | SSC 2026 favorece medidas dinâmicas para fluido; VCI isolada é insuficiente |\n| Trauma | eFAST positivo + instabilidade muda conduta | eFAST negativo não exclui lesão; em estáveis, TC segue sendo exame anatômico principal |\n| PCR | CASA em pausas <10 s | Cardiac standstill tem mau prognóstico, mas não deve ser critério isolado para encerrar |\n| Procedimentos | Probe linear, eixo curto/longo, visualizar agulha | POCUS reduz complicações quando operador e treinado e imagem é integrada ao procedimento |\n\n## Checklist de revisão\n\n- [ ] Sei escolher probe: linear, curvilíneo ou setorial.\n- [ ] Sei reconhecer linhas A, linhas B, lung sliding, lung point e estratosfera.\n- [ ] Sei interpretar perfil B difuso em SCAPE/EAP hipertensivo.\n- [ ] Sei montar BLUE em dispneia sem decorar demais.\n- [ ] Sei fazer RUSH: pump, tank, pipes.\n- [ ] Sei diferenciar choque hipovolêmico, cardiogênico e obstrutivo pelos extremos ultrassonográficos.\n- [ ] Sei que VCI sozinha não decide volume.\n- [ ] Sei usar VTI/PLR quando houver tempo e janela.\n- [ ] Sei janelas do eFAST: QSD, QSE, pelve, pericárdio e pleura.\n- [ ] Sei que FAST negativo não exclui trauma abdominal.\n- [ ] Sei usar CASA sem prolongar pausa na PCR.\n- [ ] Sei pontos da prática: PLAX, subxifoide, Morison, VCI, aorta, punção guiada e ponta da agulha.\n\n## Questões e estações relacionadas\n\n- **TEME22:** POCUS pulmonar e artefatos; choque com VCI/B-lines/VTI; POCUS de tórax na dispneia; pneumotórax com A' e lung point; eFAST; CASA; fluido-responsividade/FALLS/BLUE.\n- **TEME23:** US beira-leito em choque/TEP, fisica do ultrassom, VCI em choque, trauma e eFAST.\n- **TEME24:** estação prática de POCUS com probe setorial, janela cardíaca, pulmão com linhas A/B, lung sliding, função de VE é diagnóstico de SCAPE/EAP hipertensivo.\n- **TEME25:** estação prática de POCUS com aorta aneurismática/trombo mural, choque hipovolêmico/hemorrágico, PLAX, subxifoide, Morison, VCI colabando e punção guiada por US; prova com acesso guiado, POCUS pulmonar, derrame, apendicite, ONSD e ocular.\n- **Emergency Talks:** Aula 09 POCUS pulmonar; Aula 13 Choque; Aula 18 POCUS trauma/vascular/neuro; Aula 29 POCUS cardíaco; Aula 35 POCUS procedimentos.\n\n## Referências\n\n- Conteúdo programático TEME26 e referências oficiais do edital.\n- Livro POCUS ABRAMEDE disponível no projeto.\n- Provas teóricas TEME22, TEME23, TEME24 e TEME25 disponíveis no projeto.\n- Estações práticas TEME24 e TEME25 disponíveis no projeto.\n- Emergency Talks: Aula 09 - POCUS Pulmonar; Aula 13 - Choque; Aula 18 - POCUS Trauma, Vascular e Neuro; Aula 29 - POCUS Cardiaco; Aula 35 - POCUS Procedimentos.\n- Resumo do Emergency.docx, arquivo do usuário.\n- American College of Emergency Physicians. 2023: [Ultrasound Guidelines: Emergency, Point-of-care, and Clinical Ultrasound Guidelines in Medicine](0).\n- EFSUMB. 2022/2023: [Clinical Practice Guidelines for Point-of-Care Ultrasound: common heart and pulmonary applications](1).\n- Society of Critical Care Medicine/ESICM. 2026: [Surviving Sepsis Campaign Guidelines](2).\n- American Heart Association. 2025: [Adult Advanced Life Support](3).\n"},{"id":"temas/005_sca-arritmias-hipertensivas.md","title":"005 - SCA, Arritmias E Emergências hipertensivas","markdown":"# 005 - SCA, Arritmias E Emergências hipertensivas\n\n## Leitura de 30 segundos\n\n- Dor torácica suspeita de SCA = ECG em até 10 min, monitor, acesso, AAS, troponina seriada e decisão de reperfusão se supra/equivalente.\n- IAM com supra é tempo para angioplastia > 120 min = pensar fibrinólise se dentro da janela e sem contraindicação.\n- Oxigênio no IAM não é rotina se SatO2 está boa; use se hipoxemia, desconforto respiratório ou choque.\n- Taquiarritmia com instabilidade = cardioversão sincronizada. Bradicardia instável = atropina, marca-passo e/ou catecolamina.\n- QRS largo irregular ou FA pré-excitada: não bloqueie nodo AV.\n- PA muito alta sem lesão aguda de órgão-alvo não é emergência hipertensiva. Lesão aguda muda tudo.\n- SCAPE/EAP hipertensivo = VNI + nitrato EV cedo; diurético entra, mas não pode ser a única resposta.\n\n## Por que cai\n\nCardio cai porque mistura tempo-dependencia, ECG, droga e priorização. A banca TEME gosta de situações em que a conduta certa é simples, mas a alternativa tenta seduzir com uma etapa atrasada.\n\nO que já apareceu no padrão TEME:\n\n- STEMI/IAMCST no APH e no DE: destino para hemodinâmica, fibrinólise quando angioplastia atrasa, AAS/P2Y12/enoxaparina/tenecteplase.\n- Bradicardia instável/BAVT: atropina, marcapasso transcutaneo/transvenoso, dopamina/adrenalina.\n- Taquicardia instável: cardioversão sincronizada; TV monomorfica, FA, TSV, torsades.\n- Choque cardiogênico e pós-IAM: SCAI, hipotensão, congestão, lactato e hemodinâmica.\n- Emergências hipertensivas: eclampsia/pós-parto, SCAPE/EAP hipertensivo, AVC e dissecção.\n- Estação prática 2024: BAVT instável + IAMCST + marca-passo + evolução para FV.\n\nMensagem de prova: primeiro reconheça instabilidade e doença tempo-dependente. Depois escolha a droga.\n\n## Abordagem prática\n\n### 1. Dor torácica/Suspeita De SCA\n\nConduta inicial:\n\n1. Sala monitorada, desfibrilador próximo, acesso IV, sinais vitais.\n2. ECG de 12 derivações em até 10 minutos.\n3. Se dor inferior, fazer V3R-V4R. Se suspeita posterior, V7-V9.\n4. AAS mastigado se não houver alergia verdadeira.\n5. Troponina de alta sensibilidade seriada se sem supra/equivalente.\n6. Procurar equivalentes de supra: posterior, VD, de Winter, Wellens, Searbossa/Smith em BRE/marca-passo quando aplicável.\n7. Definir: reperfusão imediata, estratégia invasiva precoce ou observação/alta segura.\n\nSe IAMCST/equivalente:\n\n- Angioplastia primária é preferida se tempo porta-balão/sistema permite.\n- Se não consegue PCI em até 120 min do primeiro contato médico e sintomas geralmente < 12 h: fibrinólise se sem contraindicação.\n- Após fibrinólise: avaliar sucesso em 60-90 min. Se falha, angioplastia de resgate. Se sucesso, angiografia precoce.\n\nSe SCA sem supra:\n\n- Estratifique risco: HEART para dor torácica na emergência; GRACE/TIMI para SCASEST confirmada.\n- Instabilidade, dor refratária, arritmia grave, IC/choque, alteração dinâmica de ST/T ou troponina muito elevada = estratégia invasiva urgente/precoce.\n- Baixo risco com ECG sem isquemia e troponina seriada negativa pode ir para alta orientada/seguimento conforme protocolo.\n\n### 2. Pacote Inicial De SCA\n\nPense em **AAS + P2Y12 + anticoagulante + estatina + reperfusão/estratificação**, e use anti-isquêmicos conforme contexto.\n\n| Medida | Quando usar | Cuidado |\n|---|---|---|\n| AAS | Praticamente toda SCA sem alergia verdadeira | Mastigar ataque |\n| P2Y12 | IAMCST/fibrinólise/PCI/SCASEST conforme estratégia | Escolha varia por fibrinólise, idade e PCI |\n| Heparina/enoxaparina | Anticoagulação na SCA | Ajustar renal/idade/peso |\n| Estatina alta intensidade | Precoce | Atorvastatina 80 ou rosuvastatina 20-40 |\n| Nitrato | Dor persistente, congestão, hipertensão | Evitar hipotensão, infarto de VD, uso de PDE5 |\n| Beta-bloqueador | Se hipertenso/taquicardico sem contraindicação | Evitar choque, IC aguda, BAV, bradi, broncoespasmo grave |\n| Oxigênio | SatO2 baixa, desconforto, choque | Não é rotina se SatO2 normal |\n| Morfina | Dor refratária | Pode atrasar absorcao de P2Y12; uso restrito |\n\n### 3. Bradicardia Instável\n\nInstabilidade: hipotensão, choque, dor isquêmica, edema agudo de pulmão, síncope/rebaixamento.\n\nConduta:\n\n1. Monitor, acesso IV, ECG, O2 se hipoxemia.\n2. Procurar causa: IAM inferior, hiperK, intoxicação por beta-bloqueador/bloqueador de canal de cálcio/digoxina, hipotermia, hipóxia.\n3. Atropina 1 mg IV, repetir a cada 3-5 min até 3 mg.\n4. Se falha ou BAV alto grau com instabilidade importante: marca-passo transcutâneo.\n5. Ponte/alternativa: adrenalina 2-10 mcg/min ou dopamina 5-20 mcg/kg/min.\n6. Preparar marca-passo transvenoso se BAVT/Mobitz II/instabilidade persistente.\n\nPegada TEME: Mobitz II, BAV avançado e BAVT não são lugar para \"esperar atropina fazer milagre\".\n\n### 4. Taquicardia Com Pulso\n\nPrimeira Pergunta: está instável por causa da taquicardia?\n\n- Instável: cardioversão sincronizada imediata, sedar se der tempo.\n- Sem pulso: algoritmo de PCR, desfibrilação se ritmo chocável.\n- estável: classificar QRS estreito/largo e regular/irregular.\n\nConduta por padrão:\n\n| ECG | Diagnósticos prováveis | Conduta |\n|---|---|---|\n| Estreito regular | TSV, flutter 2:1, sinusal | Vagal, adenosina; cardioversão se instável |\n| Estreito irregular | FA, flutter variável, MAT | Controle de frequência se estável; tratar causa |\n| Largo regular | TV até prova em contrário | Cardioversao se instável; antiarritmico se estável |\n| Largo irregular | FA pré-excitada, TV polimórfica/TdP | Evitar AV nodais; cardioversão/desfibrilação se instável |\n\nFA pré-excitada/WPW:\n\n- Suspeite se FA irregular muito rápida, QRS largo variável, FC muito alta.\n- Evite adenosina, beta-bloqueador, diltiazem/verapamil, digoxina e amiodarona IV.\n- Se instável: cardioversão.\n- Se estável: procainamida ou ibutilida conforme disponibilidade/protocolo.\n\nTorsades:\n\n- Sulfato de magnésio 2 g IV.\n- Corrigir K/Mg, suspender droga que prolonga QT.\n- Se instável/sem pulso: choque não sincronizado/desfibrilação.\n- Se recorrente com bradicardia: overdrive pacing/isoproterenol em contexto selecionado.\n\n### 5. PA Muito Alta: É emergência?\n\nNão trate número isolado. Procure lesão aguda de órgão-alvo:\n\n- Neurológico: encefalopatia, AVCi/AVCh, HSA, convulsão.\n- Cardiovascular: SCA, dissecção de aorta, EAP/SCAPE.\n- Renal: IRA/oligúria/hematúria.\n- Obstétrico: pré-eclampsia grave/eclampsia/HELLP.\n- Retina: papiledema/retinopatia grave, se disponível.\n\nSe não há lesão aguda:\n\n- Repetir PA com técnica correta, analgesia/ansiedade/retenção urinária.\n- Ajuste VO e seguimento; redução agressiva EV faz mal.\n\nSe há emergência hipertensiva:\n\n- Preferir EV titulavel.\n- Regra geral: reduzir PA media até 25% na primeira hora; depois perto de 160/100 em 2-6 h; depois gradual em 24-48 h.\n- Exceções tem metas proprias.\n\n### 6. situações Hipertensivas Que A Banca Gosta\n\n| situação | Meta/conduta |\n|---|---|\n| Disseccao de aorta | FC < 60 e PAS < 120 rapidamente; beta-bloqueador antes do vasodilatador |\n| SCAPE/EAP hipertensivo | VNI + nitroglicerina EV; diurético se congestão/hipervolemia |\n| SCA + hipertensão | Nitroglicerina, analgesia, antitrombóticos/reperfusão; evitar queda brusca |\n| AVCi candidato a trombólise | PA < 185/110 antes; manter < 180/105 depois |\n| AVCi sem reperfusão | Geralmente tratar se > 220/120; reduzir cerca de 15% em 24 h |\n| Hemorragia intracraniana | redução controlada; alvo comum PAS 140-160, evitando hipotensão |\n| Eclampsia/pré-eclampsia grave | Sulfato de magnésio + labetalol/hidralazina/nifedipina; obstetrícia |\n| Encefalopatia hipertensiva | Reduzir PA media até 25% na primeira hora |\n\nSCAPE/EAP hipertensivo:\n\n1. Sentar o paciente.\n2. VNI precoce se desconforto/hipoxemia.\n3. Nitroglicerina EV titulada; em SCAPE grave, muitos protocolos usam doses altas/bolus.\n4. Furosemida se congesto/hipervolêmico, mas não espere a diurese para melhorar pós-carga.\n5. Procurar SCA, valvopatia, arritmia, falha renal.\n\n## Conceitos que sustentam a conduta\n\n### SCA: Tempo E Miocardio\n\nNo IAMCST, a Pergunta principal não é \"qual troponina?\", é \"como reperfundir?\". Troponina pode confirmar necrose, mas não deve atrasar hemodinâmica ou fibrinólise quando o ECG e o contexto fecham IAMCST/equivalente.\n\nNo SCASEST, o risco manda. Um paciente com dor recorrente, instabilidade, IC, choque, arritmia grave, alteração dinâmica de ST/T ou troponina alta não é \"dor torácica para observar no corredor\".\n\n### Arritmia: Instabilidade Vem Antes Do Nome Bonito\n\nTaquicardia instável é elétrica até prova em contrário: cardioversão sincronizada. Bradicardia instável precisa aumentar frequência/perfusão: atropina pode ajudar, mas marcapasso e catecolamina devem estar prontos.\n\nQRS largo em emergência deve ser tratado como TV até prova em contrário. O erro fatal e bloquear nodo AV em FA pré-excitada ou tentar \"amiodarona para tudo\".\n\n### Emergência Hipertensiva: Lesão De Órgão-Alvo\n\nPA alta crônica pode ser assustadora, mas a urgência real é a lesão aguda. Reduzir PA agressivamente em paciente sem LOA pode causar AVC, IAM, síncope e lesão renal. Em contraste, dissecção, eclampsia, SCAPE e encefalopatia pedem tratamento imediato.\n\n## Fluxograma\n\n### Dor torácica/SCA\n\n```mermaid\nflowchart TD\n    A[\"Dor torácica ou equivalente aneinoso\"] --> B[\"ECG <=10 min + monitor + acesso + AAS\"]\n    B --> C{\"Supra/equivalente?\"}\n    C -->|Sim| D[\"Ativar reperfusão\"]\n    D --> E{\"PCI <=120 min do primeiro contato?\"}\n    E -->|Sim| F[\"Angioplastia primária\"]\n    E -->|Não é sem contraindicação| G[\"fibrinólise + anticoagulante + transferência\"]\n    G --> H{\"reperfusão em 60-90 min?\"}\n    H -->|Não| I[\"Angioplastia de resgate\"]\n    H -->|Sim| J[\"Angiografia precoce\"]\n    C -->|Não| K[\"Troponina seriada + HEART/GRACE + ECG seriado\"]\n    K --> L{\"Alto risco/instável?\"}\n    L -->|Sim| M[\"Estratégia invasiva urgente/precoce\"]\n    L -->|Não| N[\"observação, teste/alta segura conforme protocolo\"]\n```\n\n### Taquicardia Com Pulso\n\n```mermaid\nflowchart TD\n    A[\"Taquicardia com pulso\"] --> B{\"Instável?\"}\n    B -->|Sim| C[\"Cardioversao sincronizada; sedar se possível\"]\n    B -->|Não| D{\"QRS estreito ou largo?\"}\n    D -->|Estreito regular| E[\"Vagal -> adenosina 6 mg -> 12 mg\"]\n    D -->|Estreito irregular| F[\"FA/flutter: controle FC, anticoag/causa\"]\n    D -->|Largo regular| G[\"Tratar como TV: antiarritmico ou cardioversão se piora\"]\n    D -->|Largo irregular| H[\"FA pré-excitada/TdP: evitar AV nodais; choque se instável\"]\n```\n\n### PA Elevada\n\n```mermaid\nflowchart TD\n    A[\"PA muito elevada\"] --> B[\"Confirmar medida + avaliar sintomas\"]\n    B --> C{\"Lesão aguda de órgão-alvo?\"}\n    C -->|Não| D[\"Não baixar rápido; medicação VO/seguimento\"]\n    C -->|Sim| E[\"Emergência hipertensiva: droga EV titulavel\"]\n    E --> F{\"Qual Cenário?\"}\n    F -->|Disseccao| G[\"Esmolol/labetalol; PAS <120 e FC <60\"]\n    F -->|SCAPE/SCA| H[\"Nitroglicerina + VNI/reperfusão conforme caso\"]\n    F -->|AVC| I[\"Meta específica para trombólise/hemorragia\"]\n    F -->|Eclampsia| J[\"MgSO4 + labetalol/hidralazina/nifedipina\"]\n    F -->|Outros| K[\"Reduzir PAM até 25% na primeira hora\"]\n```\n\n## Doses, alvos e números\n\n### SCA\n\n| Item | Dose/alvo |\n|---|---|\n| ECG | Até 10 min da chegada/primeiro contato |\n| AAS ataque | 162-325 mg VO mastigado |\n| AAS manutenção | 75-100 mg/dia |\n| Ticagrelor ataque | 180 mg VO; manutenção 90 mg 12/12 h |\n| Clopidogrel ataque PCI | 600 mg VO comum em PCI |\n| Clopidogrel fibrinólise | 300 mg se <75 anos; sem ataque se >=75 anos em muitos protocolos |\n| HNF | 60 U/kg IV max 4000; depois 12 U/kg/h max 1000 U/h |\n| Enoxaparina | 1 mg/kg SC 12/12 h; ajustar se ClCr <30 |\n| Enoxaparina no IAMCST/fibrinólise | 30 mg IV bolus se <75 anos, depois 1 mg/kg SC 12/12 h |\n| Atorvastatina | 80 mg VO precoce |\n| Nitroglicerina SL | 0,4 mg ou isordil 5 mg SL, repetir até 3 doses se PA permite |\n| Nitroglicerina EV | 5-10 mcg/min, titular; curso usa 10 mcg/min inicial |\n| Oxigênio | Usar se SatO2 <90%, desconforto respiratório ou choque |\n| PCI preferencial | Se consegue em até 120 min do primeiro contato |\n| fibrinólise | Ideal porta-agulha até 30 min quando PCI atrasada |\n| Sucesso litico | Dor melhora + supra reduz >50% em 60-90 min |\n\n### Arritmias\n\n| situação | Dose/energia |\n|---|---|\n| Atropina bradicardia | 1 mg IV a cada 3-5 min, max 3 mg |\n| Adrenalina bradicardia | 2-10 mcg/min |\n| Dopamina bradicardia | 5-20 mcg/kg/min |\n| Adenosina TSV | 6 mg IV rápido; depois 12 mg |\n| Cardioversao estreita regular | 50-100 J sincronizado |\n| Cardioversao estreita irregular | 120-200 J bifasico sincronizado |\n| Cardioversao larea regular | 100 J sincronizado |\n| TV estável amiodarona | 150 mg IV em 10 min, repetir se necessário; depois infusão |\n| Torsades | MgSO4 2 g IV |\n| FA pré-excitada estável | Procainamida/ibutilida se disponível; cardioversão se instável |\n\n### Emergências Hipertensivas/IC\n\n| situação/fármaco | Dose/alvo |\n|---|---|\n| Regra geral | Reduzir PAM até 25% na 1a hora |\n| Disseccao aórtica | PAS <120 e FC <60 em cerca de 20 min |\n| AVCi trombólise | <185/110 antes; <180/105 após |\n| AVCi sem trombólise | Tratar se >220/120; reduzir ~15% em 24 h |\n| Nitroglicerina EV | 5-200 mcg/min, titular |\n| Nitroprussiato | 0,3-10 mcg/kg/min; monitorização rigorosa |\n| Esmolol | 500 mcg/kg bolus; 50-300 mcg/kg/min |\n| Labetalol | 10-20 mg IV, repetir/titular conforme protocolo |\n| Hidralazina gestação | 5-10 mg IV, repetir a cada 20-30 min |\n| Nifedipina gestação | 10 mg VO, repetir conforme protocolo |\n| MgSO4 eclampsia | Ataque 4-6 g IV; manutenção 1-2 g/h |\n| Furosemida ICA | 20-40 mg IV se virgem ou 1-2x dose VO usual; curso usa 1 mg/kg |\n| Dobutamina | 2,5-20 mcg/kg/min |\n| Noradrenalina | 0,05-1 mcg/kg/min, titular |\n\n## Pegadinhas TEME\n\n- **Troponina antes da hemodinâmica no IAMCST claro:** errado se atrasa reperfusão.\n- **Oxigênio para todo IAM:** errado. Se SatO2 normal, não é rotina.\n- **Nitrato em infarto de VD/hipotensão/PDE5:** perigoso.\n- **Morfina como pilar obrigatório da SCA:** hoje uso restrito para dor refratária.\n- **Angioplastia vai demorar >120 min e não pensar trombólise:** pegadinha clássica.\n- **Bradicardia instável: ficar repetindo atropina sem preparar marca-passo:** erro de estação.\n- **BAV Mobitz II/BAVT como se fosse vasovagal:** errado.\n- **Toda taquicardia larea = amiodarona lenta:** se instável, choque sincronizado.\n- **FA pré-excitada + diltiazem/verapamil/beta-bloqueador/digoxina/adenosina:** pode degenerar para FV.\n- **PA 220/120 assintomatica = nitroprussiato:** errado sem lesão de órgão-alvo.\n- **Emergência hipertensiva = baixar PA para normal:** errado, salvo exceções; evite hipoperfusão.\n- **Eclampsia = benzodiazepínico como primeira linha:** errado. Sulfato de magnésio.\n- **SCAPE = esperar furosemida:** errado. VNI e vasodilatação mudam o jogo.\n\n## Erros fatais na prática\n\n- Não fazer ECG em até 10 minutos em dor torácica.\n- Não reconhecer equivalentes de supra ou deixar de fazer derivações direitas/posteriores.\n- Fibrinolisar paciente com contraindicação absoluta sem checar sangramento/AVCh/dissecção.\n- Mandar IAMCST para hospital sem hemodinâmica sem estratégia de rede.\n- Cardioverter sem sincronizar uma taquicardia com pulso organizada.\n- Tentar sedar longamente paciente instável antes do choque.\n- Dar bloqueador AV em FA pré-excitada.\n- Ignorar hipercalemia/intoxicação em bradicardia grave.\n- Reduzir PA de forma abrupta em AVCi ou PA elevada sem LOA.\n- Tratar SCAPE só com diurético e oxigênio, sem VNI/nitrato quando PA permite.\n\n## Para prova vs na prática\n\n| Tema | Resposta TEME | Atualização/Prática |\n|---|---|---|\n| SCA inicial | ECG <=10 min, AAS, monitor, troponina e reperfusão se supra | Troponina de alta sensibilidade e protocolos 0/1h ou 0/2h ajudam alta segura em baixo risco |\n| Oxigênio no IAM | Usar se hipoxemia/dispneia/choque | AHA/ACC 2025 não recomenda rotina se oxigenação normal |\n| fibrinólise | Se PCI >120 min e sem contraindicação | Rede local manda; após litico, resgate se falha e angiografia precoce se sucesso |\n| P2Y12 | Clopidogrel no litico; ticagrelor/prasugrel comuns em PCI | Ajustar por idade, sangramento, anticoagulação, AVC prévio e estratégia invasiva |\n| FA aguda | Instável = cardioversão | Se pré-excitada, evite AV nodais; se >48 h/tempo incerto, anticoag/TEE se não emergencial |\n| Bradicardia | Atropina 1 mg; marca-passo/catecolamina se falhar | Em BAV alto grau, prepare marca-passo cedo |\n| PA alta | Emergência só com LOA aguda | Termo \"urgência hipertensiva\" vem perdendo valor; evitar redução EV em assintomaticos |\n| SCAPE | VNI + nitrato + diurético | Nitrato em dose alta/bolus pode ser usado por protocolos experientes; monitorar hipotensão |\n\n## Checklist de revisão\n\n- [ ] Sei fazer abordagem inicial da dor torácica em até 10 min.\n- [ ] Sei quando IAMCST vai para PCI e quando considerar fibrinólise.\n- [ ] Sei doses de AAS, Clopidogrel/ticagrelor, heparina/enoxaparina e nitrato.\n- [ ] Sei que oxigênio não é rotina no IAM com SatO2 normal.\n- [ ] Sei contraindicações críticas de nitrato e fibrinólise.\n- [ ] Sei tratar bradicardia instável e quando preparar marca-passo.\n- [ ] Sei classificar taquicardia por instabilidade, QRS e regularidade.\n- [ ] Sei que FA pré-excitada não recebe bloqueador nodal.\n- [ ] Sei reconhecer emergência hipertensiva por lesão de órgão-alvo.\n- [ ] Sei metas de PA em dissecção, AVCi trombólise, AVCi sem trombólise, eclampsia e SCAPE.\n- [ ] Sei que SCAPE precisa VNI + nitrato precoce se PA permite.\n\n## Questões e estações relacionadas\n\n- **TEME22:** IAM e oxigênio; doenças hipertensivas da gestação; bradicardia/hipercalemia; STEMI com choque; bradicardia instável; fibrinólise quando PCI atrasa.\n- **TEME23:** SCA, choque, síncope, arritmias, PA em AVC e emergências obstétricas.\n- **TEME24:** estação prática com BAVT instável, IAMCST, marca-passo e FV; prova com tamponamento/choque, pós-RCE e arritmias.\n- **TEME25:** TV/taquicardia instável, atendimento APH do IAMCST, eclampsia pós-parto, choque cardiogênico SCAI, FV refratária, marca-passo transvenoso, intoxicações com bradicardia e IC terminal/paliativos.\n- **Emergency Talks:** Aula 34 - Síncope e Arritmias; Aula 36 - Síndrome Coronariana Aguda; Aula 47 - Emergências hipertensivas e IC Aguda; Aula 48 - Pericardite, Miocardite e Endocardite.\n\n## Referências\n\n- Conteúdo programático TEME26 e referências oficiais do edital.\n- Provas teóricas TEME22, TEME23, TEME24 e TEME25 disponíveis no projeto.\n- Estações práticas TEME22-25 disponíveis no projeto.\n- Emergency Talks: Aula 34 - Síncope e Arritmias; Aula 36 - Síndrome Coronariana Aguda; Aula 47 - Emergências hipertensivas e IC Aguda; Aula 48 - Pericardite, Miocardite e Endocardite.\n- Resumo do Emergency.docx, arquivo do usuário.\n- ACC/AHA/ACEP/NAEMSP/SCAI. 2025: [Guideline for the Management of Patients With Acute Coronary Syndromes](0).\n- European Society of Cardiology. 2023: [Guidelines for the management of acute coronary syndromes](1).\n- American Heart Association. 2025: [Adult Advanced Life Support](2).\n- ACC/AHA/ACCP/HRS. 2023: [Guideline for the Diagnosis and Management of Atrial Fibrillation](3).\n- European Society of Cardiology. 2024: [Guidelines for the management of elevated blood pressure and hypertension](4).\n- American Heart Association. 2024: [The Management of Elevated Blood Pressure in the Acute Care Setting](5).\n"},{"id":"temas/006_choque-sepse-vasoativos.md","title":"006 - Choque, Sepse E Drogas Vasoativas","markdown":"# 006 - Choque, Sepse E Drogas Vasoativas\n\n## Leitura de 30 segundos\n\n- Choque e hipoperfusão, não apenas hipotensão: confusão, TEC lento, moteamento, pele fria, oligúria, lactato e base déficit contam.\n- Primeiro minuto: ABCDE, monitor, dois acessos/IO, gaso/lactato, ECG, POCUS/RUSH, tratar causa obvia e não atrasar vasopressor se colapsando.\n- Sepse = infecção + disfunção orgânica; choque séptico = vasopressor para PAM >=65 após volume adequado + lactato >2.\n- Na prova, sepse grave/choque pede culturas se não atrasar, antibiótico precoce, cristaloide 30 mL/kg em até 3 h, lactato seriado, noradrenalina e controle de foco.\n- Na prática, depois do volume inicial, o jogo e reavaliação: fluido-responsividade, fluido-tolerância, VTI/PLR, B-lines, VCI, perfusão e lactato.\n- Noradrenalina é vasopressor de primeira linha no choque séptico; vasopressina entra como poupadora; adrenalina entra em refratário; dobutamina e inotrópico.\n- Choque anafilático = adrenalina IM primeiro. Corticoide e anti-histamínico são coadjuvantes, não salvam o colapso.\n\n## Por que cai\n\nChoque e sepse aparecem porque a banca consegue testar raciocínio de sala vermelha em qualquer área: trauma, pediatria, gestante, SCA, TEP, infecção, anafilaxia, intoxicação e ventilação mecânica.\n\nO que já apareceu no padrão TEME:\n\n- TEME22: choque hipovolêmico pediátrico, shock index, sepse com POCUS/VCI/B-lines, noradrenalina periferica/sem esperar CVC, resposta a ressuscitação por lactato/BE/diurese.\n- TEME23: definição e fisiologia do choque, DO2/VO2, fluido-responsividade, VCI, choque hipovolêmico/obstrutivo no RUSH.\n- TEME24: choque neurogênico versus hemorrágico, trauma com FAST negativo, choque cardiogênico, pós-RCE e reavaliação.\n- TEME25: choque cardiogênico SCAI, TEP com choque, anafilaxia com hipotensão, sepse urinária com altas doses de vasopressor, TRALI/TACO e lactato.\n- Estações práticas: trauma hemorrágico, POCUS em choque, BAVT/IAMCST com choque e decisão de marca-passo/vasoativo.\n\nMensagem de prova: se a alternativa trata a PA e esquece perfusão/fonte, ou da volume sem reavaliar, desconfie.\n\n## Abordagem prática\n\n### 1. Reconheça Choque Antes Da Hipotensão\n\nSinais de hipoperfusão:\n\n- Estado mental alterado, agitação ou sonolência.\n- TEC > 2-3 s, pele fria, moteamento, livedo.\n- Pulso fino, extremidades frias ou pulso amplo em distributivo inicial.\n- Oliguria: < 0,5 mL/kg/h.\n- Lactato > 2 mmol/L ou lactato subindo.\n- Base déficit/metabólica, acidose, ScvO2 baixa quando disponível.\n- Shock index > 0,9 sugere risco, principalmente no trauma/hemorragia.\n\nRegra TEME: choque pode existir com PA \"normal\", especialmente jovem, gestante, pediátrico, hipertenso crônico e paciente em catecolamina endógena alta.\n\n### 2. Primeiros 5 Minutos\n\n1. ABCDE, monitor, desfibrilador próximo se instável.\n2. Oxigênio se hipoxemia/desconforto; considerar IOT se falência respiratória, mas preparar vasopressor antes.\n3. Dois acessos calibrosos ou IO; colher gaso, lactato, hemograma, eletrólitos, renal, coagulograma, culturas se infecção provável e sem atraso.\n4. ECG e POCUS/RUSH se disponível.\n5. Tratar causa obvia imediata: sangramento, pneumotórax hipertensivo, tamponamento, anafilaxia, TEP maciço, arritmia, SCA.\n6. Iniciar volume, sangue, vasopressor ou inotrópico conforme fenótipo.\n7. Reavaliar em ciclos curtos: PA/PAM, pulso, TEC, pele, consciência, diurese, lactato, POCUS.\n\nFrase de plantão: \"Estou tratando hipoperfusão enquanto descubro o tipo de choque; não vou esperar todos os exames para ressuscitar.\"\n\n### 3. Classifique Por fenótipo\n\n| Tipo | Pista clínica | POCUS/lab | Conduta inicial |\n|---|---|---|---|\n| Hipovolêmico/hemorrágico | História de perda, trauma, HDA, desidratação; pele fria | VE pequeno/hiperdinâmico, VCI colabável, lactato/BE | Cristaloide como ponte se não hemorrágico; sangue/controle fonte se hemorrágico |\n| Distributivo/séptico | Febre/hipotermia, foco, vasodilatação, pele quente inicial ou fria tardia | VCI variável, VE hiperdinâmico ou disfunção séptica, lactato | ATB, foco, cristaloide balanceado, noradrenalina |\n| Anafilático | Exposição + pele/mucosa, broncoespasmo/edema, hipotensão | Diagnóstico clínico | Adrenalina IM, via aérea, volume, broncodilatador |\n| Cardiogênico | SCA, IC, arritmia, B3, congestão, extremidades frias | VE ruim, B-lines, VCI cheia, lactato | Noradrenalina se hipotenso, dobutamina se baixo débito, tratar causa |\n| Obstrutivo | TEP, tamponamento, pneumotórax, VM/auto-PEEP | VD grande, derrame pericárdico, sliding ausente, VCI cheia | Desobstruir: trombólise/anticoag, pericardiocentese, toracostomia |\n| Neurogênico | Trauma medular, hipotensão + bradicardia, pele quente/seca | FAST negativo ajuda, mas não exclui hemorragia | Excluir sangramento primeiro; vasopressor, volume critérioso, atropina se bradi grave |\n\n### 4. Sepse E Choque Septico\n\nSuspeite de sepse quando infecção vem com disfunção orgânica:\n\n- Hipotensão/PAM baixa ou necessidade de vasopressor.\n- Lactato > 2.\n- Rebaixamento, delirium, oligúria, creatinina subindo.\n- Hipoxemia, plaquetopenia, bilirrubina alta, coagulopatia.\n- qSOFA >=2 ajuda a perceber risco, mas não deve ser usado sozinho para excluir sepse.\n\nPacote inicial prático:\n\n1. Reconhecer e acionar fluxo de sepse se existir.\n2. Dosar lactato; repetir em 2-4 h se elevado ou se choque.\n3. Coletar hemoculturas e culturas do foco antes do antibiótico se não atrasar.\n4. Antibiótico empirico amplo precoce.\n5. Cristaloide balanceado se hipoperfusão/septic shock; 30 mL/kg em até 3 h e reavaliação frequente.\n6. Noradrenalina se PAM <65 ou hipoperfusão persistente; não esperar CVC se o paciente está colapsando.\n7. Controle de foco: drenar, retirar cateter, operar, desobstruir, limpar, conforme fonte.\n\nAntibiótico:\n\n- **Choque séptico ou sepse provável/definida grave:** imediato, alvo clássico de até 1 h.\n- **Possível sepse sem choque:** investigue rápido e trate cedo se a probabilidade subir; não transforme todo SIRS em meropenem automático.\n- Reavaliar 48-72 h para descalonar, estreitar, suspender se não era infecção e ajustar por cultura.\n\n### 5. Fluido: Responsividade E tolerância\n\nPerguntas antes de repetir volume:\n\n1. O paciente ainda está hipoperfundido?\n2. Ele é fluido-responsivo?\n3. Ele é fluido-tolerante?\n4. Existe uma fonte que precisa ser controlada em vez de \"mais soro\"?\n\nFerramentas:\n\n- Passive leg raise com VTI/VS: aumento de 10-15% sugere responsividade.\n- Mini-bolus 250-500 mL com VTI/PA/perfusão.\n- VCI: útil como parte do conjunto; isolada engana.\n- pulmão: B-lines novas/difusas indicam baixa tolerância.\n- Clínica: TEC, moteamento, diurese, ausculta, congestão, trabalho respiratório.\n\nDepois de 30 mL/kg na sepse ou volume inicial no choque, pare de agir no automático. O excesso de fluido também mata.\n\n### 6. Drogas Vasoativas: Escolha Pelo Problema\n\n| Problema | Droga principal | Comentario |\n|---|---|---|\n| Vasoplegia/séptico | Noradrenalina | Primeira linha para PAM >=65 |\n| Noradrenalina subindo | Vasopressina 0,03 U/min | Poupadora de noradrenalina; não é primeira linha isolada |\n| Choque refratário | Adrenalina | Alternativa/adicional; pode aumentar lactato |\n| Baixo débito/miocárdio ruim | Dobutamina | Inotrópico; pode causar hipotensão/taquiarritmia |\n| Anafilaxia | Adrenalina IM | Primeira linha; IV só em refratário por equipe experiente |\n| Bradicardia instável | Adrenalina/dopamina/marca-passo | Ver capítulo de arritmias |\n| Neurogênico | Noradrenalina geralmente boa escolha | Fenilefrina pode piorar bradi; individualizar |\n\nNoradrenalina periférica:\n\n- Pode ser iniciada por acesso periférico calibroso/proximal com monitorização e protocolo local.\n- Não use acesso duvidoso, mão/pe fráeil ou bomba sem vigilância.\n- Se extravasar: parar, aspirar, elevar, marcar área, tratar conforme protocolo.\n- CVC e desejavel se dose alta, uso prolongado ou múltiplas drogas, mas esperar CVC em choque profundo e erro.\n\n### 7. Corticoide, Transfusão E Adjuntos\n\n- Hidrocortisona 200 mg/dia no choque séptico com necessidade persistente de vasopressor.\n- Hemoglobina alvo restritivo geralmente 7 g/dL, salvo sangramento ativo, isquemia miocárdica, hipoxemia grave ou contexto específico.\n- Controle glicêmico: iniciar insulina se glicose >=180 mg/dL, evitando hipoglicemia.\n- Bicarbonato: não corrige choque; considerar em acidemia grave selecionada, hipercalemia ou indicações específicas.\n- Albumina pode ser considerada se grande volume de cristaloide e necessidade persistente, mas não é a primeira ampola da sepse.\n- Controle de foco e antibiótico certo importam mais que vitamina C, \"coquetel\" ou moda de UTI.\n\n## Conceitos que sustentam a conduta\n\n### DO2, VO2 E Lactato\n\nChoque é falha em entregar oxigênio suficiente ao tecido. A oferta de oxigênio depende de conteúdo arterial de O2 e débito cardíaco. Quando a oferta cai abaixo do ponto crítico, o consumo passa a depender da oferta, aparece metabolismo anaeróbio e o lactato sobe.\n\nLactato é marcador de risco e perfusão, mas não é \"choquímetro perfeito\". Beta-agonista, convulsão, hepatopatia, intoxicações, isquemia regional e adrenalina podem elevar lactato sem significar apenas falta de volume.\n\n### PAM 65 E Perfusão Individual\n\nPAM >=65 mmHg e alvo inicial razoável no choque séptico. Mas a meta real e perfusão: mentacao, pele, TEC, diurese, lactato, acidose, órgãos. Hipertenso crônico, DRC, HIC, gestante e cardiopata podem precisar ajuste.\n\n### qSOFA, SIRS E Bom Senso\n\nqSOFA ajuda a identificar paciente infectado com risco maior de mau desfecho, mas é pouco sensível para triagem isolada. SIRS é sensível demais e acende em dor, trauma, pancreatite, abstinência, TEP e ansiedade. Na prova, saiba os critérios; na prática, use julgamento clínico e disfunção orgânica.\n\n## Fluxograma\n\n### Choque Indiferenciado\n\n```mermaid\nflowchart TD\n    A[\"Hipoperfusao ou hipotensão\"] --> B[\"ABCDE + monitor + acesso/IO + gaso/lactato + ECG + POCUS\"]\n    B --> C{\"Causa imediatamente tratável?\"}\n    C -->|Sangramento| D[\"Controle mecânico + sangue/protocolo maciço\"]\n    C -->|Pneumotórax hipertensivo| E[\"Descompressão/drenagem\"]\n    C -->|Tamponamento| F[\"Pericardiocentese/cirurgia\"]\n    C -->|Anafilaxia| G[\"Adrenalina IM + via aérea + volume\"]\n    C -->|Arritmia/SCA| H[\"Choque/cardioversão/reperfusão conforme caso\"]\n    C -->|Indefinida| I[\"Fenotipar: hipovolêmico, distributivo, cardiogênico, obstrutivo\"]\n    I --> J{\"Fluido-responsivo e tolerante?\"}\n    J -->|Sim| K[\"Cristaloide/sangue conforme causa + reavaliar\"]\n    J -->|Não ou dúvida com choque| L[\"Vasopressor/inotrópico + tratar causa + reavaliar\"]\n```\n\n### Sepse/Choque Septico\n\n```mermaid\nflowchart TD\n    A[\"Infecção suspeita + disfunção orgânica\"] --> B[\"Lactato + culturas sem atrasar ATB + foco\"]\n    B --> C{\"Choque séptico ou alta probabilidade?\"}\n    C -->|Sim| D[\"Antibiótico imediato/até 1h + cristaloide balanceado\"]\n    C -->|Possível sem choque| E[\"Investigar rápido; ATB se probabilidade subir\"]\n    D --> F{\"PAM <65 ou hipoperfusão persiste?\"}\n    F -->|Sim| G[\"Noradrenalina; periférica se necessário com protocolo\"]\n    F -->|Não| H[\"Reavaliar perfusão e lactato\"]\n    G --> I{\"Nora alta ou refratário?\"}\n    I -->|Sim| J[\"Adicionar vasopressina; considerar adrenalina/hidrocortisona\"]\n    I -->|Disfunção miocárdica/baixo débito| K[\"Dobutamina ou adrenalina conforme fenótipo\"]\n    H --> L[\"Controle de foco + descalonamento em 48-72h\"]\n    J --> L\n    K --> L\n```\n\n### Escolha Rápida Do Vasoativo\n\n```mermaid\nflowchart TD\n    A[\"Paciente em choque\"] --> B{\"Qual problema dominante?\"}\n    B -->|Vasoplegia| C[\"Noradrenalina\"]\n    B -->|Nora subindo| D[\"Adicionar vasopressina 0,03 U/min\"]\n    B -->|refratário| E[\"Adrenalina +/- hidrocortisona\"]\n    B -->|Baixo débito com PAM ok ou nora| F[\"Dobutamina\"]\n    B -->|Anafilaxia| G[\"Adrenalina IM primeiro\"]\n    B -->|Obstrutivo| H[\"Tratar obstrução: TEP/tamponamento/pneumo\"]\n```\n\n## Doses, alvos e números\n\n### Reconhecimento E Metas\n\n| Item | Número/alvo | observação TEME |\n|---|---:|---|\n| PAM inicial | >=65 mmHg | Ajustar ao paciente e perfusão |\n| Lactato | >2 mmol/L anormal | Repetir se elevado/choque |\n| Lactato muito alto | >=4 mmol/L | Alto risco; acionar ressuscitação agressiva |\n| Diurese | >=0,5 mL/kg/h | Alvo simples de perfusão renal |\n| TEC | <2-3 s | Usar seriado, junto de pele/moteamento |\n| Shock index | >0,9 | Sugere risco; FC/PAS |\n| qSOFA | FR >=22, PAS <=100, GCS <15 | >=2 = risco; não exclui sepse se baixo |\n\n### Fluido E Sepse\n\n| Item | Dose/alvo |\n|---|---|\n| Cristaloide inicial sepse/choque | 30 mL/kg em até 3 h se hipoperfusão/septic shock |\n| Crianças choque hipovolêmico | 20 mL/kg cristaloide, reavaliando |\n| Mini-bolus adulto | 250-500 mL e reavaliar |\n| PLR/VTI | Aumento 10-15% sugere responsividade |\n| Culturas | Antes do ATB se não atrasar |\n| Controle de foco | Idealmente precoce; SSC 2026 sugere alvo em até 6 h quando necessário |\n\n### Vasoativos E Adjuntos\n\n| Droga | Dose inicial comum | Uso principal |\n|---|---:|---|\n| Noradrenalina | 0,05-1 mcg/kg/min, titular | Primeira linha no choque séptico/vasoplégico |\n| Vasopressina | 0,03 U/min fixa | Adjuvante/poupadora de noradrenalina |\n| Adrenalina infusão | 0,01-0,5 mcg/kg/min, titular | refratário, alternativa, anafilaxia refratária |\n| Dobutamina | 2,5-20 mcg/kg/min | Baixo débito/disfunção miocárdica |\n| Dopamina | 5-20 mcg/kg/min | Evitar rotina; selecionados com bradicardia/baixo risco arritmico |\n| Fenilefrina | 0,2-3 mcg/kg/min | situações selecionadas; não primeira linha em sepse |\n| Hidrocortisona | 200 mg/dia | Choque séptico com vasopressor persistente |\n| Adrenalina anafilaxia adulto | 0,5 mg IM, 1 mg/mL, vasto lateral | Repetir a cada 5 min se necessário |\n| Cristaloide anafilaxia adulto | 500-1000 mL rápido | Repetir conforme resposta |\n\n### Antibiótico Empirico: Atalho Mental\n\n| Foco provável | Esquema mental inicial |\n|---|---|\n| Pneumonia comunitaria grave | Ceftriaxona + azitromicina ou quinolona respiratória; ampliar se risco Pseudomonas/MRSA |\n| Urinario complicado/urosepse | Ceftriaxona, cefepime ou piperacilina-tazobactam; drenar obstrução |\n| Intra-abdominal | Ceftriaxona + metronidazol ou piperacilina-tazobactam; cirurgia/drenagem |\n| Pele grave/fascite | Vancomicina + piperacilina-tazobactam/meropenem + clindamicina; cirurgia urgente |\n| Meningite suspeita | Ceftriaxona + vancomicina +/- ampicilina; dexametasona antes/junto |\n| Neutropenia febril | Cefepime ou piperacilina-tazobactam; ampliar conforme risco/local |\n\n## Pegadinhas TEME\n\n- **Choque = PAS <90:** errado. Choque e hipoperfusão.\n- **Lactato normal exclui choque:** errado, principalmente cedo ou regional.\n- **Lactato alto = dar soro até normalizar:** errado. Reavaliar responsividade/tolerância e causa.\n- **qSOFA baixo exclui sepse:** errado.\n- **Coletar cultura pode atrasar antibiótico:** não deve. Se vai atrasar, ATB primeiro.\n- **30 mL/kg significa desligar o cérebro:** errado. É ponto inicial na sepse com hipoperfusão, sempre com reavaliação.\n- **Noradrenalina só depois de CVC:** errado em choque profundo; iniciar periférica com segurança/protocolo.\n- **Dopamina é primeira linha no choque séptico:** errado.\n- **Vasopressina substitui noradrenalina:** errado; e adjuvante.\n- **Dobutamina aumenta PA de todo mundo:** pode derrubar PA se vasodilatar; use se baixo débito.\n- **Hidrocortisona é para toda sepse:** não. Choque com vasopressor persistente/refratário.\n- **Anafilaxia melhora com corticoide/anti-histamínico primeiro:** errado. Adrenalina IM primeiro.\n- **Choque neurogênico no politrauma antes de excluir hemorragia:** erro clássico.\n\n## Erros fatais na prática\n\n- Intubar paciente em choque sem vasopressor pronto e plano de colapso peri-IOT.\n- Dar litros de cristaloide em choque hemorrágico sem sangue/controle de fonte.\n- Atrasar noradrenalina enquanto \"espera fazer central\".\n- Tratar sepse sem procurar foco drenável/retirável/operável.\n- Confundir SIRS não infeccioso com sepse e esquecer diagnóstico real: TEP, pancreatite, hemorragia, crise convulsiva, intoxicação.\n- Não repetir lactato/perfusão após intervenção.\n- Não perceber congestão/B-lines/VD ruim antes de repetir volume.\n- Usar adrenalina IV bolus em anafilaxia fora de PCR por erro de diluicao.\n- Não reconhecer TEP/tamponamento/pneumotórax como choque obstrutivo tratável.\n- Ficar com PAM bonita e paciente ainda moteado, confuso e oligúrico.\n\n## Para prova vs na prática\n\n| Tema | Resposta TEME | Atualização/Prática |\n|---|---|---|\n| Definição de choque | Hipoperfusao com ou sem hipotensão | Use sinais clínicos seriados, lactato, gaso, POCUS é resposta ao tratamento |\n| Sepse | Infecção + disfunção orgânica; qSOFA aparece como triagem | SSC recomenda não depender de qSOFA isolado; julgamento clínico e disfunção orgânica mandam |\n| Antibiótico | Até 1 h em sepse grave/choque | SSC 2026 diferencia probabilidade: choque/sepse provável = imediato; possível sem choque = investigação rápida sem atrasar se piora |\n| Fluido | 30 mL/kg em 3 h na sepse com hipoperfusão | Depois disso, personalizar com medidas dinâmicas e tolerância; evitar tanto sub quanto hiperressuscitação |\n| Vasopressor | Noradrenalina primeira linha | Pode iniciar periférico com protocolo; CVC se dose alta/uso prolongado |\n| Vasoativo refratário | Vasopressina, adrenalina, hidrocortisona, dobutamina conforme fenótipo | fenótipo importa mais que sequência decorada |\n| Lactato | Repetir e buscar queda | Não é ordem para dar volume infinito; adrenalina, beta-agonista e hepatopatia confundem |\n| Anafilaxia | Adrenalina IM | IV apenas refratária/PCR ou por equipe treinada; anti-H1/corticoide são coadjuvantes |\n\n## Checklist de revisão\n\n- [ ] Sei reconhecer choque por hipoperfusão, não só PA.\n- [ ] Sei diferenciar hipovolêmico, distributivo, cardiogênico, obstrutivo e neurogênico.\n- [ ] Sei abordagem dos primeiros 5 minutos do choque.\n- [ ] Sei pacote inicial de sepse/choque séptico.\n- [ ] Sei que culturas não podem atrasar antibiótico.\n- [ ] Sei quando usar 30 mL/kg e quando parar para reavaliar.\n- [ ] Sei usar PLR/VTI, VCI, B-lines, TEC e lactato para reavaliação.\n- [ ] Sei que noradrenalina é primeira linha no choque séptico.\n- [ ] Sei papel de vasopressina, adrenalina, dobutamina e hidrocortisona.\n- [ ] Sei dose de adrenalina IM na anafilaxia.\n- [ ] Sei que choque neurogênico em trauma é diagnóstico depois de excluir hemorragia.\n\n## Questões e estações relacionadas\n\n- **TEME22:** choque hipovolêmico pediátrico; shock index; sepse com B-lines/VCI/VTI; noradrenalina sem esperar CVC; TEP com choque; eFAST no choque; lactato/BE/diurese como resposta.\n- **TEME23:** definição/fisiologia de choque, DO2/VO2, RUSH, VCI, fluido-responsividade, choque hipovolêmico e obstrutivo.\n- **TEME24:** trauma com FAST negativo, choque neurogênico versus hemorrágico, SCA/choque, pós-RCE e metas de perfusão.\n- **TEME25:** choque cardiogênico SCAI, TEP com choque, anafilaxia, sepse urinária com vasopressor, TRALI/TACO e lactato.\n- **Emergency Talks:** Aula 13 - Choque; Aula 22 - Sepse; Aula 63 - Emergências Infecciosas; Aula 47 - IC/choque cardiogênico; Aula 53 - intoxicações com choque/bradicardia.\n\n## Referências\n\n- Conteúdo programático TEME26 e referências oficiais do edital.\n- Provas teóricas TEME22, TEME23, TEME24 e TEME25 disponíveis no projeto.\n- Estações práticas TEME22-25 disponíveis no projeto.\n- Emergency Talks: Aula 13 - Choque; Aula 22 - Sepse; Aula 47 - Emergências hipertensivas e IC Aguda; Aula 53 - Intoxicações; Aula 63 - Emergências Infecciosas.\n- Resumo do Emergency.docx, arquivo do usuário.\n- Society of Critical Care Medicine/ESICM. 2026: [Surviving Sepsis Campaign International Guidelines for Management of Sepsis and Septic Shock](0).\n- SCCM. 2026: [SSC Adult Quick Guide Infographic](1).\n- Society for Cardiovascular Angiography and Interventions. 2022: [SCAI SHOCK Stages Classification Expert Consensus Update](2).\n- World Allerey Organization. 2020: [Anaphylaxis Guidance](3).\n"},{"id":"temas/007_emergencias-neurologicas.md","title":"007 - Emergências neurológicas: AVC, Crise Convulsiva, HIC E TCE","markdown":"# 007 - Emergências neurológicas: AVC, Crise Convulsiva, HIC E TCE\n\n## Leitura de 30 segundos\n\n- Em neuro, a banca cobra decisão tempo-dependente: glicemia, hora do último visto bem, TC sem contraste, indicação de reperfusão, PA-alvo e o que não pode atrasar.\n- Status epilepticus e crise no box são prova de método: ABC, glicemia, benzodiazepínico em dose cheia, segunda linha cedo e IOT/anestésico se refratário.\n- HIC/TCE e estação prática cobram alvos: oxigenação, ventilação, PA, sedação/analgesia, cabeça a 30 graus, solução hiperosmolar, reversão de coagulopatia e neurocirurgia.\n- Morte encefálica não é \"paciente com Glasgow 3\": precisa causa conhecida irreversível, coma aperceptivo, ausência de reflexos de tronco, apneia persistente e ausência de confundidores.\n\n## Por que cai\n\n- **Recorrência em provas/estações:** AVCi/trombólise/trombectomia, HSA/HIP, convulsão/eclampsia, coma, ONSD/HIC, TCE grave e morte encefálica aparecem de forma repetida entre TEME22-25.\n- **O que a banca costuma testar:** primeiro exame, janela, critérios de inclusao/exclusao, dose de alteplase/tenecteplase, PA antes/depois de trombólise, NIHSS/ASPECTS, conduta no status, manitol/hipertônica, hiperventilação, alvos em TCE e impeditivos do protocolo de ME.\n- **Como costuma aparecer:** caso clínico com muitos distratores. Exemplo clássico: \"convulsão\" que era síncope, \"AVC leve\" mas incapacitante, TCE com hipoxemia/hipotermia em que não se pode abrir ME, ou cefaleia explosiva com TC negativa em que a suspeita de HSA segue viva.\n\n## Abordagem prática\n\n### 1. Neurológico grave no primeiro minuto\n\n1. **ABCDE antes do diagnóstico fino:** via aérea, SpO2, capnografia se intubado, circulação, temperatura e glicemia capilar.\n2. **Defina a síndrome:** déficit focal súbito, crise convulsiva, cefaleia explosiva, rebaixamento, trauma ou infecção.\n3. **Procure mímicos reversíveis:** hipoglicemia, hiponatremia, hipercapnia, hipoxemia, intoxicação, abstinência, sepse, eclampsia, pós-ictal.\n4. **Chame ajuda cedo:** neurologia/teleAVC, neurocirurgia, hemodinâmica/trombectomia, UTI e transporte regulado quando necessário.\n5. **Não sedar a prova neurológica sem motivo:** se precisa intubar, documente Glasgow, pupilas, déficit focal e drogas usadas antes.\n\n### 2. Déficit focal agudo: pensar AVC até prova em contrário\n\n1. **Hora zero:** último visto bem, uso de anticoagulante, cirurgia/sangramento recente, PA, glicemia, NIHSS e status funcional prévio.\n2. **TC sem contraste imediata:** objetivo inicial é excluir hemorragia. Não espere laboratório se não há suspeita de anticoagulação/coagulopatia relevante.\n3. **Se TC sem sangramento e janela até 4h30:** avaliar trombólise, corrigindo PA para menos de 185/110 se necessário.\n4. **Se suspeita de oclusão de grande vaso:** angioTC/angioRM e acionar trombectomia; até 6 h critérios mais diretos, até 24 h selecionados por imagem/mismatch.\n5. **Se não reperfundir:** antiagregação após excluir hemorragia, controle de fatores e investigação etiológica. Não baixar PA agressivamente sem indicação.\n\n> **Resposta de prova TEME:** déficit focal súbito + TC sem contraste sem sangramento + janela elegível = trombólise se sem contraindicação; se LVO/NIHSS alto/ASPECTS adequado = trombectomia.\n>\n> **Atualização clínica:** tenecteplase 0,25 mg/kg em bolus único é alternativa forte em várias diretrizes internacionais, especialmente em candidato a trombectomia. No PCDT brasileiro de AVCi agudo, atualizado em 2025, a alteplase segue como trombolítico preconizado, e a tenecteplase não é recomendada por ausência de indicação aprovada em bula para AVCi no Brasil.\n\n### 3. Crise convulsiva e status epilepticus\n\n1. **Se convulsão ativa:** lateralizar/proteger, aspirar se necessário, O2, acesso, glicemia, temperatura, monitor e procurar causa.\n2. **Status é operacionalmente >5 min:** não espere 30 min para tratar como emergência neurológica.\n3. **Benzodiazepínico em dose cheia:** midazolam IM/IN se sem acesso; lorazepam/diazepam IV se acesso. Repetir uma vez se necessário.\n4. **Se persiste após benzo:** segunda linha sem demora: fenitoína/fosfenitoina, levetiracetam ou valproato conforme disponibilidade e contraindicações.\n5. **refratário:** IOT, analgesia/sedação, anestésico contínuo, EEG quando disponível e UTI. Corrija etiologia em paralelo.\n\n> **Eclampsia:** crise convulsiva em gestante/puérpera é sulfato de magnésio, não fenitoína como primeira linha. Pense também em AVC/HSA/TVC se déficit focal, cefaleia explosiva ou rebaixamento persistente.\n\n### 4. Cefaleia grave, HSA, HIP e TVC\n\n1. **Cefaleia explosiva/pior da vida:** TC sem contraste. Se TC negativa e suspeita persistente, considerar LP ou angio/estratégia local.\n2. **HSA aneurismática provável:** analgesia, antiemético, PA controlada, nimodipina, neurocirurgia/intervenção para clipagem ou embolização.\n3. **Hemorragia intraparenquimatosa:** PA com controle contínuo e suave, suspender/reverter anticoagulante, corrigir coagulopatia, avaliar HIC e neurocirurgia.\n4. **Trombose venosa cerebral:** jovem, puerpério, anticoncepcional, trombofilia, cefaleia subaguda, crise ou déficit; pedir angioTC/venoRM. Anticoagulação com heparina pode ser indicada mesmo com hemorragia venosa, salvo contraindicação.\n5. **Meningite/encefalite:** se febre + cefaleia + rigidez/RNC, não atrase antibiótico/aciclovir por LP quando há indicação de TC antes.\n\n### 5. HIC e herniação iminente\n\nSuspeite se cefaleia progressiva, vômitos em jato, rebaixamento, papiledema, VI par, anisocoria, Cushing, postura anormal, TCE grave, HSA/HIP volumosa ou tumor/abscesso.\n\nConduta de ponte:\n\n1. Cabeceira 30 graus e cabeça neutra.\n2. Oxigenar e evitar hipoxemia; se intubado, capnografia.\n3. PaCO2 35-40 mmHg como regra; hiperventilar temporariamente se herniação enquanto faz terapia definitiva.\n4. Sedação/analgesia se agitado ou intubado.\n5. Manitol ou salina hipertônica conforme volemia, sódio, pressão e disponibilidade.\n6. TC, neurocirurgia e destino definitivo.\n\n> **ONSD/POCUS:** bainha do nervo óptico aumentada sugere HIC e pode acelerar decisão quando o paciente está instável ou a TC vai demorar. Não substitui TC se ela está disponível.\n\n### 6. TCE grave\n\n1. **Prioridade e evitar lesão secundária:** hipoxemia e hipotensão matam neurônio recuperável.\n2. **IOT se Glasgow <=8, perda de reflexos protetores, hipoxemia, agitação que impede cuidado ou necessidade de transporte/TC segura.**\n3. **Antes/depois da TC:** sedação contínua, analgesia, ventilação protetora, capnografia, PA-alvo, solução isotônica, evitar febre e corrigir coagulopatia.\n4. **Neurocirurgia imediata:** hematoma extradural/subdural volumoso, desvio de linha media, deterioração, anisocoria, fratura afundada complexa, contusão expansiva ou HIC refratária.\n5. **Não usar corticoide para TCE.** Profilaxia anticonvulsivante pode ser considerada nos primeiros 7 dias em TCE grave/lesão cortical, conforme protocolo local.\n\n### 7. Morte encefálica na sala vermelha\n\nAntes de pensar em protocolo:\n\n1. Causa conhecida, documentada e irreversível.\n2. Coma aperceptivo.\n3. Ausência de reatividade supraespinhal.\n4. Apneia persistente.\n5. Sem hipotermia, hipoxemia, choque, distúrbio metabólico grave ou droga depressora confundindo exame.\n\n> **Pegadinha de estação:** TCE grave + TC catastrofica + sem reflexos de tronco, mas hipotermico, hipoxêmico ou sob sedação relevante, não permite iniciar/concluir protocolo. Primeiro corrija confundidores e estabilize.\n\n## Conceitos que sustentam a conduta\n\n### AVCi: tempo, tecido e elegibilidade\n\nO objetivo da emergência é separar rápido três grupos: hemorragia, isquemia reperfundível e mímico. A TC sem contraste tira hemorragia do caminho; NIHSS mede gravidade; ASPECTS estima área já infartada; angio identifica oclusão de grande vaso. O erro clássico é pensar que \"NIHSS baixo\" sempre significa \"não tratar\": o que manda é déficit incapacitante, janela, imagem e risco.\n\nJanela básica para trombólise é até 4h30 desde o último visto bem. Para trombectomia, a prova gosta de NIHSS >=6, ASPECTS >=6, mRS prévio bom e oclusão de grande vaso, com janela clássica até 6 h e janela estendida até 24 h em selecionados.\n\n### Hemorragia: pressão, coagulação e neurocirurgia\n\nHIP/HSA não são \"só observar\". As primeiras horas definem expansão do hematoma, ressangramento, HIC e necessidade cirúrgica. O controle pressor deve ser contínuo e titulado, evitando picos e quedas bruscas. Anticoagulante em hemorragia intracraniana é emergência de reversão: varfarina pede PCC 4 fatores + vitamina K; dabigatrana pode pedir idarucizumabe; inibidor Xa pode pedir andexanet ou PCC conforme disponibilidade.\n\n### Status epilepticus: receptor muda com o tempo\n\nQuanto mais tempo a crise dura, menos responsiva fica ao benzodiazepínico e maior a chance de lesão, acidose, rabdomiólise, hipertermia e broncoaspiração. Por isso a sequência é em fases: estabilização 0-5 min, benzo 5-20 min, segunda linha 20-40 min, anestésico/UTI se refratário.\n\n### HIC/TCE: PPC e lesão secundária\n\nTCE grave e HIC são doenças de perfusão. Hipoxemia, hipotensão, febre, hipercapnia importante, hipocapnia prolongada, anemia grave e coagulopatia reduzem reserva cerebral. A hiperventilação baixa a PIC por vasoconstrição, mas também pode piorar isquemia; use como ponte curta em herniação, não como rotina.\n\n## Fluxograma\n\n### Deficit Focal Agudo\n\n```mermaid\nflowchart TD\n    A[Déficit focal súbito] --> B[ABCDE, glicemia, hora do último visto bem]\n    B --> C[NIHSS, PA, anticoagulante, mRS prévio]\n    C --> D[TC crânio sem contraste]\n    D -->|Hemorragia| E[HIP/HSA: controlar PA, reverter anticoagulante, neurocirurgia]\n    D -->|Sem hemorragia| F{Janela até 4h30 e déficit incapacitante?}\n    F -->|Sim| G[Checar contraindica e PA menor que 185/110]\n    G --> H[Trombólise se elegível]\n    F -->|Não| I[Antiagregar se indicado e investigar etiologia]\n    H --> J{Suspeita LVO ou NIHSS alto?}\n    I --> J\n    J -->|Sim| K[AngioTC/angioRM e acionar trombectomia]\n    J -->|Não| L[Unidade AVC/UTI, monitor, disfagia, controle clínico]\n```\n\n### Status Epilepticus\n\n```mermaid\nflowchart TD\n    A[Crise convulsiva ativa] --> B[0-5 min: ABC, O2, lateralizar, glicemia, acesso]\n    B --> C{Dura mais de 5 min ou recorrente sem recuperar?}\n    C -->|Sim| D[Benzo em dose cheia]\n    D --> E{Parou?}\n    E -->|Sim| F[Investigar causa, tratar etiologia, observar]\n    E -->|Não| G[Segunda linha: fenitoína/fosfenitoina, levetiracetam ou valproato]\n    G --> H{Persiste?}\n    H -->|Sim| I[IOT, sedação anestesica, EEG/UTI, tratar causa]\n    C -->|Não| F\n```\n\n### HIC/TCE Com deterioração\n\n```mermaid\nflowchart TD\n    A[TCE/HSA/HIP/coma com sinais de HIC] --> B[ABCDE, glicemia, pupilas, Glasgow]\n    B --> C[Oxigenar, PA adequada, cabeça 30 graus, pescoço neutro]\n    C --> D{Herniação iminente?}\n    D -->|Sim| E[Hipertônica ou manitol + hiperventilação temporária]\n    D -->|Não| F[Normocapnia, analgesia/sedação, evitar febre]\n    E --> G[TC e neurocirurgia imediata]\n    F --> G\n    G --> H[Reverter anticoagulante/coagulopatia e definir UTI/centro neuro]\n```\n\n## Doses, alvos e números\n\n### AVCi E Hemorragias\n\n| Item | Número | observação TEME |\n|---|---:|---|\n| TC no AVC | imediata; meta prática porta-imagem <=20-25 min | A prova quer TC sem contraste antes de trombólise |\n| Alteplase AVCi | 0,9 mg/kg, max 90 mg | 10% bolus, 90% em 60 min, até 4h30 |\n| Tenecteplase AVCi | 0,25 mg/kg, max 25 mg | Atualização; em prova brasileira, cuidado com PCDT/bula |\n| PA antes da trombólise | <185/110 mmHg | Se refratária, contraindica trombólise |\n| PA após trombólise | <180/105 mmHg por 24 h | Monitor frequente |\n| AVCi sem reperfusão | tratar se >=220/120; reduzir ~15% em 24 h | Evitar queda abrupta da perfusão |\n| Trombectomia até 6 h | LVO anterior, mRS 0-1/2, NIHSS >=6, ASPECTS >=6 | Banca gosta de ACM M1/carotida interna |\n| Trombectomia 6-24 h | selecionados por DAWN/DEFUSE/mismatch | Não é \"todo AVC até 24 h\" |\n| HIP leve-moderada com PAS 150-220 | alvo PAS 140; manter 130-150 | Evitar PAS <130 |\n| Varfarina + HIC | PCC 4 fatores + vitamina K IV | Não esperar \"lavar\" anticoagulante |\n| Plaquetas em sangramento SNC/TCE | mirar >100.000/mm3 | Estação prática costuma cobrar alvo alto |\n| HSA aneurismática | nimodipina 60 mg VO/enteral 4/4 h por 21 dias | Se hipotensão, ajustar com neuro/UTI |\n\n### Convulsão E Status\n\n| Item | Número | observação TEME |\n|---|---:|---|\n| Status epilepticus | crise >5 min ou crises sem recuperar consciência | Não esperar 30 min |\n| Midazolam IM | 0,15-0,2 mg/kg, usual max 10 mg | Boa opção sem acesso |\n| Midazolam IN/bucal | 0,2 mg/kg, max 10 mg | Útil no APH/pediatria, conforme disponibilidade |\n| Lorazepam IV | 0,1 mg/kg, max 4 mg por dose | Repetir 1 vez se necessário |\n| Diazepam IV | 0,15-0,2 mg/kg, max 10 mg | Mais recorrência que lorazepam |\n| Fenitoína IV | 20 mg/kg | Em SF 0,9%; max 50 mg/min; monitor ECG/PA |\n| Fosfenitoina IV/IM | 20 mg PE/kg | Melhor tolerância, se disponível |\n| Levetiracetam IV | 40-60 mg/kg, max 4,5 g | Pouca interacao; alternativa moderna |\n| Valproato IV | 20-40 mg/kg, max 3 g | Evitar hepatopatia, plaquetopenia, gestação |\n| Eclampsia | MgSO4 4-6 g IV ataque; 1-2 g/h manutenção | Anticonvulsivante de escolha |\n\n### HIC E TCE\n\n| Item | Número | observação TEME |\n|---|---:|---|\n| Cabeceira | 30 graus | Cabeça neutra, sem compressão jugular |\n| PaCO2 TCE/HIC sem herniação | 35-40 mmHg | Normocapnia; capnografia obrigatória se IOT |\n| Hiperventilação de ponte | PaCO2 ~30-35 mmHg por curto período | Só herniação/deterioração até terapia definitiva |\n| Manitol 20% | 0,25-1 g/kg IV | Evitar hipovolemia/choque/IRA importante |\n| NaCl 3% | 2-3 mL/kg ou bolus 100-250 mL | Ajustar a protocolo local |\n| NaCl 20% | 30 mL bolus | Número apareceu em aula/curso; checar protocolo |\n| PAS mínima TCE grave | >=100 mmHg se 50-69 anos; >=110 se 15-49 ou >70 | Na sala vermelha, \"sem hipotensão\" é a ideia-mãe |\n| Saturação | >94% | Evitar hipoxemia e hiperoxia sem alvo |\n| Temperatura | normotermia; tratar febre | Hipotermia terapêutica rotineira não melhora desfecho |\n| Corticoide no TCE | não usar | Aumenta mortalidade em TCE grave |\n| Profilaxia crise TCE grave | 7 dias, conforme protocolo | Fenitoína ou levetiracetam; não previne epilepsia tardia |\n\n## Pegadinhas TEME\n\n- **Não medir glicemia no \"AVC\":** hipoglicemia e mímico clássico e deve ser corrigida antes de carimbar AVC.\n- **Confundir último visto bem com hora em que foi encontrado:** para janela de reperfusão, vale o último momento assintomático conhecido.\n- **NIHSS baixo = sem trombólise:** errado se déficit e incapacitante. O que não se trombolisa e déficit leve não incapacitante.\n- **Crise no início exclui AVC:** não exclui; pode ser AVC com crise ou paresia de Todd. A decisão depende do déficit residual e da imagem.\n- **Esperar INR/plaqueta de todo mundo para trombolisar:** se não há suspeita de anticoagulação/coagulopatia, não atrasar. Em varfarina/heparina/coagulopatia, precisa checar.\n- **Baixar PA forte no AVCi sem reperfusão:** pode piorar penumbra. Trate agressivamente só sé indicação específica.\n- **Trombectomia até 24 h para qualquer AVC:** precisa LVO e selecao por imagem/critérios.\n- **Benzodiazepínico subdosado no status:** dose quebrada falha; faça dose plena e avance para segunda linha.\n- **Fenitoína para eclampsia:** primeira linha é sulfato de magnésio.\n- **LP antes da TC em RNC/focal/papiledema/crise recente/imunossupressão:** risco de herniação e erro de prova.\n- **Hiperventilar todo TCE grave:** ponte para herniação, não rotina.\n- **Hipotensão permissiva no TCE:** permissiva vale para hemorragia sem TCE; no TCE grave, evite hipotensão.\n- **Corticoide para edema do TCE:** contraindicado.\n- **Nimodipina na HSA traumática:** benefício é para HSA aneurismática; em traumática não é rotina de prova.\n- **Abrir ME com hipotermia, hipoxemia ou sedação:** não. Primeiro corrigir confundidores.\n\n## Erros fatais na prática\n\n- Não proteger via aérea em paciente com rebaixamento, vômitos, sangramento orofaríngeo ou hipoxemia antes de transporte/TC.\n- Não registrar último visto bem, anticoagulantes, NIHSS, pupilas e Glasgow antes de sedar/intubar.\n- Atrasar TC/angioTC em AVC candidato a reperfusão por exames que não mudam a decisão imediata.\n- Dar trombolítico em suspeita de HSA, sangramento intracraniano, INR alto, plaqueta <100.000 ou PA refratária.\n- Repetir benzodiazepínico indefinidamente e esquecer segunda linha/status refratário.\n- Fazer LP em paciente com sinais de HIC sem imagem/segurança.\n- Deixar TCE grave hipotenso, hipoxêmico, hipercápnico ou febril.\n- Não reverter anticoagulação em hemorragia intracraniana.\n- Não acionar neurocirurgia/intervencionista cedo quando há lesão expansiva, hidrocefalia, HSA aneurismática ou LVO.\n- Concluir morte encefálica sem preencher pré-requisitos legais e fisiológicos.\n\n## Para prova vs na prática\n\n| Tema | Para prova TEME | Na prática clínica |\n|---|---|---|\n| AVCi trombólise | Alteplase 0,9 mg/kg até 4h30, TC sem sangramento, PA <185/110 | Muitos centros usam tenecteplase 0,25 mg/kg em protocolos; alinhar com neurologia, PCDT, farmacia e bula/local |\n| AVCi leve | Não trombolisar déficit leve sem incapacidade | Afasia, hemianopsia, mão dominante, ataxia incapacitante ou profissao podem tornar \"leve\" clinicamente relevante |\n| Trombectomia | NIHSS >=6, ASPECTS >=6, LVO, janela até 6 h; até 24 h selecionado | Imagem avançada, transferência e discussão com centro de AVC decidem muito |\n| PA no AVCi | <185/110 antes e <180/105 depois do litico; sem litico tratar se >=220/120 | Ajustar se dissecção, IAM, EAP, encefalopatia hipertensiva ou trombectomia |\n| HIP | PAS alvo 140, manter 130-150 se leve-moderada | Evitar queda brusca; individualizar em hematoma grande, HIC, cirurgia e comorbidades |\n| HSA | TC; se suspeita persiste, investigar; nimodipina e neurocirurgia | LP, angioTC, RM e fluxo local variam conforme tempo da cefaleia e qualidade da TC |\n| Status epilepticus | Benzo dose cheia, depois fenitoína/fosfenitoina/levetiracetam/valproato | Levetiracetam e valproato cresceram por praticidade; fenitoína segue muito cobrada |\n| TCE/HIC | HOB 30, normocapnia, manitol/hipertônica, evitar hipoxemia/hipotensão | Monitorizacao invasiva, sedação, osmoterapia e neurocirurgia dependem do centro |\n| ME | Não iniciar/concluir com confundidores | Seguir estritamente CFM, hospital, CIHDOTT/OPO e documentação |\n\n## Checklist de revisão\n\n- [ ] Sei fazer abordagem inicial de coma/déficit focal/crise sem esquecer glicemia.\n- [ ] Sei dose e janela de alteplase e quando lembrar da tenecteplase.\n- [ ] Sei metas de PA no AVCi com litico, AVCi sem litico e HIP.\n- [ ] Sei critério básico de trombectomia e que janela estendida exige selecao.\n- [ ] Sei tratar status em fases e não ficar preso em benzodiazepínico.\n- [ ] Sei quando TC deve vir antes da LP.\n- [ ] Sei medidas iniciais de HIC e quando hiperventilar.\n- [ ] Sei alvos de TCE grave: oxigenação, PA, PaCO2, temperatura e coagulação.\n- [ ] Sei que corticoide não é tratamento de TCE.\n- [ ] Sei por que não abrir ME com hipotermia/hipoxemia/sedação/confundidores.\n\n## Questões e estações relacionadas\n\n- **TEME22:** TCE grave/possível ME; AVCi e decisão após TC; mal agudo da montanha; encefalopatia hepática; crise/lesões em imunossuprimido; VNI contraindicada em AVE com rebaixamento/disfagia/secreção.\n- **TEME24 prática:** TCE pediátrico com indicação de imagem; estação de neuro com TCE, HSA traumática/hematoma intraparenquimatoso, ausência de reflexos de tronco e impeditivos para ME.\n- **TEME25 teórica/prática:** tenecteplase vs alteplase; eclampsia pós-parto; síncope simulando convulsão; ONSD >6 mm e HIC; TCE/via aérea; AVCi com NIHSS alto/ASPECTS; pré-requisitos de morte encefálica.\n- **Emergency Talks:** aulas 02, 03, 12, 18, 40 e 45; `Resumo do Emergency.docx`.\n\n## Referências\n\n**Prova/TEME**\n\n- Conteúdo programático TEME26.\n- Referências bibliográficas TEME26, incluindo Manual de Via aérea 2
