<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Resumos de Emergência por Dr. Thiago Persona." />
  <title>Resumos de Emergência</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    onerror="this.onerror=null;this.href='https://unpkg.com/docsify@4/lib/themes/vue.css'"
  />
  <style>
    :root {
      --bg: #eef4f7;
      --surface: #eef4f7;
      --surface-soft: #e7f0f4;
      --card: #f8fbfc;
      --border: #d4e0e5;
      --text: #202733;
      --muted: #606775;
      --link: #0f6b5f;
      --link-soft: #dcefeb;
      --code-bg: #e4edf1;
      --sidebar-width: 320px;
      --content-max: 1240px;
      --content-pad: 36px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      letter-spacing: 0;
    }

    body {
      overflow-x: hidden;
    }

    #app {
      min-height: 100vh;
      background: var(--bg);
    }

    main,
    #main {
      min-height: 100vh;
    }

    .app-name-link img {
      display: none;
    }

    .sidebar {
      position: fixed !important;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 20;
      width: var(--sidebar-width) !important;
      padding: 58px 18px 28px;
      overflow-x: hidden;
      overflow-y: auto;
      background: var(--surface-soft) !important;
      border-right: 1px solid var(--border);
      transform: translateX(0);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .sidebar .app-name {
      margin: 0 0 18px;
      padding: 0 8px;
      color: var(--text);
      font-size: 1.04rem;
      font-weight: 750;
      line-height: 1.25;
      text-align: left;
    }

    .sidebar .app-name a {
      color: var(--text);
    }

    .brand-subtitle {
      display: block;
      margin-top: 0.28rem;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0;
    }

    .sidebar-nav {
      padding: 0 0 1.5rem;
    }

    .sidebar-nav ul,
    .sidebar-nav li {
      margin: 0;
    }

    .sidebar-nav > ul > li > p,
    .sidebar-nav > ul > li > a {
      margin: 0 0 10px;
      padding: 0 8px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .sidebar-nav li a {
      display: block;
      min-height: 34px;
      margin: 2px 0;
      padding: 7px 10px;
      border-radius: 8px;
      color: #303846;
      font-size: 0.94rem;
      line-height: 1.32;
      text-decoration: none;
      white-space: normal;
    }

    .sidebar-nav li.active > a,
    .sidebar-nav li a:hover {
      background: var(--link-soft);
      color: var(--link);
      font-weight: 650;
    }

    .sidebar-toggle {
      position: fixed !important;
      top: 12px !important;
      left: 14px !important;
      z-index: 35 !important;
      width: 38px;
      height: 38px;
      padding: 9px !important;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(248, 251, 252, 0.94);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.10);
    }

    .sidebar-toggle span {
      width: 18px !important;
      height: 2px !important;
      margin-bottom: 4px !important;
      background-color: var(--text) !important;
    }

    .content {
      position: absolute !important;
      top: 0 !important;
      right: 0 !important;
      left: var(--sidebar-width) !important;
      min-height: 100vh;
      margin-left: 0 !important;
      padding: 0 !important;
      background: var(--surface);
    }

    .markdown-section {
      max-width: var(--content-max) !important;
      margin: 0 auto !important;
      padding: 48px var(--content-pad) 84px !important;
      color: var(--text);
      line-height: 1.66;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 {
      color: var(--text);
      font-weight: 760;
      letter-spacing: 0;
      line-height: 1.24;
    }

    .markdown-section h1 {
      margin: 0 0 1.2rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: clamp(2rem, 2.6vw, 3rem);
    }

    .markdown-section h2 {
      margin-top: 2.15rem;
      padding-top: 0.35rem;
      font-size: 1.55rem;
    }

    .markdown-section h3 {
      margin-top: 1.65rem;
      font-size: 1.25rem;
    }

    .markdown-section p,
    .markdown-section li,
    .markdown-section td,
    .markdown-section th,
    .markdown-section blockquote {
      font-size: 1.04rem;
    }

    .markdown-section p,
    .markdown-section ul,
    .markdown-section ol {
      margin: 0.75rem 0;
    }

    .markdown-section a {
      color: var(--link);
      font-weight: 620;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .markdown-section blockquote {
      margin: 1.15rem 0;
      padding: 0.95rem 1rem;
      border-left: 4px solid var(--link);
      border-radius: 0 8px 8px 0;
      background: #e4f1f1;
      color: #273340;
    }

    .markdown-section code {
      border-radius: 6px;
      background: var(--code-bg);
      color: #2d3642;
      font-size: 0.92em;
    }

    .markdown-section pre {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #e9f1f4;
    }

    .markdown-section table {
      display: table;
      width: 100%;
      margin: 1rem 0 1.25rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      border-collapse: collapse;
      table-layout: auto;
      overflow: hidden;
    }

    .markdown-section th {
      background: #dde9ed;
      color: #22303a;
      font-weight: 720;
    }

    .markdown-section th,
    .markdown-section td {
      min-width: 0;
      padding: 0.66rem 0.72rem;
      border-color: var(--border);
      vertical-align: top;
      overflow-wrap: break-word;
      word-break: normal;
    }

    .markdown-section th {
      white-space: nowrap;
    }

    .markdown-section table.table-compact {
      table-layout: fixed;
    }

    .markdown-section table.table-compact th,
    .markdown-section table.table-compact td {
      padding: 0.62rem 0.58rem;
      font-size: 0.98rem;
      overflow-wrap: normal;
      white-space: nowrap;
    }

    .markdown-section table.table-compact th:not(:first-child),
    .markdown-section table.table-compact td:not(:first-child) {
      text-align: right;
    }

    .markdown-section table.table-compact th:first-child,
    .markdown-section table.table-compact td:first-child {
      text-align: left;
    }

    .markdown-section tr:nth-child(even) td {
      background: #f2f7f8;
    }

    .mermaid {
      width: 100%;
      margin: 1.1rem 0 1.35rem;
      padding: 0.75rem;
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
    }

    .mermaid svg {
      display: block;
      width: 100% !important;
      min-width: 0;
      height: auto !important;
      max-width: 100% !important;
    }

    .quiz-card {
      margin: 1.35rem 0;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.05);
    }

    .quiz-source {
      margin-top: 0 !important;
      color: var(--muted);
      font-size: 0.92rem !important;
      font-weight: 650;
    }

    .quiz-note {
      margin: 0.45rem 0 0.75rem !important;
      padding: 0.62rem 0.78rem;
      border-left: 3px solid #7abbb0;
      border-radius: 0 8px 8px 0;
      background: #e4f1f1;
      color: #4b5867;
      font-size: 0.94rem !important;
      line-height: 1.45;
    }

    .quiz-options {
      display: grid;
      gap: 0.55rem;
      margin: 0.9rem 0;
    }

    .quiz-option {
      display: flex;
      gap: 0.62rem;
      align-items: flex-start;
      min-height: 44px;
      padding: 0.72rem 0.78rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #eef4f7;
      color: var(--text);
      cursor: pointer;
      line-height: 1.45;
      transition: border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
    }

    .quiz-option:hover,
    .quiz-option.is-selected {
      border-color: #7abbb0;
      background: #e4f1f1;
    }

    .quiz-option.is-locked {
      cursor: default;
    }

    .quiz-option.is-correct {
      border-color: #1f8f72;
      background: #dff3ea;
    }

    .quiz-option.is-wrong {
      border-color: #b75c5c;
      background: #f5e3e3;
    }

    .quiz-option input {
      flex: 0 0 auto;
      margin-top: 0.23rem;
      accent-color: var(--link);
    }

    .quiz-check {
      min-height: 40px;
      padding: 0.62rem 0.9rem;
      border: 1px solid var(--link);
      border-radius: 8px;
      background: var(--link);
      color: #ffffff;
      font: inherit;
      font-weight: 720;
      cursor: pointer;
    }

    .quiz-check:hover {
      background: #0b5b51;
      border-color: #0b5b51;
    }

    .quiz-check:disabled {
      border-color: #97a6ad;
      background: #97a6ad;
      cursor: default;
    }

    .quiz-feedback {
      margin-top: 0.9rem;
      padding: 0.85rem 0.95rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #eef4f7;
    }

    .quiz-feedback[hidden] {
      display: none !important;
    }

    .quiz-feedback.is-correct {
      border-color: #1f8f72;
      background: #dff3ea;
    }

    .quiz-feedback.is-wrong {
      border-color: #b75c5c;
      background: #f5e3e3;
    }

    .quiz-feedback.is-warning {
      border-color: #b58a2b;
      background: #f4ecd8;
    }

    .quiz-explain {
      display: grid;
      gap: 0.42rem;
      margin: 0.7rem 0 0 !important;
      padding-left: 1.05rem !important;
    }

    .quiz-explain li {
      margin: 0 !important;
      line-height: 1.48;
    }

    .quiz-figure {
      margin: 0.9rem 0;
      padding: 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #eef4f7;
    }

    .quiz-figure svg {
      display: block;
      width: 100%;
      max-width: 640px;
      height: auto;
      margin: 0 auto;
    }

    .quiz-figure figcaption {
      margin-top: 0.55rem;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 650;
      text-align: center;
    }

    .quiz-summary {
      margin: 1.4rem 0 1.8rem;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #e4f1f1;
    }

    .quiz-summary h2 {
      margin-top: 0 !important;
      padding-top: 0 !important;
      border-top: 0 !important;
    }

    .quiz-summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.65rem;
      margin: 0.8rem 0;
    }

    .quiz-summary-stat {
      padding: 0.7rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
    }

    .quiz-summary-stat strong {
      display: block;
      color: var(--text);
      font-size: 1.35rem;
      line-height: 1.1;
    }

    .quiz-summary-stat span {
      display: block;
      margin-top: 0.2rem;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 650;
    }

    .quiz-progress {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #d4e0e5;
    }

    .quiz-progress span {
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: var(--link);
      transition: width 180ms ease;
    }

    .quiz-summary-note {
      margin-bottom: 0 !important;
      color: var(--muted);
      font-size: 0.95rem !important;
      font-weight: 650;
    }

    .loading-msg,
    .fallback-msg {
      max-width: 760px;
      margin: 4rem auto;
      padding: 1.25rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: var(--muted);
      text-align: center;
    }

    .loading-msg a,
    .fallback-msg a {
      color: var(--link);
      font-weight: 650;
    }

    .file-help {
      display: none;
      margin-top: 1rem;
      text-align: left;
    }

    body.close .sidebar {
      transform: translateX(calc(-1 * var(--sidebar-width)));
    }

    body.close .content {
      left: 0 !important;
      margin-left: 0 !important;
    }

    body.close #main,
    body.close main {
      left: 0 !important;
      margin-left: 0 !important;
    }

    @media (max-width: 980px) {
      :root {
        --sidebar-width: min(86vw, 340px);
        --content-pad: 24px;
      }

      .content,
      section.content,
      main,
      #main,
      body.close .content {
        left: 0 !important;
        margin-left: 0 !important;
        width: 100% !important;
        transform: none !important;
      }

      .sidebar {
        box-shadow: 18px 0 42px rgba(15, 23, 42, 0.16);
      }

      .sidebar {
        transform: translateX(0);
      }

      body.close .sidebar {
        transform: translateX(-100%);
      }
    }

    @media (max-width: 640px) {
      :root {
        --content-pad: 18px;
      }

      .markdown-section {
        padding-top: 64px !important;
      }

      .markdown-section h1 {
        font-size: 1.8rem;
      }

      .markdown-section p,
      .markdown-section li,
      .markdown-section td,
      .markdown-section th,
      .markdown-section blockquote {
        font-size: 1rem;
      }

      .markdown-section th,
      .markdown-section td {
        min-width: 130px;
      }

      .markdown-section table {
        display: block;
        overflow-x: auto;
        table-layout: auto;
      }

      .markdown-section table.table-compact {
        min-width: 760px;
      }

      .quiz-summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .mermaid svg {
        width: 860px !important;
        min-width: 860px;
        max-width: none !important;
      }
    }

    @media print {
      .sidebar,
      .sidebar-toggle {
        display: none !important;
      }

      .content {
        margin-left: 0 !important;
      }

      .markdown-section {
        max-width: none !important;
        padding: 0 !important;
      }
    }
  </style>
</head>
<body class="close">
  <div id="app">
    <div class="loading-msg">
      <p>Carregando Resumos de Emergência...</p>
      <p>
        <a href="LEITURA_OFICIAL.md">Leitura principal</a>
        ·
        <a href="MAPA_DE_QUESTOES_TEME22-25.md">Mapa de questões</a>
      </p>
      <p class="file-help" id="file-help">
        Você abriu por <code>file://</code>. O leitor completo precisa de servidor local ou GitHub Pages para carregar os arquivos Markdown.
        Abra pelo GitHub Pages ou rode <code>python -m http.server 8000</code> na pasta do projeto.
      </p>
    </div>
  </div>

  <script>
    const isFileProtocol = location.protocol === "file:";

    function loadScript(src, fallback) {
      return new Promise((resolve) => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = () => {
          if (!fallback) {
            resolve();
            return;
          }
          script.onerror = null;
          script.src = fallback;
        };
        document.body.appendChild(script);
      });
    }

    function markAppLoaded() {
      const app = document.getElementById("app");
      if (app) app.dataset.loaded = "1";
    }

    function ensureBranding() {
      const appName = document.querySelector(".sidebar .app-name");
      const link = appName ? appName.querySelector("a") : null;
      if (!appName || !link) return;

      link.textContent = "Resumos de Emergência";
      if (!appName.querySelector(".brand-subtitle")) {
        const subtitle = document.createElement("span");
        subtitle.className = "brand-subtitle";
        subtitle.textContent = "Dr. Thiago Persona";
        appName.appendChild(subtitle);
      }
    }

    function normalizeThemeLinks() {
      document.querySelectorAll('a[href*="temas/temas/"]').forEach((link) => {
        const href = link.getAttribute("href");
        if (href) link.setAttribute("href", href.replace(/temas\/temas\//g, "temas/"));
      });
    }

    function tuneExternalLinks() {
      document.querySelectorAll(".markdown-section a[href^='http']").forEach((link) => {
        link.setAttribute("target", "_blank");
        link.setAttribute("rel", "noopener noreferrer");
      });
    }

    function tuneTables() {
      document.querySelectorAll(".markdown-section table").forEach((table) => {
        const firstRow = table.querySelector("tr");
        const columns = firstRow ? firstRow.children.length : 0;
        table.classList.toggle("table-compact", columns >= 6);
      });
    }

    function initQuizzes() {
      const section = document.querySelector(".markdown-section");
      const cards = Array.from(document.querySelectorAll(".quiz-card"));

      if (section && cards.length) ensureQuizSummary(section, cards);

      cards.forEach((card) => {
        if (card.dataset.quizReady === "1") return;
        const answer = card.dataset.answer;
        const button = card.querySelector(".quiz-check");
        const feedback = card.querySelector(".quiz-feedback");
        const options = Array.from(card.querySelectorAll(".quiz-option"));

        if (!answer || !button || !feedback || !options.length) return;
        feedback.dataset.originalHtml = feedback.innerHTML;

        options.forEach((option) => {
          const input = option.querySelector("input[type='radio']");
          if (!input) return;
          input.addEventListener("change", () => {
            options.forEach((item) => {
              const itemInput = item.querySelector("input[type='radio']");
              item.classList.toggle("is-selected", Boolean(itemInput && itemInput.checked));
            });
          });
        });

        button.addEventListener("click", () => {
          if (card.dataset.locked === "1") return;

          const checked = card.querySelector("input[type='radio']:checked");
          options.forEach((option) => {
            option.classList.remove("is-correct", "is-wrong");
            const input = option.querySelector("input[type='radio']");
            if (!input || !checked) return;
            if (input.value === answer) option.classList.add("is-correct");
            if (input.checked && input.value !== answer) option.classList.add("is-wrong");
          });

          feedback.hidden = false;
          feedback.className = "quiz-feedback";

          if (!checked) {
            feedback.classList.add("is-warning");
            feedback.innerHTML = "<p><strong>Escolha uma alternativa primeiro.</strong></p>";
            return;
          }

          const isCorrect = checked.value === answer;
          card.dataset.locked = "1";
          card.dataset.correct = isCorrect ? "1" : "0";
          button.disabled = true;
          button.textContent = "Resposta checada";

          options.forEach((option) => {
            option.classList.add("is-locked");
            const input = option.querySelector("input[type='radio']");
            if (input) input.disabled = true;
          });

          feedback.classList.add(isCorrect ? "is-correct" : "is-wrong");
          feedback.innerHTML = `<p><strong>${isCorrect ? "Correto." : "Ainda não."}</strong> Gabarito: ${answer}.</p>${feedback.dataset.originalHtml}`;
          updateQuizSummary();
        });

        card.dataset.quizReady = "1";
      });
    }

    function ensureQuizSummary(section, cards) {
      if (section.querySelector(".quiz-summary")) {
        updateQuizSummary();
        return;
      }

      const summary = document.createElement("section");
      summary.className = "quiz-summary";
      summary.setAttribute("aria-live", "polite");
      cards[cards.length - 1].insertAdjacentElement("afterend", summary);
      updateQuizSummary();
    }

    function updateQuizSummary() {
      const section = document.querySelector(".markdown-section");
      if (!section) return;

      const summary = section.querySelector(".quiz-summary");
      const cards = Array.from(section.querySelectorAll(".quiz-card"));
      if (!summary || !cards.length) return;

      const total = cards.length;
      const answered = cards.filter((card) => card.dataset.locked === "1").length;
      const correct = cards.filter((card) => card.dataset.correct === "1").length;
      const wrong = answered - correct;
      const completion = Math.round((answered / total) * 100);
      const accuracy = answered ? Math.round((correct / answered) * 100) : 0;
      const note = answered === total
        ? `Tema concluído: ${correct}/${total} acertos (${accuracy}%).`
        : `Resolvidas ${answered} de ${total}. A alternativa trava depois de checar.`;

      summary.innerHTML = `
        <h2>Desempenho do tema</h2>
        <div class="quiz-summary-grid">
          <div class="quiz-summary-stat"><strong>${answered}/${total}</strong><span>respondidas</span></div>
          <div class="quiz-summary-stat"><strong>${correct}</strong><span>acertos</span></div>
          <div class="quiz-summary-stat"><strong>${wrong}</strong><span>erros</span></div>
          <div class="quiz-summary-stat"><strong>${accuracy}%</strong><span>aproveitamento</span></div>
        </div>
        <div class="quiz-progress" aria-label="Progresso da prova"><span style="width: ${completion}%"></span></div>
        <p class="quiz-summary-note">${note}</p>
      `;
    }

    function ensureMermaidInit() {
      if (window.__mermaidReady || typeof window.mermaid !== "object" || typeof window.mermaid.initialize !== "function") return;
      window.mermaid.initialize({
        startOnLoad: false,
        securityLevel: "loose",
        flowchart: {
          htmlLabels: true,
          useMaxWidth: true,
          nodeSpacing: 34,
          rankSpacing: 42
        },
        theme: "neutral",
        themeVariables: {
          fontFamily: "Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif",
          fontSize: "16px"
        }
      });
      window.__mermaidReady = true;
    }

    function renderMermaid(attempt = 0) {
      ensureMermaidInit();

      const nodes = document.querySelectorAll("pre code.language-mermaid, pre code.lang-mermaid");
      if (!nodes.length) return;

      if (typeof window.mermaid !== "object" || typeof window.mermaid.run !== "function") {
        if (attempt < 12) window.setTimeout(() => renderMermaid(attempt + 1), 200);
        return;
      }

      const wrappers = [];
      nodes.forEach((codeBlock) => {
        const pre = codeBlock.closest("pre");
        if (!pre || pre.dataset.mermaidConverted === "1") return;

        const wrapper = document.createElement("div");
        wrapper.className = "mermaid";
        wrapper.textContent = (codeBlock.textContent || "").trim();
        pre.dataset.mermaidConverted = "1";
        pre.replaceWith(wrapper);
        wrappers.push(wrapper);
      });

      if (!wrappers.length) return;

      window.mermaid.run({ nodes: wrappers }).catch(() => {
        wrappers.forEach((wrapper) => {
          wrapper.dataset.mermaidError = "1";
        });
      });
    }

    function afterRender() {
      ensureBranding();
      normalizeThemeLinks();
      tuneExternalLinks();
      tuneTables();
      initQuizzes();
      renderMermaid();
      markAppLoaded();
    }

    if (isFileProtocol) {
      const help = document.getElementById("file-help");
      if (help) help.style.display = "block";
      markAppLoaded();
    } else {
      document.body.classList.toggle("close", window.innerWidth <= 980);

      window.$docsify = {
        name: "Resumos de Emergência",
        homepage: "LEITURA_OFICIAL.md",
        loadSidebar: "_sidebar.md",
        loadNavbar: false,
        auto2top: true,
        executeScript: true,
        maxLevel: 4,
        subMaxLevel: 0,
        relativePath: false,
        routerMode: "hash",
        alias: {
          "/.*/_sidebar.md": "/_sidebar.md",
          "/.*/index-online-sidebar.md": "/_sidebar.md"
        },
        markdown: {
          smartypants: false
        },
        plugins: [
          function(hook) {
            hook.ready(() => {
              if (window.innerWidth <= 980) document.body.classList.add("close");
              afterRender();
            });
            hook.doneEach(afterRender);
          }
        ]
      };

      loadScript(
        "https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js",
        "https://unpkg.com/docsify@4/lib/docsify.min.js"
      )
        .then(() => loadScript(
          "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js",
          "https://unpkg.com/mermaid@10/dist/mermaid.min.js"
        ))
        .then(() => renderMermaid());

      window.setTimeout(() => {
        const app = document.getElementById("app");
        if (!app || app.dataset.loaded === "1") return;
        app.innerHTML = `
          <div class="fallback-msg">
            <p>O leitor está demorando para carregar.</p>
            <p><a href="LEITURA_OFICIAL.md">Abrir leitura principal em Markdown</a></p>
            <p><a href="MAPA_DE_QUESTOES_TEME22-25.md">Abrir mapa de questões em Markdown</a></p>
            <p><a href="javascript:location.reload()">Recarregar</a></p>
          </div>
        `;
      }, 12000);
    }
  </script>
</body>
</html>
