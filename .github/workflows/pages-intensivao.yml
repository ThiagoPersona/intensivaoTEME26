name: Deploy Intensivao TEME26 Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Montar site
        run: |
          set -euo pipefail
          mkdir -p site/Intensivao site/Intensivao/temas site/Intensivao/assets
          mkdir -p site/temas site/assets
          shopt -s nullglob

          # Publicação na raiz (padrão dos Links do GitHub Pages): /index-online.html
          cp -f *.html site/ 2>/dev/null || true
          cp -f *.md site/ 2>/dev/null || true
          cp -f Intensivao/*.html site/ 2>/dev/null || true
          cp -f Intensivao/*.md site/ 2>/dev/null || true
          cp -f Intensivao/index-online-sidebar.md site/_sidebar.md 2>/dev/null || true
          cp -f Intensivao/index-online-sidebar.md site/Intensivao/_sidebar.md 2>/dev/null || true
          cp -f Intensivao/*.html site/Intensivao/ 2>/dev/null || true
          cp -f Intensivao/*.md site/Intensivao/ 2>/dev/null || true
          for file in Intensivao/temas/*.md; do
            cp "$file" site/Intensivao/temas/
            cp "$file" site/temas/
          done
          for file in Intensivao/assets/*.md; do
            cp "$file" site/Intensivao/assets/
            cp "$file" site/assets/
          done
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - id: deployment
        uses: actions/deploy-pages@v4
